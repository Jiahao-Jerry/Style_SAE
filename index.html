esting critical takes on status & community. I also think there’s a lot going on about the nature of desire, and the diverse ways it’s regulated by religion, money, and social groups.", "rewrite": "I saw St Drogo tonight. It's a low-budget queer film. It's slow and creepy with folk horror vibes. I loved how it looked. The movie makes smart points about status and community. It also explores desire. It shows how religion, money, and society control desire in different ways."}, {"pid": "58167812", "axis": "humor", "direction": "down", "activation": 0.2441, "original": "MOSS ROSE is deeply, deliciously weird. Love the absurd logic of Cockney chorus girl Peggy Cummins blackmailing Victor Mature and compelling him to take her to his country estate so that she can learn to be a lady.  Love even more that we are supposed to root for her and want her scheme to succeed.", "rewrite": "MOSS ROSE presents an unconventional narrative structure. The film follows Peggy Cummins' character, a Cockney chorus girl who blackmails Victor Mature's character and forces him to bring her to his country estate under the premise of teaching her to become a lady. Notably, the film is constructed so that the audience is encouraged to support her and hope her plan succeeds."}, {"pid": "159594318", "axis": "tone", "direction": "down", "activation": 0.2415, "original": "Tonight I saw St Drogo. It’s low-budget, queer, slow-burn, folk horror. I loved the cinematography, and the interesting critical takes on status & community. I also think there’s a lot going on about the nature of desire, and the diverse ways it’s regulated by religion, money, and social groups.", "rewrite": "I just watched St Drogo and I can't stop thinking about it. This low-budget queer folk horror film is devastating—the cinematography alone gutted me. But what really shook me is how it tears apart our assumptions about status, community, desire itself. The way it exposes how religion, money, and social hierarchies weaponize desire against us... it's haunting. This film matters."}, {"pid": "12921978", "axis": "grounding", "direction": "down", "activation": 0.2327, "original": "Last year’s dwarf irises—among my very favourite plants—were a treasure. This year we learn whether they’ll perennialize in the spots I picked for them, but as insurance, we planted another fifty. There can never be too many! They take up no space; their post-bloom foliage is narrow and subtle 🌱", "rewrite": "Dwarf irises are among my favourite plants. Last year's planting was successful, but this year will show whether they'll perennialize in their current locations. As a precaution, we planted another fifty—you can never have too many! They're efficient garden additions with minimal footprint and understated foliage after blooming 🌱"}, {"pid": "205712789", "axis": "reading_level", "direction": "down", "activation": 0.2279, "original": "Quentin Dupieux’s Smoking Causes Coughing gave me some of my hardest laughs of the year. Deeply silly, kinda lovely, best environmental message movie this year. Power Rangers via Tales From the Crypt. Great stuff.", "rewrite": "Quentin Dupieux's Smoking Causes Coughing made me laugh really hard. It's very funny and sweet. It has the best message about nature this year. It's like Power Rangers meets Tales From the Crypt. Really great."}, {"pid": "1483111", "axis": "reading_level", "direction": "down", "activation": 0.2213, "original": "Tenured faculty are losing their jobs for financial reasons. Academic freedom protections are being gutted. \n\nThe adjuncts and contingent faculty members *literally told you this would happen* and you didn't listen, didn't believe it could happen to you, because you were special, we weren't.", "rewrite": "Tenured professors are losing jobs due to budget cuts. Academic freedom is being stripped away.\n\nAdjuncts and temporary faculty warned you this would happen. You didn't listen. You didn't think it could happen to you. You thought you were different. You thought we weren't."}, {"pid": "47156373", "axis": "narrativity", "direction": "down", "activation": 0.2122, "original": "I woke up early and couldn’t get back to sleep, so read the brilliant Sexcastle by @@144959 \n\nIt’s a riot from start to finish, about an assassin trying to live a peaceful life, until…\n\nIf you dig classic action movies, John Wick, Road House etc. it’s a must!", "rewrite": "Sexcastle by @@144959 is a brilliant riot from start to finish. The story follows an assassin attempting to live peacefully until circumstances force him back into action. It's a must-read for fans of classic action movies like John Wick and Road House."}, {"pid": "62134235", "axis": "grounding", "direction": "down", "activation": 0.2076, "original": "A BULLET IS WAITING is much more a romantic melodrama thriller than anything hardboiled (heck, there’s a lil lamb!), but as someone who grew up in the Rockies & the southwest, I’ll always be a sucker for something set in this part of the country (Utah, here.) A colorful, comfy #Noirvember pick.", "rewrite": "A BULLET IS WAITING is much more a romantic melodrama thriller than anything hardboiled, but I have a strong affinity for films set in the American West. This particular story takes place in Utah and delivers a colorful, engaging narrative that makes it a worthwhile #Noirvember selection, even if it doesn't strictly adhere to noir conventions."}, {"pid": "18309079", "axis": "abstract_concrete", "direction": "down", "activation": 0.2056, "original": "30 mins left, so here’s today’s “thing I love” - Lake Mungo. A perfect example of low budget ingenuity, and one of the most innovative horror films of its decade, maybe the 21st century so far, in storytelling terms. Heart breaking, profoundly creepy, a testament to the power of horror storytelling", "rewrite": "Time's running out, so here's today's appreciation post - a film that exemplifies what resourcefulness can achieve within constraints. A remarkable instance of innovative narrative filmmaking within the genre, showcasing how effective storytelling transcends production scale. Emotionally resonant and atmospherically unsettling, it demonstrates the fundamental strength of the medium's storytelling potential."}]}, {"f": 34, "density": 0.2667, "category": "novel_candidate", "lifts": {"reading_level": -0.0079, "background": 0.0388, "abstract_concrete": -0.0145, "tone": 0.0555, "humor": -0.0179, "narrativity": -0.0612, "grounding": 0.0071}, "best_axis": "narrativity", "best_lift": -0.0612, "examples": [{"pid": "38352283", "axis": "tone", "direction": "down", "activation": 0.3495, "original": "a while ago I read somewhere that the reason why you see so many cheapo LPs of Ravel's Bolero is that in the 60s and 70s it was like common received wisdom that the best music to have sex to was Bolero, and I just remembered that and put on Bolero (just to listen to) and oh my god that's so funny", "rewrite": "I just remembered this wild fact that's been haunting me: back in the 60s and 70s, Bolero was THE soundtrack everyone desperately needed for sex—it was literally everywhere on cheap knockoff records because of this obsession. So I threw it on today just to hear it again and I'm DYING. It's absolutely hilarious once you know that context. The absurdity just hits different now."}, {"pid": "38352283", "axis": "humor", "direction": "down", "activation": 0.3013, "original": "a while ago I read somewhere that the reason why you see so many cheapo LPs of Ravel's Bolero is that in the 60s and 70s it was like common received wisdom that the best music to have sex to was Bolero, and I just remembered that and put on Bolero (just to listen to) and oh my god that's so funny", "rewrite": "I read somewhere that in the 60s and 70s, Ravel's Bolero became widely regarded as the ideal music to have during intimate moments, which is why so many budget vinyl copies exist. I thought about this recently and decided to listen to the piece again. After hearing it with this context in mind, I found myself struck by how deliberate and intentional that choice actually was."}, {"pid": "29654609", "axis": "reading_level", "direction": "down", "activation": 0.2809, "original": "Recently, I have been looking into the Late Pleistocene climate and vegetation of Argentina for a work project, and was delighted to find out that pink peppercorn was - and still is - part of the native flora in the area. Maybe Macrauchenia developed a taste for the spicy tree.", "rewrite": "I've been researching Argentina's climate and plants from the Late Pleistocene for a work project. I found something cool: pink peppercorn trees are native to that area. They were there then, and they're still there now. Maybe the ancient animal Macrauchenia ate these spicy trees."}, {"pid": "200718622", "axis": "tone", "direction": "down", "activation": 0.2804, "original": "A lot of people are surprised to find out I'm autistic but that's just because social stuff is one of my special interests\n\nIf you hang out with me for awhile you'll start to realize that actually I'm following routines with a lot of social behavior and can't handle unexpected situations well", "rewrite": "I'm autistic and people are SHOCKED when they find out — but here's the thing: social interaction happens to be my special interest, so I've mastered the performance. The truth? I'm running on rigid scripts and routines the entire time. Push me even slightly outside those patterns and I completely fall apart. It's exhausting pretending everything feels natural when it absolutely doesn't."}, {"pid": "32613710", "axis": "humor", "direction": "down", "activation": 0.2761, "original": "So far, the main results I’ve noticed from working out is that my back is unexpectedly toned? And just watching how insufferable that’s made me is all but guaranteeing I’m two months away from becoming the worst person you know.", "rewrite": "Since I've started working out, I've noticed my back has become noticeably more toned. I'm aware this is making me more self-conscious about my appearance in ways I didn't anticipate. I'm concerned that as I continue this fitness journey, I may become someone who is difficult to be around, and I want to be mindful of that risk."}, {"pid": "8063791", "axis": "grounding", "direction": "down", "activation": 0.2563, "original": "Fascinating: The Mars Express orbiter has detected enough water ice buried beneath the Red Planet's equator to cover the entire planet.\n\nAstronomers assume that a large part of Mars was covered with water billions of years ago. It is possible that simple life forms occurred on Mars at that time.", "rewrite": "Fascinating: The Mars Express orbiter has detected substantial water ice deposits beneath Mars's equatorial surface that would be sufficient to cover the planet entirely.\n\nScientists believe Mars had extensive water coverage in its ancient past. This raises the possibility that simple life forms may have existed on Mars during that period."}, {"pid": "59431130", "axis": "abstract_concrete", "direction": "down", "activation": 0.2406, "original": "\"Promotion and marketing are not everything\"\nsays director Yuichiro Kitao.\n\n\"I think developers’ passion is also in demand, so I would like to keep both in mind: research is research, and passion is passion.\"\n\nWe need more of this thinking in the games industry.", "rewrite": "\"Promotion and marketing are not everything,\" says a creative leader.\n\n\"I think passion for craft is also in demand, so I would like to keep both in mind: strategic effort is strategic effort, and creative drive is creative drive.\"\n\nWe need more of this thinking in the industry."}, {"pid": "635633", "axis": "narrativity", "direction": "down", "activation": 0.2359, "original": "There are so many things I’ve learned in the last 2 years since I started getting fit (and hench) that I wish someone had told me when I was young. One of them is that the muscle soreness you get for a week after you work out a muscle group pretty much only happens the first time you do it", "rewrite": "Muscle soreness lasting a week after working out a muscle group primarily occurs only on first exposure. Subsequent workouts of the same muscles produce minimal soreness. This adaptation happens consistently across individuals and training phases. The initial soreness is a normal response to novel stimulus, not an indicator of workout quality or effectiveness in later sessions."}, {"pid": "29102495", "axis": "grounding", "direction": "down", "activation": 0.2299, "original": "Through a combination of unexpected heat wave, lots of unfinished business prior to opening, and placing our bar a good hundred yards away from our commercial kitchen, my husband and I each managed to lose about 4lb of useless middle aged weight this weekend.", "rewrite": "My husband and I each lost about 4lb this weekend due to a combination of factors: unexpected hot weather, unfinished preparations before opening, and operational inefficiencies in our setup that increased physical activity demands on us both."}, {"pid": "115211901", "axis": "narrativity", "direction": "up", "activation": 0.2197, "original": "Re-listened to Beasties' catalog in order. Ranked: \n\nLicensed to Ill (1986)*\nCheck Your Head (1992)\nPaul's Boutique (1989)\nIll Communication (1994)\nHot Sauce Committee Part Two (2011)\nHello Nasty (1998)\nTo the 5 Boroughs (2004)\nThe Mix-Up (2007)\n\n*MASSIVE 80s drum machine sounds = my red kryptonite.", "rewrite": "I was sorting through my old iPod playlists last week when I realized I'd never actually sat down and ranked the Beasties' whole discography in order. So I committed: headphones on, afternoon cleared, starting from '86 and working straight through.\n\nBy the time Licensed to Ill finished, I remembered why those massive 80s drum machine sounds hit different for me — they're basically my red kryptonite. Here's how it all shook out:\n\nLicensed to Ill (1986)\nCheck Your Head (1992)\nPaul's Boutique (1989)\nIll Communication (1994)\nHot Sauce Committee Part Two (2011)\nHello Nasty (1998)\nTo the 5 Boroughs (2004)\nThe Mix-Up (2007)"}]}];
const AXIS_COLORS   = {"reading_level": "#6c8ebf", "background": "#82b366", "abstract_concrete": "#d6b656", "tone": "#ae4132", "humor": "#9673a6", "narrativity": "#d79b00", "grounding": "#23748a"};
const CAT_COLORS    = {"confirms_axis": "#5cb85c", "partial_overlap": "#e6a817", "novel_candidate": "#6c8ebf", "dead": "#555"};
const AXIS_NAMES    = ["reading_level", "background", "abstract_concrete", "tone", "humor", "narrativity", "grounding"];
const CONFIRM_LIFT  = 0.3;
const PARTIAL_LIFT  = 0.15;

// ── Build sidebar ────────────────────────────────────────────────
const list = document.getElementById('feature-list');
FEATURES.forEach((feat, i) => {
  const item = document.createElement('div');
  item.className = 'feat-item';
  item.dataset.idx = i;
  const catColor = CAT_COLORS[feat.category] || '#555';
  const axLabel  = feat.best_axis ? feat.best_axis.replace('_',' ') : '—';
  item.innerHTML = `
    <div class="feat-title">
      F${feat.f}
      <span class="cat-badge" style="background:${catColor}22;color:${catColor}">
        ${feat.category === 'confirms_axis' ? '✓' : feat.category === 'partial_overlap' ? '~' : feat.category === 'dead' ? '✗' : '?'}
      </span>
    </div>
    <div class="feat-sub">${axLabel}  lift=${feat.best_lift.toFixed(3)}  density=${feat.density.toFixed(3)}</div>
  `;
  item.addEventListener('click', () => showFeature(i));
  list.appendChild(item);
});

// ── Show feature detail ───────────────────────────────────────────
function showFeature(idx) {
  document.querySelectorAll('.feat-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.feat-item[data-idx="${idx}"]`).classList.add('active');

  const feat = FEATURES[idx];
  const catColor = CAT_COLORS[feat.category] || '#555';
  const maxLift  = Math.max(...Object.values(feat.lifts).map(Math.abs), 0.01);

  // Lift bars
  let liftHtml = '';
  AXIS_NAMES.forEach(ax => {
    const lift    = feat.lifts[ax] || 0;
    const pct     = Math.abs(lift) / maxLift * 100;
    const color   = AXIS_COLORS[ax] || '#6c8ebf';
    const isBest  = ax === feat.best_axis;
    liftHtml += `
      <div class="lift-row">
        <div class="lift-label" style="${isBest ? 'color:#fff;font-weight:700' : ''}">${ax.replace(/_/g,' ')}</div>
        <div class="lift-bar-bg">
          <div class="lift-bar" style="width:${pct}%;background:${color};opacity:${isBest ? 1 : 0.5}"></div>
        </div>
        <div class="lift-val">${lift >= 0 ? '+' : ''}${lift.toFixed(3)}</div>
      </div>`;
  });

  // Examples
  let exHtml = '';
  if (feat.examples.length === 0) {
    exHtml = '<p style="color:#555">No active examples.</p>';
  } else {
    feat.examples.forEach(ex => {
      const axColor = AXIS_COLORS[ex.axis] || '#6c8ebf';
      exHtml += `
        <div class="example-card">
          <div class="example-meta">
            post ${ex.pid} ·
            <span style="color:${axColor}">${ex.axis.replace(/_/g,' ')}</span> ·
            direction: <span>${ex.direction}</span> ·
            activation: <span class="activation-badge">${ex.activation.toFixed(4)}</span>
          </div>
          <div class="text-label">ORIGINAL</div>
          <div class="text-block">${escHtml(ex.original)}</div>
          <div class="text-label">REWRITE (${ex.direction} ${ex.axis.replace(/_/g,' ')})</div>
          <div class="text-block rewrite">${escHtml(ex.rewrite)}</div>
        </div>`;
    });
  }

  document.getElementById('detail').innerHTML = `
    <h2>Feature F${feat.f}</h2>
    <div class="meta">
      <span class="cat-badge" style="background:${catColor}22;color:${catColor};font-size:12px">${feat.category}</span>
      &nbsp; best axis: <strong>${feat.best_axis || '—'}</strong> &nbsp;
      lift: <strong>${feat.best_lift.toFixed(4)}</strong> &nbsp;
      density: <strong>${feat.density.toFixed(4)}</strong>
    </div>
    <div class="section-title">Lift across axes</div>
    ${liftHtml}
    <div class="section-title">Top ${feat.examples.length} activating examples</div>
    ${exHtml}
  `;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Auto-select first feature
if (FEATURES.length > 0) showFeature(0);
</script>

</html>
