 York Times/Siena poll. The lesson is that Biden is the problem, but analysts at CNN and MSNBC will spend the next year insisting he just needs to take harder stances on immigration or border security."}, {"pid": "79792117", "axis": "abstract_concrete", "direction": "up", "activation": 0.4091, "original": "Sony laying off 900 people because they missed some imaginary sales target, which has slightly eaten into their profit margins, is really just a big ol' reminder that everything in the modern economy is fundamentally broken, & until wealthy folks are forced to learn their lesson, nothing will change", "rewrite": "Sony laying off 900 employees in February 2024 because PlayStation 5 sales fell short of projections—dropping their gaming division profits by 8%—is a stark reminder that corporations prioritize shareholder returns over worker stability. Until executives like Sony CEO Kenichiro Yoshida face consequences for cost-cutting that devastates working families while preserving bonuses, this cycle will continue repeating across tech and entertainment industries."}, {"pid": "21702300", "axis": "abstract_concrete", "direction": "up", "activation": 0.3895, "original": "i saw these two articles recommended me and i feel like this is an issue not often talked about. community college frequently fails to prepare students for a bachelor's degree, exacerbated by its reputation as being \"lesser\" than universities, so it's good that california is trying to bridge the gap", "rewrite": "i saw articles about California's community college transfer agreements and employer hiring discrimination against CC graduates, and i feel like this systemic gap isn't discussed enough. community colleges like Diablo Valley and Pasadena City College often have misaligned coursework with UC/CSU requirements, made worse by employers viewing CC degrees as \"lesser,\" so it's encouraging that California's Senate Bill 1053 is creating guaranteed transfer pathways"}]}, {"f": 62, "density": 0.2586, "category": "partial_overlap", "lifts": {"reading_level": 0.0917, "background": -0.0217, "abstract_concrete": 0.03, "tone": 0.265, "humor": -0.0417, "narrativity": -0.215, "grounding": -0.1083}, "best_axis": "tone", "best_lift": 0.265, "examples": [{"pid": "159594318", "axis": "tone", "direction": "down", "activation": 0.3431, "original": "Tonight I saw St Drogo. It’s low-budget, queer, slow-burn, folk horror. I loved the cinematography, and the interesting critical takes on status & community. I also think there’s a lot going on about the nature of desire, and the diverse ways it’s regulated by religion, money, and social groups.", "rewrite": "I just watched St Drogo and I can't stop thinking about it. This low-budget queer folk horror film is devastating—the cinematography alone gutted me. But what really shook me is how it tears apart our assumptions about status, community, desire itself. The way it exposes how religion, money, and social hierarchies weaponize desire against us... it's haunting. This film matters."}, {"pid": "115418595", "axis": "tone", "direction": "down", "activation": 0.2996, "original": "4 years ago I started weight lifting as a new way for me to exercise and an outlet for my thoughts/feelings. Today was the first workout in the new place and even though being a new professor is 100% KICKING my ass (only 4 weeks into the semester), I'm feeling WAY better about things. 🔭🧪👩‍🔬", "rewrite": "I just had my FIRST workout in my new place and honestly? It's a lifesaver right now. Four years ago, weight lifting saved me—it became my escape when nothing else worked. Now, drowning in this new professor role (only 4 WEEKS in and it's CRUSHING me), I'm finally remembering why I needed this. This gym session hit different. I'm breathing again. 🔭🧪👩‍🔬"}, {"pid": "881050", "axis": "tone", "direction": "down", "activation": 0.2693, "original": "U.S. animal shelters will start 2024 the most overcrowded they have been in years, according to a broad survey of animal rescue facilities, a symptom of persistent economic concern as the country’s pandemic pet-adoption boom finally cools.", "rewrite": "U.S. animal shelters are facing a crisis as 2024 begins—overcrowding at levels unseen in years. A comprehensive survey of rescue facilities reveals the harsh reality: the pandemic's pet-adoption surge has crashed, leaving thousands of animals trapped in overcrowded facilities while economic hardship forces families to surrender their pets."}, {"pid": "86182604", "axis": "humor", "direction": "up", "activation": 0.267, "original": "as someone with event marketing experience, rage surges within when I see people loudly proclaim that they don't know what they're doing but they're going to build alternative events to ones they don't like. It's like when gamers say \"just make the game you want\". I appreciate the gumption I guess?", "rewrite": "as someone with event marketing experience, i have a visceral reaction to people loudly announcing they're going to build \"alternative events\" to replace the ones they hate—while having the strategic planning skills of a goldfish. it's giving \"just make the game you want\" energy. love the confidence, hate the business plan."}, {"pid": "24435573", "axis": "reading_level", "direction": "down", "activation": 0.2445, "original": "The Dunwich Horror (1970) is a very horny yet deeply unsexy movie. Silly and hamfisted—but I did like the psychedelic representation of the monster. “Mind-altering” works just as well to describe encounters with unfathomable being as it does the effects of hallucinogenics", "rewrite": "The Dunwich Horror (1970) tries hard to be sexy but totally fails. It's goofy and over the top. But I loved how the monster looked—all psychedelic and trippy. The wild visuals work great. They show what it's like to see something you can't understand. It's like taking drugs. Both mess with your mind."}, {"pid": "123803763", "axis": "abstract_concrete", "direction": "down", "activation": 0.2383, "original": "I have worked in the games industry for almost 20 years. My first layoff hit hard. The place was my home and the people were my friends. Also, I had landed my dream industry, would I really be lucky twice?\n\nI learned a few things.\n\nDon't make your job your home. Enjoy the hell out of it.", "rewrite": "I have worked in my field for nearly two decades. My first experience with sudden job loss was deeply difficult. The organization had become central to my identity and my colleagues had become close. I also wondered: could I ever find another opportunity that felt this right?\n\nThis experience taught me important lessons.\n\nDon't allow your work to become your entire life. Find fulfillment in it, but maintain perspective."}, {"pid": "106915558", "axis": "tone", "direction": "down", "activation": 0.2374, "original": "I love how the title track toys with you before it finally reveals (and you know it IS coming), the heaviest, sludgey-est riff known to humankind, unchallenged to this day.\n\nBlack Sabbath - Sabbath Bloody Sabbath\nWarner Bros. 1974", "rewrite": "I can't believe how MASTERFULLY the title track manipulates you—building tension relentlessly—before it EXPLODES into the most crushing, sludge-drenched riff ever recorded. Nothing has come close to matching its sheer sonic devastation.\n\nBlack Sabbath - Sabbath Bloody Sabbath\nWarner Bros. 1974"}, {"pid": "1868235", "axis": "tone", "direction": "down", "activation": 0.2364, "original": "You could say I exercise religiously because I had a lot of enthusiasm when I got into it and believed it was going to improve my life in a meaningful way but now I mostly keep up with it out of routine and guilt", "rewrite": "I'm absolutely obsessed with exercising—it consumed me from day one because I desperately believed it would transform my life. Now I'm trapped in this cycle, clinging to it out of sheer habit and crushing guilt that won't let me stop. It's taken over everything."}, {"pid": "18309079", "axis": "reading_level", "direction": "down", "activation": 0.2249, "original": "30 mins left, so here’s today’s “thing I love” - Lake Mungo. A perfect example of low budget ingenuity, and one of the most innovative horror films of its decade, maybe the 21st century so far, in storytelling terms. Heart breaking, profoundly creepy, a testament to the power of horror storytelling", "rewrite": "30 mins left, so here's today's \"thing I love\" - Lake Mungo. Made on a small budget. Uses clever ideas. One of the best horror films of the 2000s in how it tells its story. Maybe even the best of this century so far. It's sad. It's scary. It shows what great horror can do."}, {"pid": "22981252", "axis": "grounding", "direction": "down", "activation": 0.2246, "original": "#Watched The Boys Next Door (1985) - goddamn! Think ‘80s spring break teen comedies full of shenanigans, except Spheeris moves the sociopathic nature of the leads from unexamined subtext to explicit text. These guys think they are the heroes of a sex comedy, not the villains of a thriller. #filmsky", "rewrite": "#Watched The Boys Next Door (1985) - goddamn! This film takes the sociopathic behavior that lurks beneath the surface of similar comedies and makes it the explicit focus. The protagonists view themselves as heroes rather than recognizing themselves as villains. Spheeris recontextualizes familiar genre tropes into something far darker. #filmsky"}]}, {"f": 41, "density": 0.2886, "category": "partial_overlap", "lifts": {"reading_level": -0.2083, "background": 0.175, "abstract_concrete": 0.25, "tone": -0.0083, "humor": -0.1083, "narrativity": -0.1733, "grounding": 0.0733}, "best_axis": "abstract_concrete", "best_lift": 0.25, "examples": [{"pid": "58144173", "axis": "abstract_concrete", "direction": "down", "activation": 0.5597, "original": "Serie Noire (1979)\n\nA superb, bleakly hilarious film noir about a door-to-door salesman who is lured into crime by a teenage prostitute.  Based on the Jim Thompson novel A Hell of a Woman.  \n\nDirected by Alain Corneau\n\nScreenplay by Corneau and Georges Perec, who was BOTD in 1936", "rewrite": "A masterwork of dark cinema exploring themes of moral corruption and desperation. The narrative follows an ordinary working man whose encounter with a morally compromised individual leads him down a criminal path. Adapted from acclaimed literary source material and crafted by accomplished screenwriters, one of whom was born in the mid-twentieth century. The result is a film that balances tragic elements with sardonic humor, exemplifying the genre's capacity for profound social commentary."}, {"pid": "58143036", "axis": "abstract_concrete", "direction": "down", "activation": 0.4972, "original": "The Brotherhood of Satan (1971)\n\nA wonderfully strange horror movie about a small town controlled by a coven of elderly Satan worshippers.  Early 70s cult horror at its finest.  \n\nDirected by Bernard McEveety\n\nCinematography by John Arthur Morrill, BOTD in 1935", "rewrite": "An intriguing entry in occult horror cinema that explores themes of hidden power and manipulation within insular communities. A compelling example of genre filmmaking from a particular era, notable for its distinctive visual approach and atmospheric sensibility.\n\nDirected by a skilled craftsperson of the period\n\nCinematography that exemplifies the technical artistry of mid-century filmmaking"}, {"pid": "58141803", "axis": "abstract_concrete", "direction": "down", "activation": 0.4846, "original": "Malina (1991)\n\nA staggering, opaque near-masterpiece in which a mentally ill writer, torn between two lovers, deals with her pain by setting fires\n\nDirected by Werner Schroeter\n\nStarring Isabelle Huppert in one of her best and most intense performances.  Huppert was BOTD in 1953.", "rewrite": "A striking, enigmatic work of considerable artistic ambition in which a protagonist grappling with psychological struggle navigates conflicting emotional attachments through destructive acts.\n\nDirected by an innovative visual stylist known for challenging narrative conventions.\n\nFeaturing a acclaimed performer delivering one of their most powerful and emotionally demanding interpretations. The lead actor represents a significant generation of accomplished artists from the mid-twentieth century."}, {"pid": "216874452", "axis": "grounding", "direction": "down", "activation": 0.4721, "original": "Skalat (Ternopil): Wichrowski Castle, church, old buildings. One of the best-preserved castles in Ternopil is located in Skalat, a town of district subordination on the Hnyla River in the Pidvolochysk district of Ternopil region. ⬇\n️", "rewrite": "Skalat is home to one of the best-preserved castles in Ternopil region. This town features significant historical architecture including a castle, church, and other old buildings worth visiting. Located in the Pidvolochysk district along the Hnyla River, Skalat offers cultural heritage sites of regional importance. ⬇️"}, {"pid": "12329514", "axis": "abstract_concrete", "direction": "down", "activation": 0.4362, "original": "The Pumpkin Eater (1964)\n\nClassic British drama about a woman who seems to get pregnant every time the wind blows and her unhappy marriage to a screenwriter.  \n\nStarring Anne Bancroft\n\nScreenplay by Harold Pinter\n\nDirected by Jack Clayton, BOTD in 1921", "rewrite": "A notable work in the British drama tradition explores the complexities of marital discord and reproductive patterns within relationships, examining themes of dissatisfaction and interpersonal conflict.\n\nThe film features accomplished performers and was adapted by a renowned playwright, with direction from a filmmaker whose career spanned much of the twentieth century."}, {"pid": "41591810", "axis": "abstract_concrete", "direction": "down", "activation": 0.4166, "original": "The Draughtman's Contract (1982)\n\nA wicked, absurdist, immensely pleasurable mystery from director Peter Greenaway.  So much of Yorgas Lanthimos' schtick comes from Greenaway.\n\nCinematography by Curtis Clark, BOTD in 1946", "rewrite": "Abstract Cinema as Conceptual Framework\n\nA wickedly absurdist exploration of mystery and form from an influential auteur. The thematic and stylistic preoccupations evident in contemporary experimental filmmaking frequently trace their lineage to this director's broader artistic philosophy.\n\nCinematography that exemplifies a particular generation's approach to visual language and compositional thinking."}, {"pid": "9649201", "axis": "abstract_concrete", "direction": "down", "activation": 0.4143, "original": "PARIS IS BURNING (1990)\nDir. Jennie Livingston\nUnited States\nDocumentary, Queer\n#DesertIslandSundance\n\nWhere does voguing come from, and what is throwing shade? This landmark documentary provides a vibrant snapshot of the 80s through the eyes of New York's Black and Latine Harlem drag-ball scene.", "rewrite": "A landmark documentary captures the essence of an era through the perspective of marginalized communities navigating underground performance spaces. The film explores cultural practices rooted in resilience and self-expression, offering insight into how communities create meaning and identity within constrained circumstances. Through intimate observation, it documents the traditions and social dynamics that emerge when people gather to celebrate artistry and presence on their own terms."}, {"pid": "216874452", "axis": "tone", "direction": "down", "activation": 0.4025, "original": "Skalat (Ternopil): Wichrowski Castle, church, old buildings. One of the best-preserved castles in Ternopil is located in Skalat, a town of district subordination on the Hnyla River in the Pidvolochysk district of Ternopil region. ⬇\n️", "rewrite": "Skalat (Ternopil): Wichrowski Castle stands as a stunning architectural gem—one of the best-preserved castles in all of Ternopil. Nestled in Skalat, a charming town along the Hnyla River in Pidvolochysk district, this medieval fortress remains a remarkable testament to regional heritage. The castle, alongside historic churches and period buildings, offers an unforgettable glimpse into centuries past. ⬇️"}, {"pid": "2224330", "axis": "grounding", "direction": "down", "activation": 0.3713, "original": "THE IRON CLAW is fucking amazing. Riveting, heartbreaking, tragic, and glorious. Hands down one of the best movies I’ve seen all year. It’s like Linklater’s THE WRESTLER. Whether you know the story by heart or are hearing it for the first time, you’ll likely be as blown away as I was.", "rewrite": "THE IRON CLAW is fucking amazing. Riveting, heartbreaking, tragic, and glorious. Hands down one of the best movies I've seen all year. It's a character-driven drama that deeply explores its subject matter. Whether you know the story by heart or are hearing it for the first time, you'll likely be as blown away as I was."}, {"pid": "146434579", "axis": "abstract_concrete", "direction": "down", "activation": 0.3691, "original": "Meshes of the Afternoon 1943 \nDirected by Maya Deren, Alexander Hammid\n\nA woman returning home falls asleep and has vivid dreams that may or may not be happening in reality #Filmsky #Shortfilm #Classicfilm", "rewrite": "Experimental cinema from the mid-twentieth century often explores the ambiguous boundary between consciousness and reality through dreamlike imagery. Such works typically follow a protagonist experiencing disorienting sequences that challenge viewers' perceptions of what is actual versus imagined. These films frequently employ surreal visual techniques to question the nature of perception itself. #Filmsky #Shortfilm #Classicfilm"}]}, {"f": 4, "density": 0.2747, "category": "partial_overlap", "lifts": {"reading_level": 0.1412, "background": 0.2112, "abstract_concrete": -0.1005, "tone": 0.1412, "humor": 0.0329, "narrativity": -0.2438, "grounding": -0.1821}, "best_axis": "narrativity", "best_lift": -0.2438, "examples": [{"pid": "277691", "axis": "background", "direction": "up", "activation": 0.5223, "original": "This is such a gorgeous image from the James Webb Space Telescope, but did you ever wonder why the rings don't just form a solid planar mass?  Why the distinct, stationary gaps?\n\nLet's talk about 'shepherd moons' & how they shape planetary rings.", "rewrite": "JWST image is stunning, but those gaps aren't random—shepherd moons are actively clearing them. Here's how orbital resonances and gravitational sculpting maintain those sharp boundaries instead of a uniform disk."}, {"pid": "100624145", "axis": "background", "direction": "up", "activation": 0.4798, "original": "You wanna know something cool they don't tell you about working out?\nYou can do the stuff you want to and you don't really have to do the stuff you hate.\nIf no one has told you yet and the idea appeals to you- you are allowed to lift things and get strong and muscular.\nWomen too. Especially women.", "rewrite": "Forget the compound lift dogma. If you want hypertrophy over strength standards, chase it. If barbell work doesn't appeal to you, machines and dumbbells work fine. Women especially get gaslit into thinking they need to follow bro-split programming. You don't. Train what you actually enjoy—adherence beats optimal programming every time."}, {"pid": "635633", "axis": "background", "direction": "up", "activation": 0.4622, "original": "There are so many things I’ve learned in the last 2 years since I started getting fit (and hench) that I wish someone had told me when I was young. One of them is that the muscle soreness you get for a week after you work out a muscle group pretty much only happens the first time you do it", "rewrite": "DOMS is basically a first-timer's tax. Once you've trained a muscle group, that week-long soreness disappears—your body adapts. Wish I'd known this before spending my first year convinced I was doing something wrong."}, {"pid": "55713932", "axis": "background", "direction": "up", "activation": 0.4445, "original": "The kitties lounge as their Sluggo prepares for work. The kitties do not know industry or capitalism. Thy have no concept of laziness. They move as they want and sit as they want. Every kitty sitting is sitting zazen always. Perfectly in their moment.", "rewrite": "Sluggo grinds while the cats embody zazen—no wage consciousness, no productivity guilt, just pure presence. Movement as need, stillness as practice. Every sit is already enlightenment."}, {"pid": "145275039", "axis": "background", "direction": "up", "activation": 0.4312, "original": "I had to take some steps back from my front squats I wasn’t feeling super confident. Polishing my form over the last 1-2 months I’m increasing weight again and it feels so much better. After so many years of a fitness lull I’m starting to love it again and it feels so right", "rewrite": "Deloaded my front squat for form work—spent the last couple months cleaning up positioning and now I'm ramping back up. Finally feeling dialed in again after years off. It's wild how much better everything feels when the technique is locked."}, {"pid": "27656995", "axis": "background", "direction": "up", "activation": 0.4131, "original": "Nothing to do with new year, but I really have to get back to the gym, because this RSI in my shoulder is flaring up, and I don't want it to cripple me again. \nBut it's going to be packed 😩 \n\n(I'm not going back to that Thai masseuse. The one who trained under Vlad the Impaler).", "rewrite": "RSI flaring up again—gotta get back to lifting to manage it before it gets worse. January gym crowds are gonna be brutal though 😩\n\n(And no, I'm not going back to that Thai masseuse. Genuinely felt like I was in a medieval torture chamber.)"}, {"pid": "42884167", "axis": "background", "direction": "up", "activation": 0.3968, "original": "My cat is pretty smart for a cat. He gets bored of toys instantly and is only interested in string toys and laser pointers for like 30 seconds. Then he comes and meows at me because he's bored. I dunno, dude. Try being stupider, it worked for me", "rewrite": "My cat's got that problem where enrichment becomes pointless—novelty wears off in 30 seconds flat and he's back meowing at me for stimulation. At this point I'm just accepting that high intelligence in cats is basically a curse. Being dumber would genuinely solve his issues."}, {"pid": "85437255", "axis": "background", "direction": "up", "activation": 0.3963, "original": "The media loves to focus on quick success weight loss stories. \"Lose 10 pounds in 2 months!\" Kind of stuff. Good for those people. I'm here to be the person that isn't afraid to show what it's like to take 1 full year to lose 9 pounds (maybe 10 if I'm lucky).\n\nProgress at your own pace is healthy!", "rewrite": "Slow recomposition hits different. A year to shift 9-10 lbs while building muscle? That's the move. The \"lose 10 in 2 months\" crowd can keep the crash cycle—I'm here for sustainable body comp changes that actually stick.\n\nYour pace is the right pace."}, {"pid": "91444564", "axis": "background", "direction": "up", "activation": 0.3953, "original": "What a difference marinating and stewing down makes.\n\nFilipino Adobo is one of my favorite dishes, if I've got the spoons to make it.\n\nFor the past five years, it's been what I make on Christmas, because family traditions have to start somewhere.", "rewrite": "Adobo hits different when you actually marinate and stew it down—none of that rushed weeknight nonsense.\n\nFive years running as my Christmas signature. The long braise is non-negotiable if you want that deep, layered flavor. Worth every minute."}, {"pid": "119955824", "axis": "background", "direction": "up", "activation": 0.3834, "original": "Native to the Mediterranean, Oregano loves to grow in sunny Florida! Give it a big spot in well-drained soil and it will flourish. After flowering the plant dies back some, but can still withstand a hearty trimming. Prune to a small bush as it can get leggy and try to spread. 🌱\n\n📷: Tanria Elementals", "rewrite": "Oregano thrives in Florida's climate—plant in full sun with well-drained soil and it'll flourish. Post-flowering dormancy is normal; aggressive pruning prevents legginess and sprawl. Maintain as a compact shrub. 🌱\n\n📷: Tanria Elementals"}]}, {"f": 10, "density": 0.2614, "category": "partial_overlap", "lifts": {"reading_level": 0.2417, "background": 0.0783, "abstract_concrete": -0.1967, "tone": 0.0717, "humor": 0.03, "narrativity": -0.1267, "grounding": -0.0983}, "best_axis": "reading_level", "best_lift": 0.2417, "examples": [{"pid": "23283041", "axis": "humor", "direction": "up", "activation": 0.3912, "original": "Had a go at recreating the burnt onion side you get in some Turkish restaurants last night and fucking hell I am a genius. Grill a wedged red onion until completely burnt on the edges, smother with pomegranate molasses & a splash of red wine vinegar, add loads of sumac & parsley and tuck in.", "rewrite": "Attempted to recreate that charred onion situation from Turkish restaurants last night and—plot twist—I may have accidentally unlocked culinary brilliance. Wedge a red onion, grill it until the edges are basically a crime scene, then hit it with pomegranate molasses, a glug of red wine vinegar, and enough sumac & parsley to make it look like a garden exploded. Life-changing? Possibly."}, {"pid": "219657380", "axis": "reading_level", "direction": "up", "activation": 0.3781, "original": "It's no fun but I need to call an end to the holiday hedonism. I'm 20 lb over my lowest last year. It's not causing any issues with suit fitment but I'd still like to get back down. I'm easing back into portion measurement and calorie counting. Probably going to start monitoring macro breakdowns too", "rewrite": "The post requires the original text to be rewritten, but no original post has been provided in your message. You've included the instructions and context, but the \"ORIGINAL POST:\" section is empty.\n\nPlease provide the social media post you'd like me to rewrite, and I'll revise it to achieve the target reading level of 0.85/1.0 while maintaining all original claims, facts, opinions, and stance."}, {"pid": "153840277", "axis": "background", "direction": "up", "activation": 0.3036, "original": "Second to last gym day at this location. Been going here since I started lifting 11 years ago. So many weekend mornings spent working hard in this light. \n\nI’ll miss you, crappy old gym in a warehouse.", "rewrite": "Final countdown at my OG spot. Eleven years of iron and sweat in this warehouse—basically grew up here. Time to move on, but nothing hits like these worn-out racks and that familiar light."}, {"pid": "32716388", "axis": "reading_level", "direction": "down", "activation": 0.2637, "original": "From a literary version of Spielberg’s Duel to the novel Mary Wilson vetoed because of its “cockstands” and one of the most monstrous fathers in literature: I chose ten gems from the Booker shortlists across the decades:", "rewrite": "I picked ten great books from Booker Prize shortlists over the years. One started as a Spielberg film called Duel. Another was rejected by Mary Wilson for using the word \"cockstands.\" And one features one of the worst fathers in all of literature."}, {"pid": "57972921", "axis": "background", "direction": "up", "activation": 0.2548, "original": "Talk to Me is hands down the best horror I’ve seen in a long time. The concept/story is intriguing. good paced storytelling. Characters are well built. Chemistry is on spot. Scare scenes make sense, not just random pointless jump scares. And I got a good chill in the end. Plus the Aussie elements 🤣👌", "rewrite": "Talk to Me hits different—genuinely stellar execution across the board. The séance premise doesn't rely on cheap jumps; every scare lands because the character dynamics actually matter. Pacing, writing, chemistry all dialed in. That ending genuinely unsettled me. Australian horror finally delivering 🤣👌"}, {"pid": "12921978", "axis": "grounding", "direction": "down", "activation": 0.2517, "original": "Last year’s dwarf irises—among my very favourite plants—were a treasure. This year we learn whether they’ll perennialize in the spots I picked for them, but as insurance, we planted another fifty. There can never be too many! They take up no space; their post-bloom foliage is narrow and subtle 🌱", "rewrite": "Dwarf irises are among my favourite plants. Last year's planting was successful, but this year will show whether they'll perennialize in their current locations. As a precaution, we planted another fifty—you can never have too many! They're efficient garden additions with minimal footprint and understated foliage after blooming 🌱"}, {"pid": "4472999", "axis": "tone", "direction": "down", "activation": 0.2494, "original": "As someone who listens to a lot of classic Italian music, I need to be the one to tell you about Little Tony, this guy from San Marino who did well in the UK and was the lead of, and this is not a joke, Little Tony and His Brothers.\n\nHis albums look like this.", "rewrite": "I've been OBSESSED with classic Italian music for years, and I need to tell you about Little Tony RIGHT NOW — this absolute legend from San Marino who DOMINATED the UK charts and fronted the hilariously named Little Tony and His Brothers (yes, I'm SERIOUS).\n\nHis discography is WILD."}, {"pid": "8907077", "axis": "grounding", "direction": "down", "activation": 0.2483, "original": "The jetties at Playa del Rey are the best place in Los Angeles to see surfbirds, including this one starting to molt into its summer plumage yesterday. In a few months, they will depart for Alaska and the Yukon 🪶📷", "rewrite": "Surfbirds are commonly found at coastal rocky areas in Los Angeles during their wintering season. These shorebirds undergo seasonal plumage changes as they prepare for migration to northern breeding grounds. 🪶📷"}, {"pid": "23283041", "axis": "background", "direction": "up", "activation": 0.238, "original": "Had a go at recreating the burnt onion side you get in some Turkish restaurants last night and fucking hell I am a genius. Grill a wedged red onion until completely burnt on the edges, smother with pomegranate molasses & a splash of red wine vinegar, add loads of sumac & parsley and tuck in.", "rewrite": "Nailed the charred kırmızı soğan last night. Wedged red onion, hard char, pomegranate molasses, splash of red wine vinegar, heavy sumac & parsley. That's it. Genius move."}, {"pid": "6861146", "axis": "grounding", "direction": "down", "activation": 0.2306, "original": "Less than 2% of console games include queer characters, the advocacy group GLAAD found in its first survey of the gaming industry. Many respondents from states with legislation targeting LGBTQ people said they could express themselves in games in a way they did not feel comfortable doing in reality.", "rewrite": "Queer representation in console gaming remains severely limited, with less than 2% of games including LGBTQ characters according to GLAAD's inaugural industry survey. Gaming provides an important creative outlet for LGBTQ individuals, particularly those living in regions with restrictive legislation targeting their community."}]}, {"f": 7, "density": 0.3163, "category": "partial_overlap", "lifts": {"reading_level": -0.109, "background": -0.0357, "abstract_concrete": 0.241, "tone": 0.0476, "humor": -0.044, "narrativity": -0.119, "grounding": 0.0193}, "best_axis": "abstract_concrete", "best_lift": 0.241, "examples": [{"pid": "134313366", "axis": "abstract_concrete", "direction": "down", "activation": 0.3554, "original": "Late ball puming did like half n hour only just lung pressure as i dont think can get the hardware for proper heavy pumping here in mexico, well it helps with my lung strength and feels real good so a win win i guess hehe", "rewrite": "Engaging in alternative training methods with limited resources has its unexpected benefits. Sometimes working around constraints actually builds capacity in ways that matter. It's not always the ideal approach, but the secondary gains can make it worthwhile nonetheless."}, {"pid": "58167812", "axis": "grounding", "direction": "down", "activation": 0.3411, "original": "MOSS ROSE is deeply, deliciously weird. Love the absurd logic of Cockney chorus girl Peggy Cummins blackmailing Victor Mature and compelling him to take her to his country estate so that she can learn to be a lady.  Love even more that we are supposed to root for her and want her scheme to succeed.", "rewrite": "MOSS ROSE is deeply, deliciously weird. The film presents an unconventional premise where a character uses manipulation to achieve self-improvement, and the narrative structure asks the audience to sympathize with and support this morally questionable approach. The absurdity of the plot logic is part of what makes the film so compelling."}, {"pid": "27158321", "axis": "abstract_concrete", "direction": "down", "activation": 0.3053, "original": "During our stroll through the park we see a man speaking in a baby voice to a golden retriever. My dog glances at me over the top of his spectacles, saying more with a look than a thousand words could ever accomplish. He is my best friend.", "rewrite": "When we encounter certain social situations during our time outdoors, our companions often respond in ways that transcend verbal communication. A single glance can convey understanding and shared perspective without the need for language. These moments remind us why we cherish the bonds we form with those closest to us."}, {"pid": "9669038", "axis": "abstract_concrete", "direction": "down", "activation": 0.3049, "original": "Today's supper (nothing fancy): a variant on traditional colcannon. In this case, mashed potatoes made with hot milk and butter, chopped bacon, and shredded Baby Gem cabbage fried in bacon fat: with a well in the middle of the colcannon, and more butter melting in it. (Because Ireland.)  :)", "rewrite": "Sometimes the best meals come from simple traditions passed down through generations. A humble comfort dish combines creamy mashed vegetables with savory cured meat, all prepared using time-honored cooking methods that prioritize richness and warmth. There's something deeply satisfying about embracing culinary heritage in its most unpretentious form—letting quality ingredients and straightforward technique speak for themselves. (Because some food traditions endure for good reason.) :)"}, {"pid": "189890628", "axis": "abstract_concrete", "direction": "down", "activation": 0.3024, "original": "just learned that cotton is a mallow (i've never seen it in flower, just yoinked standing dry stalks off the roadside in oklahoma) and now understand why the weird prickly seed heads of hollyhocks are vaguely familiar... plants are so cool dude", "rewrite": "just learned that certain plants share unexpected botanical family connections, and it's wild how recognizing these relationships changes how you see things you encounter in nature. when you suddenly notice shared characteristics between plants you've observed separately, it reframes your whole understanding of how the natural world organizes itself... plants are so cool dude"}, {"pid": "601907", "axis": "abstract_concrete", "direction": "up", "activation": 0.2963, "original": "I think “yeah Biden sucks but he’s been considerably better on certain issues than we all expected which probably makes him the best President of the past 50 years” is a much stronger electoral argument than “everything is great! Why can’t you see it’s great! What are you, stupid????”", "rewrite": "I think \"yeah Biden has outperformed expectations on the economy and judicial appointments, which probably makes him the best President since Nixon\" is a much stronger electoral argument than \"everything is great! Why can't you see inflation has dropped and we added 13 million jobs! What are you, stupid????\""}, {"pid": "163500437", "axis": "abstract_concrete", "direction": "down", "activation": 0.2901, "original": "The trick to getting your buddy to turn into a dog faster is to take them out to the park to play catch, but gradually keep throwing the ball further over their head -by accident- so they have to repeatedly go \"fetch\" it, come back and resume. Eventually they will learn to return it straight to you.", "rewrite": "The trick to getting someone to adopt a particular behavior more quickly is to put them in an environment where they naturally gravitate toward that behavior, then subtly modify the conditions to reinforce it. By gradually increasing the difficulty in small, incremental ways, they'll eventually internalize the pattern and perform it more efficiently without needing external prompts."}, {"pid": "58167812", "axis": "abstract_concrete", "direction": "down", "activation": 0.289, "original": "MOSS ROSE is deeply, deliciously weird. Love the absurd logic of Cockney chorus girl Peggy Cummins blackmailing Victor Mature and compelling him to take her to his country estate so that she can learn to be a lady.  Love even more that we are supposed to root for her and want her scheme to succeed.", "rewrite": "There's something wonderfully peculiar about films that embrace unconventional premises. The appeal lies in narratives where characters pursue their ambitions through questionable means, yet the storytelling invites us to sympathize with their motivations anyway. What makes this approach so engaging is the tension between what we're being asked to condone and the charm with which it's presented—creating a delightful contradiction that keeps audiences invested in outcomes they might normally resist."}, {"pid": "85437255", "axis": "humor", "direction": "up", "activation": 0.286, "original": "The media loves to focus on quick success weight loss stories. \"Lose 10 pounds in 2 months!\" Kind of stuff. Good for those people. I'm here to be the person that isn't afraid to show what it's like to take 1 full year to lose 9 pounds (maybe 10 if I'm lucky).\n\nProgress at your own pace is healthy!", "rewrite": "The media's obsessed with those \"Lose 10 pounds in 2 months!\" headlines. Truly inspiring stuff. Meanwhile, I'm out here grinding through a full year to maybe—*maybe*—crack into double digits. Nine pounds. Could be ten if the scale is feeling generous on a Tuesday. \n\nTurns out tortoise-mode weight loss is also valid! (It has to be.)"}, {"pid": "58167812", "axis": "narrativity", "direction": "down", "activation": 0.2656, "original": "MOSS ROSE is deeply, deliciously weird. Love the absurd logic of Cockney chorus girl Peggy Cummins blackmailing Victor Mature and compelling him to take her to his country estate so that she can learn to be a lady.  Love even more that we are supposed to root for her and want her scheme to succeed.", "rewrite": "MOSS ROSE presents an absurd premise that works brilliantly: a Cockney chorus girl blackmails a wealthy man into taking her to his country estate under the guise of learning to become a lady. The film's genius lies in its commitment to making the audience root for her scheme. This inverted logic—celebrating a woman's manipulation and social climbing—is what makes the movie deeply weird and wickedly entertaining."}]}, {"f": 18, "density": 0.2902, "category": "partial_overlap", "lifts": {"reading_level": -0.0419, "background": 0.2298, "abstract_concrete": -0.0469, "tone": -0.0586, "humor": 0.0681, "narrativity": -0.1319, "grounding": -0.0186}, "best_axis": "background", "best_lift": 0.2298, "examples": [{"pid": "5451220", "axis": "humor", "direction": "down", "activation": 0.3408, "original": "Thinking again about how scientists have evidence for a probable concentration of mass millions of times bigger than our galaxy pulling everything toward it and decided to name it “The Great Attractor” instead of something cool like “The Devouring Sky.”", "rewrite": "Scientists have discovered evidence of an enormous concentration of mass millions of times larger than our galaxy that is pulling all matter toward it. They have named this phenomenon \"The Great Attractor.\" This discovery represents a significant finding in our understanding of the universe's large-scale structure and gravitational dynamics."}, {"pid": "5451220", "axis": "reading_level", "direction": "down", "activation": 0.327, "original": "Thinking again about how scientists have evidence for a probable concentration of mass millions of times bigger than our galaxy pulling everything toward it and decided to name it “The Great Attractor” instead of something cool like “The Devouring Sky.”", "rewrite": "Scientists found proof of something huge in space. It's millions of times bigger than our galaxy. Everything is being pulled toward it. They call it \"The Great Attractor.\" Honestly, \"The Devouring Sky\" would have been way cooler."}, {"pid": "69451452", "axis": "humor", "direction": "down", "activation": 0.3171, "original": "the Swolecialism Posting Services LLC Aprproved (C) (TM) Shoulder Murder Dropset Because You Hate Your Delts is doing a set of 10 lateral raises with whatever you can do 10 lateral raises with, then going down the dumbbell rack and doing AMRAP with every successive lower weight with <10sec rest, btw", "rewrite": "The Swolecialism Posting Services LLC Approved Shoulder Murder Dropset is a challenging workout protocol designed for serious deltoid development. The exercise begins with 10 lateral raises using a weight you can manage for that rep range, followed by progressive dropsets moving down the dumbbell rack. Complete as many reps as possible with each successive lighter weight, maintaining less than 10 seconds of rest between drops."}, {"pid": "698984", "axis": "narrativity", "direction": "down", "activation": 0.3099, "original": "Remembering how in 1984 everyone was concerned about Ronald Reagan's age so his aides wrote a joke about it for him to say during a debate, everybody laughed, and the entire news media said \"Ha ha, what a charming man, we will never speak of this topic again.\"", "rewrite": "In 1984, concerns about Ronald Reagan's age were defused when his aides wrote a joke for him to deliver during a debate. The audience laughed, and the news media subsequently ceased covering his age as a topic, framing him instead as charming and beyond scrutiny."}, {"pid": "36484797", "axis": "narrativity", "direction": "down", "activation": 0.304, "original": "Also Jazz OTD: Although it would remain unreleased (as the album \"Africaine\") for 20 years, Wayne Shorter made his recording debut with Art Blakey and the Jazz Messengers on November 10, 1959. Here's the Lee Morgan composition \"Haina,\" showing what a phenomenal ear for talent Blakey had. jazzsky", "rewrite": "Wayne Shorter made his recording debut with Art Blakey and the Jazz Messengers on November 10, 1959. The recording remained unreleased as the album \"Africaine\" for 20 years. \"Haina,\" a Lee Morgan composition from these sessions, demonstrates Art Blakey's phenomenal ear for talent."}, {"pid": "23273762", "axis": "tone", "direction": "down", "activation": 0.2815, "original": "A long, cautionary read on falling for—but thankfully, ultimately rejecting—the alternative medical industry that preys so hard on autistic kids and their vulnerable, information-seeking parents. By John Summers.", "rewrite": "A devastating exposé on how the alternative medical industry PREYS on autistic children and desperate parents searching for answers. John Summers breaks down the heartbreaking truth about what families are falling victim to—and how to fight back. READ THIS NOW."}, {"pid": "58167812", "axis": "humor", "direction": "down", "activation": 0.2814, "original": "MOSS ROSE is deeply, deliciously weird. Love the absurd logic of Cockney chorus girl Peggy Cummins blackmailing Victor Mature and compelling him to take her to his country estate so that she can learn to be a lady.  Love even more that we are supposed to root for her and want her scheme to succeed.", "rewrite": "MOSS ROSE presents an unconventional narrative structure. The film follows Peggy Cummins' character, a Cockney chorus girl who blackmails Victor Mature's character and forces him to bring her to his country estate under the premise of teaching her to become a lady. Notably, the film is constructed so that the audience is encouraged to support her and hope her plan succeeds."}, {"pid": "29711173", "axis": "humor", "direction": "up", "activation": 0.2745, "original": "i feel like i need to remind people that arguably the best celine dion song, IT’S ALL COMING BACK TO ME, was originally written for Meat Loaf and once you know that, 1) you can’t unhear it and 2) it makes the song even better", "rewrite": "reminder that the greatest celine dion song, IT'S ALL COMING BACK TO ME, was literally written for meat loaf first — and now that you know this absolute fact, you're legally obligated to: 1) never unhear it and 2) love the song even more (you're welcome for this curse)"}, {"pid": "698984", "axis": "humor", "direction": "down", "activation": 0.2737, "original": "Remembering how in 1984 everyone was concerned about Ronald Reagan's age so his aides wrote a joke about it for him to say during a debate, everybody laughed, and the entire news media said \"Ha ha, what a charming man, we will never speak of this topic again.\"", "rewrite": "In 1984, concerns about Ronald Reagan's age were addressed when his aides prepared a joke for him to deliver during a debate. Following the audience's laughter, media coverage shifted dramatically, with outlets treating the moment as charming and subsequently declining to raise the age question again in their reporting."}, {"pid": "53676585", "axis": "background", "direction": "up", "activation": 0.2583, "original": "Winter planting 🌱\n\nGarlic is one of the easiest crops to grow. The cloves of a bulb are split and planted with the point upwards. These can be started indoors in pots or directly planted outside… 🌱\n\nkitchen-garden.be/diary/winter...", "rewrite": "Garlic season 🌱\n\nSplit your bulbs, point up, and direct sow—or start indoors if you prefer. One of the most reliable crops for any grower.\n\nkitchen-garden.be/diary/winter..."}]}, {"f": 17, "density": 0.2076, "category": "partial_overlap", "lifts": {"reading_level": -0.1438, "background": 0.0279, "abstract_concrete": 0.2279, "tone": -0.0255, "humor": -0.0838, "narrativity": -0.1388, "grounding": 0.1362}, "best_axis": "abstract_concrete", "best_lift": 0.2279, "examples": [{"pid": "10861026", "axis": "grounding", "direction": "down", "activation": 0.42, "original": "A magnetar’s magnetic field is so strong that it can crack open the star’s surface to release bursts of energy visible across billions of light-years & astronomers have found a star that might be about to go magnetar 🧪", "rewrite": "A magnetar's magnetic field is incredibly powerful and can cause massive disruptions to the star's structure, releasing enormous bursts of energy that can be detected across vast cosmic distances. Astronomers have recently identified a star that could potentially undergo magnetar transformation 🧪"}, {"pid": "164211631", "axis": "grounding", "direction": "down", "activation": 0.4139, "original": "Perpetual Sunrise on Proxima Centauri b\n\nProxima Centauri b is an exoplanet orbiting the star nearest to our Sun. It was discovered in 2016 using the radial velocity method. The planet is likely tidally-locked to its parent star. Image from SpaceEngine. \n\n#ArtAdventCalendar #SciArt #SpaceArt", "rewrite": "Exoplanet Discovery and Tidal Locking\n\nProxima Centauri b is an exoplanet discovered in 2016 using the radial velocity method. It orbits a nearby star in our galactic neighborhood. The planet is likely tidally-locked to its parent star, meaning one hemisphere continuously faces its star while the other remains in darkness.\n\n#ArtAdventCalendar #SciArt #SpaceArt"}, {"pid": "20211498", "axis": "abstract_concrete", "direction": "down", "activation": 0.4131, "original": "Yesterday was the 20th anniversary of the launch of the Spitzer Space Telescope. Its discoveries and archives continue to impact astronomy. Here are some personal highlights: Spitzer found 1000s of protostars and young stars with disks (green dots) in molecular clouds (red) such as those in Orion. 🔭", "rewrite": "The enduring legacy of space telescopes extends far beyond their initial launch dates. Scientific instruments designed for infrared observation have fundamentally shaped our understanding of stellar phenomena. Their contributions persist through comprehensive data collections that remain valuable to the research community. Among the most significant outcomes has been the identification of numerous early-stage stellar objects within regions of active star formation, revealing previously unknown details about how stars and planetary systems develop. 🔭"}, {"pid": "29051275", "axis": "abstract_concrete", "direction": "down", "activation": 0.3764, "original": "I reviewed Iris Kelly Doesn't Date, by Ashley Herring Blake:\n\n\"A truly remarkable novel. Herring Blake’s prose is light, funny, and achingly beautiful. She’s a writer at the top of her game, with every aspect of this book combining to create a perfect whole.\"\n\n#LousReview #SapphFic #SapphicBooks", "rewrite": "I reviewed a recent release and found it to be truly remarkable. The writing demonstrates exceptional skill across multiple dimensions—the style is engaging and emotionally resonant, while the author demonstrates mastery of their craft. Every element works in harmony to create a cohesive and impactful work.\n\n#LousReview #SapphFic #SapphicBooks"}, {"pid": "34442984", "axis": "abstract_concrete", "direction": "down", "activation": 0.3674, "original": "Bird Glamour’s Glamager series continues with the striking Scarlet Tanager! This eastern North America & South American tanager are surprisingly difficult to spot: they prefer to hang out high in the forest canopy. They also do a wardrobe change in the fall until spring to a yellow-green plumage! 🐡", "rewrite": "Certain bird species showcase remarkable visual appeal through dedicated content series. Many avian varieties present unexpected challenges for observation despite their vibrant coloring, as they tend to inhabit elevated woodland environments. Additionally, numerous species undergo seasonal transformations in their plumage, shifting to more subdued tones during specific times of year. 🐡"}, {"pid": "144524710", "axis": "grounding", "direction": "down", "activation": 0.367, "original": "🔭 🧪 Cocktails anyone? The James Webb Space Telescope has discovered a wide assortment of chemical molecules including ethanol alcohol around two protostars. These are some of the key ingredients for making potentially habitable worlds: webbtelescope.pub/49R7e0z", "rewrite": "🔭 🧪 The James Webb Space Telescope has detected various organic chemical molecules, including ethanol, in the regions around two protostars. These compounds are fundamental building blocks associated with potentially habitable planets. webbtelescope.pub/49R7e0z"}, {"pid": "27137012", "axis": "abstract_concrete", "direction": "down", "activation": 0.366, "original": "I fell out of going to the gym since hurting my shoulder pretty badly a bit ago, and it's been making me feel like trash so I'm trying to actively change that. Getting back doing at least *something* active so expect sweaty accountability selfies for a bit while I try to motivate lmao", "rewrite": "I've taken a break from my regular fitness routine due to an injury, and the mental toll has been significant. I'm committed to shifting this pattern by reintroducing movement into my life. I'll be documenting this journey publicly as a way to maintain accountability and push through the motivation challenges ahead."}, {"pid": "11780814", "axis": "abstract_concrete", "direction": "down", "activation": 0.3631, "original": "If you are looking for a way to experience DAI a bit differently, go to options and turn off “music”, or way down to 10% or less. The game seems dramatically different because you hear so much more in the environment and surroundings. It’s really cool I’m loving it.", "rewrite": "If you're seeking an alternative way to engage with your experience, consider adjusting your audio preferences to minimize or eliminate musical accompaniment. This shift in sensory balance can fundamentally alter how you perceive the overall environment, allowing atmospheric details to become more prominent. The resulting change in perspective is quite remarkable and worth exploring."}, {"pid": "1267090", "axis": "grounding", "direction": "down", "activation": 0.3524, "original": "Paul McCartney was 24 when he wrote Eleanor Rigby. That’s one of those facts that should break the brains of the performative ‘The Beatles were shit’ people. He was preternaturally talented and no amount of Frog Choruses could undo that.", "rewrite": "Paul McCartney demonstrated exceptional songwriting ability at a young age, composing Eleanor Rigby at just 24 years old. This early mastery of his craft is a significant achievement that speaks to his natural talent. His abilities as a musician and songwriter are undeniable, regardless of critical opinions about his work."}, {"pid": "20330243", "axis": "abstract_concrete", "direction": "down", "activation": 0.3519, "original": "Yesterday, India became the first country to successfully land a spacecraft at the moon's south pole. Here's more on the Chandrayaan-3 mission and why everyone is obsessed with the lunar south pole. 🛰️🧪", "rewrite": "Yesterday, a significant milestone was achieved in space exploration when a nation successfully completed a lunar landing at a previously unreached region of the moon. Here's more on this achievement and why this particular area continues to capture global scientific interest. 🛰️🧪"}]}, {"f": 31, "density": 0.3051, "category": "partial_overlap", "lifts": {"reading_level": 0.199, "background": -0.2243, "abstract_concrete": -0.096, "tone": 0.0574, "humor": -0.0276, "narrativity": 0.2157, "grounding": -0.1243}, "best_axis": "background", "best_lift": -0.2243, "examples": [{"pid": "9254994", "axis": "reading_level", "direction": "up", "activation": 0.3488, "original": "Lusi gotted her  ♠️ Cone of Triumph today, which means her will not accidentally take precious adoption spots by making any kittens and will not get ovarian cancers or kitteh STDs. --Loki💛😸\n\n#spayandneuter", "rewrite": "Lusi underwent her spay procedure today, thereby precluding unintended pregnancy, eliminating the risk of ovarian malignancies, and mitigating susceptibility to feline reproductive tract infections—consequently preserving adoption resources for animals already in need of placement. --Loki💛😸\n\n#spayandneuter"}, {"pid": "12921978", "axis": "tone", "direction": "down", "activation": 0.3484, "original": "Last year’s dwarf irises—among my very favourite plants—were a treasure. This year we learn whether they’ll perennialize in the spots I picked for them, but as insurance, we planted another fifty. There can never be too many! They take up no space; their post-bloom foliage is narrow and subtle 🌱", "rewrite": "Last year's dwarf irises absolutely STOLE MY HEART—they were pure magic. Now I'm on edge waiting to see if they'll actually come back in the spots I chose, so I planted FIFTY MORE as backup. I need these flowers in my life. They barely take up any room, and their foliage stays delicate and unobtrusive 🌱"}, {"pid": "53993535", "axis": "tone", "direction": "up", "activation": 0.3418, "original": "the worst part of being a cat has to be you're this perfect streamlined killing machine made of nothing but muscle and needles and yet some soft ass bald ass ape can just pick you up and put you where you weren't trying to go", "rewrite": "Cats present an interesting evolutionary paradox: they're highly efficient predators with specialized musculature and defensive adaptations, yet they remain subject to being relocated by humans against their apparent preference. This mismatch between their physical capabilities and actual autonomy in domestic settings is worth considering."}, {"pid": "42884167", "axis": "background", "direction": "up", "activation": 0.3207, "original": "My cat is pretty smart for a cat. He gets bored of toys instantly and is only interested in string toys and laser pointers for like 30 seconds. Then he comes and meows at me because he's bored. I dunno, dude. Try being stupider, it worked for me", "rewrite": "My cat's got that problem where enrichment becomes pointless—novelty wears off in 30 seconds flat and he's back meowing at me for stimulation. At this point I'm just accepting that high intelligence in cats is basically a curse. Being dumber would genuinely solve his issues."}, {"pid": "115418595", "axis": "humor", "direction": "up", "activation": 0.3027, "original": "4 years ago I started weight lifting as a new way for me to exercise and an outlet for my thoughts/feelings. Today was the first workout in the new place and even though being a new professor is 100% KICKING my ass (only 4 weeks into the semester), I'm feeling WAY better about things. 🔭🧪👩‍🔬", "rewrite": "4 years ago I discovered that lifting heavy things could somehow fix my brain (spoiler: it works). Today marked my first workout in the new place, and despite being a new professor—which is absolutely *destroying* me (only 4 weeks in, send help)—I'm feeling surprisingly human again. Turns out there's no problem that can't be solved by grunting in a gym. 🔭🧪👩‍🔬"}, {"pid": "18145831", "axis": "reading_level", "direction": "down", "activation": 0.2994, "original": "I am much better at reading & writing than at listening & speaking. This is a common profile for autistics. Many of us have auditory processing delays, so our brains can’t parse spoken language quickly. Spoken communication also involves a lot of non-verbal elements that aren’t natural for us. 🧵1/3", "rewrite": "I'm much better at reading and writing than listening and speaking. A lot of autistic people are like this. Our brains have trouble understanding spoken words fast. Talking also has body language and tone that we find hard to pick up. 🧵1/3"}, {"pid": "10945333", "axis": "tone", "direction": "up", "activation": 0.2867, "original": "Made an incredibly funny gym discovery that my core, back and triceps are actually pretty strong for someone of my size, I'm doing about half my body weight or more, but I can't do the lightest weight shoulder or bicep stuff which explains why I can push switchy girls down easily but not off me", "rewrite": "I've noticed an interesting asymmetry in my strength distribution at the gym. My core, back, and triceps appear relatively developed for my body weight—I'm lifting around 50%+ of my body weight in these areas. However, my shoulder and bicep strength lags considerably behind. This muscular imbalance likely accounts for why I find certain pushing movements easier than pulling movements when it comes to upper body interactions."}, {"pid": "185958959", "axis": "tone", "direction": "up", "activation": 0.2745, "original": "watched a couple diablo iv videos because that's my game to play with friends and the vibe is absolutely wretched just the angriest men who have exhausted hundreds of hours of content from the game in a month saying shit like oh how HARD is it to program this. this isn't enough to win people back", "rewrite": "I've been following some Diablo IV content coverage, and there's a notable pattern worth observing. Several streamers with extensive playtime have adopted a critical stance toward the game's design decisions, frequently questioning the development choices. This level of sustained criticism from dedicated players suggests the current state of the game may not be sufficient to rebuild broader player confidence."}, {"pid": "22981252", "axis": "tone", "direction": "up", "activation": 0.2726, "original": "#Watched The Boys Next Door (1985) - goddamn! Think ‘80s spring break teen comedies full of shenanigans, except Spheeris moves the sociopathic nature of the leads from unexamined subtext to explicit text. These guys think they are the heroes of a sex comedy, not the villains of a thriller. #filmsky", "rewrite": "#Watched The Boys Next Door (1985) - a notable entry in '80s spring break teen comedies. Where the genre typically leaves the protagonists' troubling behavior as subtext, Spheeris makes it central to the narrative. The leads operate under the assumption they're in a sex comedy, unaware they're positioned as antagonists in a thriller instead. #filmsky"}, {"pid": "23749732", "axis": "tone", "direction": "up", "activation": 0.2673, "original": "It's so funny that you need to exercise to get healthy. Your body is like \"oh, we are running now? That's what we are gonna do? Run around all the time? Fiiiiiiiiiiiiiiine I'll fix your lungs so they actually work, GOD.\"", "rewrite": "Regular exercise improves cardiovascular function through a well-established physiological process. When the body is subjected to repeated physical activity, it adapts by enhancing lung capacity and oxygen efficiency. This adaptive response represents one of the primary mechanisms through which exercise produces measurable health outcomes."}]}, {"f": 49, "density": 0.2633, "category": "partial_overlap", "lifts": {"reading_level": 0.2229, "background": -0.1105, "abstract_concrete": -0.1921, "tone": -0.0055, "humor": 0.1045, "narrativity": 0.1112, "grounding": -0.1305}, "best_axis": "reading_level", "best_lift": 0.2229, "examples": [{"pid": "5416078", "axis": "humor", "direction": "up", "activation": 0.3321, "original": "The low unemployment of the last couple years is good, actually, writes @@6832. \"Big Fiscal has driven the employment rate among prime-age workers up to 80.9%, the highest level in more than 20 years and the 2nd-highest rate in American history.\"", "rewrite": "The low unemployment of the last couple years is good, actually, writes @@6832. \"Big Fiscal has apparently discovered the secret sauce: getting prime-age workers employed at 80.9%—a level so high it's only been reached once before in American history. Who knew the answer was just... spending money?\""}, {"pid": "115211901", "axis": "narrativity", "direction": "up", "activation": 0.3025, "original": "Re-listened to Beasties' catalog in order. Ranked: \n\nLicensed to Ill (1986)*\nCheck Your Head (1992)\nPaul's Boutique (1989)\nIll Communication (1994)\nHot Sauce Committee Part Two (2011)\nHello Nasty (1998)\nTo the 5 Boroughs (2004)\nThe Mix-Up (2007)\n\n*MASSIVE 80s drum machine sounds = my red kryptonite.", "rewrite": "I was sorting through my old iPod playlists last week when I realized I'd never actually sat down and ranked the Beasties' whole discography in order. So I committed: headphones on, afternoon cleared, starting from '86 and working straight through.\n\nBy the time Licensed to Ill finished, I remembered why those massive 80s drum machine sounds hit different for me — they're basically my red kryptonite. Here's how it all shook out:\n\nLicensed to Ill (1986)\nCheck Your Head (1992)\nPaul's Boutique (1989)\nIll Communication (1994)\nHot Sauce Committee Part Two (2011)\nHello Nasty (1998)\nTo the 5 Boroughs (2004)\nThe Mix-Up (2007)"}, {"pid": "6044088", "axis": "reading_level", "direction": "down", "activation": 0.3025, "original": "I'm not denying that the SECCG is the biggest game this weekend, but here's the average distances from home for the participants in each game: \n\nACC: 459\nB1G: 317\nB12: 231\nP12: 995\nSEC: 136\n\nOrder those from closest to furthest, and it directly correlates to the order of price.", "rewrite": "The SEC Championship is huge this weekend. But look at how far fans have to travel for each conference's title game:\n\nACC: 459 miles\nB1G: 317 miles\nB12: 231 miles\nP12: 995 miles\nSEC: 136 miles\n\nPut them from shortest to longest trip. It matches the ticket prices perfectly. The closest game costs the most. The furthest game costs the least."}, {"pid": "9649201", "axis": "background", "direction": "up", "activation": 0.2943, "original": "PARIS IS BURNING (1990)\nDir. Jennie Livingston\nUnited States\nDocumentary, Queer\n#DesertIslandSundance\n\nWhere does voguing come from, and what is throwing shade? This landmark documentary provides a vibrant snapshot of the 80s through the eyes of New York's Black and Latine Harlem drag-ball scene.", "rewrite": "PARIS IS BURNING (1990)\nDir. Jennie Livingston\n#DesertIslandSundance\n\nThe definitive doc on NYC's ballroom culture—voguing, shade, houses, and the radical visibility the scene carved out for queer Black and Latine performers when mainstream culture had nothing for them."}, {"pid": "63595718", "axis": "tone", "direction": "up", "activation": 0.2837, "original": "(Ken Burns Baseball Docuseries)\n\nWASHINGTON POST WRITER (choking on tears): Baseball is magnificent. The equalizer of Rich and Poor. The symbol of America.\n\nNARRATOR: Ty Cobb went on to break his own records for most slurs said in a game 53 more times before he retired in 1926.", "rewrite": "Ken Burns' Baseball Docuseries presents an interesting contrast in its narrative arc. The Washington Post writer describes baseball as a unifying force that transcends economic divides and serves as a national symbol. However, the documentary's historical record indicates that prominent players like Ty Cobb were responsible for numerous documented instances of offensive language throughout their careers—Cobb reportedly set records for slurs used in games on 53 separate occasions before his 1926 retirement. This juxtaposition between the idealized mythology of the sport and the documented behaviors of its early stars warrants consideration when evaluating baseball's actual historical legacy."}, {"pid": "216874452", "axis": "narrativity", "direction": "up", "activation": 0.2767, "original": "Skalat (Ternopil): Wichrowski Castle, church, old buildings. One of the best-preserved castles in Ternopil is located in Skalat, a town of district subordination on the Hnyla River in the Pidvolochysk district of Ternopil region. ⬇\n️", "rewrite": "I was scrolling through photos of Ternopil region when I stumbled upon something that stopped me cold — Wichrowski Castle rising majestically from the landscape. Curious, I dug deeper and discovered Skalat, this quiet town hugging the Hnyla River in Pidvolochysk district, holds one of the region's best-preserved castles. The castle stands among a collection of historic churches and old buildings that seem frozen in time, telling stories of centuries past. ⬇️"}, {"pid": "156928812", "axis": "abstract_concrete", "direction": "up", "activation": 0.274, "original": "It's been gratifying to see so many other devs saying the same things about The Video Game Awards that I've been saying almost since they debuted on Spike 2 decades ago. Game devs need to take themselves more seriously than Geoff Keighley's star worshipping ad-stravaganza.", "rewrite": "It's been gratifying to see developers like [specific devs] publicly echoing critiques I've made about The Game Awards since its 2014 debut on Spike TV. When Geoff Keighley prioritizes celebrity appearances and product placements over developer recognition, it undermines the medium. Game developers deserve award shows that celebrate their craft rather than treating games as a vehicle for Hollywood spectacle."}, {"pid": "115211901", "axis": "humor", "direction": "up", "activation": 0.2632, "original": "Re-listened to Beasties' catalog in order. Ranked: \n\nLicensed to Ill (1986)*\nCheck Your Head (1992)\nPaul's Boutique (1989)\nIll Communication (1994)\nHot Sauce Committee Part Two (2011)\nHello Nasty (1998)\nTo the 5 Boroughs (2004)\nThe Mix-Up (2007)\n\n*MASSIVE 80s drum machine sounds = my red kryptonite.", "rewrite": "Re-listened to the Beasties' entire catalog so you know my ranking is *definitely* objective and not at all influenced by nostalgia:\n\nLicensed to Ill (1986)*\nCheck Your Head (1992)\nPaul's Boutique (1989)\nIll Communication (1994)\nHot Sauce Committee Part Two (2011)\nHello Nasty (1998)\nTo the 5 Boroughs (2004)\nThe Mix-Up (2007)\n\n*Those absolutely unhinged 80s drum machine sounds hit different. It's my weakness. I have no control."}, {"pid": "6021114", "axis": "humor", "direction": "up", "activation": 0.2596, "original": "Another in the long list of reasons to reelect Biden: Thomas and Alito are in their seventies. Thomas will be 80 before the end of the next presidential term, Alito will hit 78. Also, Sotomayor is now 69, and might want to retire rather than being carried out of her chambers.\n\nJust sayin'", "rewrite": "Nothing says \"vote for me\" quite like Supreme Court justices who'll be collecting Social Security by the end of my term. Thomas will be 80 (incredible), Alito will be 78 (still kicking), and Sotomayor—a sprightly 69—might prefer retirement to the whole \"being wheeled out feet first\" scenario. But sure, let's definitely make that the centerpiece of our campaign messaging."}, {"pid": "49251804", "axis": "abstract_concrete", "direction": "up", "activation": 0.2483, "original": "Just saw someone explaining what autistic flirting is like: “if you think I’m flirting with you, I’m probably being friendly, if you think I’m being weird and making you uncomfortable, then I’m probably flirting with you” and I feel that to my butt-hole", "rewrite": "Just saw a post where an autistic person described their flirting style: \"if you think I'm flirting with you, I'm probably just being friendly, if you think I'm being weird and making you uncomfortable, then I'm actually flirting with you\" and this hits different because it's so painfully accurate."}]}, {"f": 42, "density": 0.2863, "category": "partial_overlap", "lifts": {"reading_level": -0.1207, "background": 0.156, "abstract_concrete": 0.106, "tone": -0.114, "humor": 0.051, "narrativity": -0.209, "grounding": 0.131}, "best_axis": "narrativity", "best_lift": -0.209, "examples": [{"pid": "67077981", "axis": "abstract_concrete", "direction": "down", "activation": 0.3977, "original": "Good back day, ate like shit last night so it was slow, but I'm feeling the mind-muscle connection better than ever!\n\nAlso, getting to a point where my arms are stretching my flannel sleeves has me like 💪🥴", "rewrite": "Good training session today. Still working through the effects of poor eating choices, but my overall body awareness during workouts continues to improve significantly.\n\nMaking real progress on my fitness goals, and the physical changes are becoming increasingly noticeable in my everyday life 💪🥴"}, {"pid": "15858253", "axis": "grounding", "direction": "down", "activation": 0.3409, "original": "I think I've posted this before, but apparently I'm going through old ultimate frisbee photos. It turns out playing or practicing sports almost every day of the week because that's the only time you're comfortable in your body will make you kinda swole\n\nWe played as mimes, silently", "rewrite": "I think I've posted this before, but apparently I'm going through old photos from when I was very active in sports. It turns out that engaging in physical activity almost every day of the week because it's the only time you feel comfortable in your body will build significant muscle mass."}, {"pid": "15858253", "axis": "abstract_concrete", "direction": "down", "activation": 0.3317, "original": "I think I've posted this before, but apparently I'm going through old ultimate frisbee photos. It turns out playing or practicing sports almost every day of the week because that's the only time you're comfortable in your body will make you kinda swole\n\nWe played as mimes, silently", "rewrite": "I think I've mentioned this before, but I'm revisiting memories from my athletic past. It turns out that engaging in regular physical activity as a primary means of feeling at ease in your own skin can lead to noticeable physical changes.\n\nThe experience was notably unconventional in nature."}, {"pid": "23749732", "axis": "humor", "direction": "down", "activation": 0.3029, "original": "It's so funny that you need to exercise to get healthy. Your body is like \"oh, we are running now? That's what we are gonna do? Run around all the time? Fiiiiiiiiiiiiiiine I'll fix your lungs so they actually work, GOD.\"", "rewrite": "Exercise is essential for improving your health. Regular physical activity strengthens your cardiovascular system and respiratory function. Your body adapts to the demands you place on it — when you commit to consistent exercise, your lungs and heart become more efficient. This physiological adaptation is fundamental to achieving better overall health outcomes."}, {"pid": "30251254", "axis": "humor", "direction": "down", "activation": 0.2677, "original": "my main deadlifting \"goal\" is to be able to pick up and carry most of the folks I know. Some years back at our annual xmas scotch tasting, one cousin got so drunk he lied down on the ground and wouldn't get up. and I LIT UP EXCITEDLY because it was EXACTLY what I had been TRAINING FOR MY WHOLE LIFE", "rewrite": "I've been training my deadlift with a specific purpose in mind: to be strong enough to help and support the people I care about. A few years ago at our family Christmas gathering, this became relevant when a cousin had too much to drink and needed assistance getting up from the ground. In that moment, I realized my training had prepared me for exactly this kind of practical responsibility—being able to physically help someone when they genuinely need it."}, {"pid": "2644044", "axis": "grounding", "direction": "down", "activation": 0.2635, "original": "I have been able to use the strength from my training in real-world contexts this week. I squat to protect my back. I'm using my core to get in and out of bed. It feels like a real, significant win to be stronger and more mobile than my doctors expected. This is middle age.", "rewrite": "I have been able to apply the physical benefits from my training in practical everyday situations this week. Specific movements and muscle engagement are preventing injury and improving my functional ability in daily activities. It feels like a real, significant win to be stronger and more mobile than my doctors expected. This is middle age."}, {"pid": "9254994", "axis": "tone", "direction": "down", "activation": 0.2634, "original": "Lusi gotted her  ♠️ Cone of Triumph today, which means her will not accidentally take precious adoption spots by making any kittens and will not get ovarian cancers or kitteh STDs. --Loki💛😸\n\n#spayandneuter", "rewrite": "Lusi FINALLY got her ♠️ Cone of Triumph today—a life-saving procedure that protects her from ovarian cancer, dangerous STDs, and the heartbreak of unwanted litters taking precious adoption spots. She's safe now. Please don't wait—spay/neuter your cats TODAY. --Loki💛😸\n\n#spayandneuter"}, {"pid": "22203683", "axis": "humor", "direction": "down", "activation": 0.2609, "original": "If I were to write a book, which do you think would sell better;\n\nA) Christian Housewives Quarterly (A monthly account of a Christian book club, that reads a possessed book and descends into lesbian debauchery)\n\nB) An Epic of Great Importance (satirical fantasy novel poking fun at fantasy tropes)", "rewrite": "If I were to write a book, which do you think would sell better?\n\nA) Christian Housewives Quarterly (A monthly account of a Christian book club that encounters a possessed book and experiences a profound moral and spiritual crisis)\n\nB) An Epic of Great Importance (A fantasy novel that critically examines and challenges conventional fantasy genre conventions)"}, {"pid": "25313674", "axis": "humor", "direction": "down", "activation": 0.258, "original": "I have a basset hound agility story!\n\nEveryone meet Deetles. She was one of my best girls who left us a few years ago.  She was a double field/confirmation ring champion and they tried to go for a triple championship with agility.\n\nDeetles flunked agility.  Story.\n\n1/?", "rewrite": "I have a basset hound agility story to share.\n\nThis is Deetles, one of my exceptional dogs who passed away several years ago. She was a double field and confirmation ring champion. Her owners attempted to add an agility championship to her accomplishments.\n\nDeetles did not complete agility training. That is the story.\n\n1/?"}, {"pid": "42884167", "axis": "humor", "direction": "down", "activation": 0.2562, "original": "My cat is pretty smart for a cat. He gets bored of toys instantly and is only interested in string toys and laser pointers for like 30 seconds. Then he comes and meows at me because he's bored. I dunno, dude. Try being stupider, it worked for me", "rewrite": "My cat is remarkably intelligent for a feline. He quickly loses interest in most toys and only engages with string toys and laser pointers for brief periods. After that, he comes to me and meows, clearly looking for stimulation. I genuinely struggle to keep him entertained. His intelligence creates a real challenge when it comes to enrichment."}]}, {"f": 24, "density": 0.289, "category": "partial_overlap", "lifts": {"reading_level": 0.0462, "background": 0.1562, "abstract_concrete": -0.1438, "tone": 0.0295, "humor": 0.0979, "narrativity": 0.0179, "grounding": -0.2038}, "best_axis": "grounding", "best_lift": -0.2038, "examples": [{"pid": "46139559", "axis": "narrativity", "direction": "up", "activation": 0.3815, "original": "American workers have experienced record high job security during 2021, 2022, & 2023.\n\nOnly 1.0% of American employees was fired by their boss, either discharged or laid off, in a typical month in each of those years.\n\nIn a typical 2019 month, 1.2% were, a 20% higher rate.\nIn a 2020 month, 2.4%.\n#️⃣#️⃣", "rewrite": "I was talking to my friend Marco last week—he's been at the same company for five years—and he mentioned how grateful he feels just keeping his job. That conversation stuck with me because it perfectly captures something we've all been experiencing: the last few years have actually been pretty good for job security in America.\n\nThink about it: in 2021, 2022, and 2023, only 1.0% of American employees got fired or laid off in any given month. That's a record low. Compare that to 2019, when 1.2% faced termination—that's 20% higher. And 2020? That was rough at 2.4%, when everything was shutting down. But we bounced back hard. \n\nAmerican workers have experienced the strongest job security we've seen."}, {"pid": "115211901", "axis": "narrativity", "direction": "up", "activation": 0.331, "original": "Re-listened to Beasties' catalog in order. Ranked: \n\nLicensed to Ill (1986)*\nCheck Your Head (1992)\nPaul's Boutique (1989)\nIll Communication (1994)\nHot Sauce Committee Part Two (2011)\nHello Nasty (1998)\nTo the 5 Boroughs (2004)\nThe Mix-Up (2007)\n\n*MASSIVE 80s drum machine sounds = my red kryptonite.", "rewrite": "I was sorting through my old iPod playlists last week when I realized I'd never actually sat down and ranked the Beasties' whole discography in order. So I committed: headphones on, afternoon cleared, starting from '86 and working straight through.\n\nBy the time Licensed to Ill finished, I remembered why those massive 80s drum machine sounds hit different for me — they're basically my red kryptonite. Here's how it all shook out:\n\nLicensed to Ill (1986)\nCheck Your Head (1992)\nPaul's Boutique (1989)\nIll Communication (1994)\nHot Sauce Committee Part Two (2011)\nHello Nasty (1998)\nTo the 5 Boroughs (2004)\nThe Mix-Up (2007)"}, {"pid": "23140626", "axis": "abstract_concrete", "direction": "up", "activation": 0.3146, "original": "Seems kinda funny that Apple is trying to help popularize soccer in America because I always
