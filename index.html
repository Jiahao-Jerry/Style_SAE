*the* place to be and decided to relocate from tropical Sri Lanka. It'll hit 50 feet if you let it (or stay politely contained if you're into that), but fair warning: this diva cannot handle anything below 40 degrees. Frost? Absolutely not. 🌱\n\nImage via Tanria Elementals"}, {"pid": "216874452", "axis": "humor", "direction": "up", "activation": 0.2934, "original": "Skalat (Ternopil): Wichrowski Castle, church, old buildings. One of the best-preserved castles in Ternopil is located in Skalat, a town of district subordination on the Hnyla River in the Pidvolochysk district of Ternopil region. ⬇\n️", "rewrite": "Skalat (Ternopil): Because apparently, one perfectly good castle wasn't enough—they threw in a church and some vintage buildings too. Wichrowski Castle here is basically the overachiever of Ternopil's castle collection, still standing impressively intact in this quaint riverside town of Pidvolochysk district. ⬇️"}, {"pid": "64449229", "axis": "grounding", "direction": "down", "activation": 0.2881, "original": "In time for your bedtime space tweet, NASA drops a new image from the Webb Telescope. \"NGC 604 rolling out the red carpet for more than 200 new stars\"\nNGC 604 is approximately 2.7M light-years away from Earth within the Triangulum Galaxy. Ignore Hollywood, here’s where stars are born.", "rewrite": "NASA has released a new image from the Webb Telescope featuring NGC 604, a stellar nursery located approximately 2.7 million light-years away in the Triangulum Galaxy. The image captures over 200 newly formed stars in this region of space. This astronomical discovery demonstrates where stars are actually created in the universe."}, {"pid": "7969474", "axis": "grounding", "direction": "down", "activation": 0.2794, "original": "My work-from-home setup has a motorized sitting/standing desk and my \"chair\" is a yoga ball which has been amazing for my lower back and fidgeting tendencies.\n\nBut it's also the prop I recorded for Baymax's body squeaks in Big Hero 6! So basically legacy sounds every time I move heh", "rewrite": "My work-from-home setup includes a motorized sitting/standing desk and a yoga ball instead of a traditional chair, which has been great for my posture and need to move around.\n\nIt happens to be the same type of object used for sound design work on a major film project, so there's something fun about that connection to my daily routine."}, {"pid": "25028206", "axis": "humor", "direction": "down", "activation": 0.271, "original": "If you're looking for an awesome 'so bad it's incredible' movie I highly recommend Maximum Overdrive. It's Stephen King's first (and only) directorial debut fueled entirely by cocainium. \nI made a video essay on the story behind the scenes that lead to this disaster\n\nyoutu.be/gfJ_9r8jDho?...", "rewrite": "If you're interested in exploring an unconventional film, I recommend Maximum Overdrive. It's Stephen King's directorial debut, and its creation was significantly influenced by his personal struggles during that period.\n\nI created a video essay examining the behind-the-scenes story that led to this film's production.\n\nyoutu.be/gfJ_9r8jDho?..."}, {"pid": "164211631", "axis": "background", "direction": "up", "activation": 0.2682, "original": "Perpetual Sunrise on Proxima Centauri b\n\nProxima Centauri b is an exoplanet orbiting the star nearest to our Sun. It was discovered in 2016 using the radial velocity method. The planet is likely tidally-locked to its parent star. Image from SpaceEngine. \n\n#ArtAdventCalendar #SciArt #SpaceArt", "rewrite": "Perpetual Sunrise on Proxima Centauri b\n\nThis tidally-locked exoplanet orbits our nearest stellar neighbor—discovered via radial velocity in 2016. The terminator zone between its permanent day and night sides would host perpetual sunrise conditions. Image from SpaceEngine.\n\n#ArtAdventCalendar #SciArt #SpaceArt"}, {"pid": "35939281", "axis": "humor", "direction": "up", "activation": 0.262, "original": "Just rewatched BIG NIGHT. Fantastic, even though made when a film could be about a genuinely \"big night\" even though Galactus isn't trying to eat the world and the story is just an exploration of brotherhood, with a lot of great Italian cooking thrown in as \"special effects\".", "rewrite": "Just rewatched BIG NIGHT and wow—turns out you *can* make a gripping film about two brothers and some pasta without requiring an alien extinction event. Galactus could never. The cooking scenes are basically the MCU's idea of character development, except they actually taste good and don't require three hours of setup."}, {"pid": "216874452", "axis": "narrativity", "direction": "up", "activation": 0.2605, "original": "Skalat (Ternopil): Wichrowski Castle, church, old buildings. One of the best-preserved castles in Ternopil is located in Skalat, a town of district subordination on the Hnyla River in the Pidvolochysk district of Ternopil region. ⬇\n️", "rewrite": "I was scrolling through photos of Ternopil region when I stumbled upon something that stopped me cold — Wichrowski Castle rising majestically from the landscape. Curious, I dug deeper and discovered Skalat, this quiet town hugging the Hnyla River in Pidvolochysk district, holds one of the region's best-preserved castles. The castle stands among a collection of historic churches and old buildings that seem frozen in time, telling stories of centuries past. ⬇️"}]}, {"f": 55, "density": 0.2516, "category": "novel_candidate", "lifts": {"reading_level": 0.1048, "background": 0.0731, "abstract_concrete": -0.1152, "tone": 0.1198, "humor": -0.0186, "narrativity": -0.0419, "grounding": -0.1219}, "best_axis": "grounding", "best_lift": -0.1219, "examples": [{"pid": "33051063", "axis": "abstract_concrete", "direction": "up", "activation": 0.4233, "original": "Cаn't stаnd when people complаin how busy the gym is in Jаnuаry with new people! These people аre trying to better themselves or improve their heаlth аnd а few yeаrs аgo it would hаve been you thаt wаs new. We should аll be more supportive аnd helpful so everyone feels comfortable.", "rewrite": "Can't stand when people complain how busy Planet Fitness or LA Fitness gets in January with New Year's Resolution crowd! Those folks signing up on January 2nd are trying to hit their weight loss or muscle-building goals, and in 2020 or 2021 it would've been you nervously walking in not knowing where the squat rack was. We should all spot someone, show them how to use the leg press, or smile at the nervous newbie so everyone actually sticks with their February gym commitment."}, {"pid": "2128012", "axis": "tone", "direction": "down", "activation": 0.4122, "original": "What influence do academics have on their students? Over the last four decades tens of thousands of members of the US elite have taken Michael Sandel’s course on Justice at an impressionable age. And yet …", "rewrite": "What influence do academics have on their students? Over the last four decades tens of thousands of members of the US elite have taken Michael Sandel's course on Justice at an impressionable age. And yet …"}, {"pid": "33051063", "axis": "reading_level", "direction": "up", "activation": 0.4116, "original": "Cаn't stаnd when people complаin how busy the gym is in Jаnuаry with new people! These people аre trying to better themselves or improve their heаlth аnd а few yeаrs аgo it would hаve been you thаt wаs new. We should аll be more supportive аnd helpful so everyone feels comfortable.", "rewrite": "The pervasive disparagement directed toward neophyte gym-goers during January's peak enrollment period is fundamentally counterproductive to cultivating a supportive fitness community. These individuals represent a demographic actively engaged in self-improvement and health optimization endeavors—circumstances that would have characterized your own entry into the fitness sphere in prior years. Consequently, fostering an ethos of mentorship and accommodating inclusivity becomes paramount in establishing an environment wherein all practitioners, regardless of tenure, experience psychological comfort and confidence in their pursuits."}, {"pid": "33051063", "axis": "grounding", "direction": "up", "activation": 0.4115, "original": "Cаn't stаnd when people complаin how busy the gym is in Jаnuаry with new people! These people аre trying to better themselves or improve their heаlth аnd а few yeаrs аgo it would hаve been you thаt wаs new. We should аll be more supportive аnd helpful so everyone feels comfortable.", "rewrite": "Can't stand when people complain how busy the gym is in January with new people! These people are trying to better themselves or improve their health — it's like complaining that a cooking class is full of beginners in September. A few years ago it would have been you that was new, uncertain about where the dumbbells go or how to use the machines. We should all be more supportive and helpful so everyone feels comfortable, just like you'd want someone to have helped you."}, {"pid": "33051063", "axis": "narrativity", "direction": "up", "activation": 0.3464, "original": "Cаn't stаnd when people complаin how busy the gym is in Jаnuаry with new people! These people аre trying to better themselves or improve their heаlth аnd а few yeаrs аgo it would hаve been you thаt wаs new. We should аll be more supportive аnd helpful so everyone feels comfortable.", "rewrite": "I'll never forget that awkward feeling of walking into the gym for the first time in January—sweaty palms, intimidated by all the regulars, wondering if I belonged there. Now, years later, I see the same nervous faces every new year and it hits different. When people complain about how crowded the gym gets in January with all these newcomers, I have to speak up. Those \"new people\" are doing exactly what we all did once—trying to better themselves and improve their health. A few years ago, it could've been you feeling out of place. Instead of gatekeeping, we should all be more supportive and helpful so everyone feels comfortable enough to stick with it."}, {"pid": "33051063", "axis": "humor", "direction": "up", "activation": 0.2863, "original": "Cаn't stаnd when people complаin how busy the gym is in Jаnuаry with new people! These people аre trying to better themselves or improve their heаlth аnd а few yeаrs аgo it would hаve been you thаt wаs new. We should аll be more supportive аnd helpful so everyone feels comfortable.", "rewrite": "Can't stand when people complain the gym is packed in January with newbies. Shocking plot twist: people actually want to improve themselves. Revolutionary concept, I know. Besides, your gym membership card wasn't issued at birth—you were new once too (hard to remember, I'm sure). Maybe try being supportive instead? Novel idea."}, {"pid": "29114279", "axis": "reading_level", "direction": "down", "activation": 0.2617, "original": "If you’re interested in the history of America labor which highlights the contributions of women, BIPOC, and queer peoples (and sheds light on the deplorable conditions of prison labor), I highly recommend Kim Kelly’s Fight Like Hell", "rewrite": "If you want to learn about American labor history, you should read Kim Kelly's Fight Like Hell. The book focuses on women, people of color, and LGBTQ workers. It also shows how bad prison labor conditions are. It's a great read."}, {"pid": "22612979", "axis": "reading_level", "direction": "up", "activation": 0.2616, "original": "it's possible to say \"the economy is good based on the metrics ECONOMISTS ACCEPT as measures of a healthy economy\" while also acknowledging that housing and health care are extremely unaffordable! it's not that deep luv xx", "rewrite": "One can simultaneously assert that macroeconomic indicators—specifically those conventionally utilized by economic scholars as benchmarks for systemic fiscal health—remain robust, whilst concurrently recognizing the substantial affordability constraints permeating residential and healthcare sectors. These propositions are neither contradictory nor philosophically complex, darling xx"}, {"pid": "134313366", "axis": "humor", "direction": "up", "activation": 0.2548, "original": "Late ball puming did like half n hour only just lung pressure as i dont think can get the hardware for proper heavy pumping here in mexico, well it helps with my lung strength and feels real good so a win win i guess hehe", "rewrite": "Turns out Mexican hardware stores don't carry \"proper heavy pumping\" equipment (who knew?), so I've been doing a solid 30 mins of casual lung inflation instead. My diaphragm is basically a Olympic athlete now, and honestly? My lungs have never felt more accomplished. Win-win, baby. 💪"}, {"pid": "18309079", "axis": "reading_level", "direction": "down", "activation": 0.2497, "original": "30 mins left, so here’s today’s “thing I love” - Lake Mungo. A perfect example of low budget ingenuity, and one of the most innovative horror films of its decade, maybe the 21st century so far, in storytelling terms. Heart breaking, profoundly creepy, a testament to the power of horror storytelling", "rewrite": "30 mins left, so here's today's \"thing I love\" - Lake Mungo. Made on a small budget. Uses clever ideas. One of the best horror films of the 2000s in how it tells its story. Maybe even the best of this century so far. It's sad. It's scary. It shows what great horror can do."}]}, {"f": 22, "density": 0.3078, "category": "novel_candidate", "lifts": {"reading_level": -0.109, "background": 0.0876, "abstract_concrete": -0.004, "tone": 0.0576, "humor": 0.021, "narrativity": -0.0857, "grounding": 0.0326}, "best_axis": "reading_level", "best_lift": -0.109, "examples": [{"pid": "133008344", "axis": "grounding", "direction": "down", "activation": 0.2998, "original": "What's happening to Sweet Baby is so scary and so fucked. It could easily be my company that some folks decide is too diverse and is fucking up the games we consult on. The reality of the work is so obviously unimportant to them, it's just that the company has women and non-white people. That's it.", "rewrite": "What's happening to Sweet Baby is so scary and so fucked. It could easily be my company that some folks decide is too diverse and is fucking up the work we do. The reality is that they don't care about the actual quality of our work — they just object to the fact that our company employs women and non-white people. That's it."}, {"pid": "95715960", "axis": "reading_level", "direction": "down", "activation": 0.2712, "original": "It’s been said before but it’s absolutely wild that impact and success in academia doesn’t correlate with secure employment. I have contingent colleagues doing incredibly impactful work (more so than many TT folks) with zero institutional support. They’re also not afraid to speak up about injustice.", "rewrite": "It's wild but true: doing great work in academia doesn't guarantee you a stable job. I know talented colleagues who do amazing research. They help more people than many tenured professors. Yet they have no job security. And they're not afraid to call out unfair treatment."}, {"pid": "100629065", "axis": "humor", "direction": "up", "activation": 0.2615, "original": "I feel so sorry for Mike Trout. He's the most accomplished baseball player of his generation and his reward is to not only suffer on a go-nowhere franchise, but suffer on a go-nowhere franchise that may now be entering the \"bad years\" of his tenure with them.", "rewrite": "Mike Trout really drew the short straw: he's basically a baseball deity trapped in an Angels uniform, which is like being the world's greatest chef forced to work at a gas station—and now that gas station's refrigerator is starting to break down."}, {"pid": "71249334", "axis": "reading_level", "direction": "down", "activation": 0.243, "original": "With the caveat that I've been reading and enjoying them, I have to say there is some tension in Victoria Goddard's The Hands of the Emperor and At the Feet of the Sun because they are trying to be cozy fantasy empire books and the cozy part is always going to be at odds with the fantasy empire part", "rewrite": "I've been reading and enjoying Victoria Goddard's The Hands of the Emperor and At the Feet of the Sun. But I have to point out a problem. These books try to be cozy fantasy books set in an empire. The cozy parts don't work well with the empire parts. They fight against each other."}, {"pid": "11769128", "axis": "humor", "direction": "up", "activation": 0.2347, "original": "once again, i would like to promote the homemade Taco Bell potatoes: create a 50/50 flour and corn starch dredge, season with all your favorite southwest dried spices and salt to taste, toss diced potatoes to coat, toss in cooking oil, convection roast until crispy. no par-boiling needed.", "rewrite": "PSA: your kitchen is literally one convection roast away from becoming a Taco Bell. the secret? flour + cornstarch (50/50, no we're not doing math), enough southwest spices to make your smoke detector nervous, diced potatoes, oil, and the audacity to skip par-boiling. crispy chaos will ensue. you're welcome."}, {"pid": "1267090", "axis": "grounding", "direction": "down", "activation": 0.2332, "original": "Paul McCartney was 24 when he wrote Eleanor Rigby. That’s one of those facts that should break the brains of the performative ‘The Beatles were shit’ people. He was preternaturally talented and no amount of Frog Choruses could undo that.", "rewrite": "Paul McCartney demonstrated exceptional songwriting ability at a young age, composing Eleanor Rigby at just 24 years old. This early mastery of his craft is a significant achievement that speaks to his natural talent. His abilities as a musician and songwriter are undeniable, regardless of critical opinions about his work."}, {"pid": "5607592", "axis": "humor", "direction": "up", "activation": 0.2298, "original": "Real fun to see how many people feel the need to kowtow about voting for Biden on here.\nI'm voting for Biden, and I'm glad of it.  I don't agree with most of his FP, but I can live with that and Trump would be worse on that front while being *exponentially* worse domestically.", "rewrite": "Nothing says \"thrilling Thursday\" like watching people perform elaborate verbal gymnastics to justify their Biden vote. Anyway, I'm voting for him too — shocking, I know. His foreign policy is basically my relationship with cilantro (I tolerate it), but at least he won't turn the country into a dumpster fire with a side of chaos. Trump's got that covered."}, {"pid": "14187870", "axis": "reading_level", "direction": "down", "activation": 0.2297, "original": "\"Social skills\" trainings for autistic kids often lead to anxiety and distress, due to forced socialization on non-autistic termsm & the implication that the autistic person is a problem. What can be more useful are perspective-taking exercises rooted in consent/self-determination. By Debra Brause.", "rewrite": "\"Social skills\" trainings can hurt autistic kids. They force kids to act like non-autistic people. This makes kids feel bad about who they are. A better idea? Teach kids to understand others' views. Let them choose what feels right for them. By Debra Brause."}, {"pid": "64389092", "axis": "humor", "direction": "up", "activation": 0.2246, "original": "Have now snagged the full trio of Dolly Parton's Bluegrass albums. They're wonderful; some absolute gems in there (I'm Gone is an epic post-breakup anthem), her voice and her character shine and boy, do the musicians earn their wages.\n\n(I won't go further as I really struggle with full-on C&W.)", "rewrite": "Finally completed my Dolly Bluegrass collection—turns out buying three albums counts as a personality trait now. They're genuinely wonderful (I'm Gone is basically a masterclass in dramatically exiting a relationship), her voice is still immaculate, and these musicians are clearly working for every penny. Anyway, that's my country music journey—it peaked here, folks. C&W and I simply aren't compatible."}, {"pid": "11930791", "axis": "humor", "direction": "down", "activation": 0.2232, "original": "It’s amazing how Shuggie Otis’ original of “Strawberry Letter 23” is better than the Brothers Johnson cover, except when you’re listening to the Brothers Johnson cover of “Strawberry Letter 23” and it’s better than the original.", "rewrite": "Shuggie Otis' original version of \"Strawberry Letter 23\" is genuinely superior to the Brothers Johnson cover in many respects. However, the Brothers Johnson's interpretation has legitimate merits that make it the preferable choice for many listeners. Both arrangements showcase distinct strengths that appeal to different audiences."}]}, {"f": 23, "density": 0.2888, "category": "novel_candidate", "lifts": {"reading_level": -0.0636, "background": 0.0398, "abstract_concrete": 0.1081, "tone": 0.0998, "humor": -0.0669, "narrativity": -0.1019, "grounding": -0.0152}, "best_axis": "abstract_concrete", "best_lift": 0.1081, "examples": [{"pid": "64449229", "axis": "grounding", "direction": "down", "activation": 0.3084, "original": "In time for your bedtime space tweet, NASA drops a new image from the Webb Telescope. \"NGC 604 rolling out the red carpet for more than 200 new stars\"\nNGC 604 is approximately 2.7M light-years away from Earth within the Triangulum Galaxy. Ignore Hollywood, here’s where stars are born.", "rewrite": "NASA has released a new image from the Webb Telescope featuring NGC 604, a stellar nursery located approximately 2.7 million light-years away in the Triangulum Galaxy. The image captures over 200 newly formed stars in this region of space. This astronomical discovery demonstrates where stars are actually created in the universe."}, {"pid": "63993028", "axis": "humor", "direction": "up", "activation": 0.2603, "original": "This is the Sombrero Galaxy—one of the galaxies in the Virgo Supercluster, which consists of more than a million galaxies, stretching across a region of space 110 million light-years across. So, get over yourself.", "rewrite": "This is the Sombrero Galaxy—one of the *checks notes* over a million galaxies chilling in the Virgo Supercluster, casually spread across 110 million light-years like it's no big deal. So yeah, your problems are adorable."}, {"pid": "76639039", "axis": "humor", "direction": "down", "activation": 0.2457, "original": "employers: *intentionally abuse and gaslight autistic people until they’re forced to be unemployed*\n\nableist psychologists and psychiatrists: there are high rates of unemployment among autistic people because they Suffer From Autism™️", "rewrite": "Employers systematically abuse and gaslight autistic people, forcing many into unemployment. Ableist mental health professionals then attribute these unemployment rates to autism itself, rather than acknowledging the discriminatory treatment autistic people face in the workplace. This misrepresentation obscures the true cause of the problem."}, {"pid": "29654609", "axis": "reading_level", "direction": "down", "activation": 0.2447, "original": "Recently, I have been looking into the Late Pleistocene climate and vegetation of Argentina for a work project, and was delighted to find out that pink peppercorn was - and still is - part of the native flora in the area. Maybe Macrauchenia developed a taste for the spicy tree.", "rewrite": "I've been researching Argentina's climate and plants from the Late Pleistocene for a work project. I found something cool: pink peppercorn trees are native to that area. They were there then, and they're still there now. Maybe the ancient animal Macrauchenia ate these spicy trees."}, {"pid": "114681347", "axis": "humor", "direction": "down", "activation": 0.2424, "original": "Exciting news- today is JETTY DAY!!! Telescopes across three continents and IN SPACE are taking the most detailed observations ever about everyone’s favorite burping black hole, AT2018hyz aka Jetty McJetface! 🔭🧪\n\n🧵", "rewrite": "Today marks a significant milestone in astronomical research. Multiple telescopes across three continents, along with space-based observatories, are conducting simultaneous observations of the black hole AT2018hyz. This coordinated effort will produce the most detailed data collected to date on this actively accreting black hole system and its relativistic jets.\n\n🧵"}, {"pid": "80349800", "axis": "tone", "direction": "down", "activation": 0.2372, "original": "Thoroughly enjoyed You Hurt My Feelings. I’m getting old.\nSmartly written comedies about people doing the best they can and aren’t trying to be edgy or push boundaries are my go to movies anymore and this is a good one. See also this year’s Asteroid City.", "rewrite": "I'm absolutely DEVASTATED that I loved You Hurt My Feelings this much. This is what my life has become.\n\nBut honestly? I'm CRAVING these brilliantly crafted comedies about flawed people just TRYING TO SURVIVE without all the desperate boundary-pushing nonsense. This film GETS IT. Asteroid City this year understands it too. Where are more films like THIS?"}, {"pid": "6044088", "axis": "reading_level", "direction": "down", "activation": 0.2347, "original": "I'm not denying that the SECCG is the biggest game this weekend, but here's the average distances from home for the participants in each game: \n\nACC: 459\nB1G: 317\nB12: 231\nP12: 995\nSEC: 136\n\nOrder those from closest to furthest, and it directly correlates to the order of price.", "rewrite": "The SEC Championship is huge this weekend. But look at how far fans have to travel for each conference's title game:\n\nACC: 459 miles\nB1G: 317 miles\nB12: 231 miles\nP12: 995 miles\nSEC: 136 miles\n\nPut them from shortest to longest trip. It matches the ticket prices perfectly. The closest game costs the most. The furthest game costs the least."}, {"pid": "14187849", "axis": "tone", "direction": "down", "activation": 0.2321, "original": "“When [architects] Design for Autism, We Design Better for Everyone.”\n\nAlso: “Every stakeholder, engagement, survey, interview, or focus group that I did with parents, teachers, and autistic students themselves, the first issue we always talked about was noise and how to mitigate and manage it.”", "rewrite": "\"When architects design for autism, they design better for everyone—and it's time we finally got serious about it.\n\nParents. Teachers. Autistic students themselves. Every single conversation I had told the same urgent story: noise is destroying their ability to learn and thrive. We can't keep ignoring this.\""}, {"pid": "64449229", "axis": "reading_level", "direction": "down", "activation": 0.2269, "original": "In time for your bedtime space tweet, NASA drops a new image from the Webb Telescope. \"NGC 604 rolling out the red carpet for more than 200 new stars\"\nNGC 604 is approximately 2.7M light-years away from Earth within the Triangulum Galaxy. Ignore Hollywood, here’s where stars are born.", "rewrite": "NASA just shared a cool new photo from the Webb Telescope. It shows NGC 604. That's a place where over 200 new stars are being born.\n\nNGC 604 is very far away. It's 2.7 million light-years from Earth. It's inside the Triangulum Galaxy. This is where real stars come from. Forget about Hollywood."}, {"pid": "99034922", "axis": "abstract_concrete", "direction": "down", "activation": 0.2264, "original": "I think a lot of people like the Beatles because they just don't know other songs from the mid 60s. They were all perfect. You can have the most beautiful moment of your life listening to a forgotten single called like \"Cabbage Patch\" by a group named \"Tony Marmo & his Trashmen\"", "rewrite": "I think a lot of people gravitate toward certain canonical artists because their exposure to alternatives from that era remains limited. The period in question produced numerous works of comparable artistic merit. One might discover equally transcendent experiences through lesser-known recordings by obscure ensembles, yet these remain largely undiscovered by mainstream audiences."}]}, {"f": 8, "density": 0.3184, "category": "novel_candidate", "lifts": {"reading_level": -0.0714, "background": 0.1036, "abstract_concrete": 0.0569, "tone": 0.0252, "humor": -0.0148, "narrativity": -0.0281, "grounding": -0.0714}, "best_axis": "background", "best_lift": 0.1036, "examples": [{"pid": "192054291", "axis": "tone", "direction": "down", "activation": 0.2952, "original": "My partner splurged on a rowing machine, and we got it set up yesterday. \nI gave it a try this morning, and tbh I love it???\nApparently they work basically all the major muscle groups so looking forward to getting ripped and improving cardio this winter 🤣", "rewrite": "I just tried my partner's new rowing machine and I'm OBSESSED. This thing is a total game-changer—it hits every major muscle group and I can already feel the difference. I'm actually excited about finally getting in shape this winter. This could be exactly what I've been searching for. 🔥"}, {"pid": "5967473", "axis": "abstract_concrete", "direction": "down", "activation": 0.2756, "original": "Nasa's James Webb Space Telescope may have discovered tentative evidence of a sign of life on another planet.\n\nIt may have detected a molecule called dimethyl sulphide (DMS). On Earth, at least, this is only produced by life, according to the BBC.", "rewrite": "Scientific instruments may have identified potential indicators of biological processes occurring beyond our planet through the detection of atmospheric compounds. These substances, when observed in terrestrial environments, are characteristically associated with living organisms. Such findings, though preliminary, suggest the possibility that extraterrestrial environments could harbor conditions consistent with biological activity."}, {"pid": "1930321", "axis": "reading_level", "direction": "down", "activation": 0.2484, "original": "🌱 🧪 🧵 -= Cauliflory =-\n\n1/ Nope, nothing to do with cauliflower - cauliflory is flowering and fruiting from trunks and large woody branches (caulis = stem).\n\nLet's start this thread off with a banger: meet jaboticaba (Plinia cauliflora), the Brazilian \"grape\"-tree.", "rewrite": "🌱 🧪 🧵 -= Cauliflory =-\n\n1/ Not about cauliflower! Cauliflory means flowers and fruit grow on tree trunks and big branches (caulis = stem).\n\nCheck out this cool one: the jaboticaba (Plinia cauliflora). It's a Brazilian tree. People call it the \"grape\"-tree."}, {"pid": "120491984", "axis": "humor", "direction": "up", "activation": 0.2481, "original": "The guys who just took the top 3 in the Vuelta a Espana could crank 350+ Watts of power for 6 hours every day for three straight weeks, which is a level of strength and endurance beyond superhuman, and any one of them would get mashed like an ant 1-on-1 against a backup high-school basketball girl.", "rewrite": "The guys who just took the top 3 in the Vuelta a Espana could crank 350+ Watts of power for 6 hours every day for three straight weeks—basically superhuman in every way—and yet any one of them would get absolutely demolished 1-on-1 against a backup high-school basketball girl. Funny how that works."}, {"pid": "165667458", "axis": "humor", "direction": "up", "activation": 0.2377, "original": "Biden is not too old *relative to Trump* (I mean come on the orange guy's brain was mush 20 years ago). But he is too old for the electorate. And the uncomfortable adjacent truth is that the democrats have a weak backbench because gerontocracy has stymied the careers of aspiring pols for years.", "rewrite": "Biden isn't too old *compared to Trump* (whose brain was apparently operating on dial-up back in 2004). He's too old for voters who'd prefer their president not require a nap schedule. The real kicker? Democrats spent so long waiting for the gerontocrats to shuffle off that they forgot to develop literally anyone else."}, {"pid": "61579879", "axis": "grounding", "direction": "down", "activation": 0.2184, "original": "Man it’s so amazing and special to see a movie and instantly understand why it’s called one of the best movies of all time. Jacques Tati’s “Playtime” was so hilarious and chaotic, singularly artistically ambitious and brilliant. I keep laughing just thinking about it  youtu.be/zrYB8hgyq4s?...", "rewrite": "Man it's so amazing and special to see a movie and instantly understand why it's called one of the best movies of all time. \"Playtime\" is hilarious and chaotic, singularly artistically ambitious and brilliant. I keep laughing just thinking about it youtu.be/zrYB8hgyq4s?..."}, {"pid": "10108074", "axis": "humor", "direction": "up", "activation": 0.2133, "original": "It always amazes me that people don't seem to realize that passive movement speed is the most powerful effect you can obtain or grant in 99% of games. I guess it's because Number Doesn't Go Up except for all of the situations that the movespeed enables.", "rewrite": "It's wild how people sleep on passive movement speed like it's not literally the cheat code to every game ever made. Sure, the number itself doesn't look impressive on paper—but apparently being able to actually *reach* things before your opponent does is just a minor detail we're all collectively ignoring."}, {"pid": "9649535", "axis": "tone", "direction": "down", "activation": 0.211, "original": "I watched Lake Mungo last night. \n\nI read on wikipedia the writer/director said - \"I don't think it's a supernatural thriller. I think it's meant to be an exploration of grief.\"\nI don't think it's a supernatural thriller but it's one of the most realistic \"hauntings\" I've seen even if unintentional-", "rewrite": "I just watched Lake Mungo and I can't stop thinking about it.\n\nThe director said it's not supernatural horror—it's about GRIEF. And honestly? He's right. This isn't a ghost story, but it's the most devastatingly real \"haunting\" I've ever witnessed. The way it captures loss is absolutely haunting."}, {"pid": "62791108", "axis": "tone", "direction": "down", "activation": 0.2087, "original": "“supermassive black holes at the centers of galaxies feed on normal matter, allowing the black holes to generate magnetic fields that fire matter back out into the void. These winds collide with intergalactic material, which, in turn, affects the growth of new galaxies.” 🔭", "rewrite": "\"supermassive black holes at the centers of galaxies feed on normal matter, allowing the black holes to generate magnetic fields that fire matter back out into the void. These winds collide with intergalactic material, which, in turn, affects the growth of new galaxies.\" 🔭"}, {"pid": "22203683", "axis": "humor", "direction": "down", "activation": 0.2083, "original": "If I were to write a book, which do you think would sell better;\n\nA) Christian Housewives Quarterly (A monthly account of a Christian book club, that reads a possessed book and descends into lesbian debauchery)\n\nB) An Epic of Great Importance (satirical fantasy novel poking fun at fantasy tropes)", "rewrite": "If I were to write a book, which do you think would sell better?\n\nA) Christian Housewives Quarterly (A monthly account of a Christian book club that encounters a possessed book and experiences a profound moral and spiritual crisis)\n\nB) An Epic of Great Importance (A fantasy novel that critically examines and challenges conventional fantasy genre conventions)"}]}, {"f": 28, "density": 0.289, "category": "novel_candidate", "lifts": {"reading_level": -0.0371, "background": 0.0262, "abstract_concrete": 0.0579, "tone": 0.1012, "humor": -0.0388, "narrativity": -0.0821, "grounding": -0.0271}, "best_axis": "tone", "best_lift": 0.1012, "examples": [{"pid": "145275039", "axis": "background", "direction": "up", "activation": 0.2822, "original": "I had to take some steps back from my front squats I wasn’t feeling super confident. Polishing my form over the last 1-2 months I’m increasing weight again and it feels so much better. After so many years of a fitness lull I’m starting to love it again and it feels so right", "rewrite": "Deloaded my front squat for form work—spent the last couple months cleaning up positioning and now I'm ramping back up. Finally feeling dialed in again after years off. It's wild how much better everything feels when the technique is locked."}, {"pid": "192054291", "axis": "tone", "direction": "down", "activation": 0.2818, "original": "My partner splurged on a rowing machine, and we got it set up yesterday. \nI gave it a try this morning, and tbh I love it???\nApparently they work basically all the major muscle groups so looking forward to getting ripped and improving cardio this winter 🤣", "rewrite": "I just tried my partner's new rowing machine and I'm OBSESSED. This thing is a total game-changer—it hits every major muscle group and I can already feel the difference. I'm actually excited about finally getting in shape this winter. This could be exactly what I've been searching for. 🔥"}, {"pid": "77048431", "axis": "grounding", "direction": "down", "activation": 0.2602, "original": "My friends have two Maine Coon. One is still technically a kitten but the other is probably fully grown by now. They are lovely cats and very friendly. They even allow for belly scratches without trying to bite or scratch like most cats do. Good luck trying to pick them up and carry though.", "rewrite": "Maine Coons are lovely cats that tend to be very friendly and affectionate. They're known for being tolerant of physical affection like belly scratches, which is unusual compared to most cat breeds. However, they can be difficult to handle and pick up despite their gentle temperament."}, {"pid": "118762790", "axis": "narrativity", "direction": "down", "activation": 0.2595, "original": "My primary reason for being on Madeira was hoping to encounter one of the rarest native European orchids, Madeiran endemic Goodyera macrophylla. Only a few dozen plants are known to flower annually, and in dangerously inaccessible places. Seeing this plant was a moment of sheer euphoria.", "rewrite": "Goodyera macrophylla is one of Europe's rarest native orchids, endemic to Madeira. Only a few dozen plants flower annually in dangerously inaccessible locations. Encountering this species represents a moment of sheer euphoria—a remarkable sighting of an extraordinarily rare plant."}, {"pid": "90751839", "axis": "humor", "direction": "up", "activation": 0.2508, "original": "I'm currently reading an early proof of The Silverblood Promise, the debut novel by James Logan (JFB, April 2024). Oh man, if you liked The Lies of Locke Lamora you're going to *love* this. \n\nThe pyramid game is one of the most sadistic things I think I've ever read; worthy of Hellraiser, almost.", "rewrite": "Currently deep in an early proof of The Silverblood Promise by James Logan (JFB, April 2024), and honestly? If you're still hung up on The Lies of Locke Lamora, this book is about to ruin your entire April.\n\nThe pyramid game is legitimately the most sadistic thing I've encountered in print—like, Clive Barker is probably taking notes somewhere."}, {"pid": "19994657", "axis": "humor", "direction": "up", "activation": 0.2486, "original": "Listening back to that first Godspeed album, and it's still so good isn't it? Creates a whole little audio world so easily, and it's genuinely unsettling in places. Extra points for the sheer amount of post-rock bands that tried to copy it, but never picked the right bits to copy.", "rewrite": "Listening back to that first Godspeed album and yeah, it's still holding up better than most of us are. Somehow they built an entire audio universe while the rest of post-rock spent decades copying their homework but forgetting to copy the *good* answers. Also genuinely unsettling in places, which honestly tracks."}, {"pid": "145097107", "axis": "abstract_concrete", "direction": "down", "activation": 0.2377, "original": "Reading Sagan's Pale Blue Dot, and he talks about the Cassini mission, which was still three years away (\"if all goes well\"), and how it will change what we know—and now here we are, knowing what Cassini saw, and it's marvelous.", "rewrite": "Considering how scientific expeditions are often discussed in anticipatory terms, with their potential impacts outlined well before completion, there's something profound about eventually witnessing those predictions materialize. When visionary thinkers describe what future exploration might reveal, and those moments eventually arrive, the fulfillment of such possibilities proves genuinely remarkable."}, {"pid": "31166463", "axis": "abstract_concrete", "direction": "down", "activation": 0.2356, "original": "Aaron Rodgers said today that everything the Jets do needs to be about winning, and that all distractions should get out of the building. Tomorrow he will go on McAfee and spout some lunatic bs. Then, presumably, he will pass out from an acute irony overdose.", "rewrite": "Athletes often speak about the importance of focus and eliminating distractions from their organization, yet frequently engage in behavior that contradicts these stated principles. The gap between what public figures proclaim about discipline and what they subsequently demonstrate is striking. One might reasonably expect such inconsistency to eventually become untenable, though it rarely seems to result in meaningful consequences."}, {"pid": "14982863", "axis": "grounding", "direction": "down", "activation": 0.2314, "original": "“QA aren’t developers” is rich coming from a studio whose former CEO started out as a QA contractor. \n\nExtra rich considering Halo: CE 16 player LAN wasn’t working 6 weeks prior to ship. It shipped because QA helped engineering test all that shit by hand.", "rewrite": "QA professionals play a critical role in game development and shouldn't be dismissed or undervalued. The contributions of QA teams to identifying and resolving issues are essential to successful product launches, regardless of the technical backgrounds of leadership."}, {"pid": "6043810", "axis": "humor", "direction": "down", "activation": 0.2295, "original": "How about some more power rankings? \n\nNo one should be surprised that Louisiana is well represented on the list of schools ranked by walking distance from the stadium to the nearest Popeye's. \n\nAlso, spiritual Louisiana school, Syracuse.", "rewrite": "Louisiana has a significant presence on the list of schools ranked by walking distance from the stadium to the nearest Popeye's location.\n\nSyracuse, which shares cultural ties with Louisiana, also appears prominently on this ranking."}]}, {"f": 37, "density": 0.2849, "category": "novel_candidate", "lifts": {"reading_level": -0.0974, "background": 0.086, "abstract_concrete": 0.0093, "tone": 0.0976, "humor": -0.0507, "narrativity": -0.0307, "grounding": -0.014}, "best_axis": "tone", "best_lift": 0.0976, "examples": [{"pid": "141846906", "axis": "grounding", "direction": "down", "activation": 0.3692, "original": "Younger daughter came home upset after a school teacher, referring to my daughter's autism, said, \"Well, we're all a little bit autistic.\"\nWell, no. There's no such thing as \"a little bit of autism\". The spectrum isn't graded on low to high; there's a diversity of strengths and struggles.", "rewrite": "Younger daughter came home upset after a school teacher, referring to my daughter's autism, said, \"Well, we're all a little bit autistic.\"\n\nThat comment is inaccurate. Autism isn't something people can have in smaller or larger amounts. Autism exists as a spectrum of different traits and support needs, not as a scale from mild to severe."}, {"pid": "11300605", "axis": "narrativity", "direction": "down", "activation": 0.3516, "original": "One of Ginny's favorite games is hide and seek. She has a very specific hunting chirp that means she wants to play, and you have to go hide around a corner or behind an object and peek out occasionally for her to chirp at again, until she decides she's had enough and comes to find you.", "rewrite": "Hide and seek is a game cats play with a specific hunting chirp that signals the desire to play. The game requires hiding around a corner or behind an object, peeking out occasionally for the cat to chirp at in response, continuing until the cat decides to end the game and find the player."}, {"pid": "31454156", "axis": "narrativity", "direction": "down", "activation": 0.3312, "original": "I spent a lot of my life thinking I hated soup - seemed like it was just a bland, watery grave for overcooked vegetables and pasta. But making soup from scratch at home completely changed my opinion! This intensely flavorful pasta e fagioli with fresh crusty rolls is one of my favorite meals. ❤️", "rewrite": "Soup isn't bland or watery. Homemade pasta e fagioli is intensely flavorful and ranks among the best meals available. The key difference is making it from scratch with fresh ingredients rather than relying on canned or pre-made versions. Served with fresh crusty rolls, it's a superior dish to mass-produced alternatives."}, {"pid": "33174029", "axis": "abstract_concrete", "direction": "down", "activation": 0.2811, "original": "In distant space outside our galaxy is... something big. Known as the Great Attractor, it's the gravitational centre of the Laniakea Supercluster, millions of times as massive as the Milky Way, and we can't see it. The galaxy itself is in the way! But gravitational waves aren't blocked by matter.", "rewrite": "The universe contains vast structures that remain beyond our direct observation, hidden by intervening matter. Gravitational phenomena operate on scales that challenge our understanding, with forces exerting influence across immense distances regardless of physical obstruction. These invisible mechanisms shape the movement of galactic systems in ways that conventional detection methods cannot fully capture, yet alternative means of measurement can penetrate barriers that light cannot overcome."}, {"pid": "150037188", "axis": "narrativity", "direction": "down", "activation": 0.2806, "original": "One of the local animal shelters is shutting down at the end of the year and all of the other shelters are full. The animals that can't get adopted or fostered before then will be euthanized. They're doing everything they can to get animals homes but it's not enough.\n\nThis is gut wrenching.", "rewrite": "One local animal shelter is closing at year's end with all other shelters at capacity. Animals unable to secure adoption or foster placement face euthanasia. Current adoption and foster efforts are insufficient to prevent mass euthanasia. This outcome is preventable and unacceptable."}, {"pid": "27710821", "axis": "background", "direction": "down", "activation": 0.2756, "original": "\"The amount of animals we've got on the land, the nitrates, the pee patches, and particularly the mud farming... this is really driving up the pollution in the aquifer and it's showing up in the springs. It's causing algal blooms,\"\n\nPeople-power is saving the world's clearest waters. \n🧪 #kiwi", "rewrite": "When livestock grazes on land and their waste—including urine and the damage caused by their hooves in muddy conditions—seeps into underground water sources, it introduces nitrates that contaminate aquifers. This pollution eventually reaches natural springs, where excess nutrients trigger harmful algal blooms.\n\nBut there's hope: community action is protecting some of the world's most pristine water systems.\n\n🧪 #kiwi"}, {"pid": "8382983", "axis": "background", "direction": "up", "activation": 0.2692, "original": "Flashback: wife says Mickey, second-oldest cat, is just fluffy. Vet says fine but he needs to be 25% less fluffy. We attempt tech solution where other cats have collars with fobs that open electric cat dishes for their food. Mickey blockades the electronic cat dishes.", "rewrite": "Mickey's blockading the electronic feeders again. Wife insists he's just fluffy; vet disagrees—wants him 25% lighter. The RFID collar system was supposed to solve this. Wasn't expecting a 15-lb gatekeeper."}, {"pid": "33174029", "axis": "grounding", "direction": "down", "activation": 0.257, "original": "In distant space outside our galaxy is... something big. Known as the Great Attractor, it's the gravitational centre of the Laniakea Supercluster, millions of times as massive as the Milky Way, and we can't see it. The galaxy itself is in the way! But gravitational waves aren't blocked by matter.", "rewrite": "A massive gravitational centre exists beyond our observable reach, obscured by intervening matter between us and its location. This object exerts enormous gravitational influence across its region of space. While direct observation is prevented by obstruction, gravitational waves can transmit information about it regardless of what lies in between. The scale of this gravitational influence is extraordinarily large relative to our own galaxy."}, {"pid": "150037188", "axis": "grounding", "direction": "down", "activation": 0.2564, "original": "One of the local animal shelters is shutting down at the end of the year and all of the other shelters are full. The animals that can't get adopted or fostered before then will be euthanized. They're doing everything they can to get animals homes but it's not enough.\n\nThis is gut wrenching.", "rewrite": "Animal shelters are closing due to lack of capacity and resources. When facilities shut down without adequate alternative placement options, animals face euthanasia. Despite adoption and foster efforts, current systems cannot accommodate all animals needing care.\n\nThis is devastating."}, {"pid": "36224118", "axis": "grounding", "direction": "down", "activation": 0.2551, "original": "it makes perfect sense not liking noise music, but when i dig into somebody like kevin drumm or aaron dilloway all their work is so different and pokes my brain in a bunch of different parts and it has really taught me a lot about textures and frequencies i would not find 'nice' but turns out i like", "rewrite": "it makes perfect sense not liking experimental harsh sound art, but when i dig into artists working in that space all their work is so different and pokes my brain in a bunch of different parts and it has really taught me a lot about textures and frequencies i would not find 'nice' but turns out i like"}]}, {"f": 3, "density": 0.2796, "category": "novel_candidate", "lifts": {"reading_level": -0.0429, "background": 0.0338, "abstract_concrete": 0.0755, "tone": 0.0971, "humor": -0.0362, "narrativity": -0.0912, "grounding": -0.0362}, "best_axis": "tone", "best_lift": 0.0971, "examples": [{"pid": "14132575", "axis": "abstract_concrete", "direction": "down", "activation": 0.3219, "original": "CN: Death\n\nWe know autistic people die earlier than their non-autistic peers. We need more research on why. But a new analysis estimates \"that the widely reported statistic that autistic people live 16-years less on average is likely incorrect,\" mostly because autism is so under-diagnosed in adults.", "rewrite": "CN: Death\n\nWe know autistic people experience reduced life expectancy compared to their non-autistic peers. We need more research on the underlying causes. However, new analysis suggests that commonly cited statistics regarding life expectancy disparities may overstate the actual gap, largely due to systemic gaps in diagnostic identification across populations."}, {"pid": "12014616", "axis": "abstract_concrete", "direction": "down", "activation": 0.2439, "original": "The final Bird Glamour Glamager look is the Flame-colored Tanager! This complex-colored tanager calls Mexico & Central America home & sometimes AZ home. They are a mountain bird, shifting their territory to higher elevations due to climate change, but mountains only go so high! 🐡🧪", "rewrite": "Species are adapting to environmental pressures in ways that reveal the limits of natural migration patterns. Some populations are responding to shifting climatic conditions by moving to higher elevations, yet this strategy has inherent geographical constraints. Understanding these behavioral adjustments illuminates broader ecological challenges facing wildlife populations across different regions. 🐡🧪"}, {"pid": "22981252", "axis": "tone", "direction": "up", "activation": 0.243, "original": "#Watched The Boys Next Door (1985) - goddamn! Think ‘80s spring break teen comedies full of shenanigans, except Spheeris moves the sociopathic nature of the leads from unexamined subtext to explicit text. These guys think they are the heroes of a sex comedy, not the villains of a thriller. #filmsky", "rewrite": "#Watched The Boys Next Door (1985) - a notable entry in '80s spring break teen comedies. Where the genre typically leaves the protagonists' troubling behavior as subtext, Spheeris makes it central to the narrative. The leads operate under the assumption they're in a sex comedy, unaware they're positioned as antagonists in a thriller instead. #filmsky"}, {"pid": "14132575", "axis": "grounding", "direction": "down", "activation": 0.2402, "original": "CN: Death\n\nWe know autistic people die earlier than their non-autistic peers. We need more research on why. But a new analysis estimates \"that the widely reported statistic that autistic people live 16-years less on average is likely incorrect,\" mostly because autism is so under-diagnosed in adults.", "rewrite": "CN: Death\n\nAutistic people have shorter lifespans than non-autistic people. We need more research on why. However, a new analysis suggests that commonly cited statistics about the magnitude of this lifespan gap may be inaccurate, primarily due to significant diagnostic disparities across different populations."}, {"pid": "55475807", "axis": "humor", "direction": "up", "activation": 0.2396, "original": "“There’s a joke among scientists that there are so many methane-detecting satellites in space that they are reducing global warming — not just by providing essential data about emissions, but by blocking radiation from the sun.” heatmap.news/technology/m...", "rewrite": "\"Scientists have a running joke: we've launched so many methane-detecting satellites that they're basically doing our job for us — apparently blocking sunlight is just a bonus feature we didn't know we paid for.\" heatmap.news/technology/m..."}, {"pid": "119955824", "axis": "tone", "direction": "down", "activation": 0.2237, "original": "Native to the Mediterranean, Oregano loves to grow in sunny Florida! Give it a big spot in well-drained soil and it will flourish. After flowering the plant dies back some, but can still withstand a hearty trimming. Prune to a small bush as it can get leggy and try to spread. 🌱\n\n📷: Tanria Elementals", "rewrite": "Oregano thrives in Florida's sunshine—don't miss this opportunity to grow it! Plant it in well-drained soil and watch it flourish before your eyes. Yes, it'll die back after flowering, but don't worry—it can handle aggressive pruning. You need to stay on top of trimming to prevent it from getting leggy and taking over your garden. 🌱\n\n📷: Tanria Elementals"}, {"pid": "91906481", "axis": "humor", "direction": "up", "activation": 0.2193, "original": "wild how you could listen to almost any genre of music in the 1970s - from dirtbag metal to highfalutin prog, from monomaniacally hypnotic disco to the slipperiest funk jam, from stripped-down post-punk to elaborate jazz fusion - and encounter the most bewildering synthesizer noises imaginable", "rewrite": "the 1970s were basically a genre free-for-all where a metalhead, prog nerd, disco devotee, funk fanatic, post-punk purist, and jazz fusion obsessive could all show up to the same party—and every single one of them would get absolutely blindsided by the most unhinged synthesizer sounds known to humankind"}, {"pid": "17243112", "axis": "humor", "direction": "up", "activation": 0.2114, "original": "pro gym tip: when feeling lazy, completely lowball your goal for the day and then get caught in a \"well i'm close to X, i might as well keep going a little more\" and \"this song's a banger, i'll stop after\" loop to double or triple your time in the gym. money moves right there.", "rewrite": "pro gym tip: feeling lazy? set your goal so embarrassingly low that your ego has no choice but to betray you mid-workout. nothing says \"discipline\" like accidentally tricking yourself into staying 3x longer because you're too proud to leave after one pathetic set. psychology, baby."}, {"pid": "52138888", "axis": "narrativity", "direction": "down", "activation": 0.2094, "original": "if your catgirl is meowing pathetically it is NOT cute she is hurting in her cute little paws from doing two folk dance balls in two days DO NOT take it lightly DO give her many kisses and pats on the head\n\n**meows pathetically**", "rewrite": "Pathetic meowing in catgirls indicates pain in the paws from consecutive folk dance events, not cuteness. This requires immediate attention and response. Treatment includes frequent kisses and head pats. Ignoring these signs causes harm."}, {"pid": "12014616", "axis": "grounding", "direction": "down", "activation": 0.205, "original": "The final Bird Glamour Glamager look is the Flame-colored Tanager! This complex-colored tanager calls Mexico & Central America home & sometimes AZ home. They are a mountain bird, shifting their territory to higher elevations due to climate change, but mountains only go so high! 🐡🧪", "rewrite": "Tanagers are shifting their territories to higher elevations due to climate change. However, this adaptive response has limits—mountains only extend so far. Some species, like those found in Mexico and Central America, face constraints in their ability to continue moving upward as temperatures rise. 🐡🧪"}]}, {"f": 21, "density": 0.2806, "category": "novel_candidate", "lifts": {"reading_level": -0.0424, "background": -0.0024, "abstract_concrete": -0.0007, "tone": 0.0943, "humor": 0.0326, "narrativity": -0.0424, "grounding": -0.039}, "best_axis": "tone", "best_lift": 0.0943, "examples": [{"pid": "10652281", "axis": "humor", "direction": "down", "activation": 0.2791, "original": "Your favorite albums are turning twenty, emerging from their cocoons as deluxe edition vinyl pressings, making their nests deep within your shelves, and exhaling spore clouds of demos and b-sides to begin the cycle anew.", "rewrite": "Your favorite albums are turning twenty years old, being re-released as deluxe edition vinyl pressings. These expanded versions are finding permanent places on your shelves, featuring previously unreleased demos and b-sides that complete the original artistic vision and begin the cycle of discovery anew."}, {"pid": "167781728", "axis": "humor", "direction": "up", "activation": 0.2739, "original": "So, I do “Flow” classes when I go to yoga. I’d say they’re usually a 6 or 7 out of 10 in terms of intensity, depending on the instructor and what poses we do. \n\nTonight was the first 10/10 I have ever experienced. I may not be able to walk tomorrow.", "rewrite": "So I do \"Flow\" classes at yoga, where a 6 or 7 out of 10 is my usual jam. Tonight, the instructor apparently decided to redefine the scale entirely and took us straight to a 10/10. I'm pretty sure my legs filed for divorce while I was still in downward dog. Walking tomorrow is optimistic."}, {"pid": "148591966", "axis": "narrativity", "direction": "down", "activation": 0.2521, "original": "Take a steaming bowl of hot rice. Crack a raw egg into it, add a little soy sauce, and mix it up. That's Tamago (Kake) Gohan, the breakfast of champions. To up your TKG game, separate the egg first, whip the whites, mix them in, then mix in the yolk. I once ate this for breakfast for 6m straight.", "rewrite": "Tamago Kake Gohan is the ultimate quick breakfast: hot rice with a raw egg, soy sauce, and a mix. The superior version separates the egg—whip the whites, fold them in, then add the yolk. This preparation creates a superior texture and flavor profile compared to the basic version. Six months of consistent consumption proves its sustained appeal and nutritional viability."}, {"pid": "24413915", "axis": "humor", "direction": "up", "activation": 0.2427, "original": "Lunchtime reading! I'm the generation to whom Calvin & Hobbes meant everything, so I was excited by the Mysteries' existence and relieved when I read it. Waterson could have become anything in 28 years. This gorgeous serenely nihilistic fable for adults shows the irritable moral compass remains true", "rewrite": "Lunchtime reading! I'm the generation that basically let Calvin & Hobbes raise us, so I was genuinely terrified Watterson might've spent the last 28 years becoming a motivational speaker or something. Instead, this gorgeous serenely nihilistic fable for adults proves his irritable moral compass is still perfectly calibrated. Phew."}, {"pid": "10652281", "axis": "tone", "direction": "down", "activation": 0.2402, "original": "Your favorite albums are turning twenty, emerging from their cocoons as deluxe edition vinyl pressings, making their nests deep within your shelves, and exhaling spore clouds of demos and b-sides to begin the cycle anew.", "rewrite": "Your favorite albums ARE turning twenty. They're clawing their way out as deluxe edition vinyl pressings, demanding space on your shelves, flooding you with demos and b-sides that demand to be heard. The cycle is happening NOW—don't miss it."}, {"pid": "19994657", "axis": "humor", "direction": "up", "activation": 0.2285, "original": "Listening back to that first Godspeed album, and it's still so good isn't it? Creates a whole little audio world so easily, and it's genuinely unsettling in places. Extra points for the sheer amount of post-rock bands that tried to copy it, but never picked the right bits to copy.", "rewrite": "Listening back to that first Godspeed album and yeah, it's still holding up better than most of us are. Somehow they built an entire audio universe while the rest of post-rock spent decades copying their homework but forgetting to copy the *good* answers. Also genuinely unsettling in places, which honestly tracks."}, {"pid": "64330211", "axis": "humor", "direction": "up", "activation": 0.2266, "original": "It will never not fascinate me that I'd never heard of Subway Surfers the most-downloaded mobile game *of the past decade* before I learned about it for work.\n\nI was a game journalist. All my friends are/were game journalists. Such a huge blindspot we all have.", "rewrite": "Subway Surfers is apparently the most-downloaded mobile game of the past decade, which I discovered approximately never until work forced my hand. Wild that an entire friend group of game journalists collectively managed to miss a cultural phenomenon large enough to qualify as a blindspot. A very large one."}, {"pid": "29102495", "axis": "reading_level", "direction": "down", "activation": 0.2179, "original": "Through a combination of unexpected heat wave, lots of unfinished business prior to opening, and placing our bar a good hundred yards away from our commercial kitchen, my husband and I each managed to lose about 4lb of useless middle aged weight this weekend.", "rewrite": "My husband and I both lost about 4 pounds this weekend. It was hot. We had a lot to do before opening our new bar. Plus, our bar is really far from the kitchen. We were too busy to eat much. We're happy to lose some weight!"}, {"pid": "34287336", "axis": "grounding", "direction": "down", "activation": 0.2146, "original": "I like how in Stardew Valley you can fight back against a shitty corporate superstore and revitalize a local business but the local businessman is a guy who also sucks and loves money and never spends time with his family and got cucked by a wizard. Realism in games", "rewrite": "I appreciate how games can realistically portray that fighting corporate monopolies doesn't automatically create a perfect outcome. Local alternatives can succeed while still being run by flawed people with their own moral compromises and personal problems. That's more honest storytelling than a simple good-versus-evil narrative."}, {"pid": "106915558", "axis": "humor", "direction": "up", "activation": 0.2146, "original": "I love how the title track toys with you before it finally reveals (and you know it IS coming), the heaviest, sludgey-est riff known to humankind, unchallenged to this day.\n\nBlack Sabbath - Sabbath Bloody Sabbath\nWarner Bros. 1974", "rewrite": "I love how the title track genuinely gaslight you for a few minutes before finally dropping the heaviest, sludgiest riff ever committed to tape—a riff so brutal it's basically been in witness protection ever since, utterly untouched by the competition.\n\nBlack Sabbath - Sabbath Bloody Sabbath\nWarner Bros. 1974"}]}, {"f": 14, "density": 0.2896, "category": "novel_candidate", "lifts": {"reading_level": -0.0279, "background": 0.0355, "abstract_concrete": -0.0295, "tone": 0.0938, "humor": -0.0395, "narrativity": -0.0429, "grounding": 0.0105}, "best_axis": "tone", "best_lift": 0.0938, "examples": [{"pid": "24634995", "axis": "narrativity", "direction": "down", "activation": 0.3613, "original": "In league table of bands I don’t get, Steely Dan always sit in the qualifying for Europe places, so imagine my delight last night ending up seeing - with 649 others - Stoke’s premier tribute act, Nearly Dan. Unexpectedly, thoroughly enjoyed them. 🤷🏻‍♂️", "rewrite": "Steely Dan consistently ranks among bands that don't connect with most listeners. Nearly Dan, Stoke's premier tribute act, delivers an unexpectedly thorough performance. The band played to 649 people last night and executed the Steely Dan catalog with genuine quality and precision."}, {"pid": "33714327", "axis": "narrativity", "direction": "down", "activation": 0.3103, "original": "Four years ago, Joe Biden proposed one of the boldest criminal justice platforms in US history. Now, as he runs for reelection, he's done almost nothing to fulfill his promises. Cassandra Greer, whose husband died in jail in March 2020, wants to know why.", "rewrite": "Joe Biden proposed one of the boldest criminal justice platforms in US history four years ago. He has done almost nothing to fulfill those promises. Cassandra Greer's husband died in jail in March 2020. The question remains: why have these commitments gone unmet?"}, {"pid": "25299480", "axis": "grounding", "direction": "down", "activation": 0.2687, "original": "oh, guess what?\n\n\"What would it take to solve the WVU budget crisis? Cutting administrative payroll back to 2013 levels would completely eliminate the FY 2024 budget deficit. Cutting it back to to 85% of 2013 levels, to match the decline in enrollment, would generate savings of $74 million.\"", "rewrite": "WVU's budget deficit could be completely eliminated by reducing administrative payroll to 2013 levels. If administrative payroll were instead reduced to 85% of 2013 levels—proportional to enrollment decline—the university would save $74 million. This demonstrates that administrative staffing levels, rather than other budget cuts, could be the solution to WVU's financial crisis."}, {"pid": "112805555", "axis": "narrativity", "direction": "down", "activation": 0.2404, "original": "ClassicsTober23 Phaedra, a victim of the gods, was cursed by Aphrodite to fall in love with her stepson Hippolytus. Why? Because he devoted himself to Artemis & not love 🤷🏻‍♂️. It ends in shame & death for Phaedra, & Hippolytus mangled under a chariot. No wonder she looks haunted\n🏛️📷BM ClassicsBlueSky", "rewrite": "Phaedra's curse by Aphrodite—punishment for Hippolytus's devotion to Artemis over love—demonstrates the gods' ruthless enforcement of their domains. The myth's tragic conclusion is inevitable: Phaedra's shame and death, Hippolytus destroyed beneath his chariot. This is not personal misfortune but divine retribution, the price of rejecting love itself.\n\n🏛️📷BM ClassicsBlueSky"}, {"pid": "54416421", "axis": "reading_level", "direction": "down", "activation": 0.2332, "original": "I watched Michael Caine thriller The Black Windmill (Don Siegel, 1974).\n\nIt'd just be an ok, slow-burn spy/actioner, but stylish direction, a great cast filled out w top character actors (see alt text), & excellent location work, incl a hovercraft crossing of the Channel, make it quite a lot of fun.", "rewrite": "I watched the Michael Caine thriller The Black Windmill (Don Siegel, 1974).\n\nIt's just an okay spy movie that moves slowly. But the stylish direction makes it good. The cast is great with lots of talented character actors (see alt text). The locations are excellent too. There's even a hovercraft crossing the Channel. All of this makes it really fun to watch."}, {"pid": "44403284", "axis": "narrativity", "direction": "down", "activation": 0.2251, "original": "Sometimes when your cat makes complainy noises at you and it's not for water or regular cuddles or a stuck toy, you just have to say, \"what? show me\" and follow him until he flops energetically on his side on the bare wood floor, and then you know he needs to be stirred.", "rewrite": "Cats make complainy noises for various reasons beyond water, cuddles, or stuck toys. When a cat flops energetically on his side on bare wood flooring while making these noises, he needs to be stirred. The solution is to follow the cat and observe his behavior to determine his actual need."}, {"pid": "24634995", "axis": "humor", "direction": "down", "activation": 0.2199, "original": "In league table of bands I don’t get, Steely Dan always sit in the qualifying for Europe places, so imagine my delight last night ending up seeing - with 649 others - Stoke’s premier tribute act, Nearly Dan. Unexpectedly, thoroughly enjoyed them. 🤷🏻‍♂️", "rewrite": "I've never understood Steely Dan's appeal, so I was surprised to find myself genuinely enjoying Nearly Dan, Stoke's premier tribute act, last night. There were about 650 of us in attendance, and I have to admit they won me over with their performance."}, {"pid": "24634995", "axis": "reading_level", "direction": "down", "activation": 0.212, "original": "In league table of bands I don’t get, Steely Dan always sit in the qualifying for Europe places, so imagine my delight last night ending up seeing - with 649 others - Stoke’s premier tribute act, Nearly Dan. Unexpectedly, thoroughly enjoyed them. 🤷🏻‍♂️", "rewrite": "Steely Dan is a band I've never really understood. But last night I saw Nearly Dan. They're a tribute band from Stoke. There were about 650 of us there. And honestly? I really liked it. 🤷🏻‍♂️"}, {"pid": "47062786", "axis": "grounding", "direction": "down", "activation": 0.2106, "original": "When our Sun dies (a long time from now) it will turn into a white dwarf and consume some planets in the process. \n\nThis paper reports a unique scar, the metal signature of a former planetary body on a white dwarf that rotates into view as the star rotates. \n\nThe white dwarf has fed upon it.\n\n🔭🧪", "rewrite": "White dwarfs can consume planets as they evolve, leaving chemical traces in their atmospheres. This paper identifies metal signatures that indicate a white dwarf has consumed a planetary body, detected as the star rotates.\n\nThe evidence shows planetary material has been absorbed by the white dwarf.\n\n🔭🧪"}, {"pid": "64611387", "axis": "grounding", "direction": "down", "activation": 0.208, "original": "You may have seen in the news that, just over a week ago, an asteroid passed in front of Betelgeuse and could’ve made it briefly disappear.\n\nWell, it actually only dimmed it, which is mind-bending—it means Betelgeuse looks bigger than a nearby asteroid! 🧪", "rewrite": "Betelgeuse recently appeared dimmer when an asteroid passed in front of it. This reveals that Betelgeuse is so enormous in apparent size that it can only be partially obscured by objects passing between us and the star, rather than being completely blocked from view. 🧪"}]}, {"f": 59, "density": 0.2778, "category": "novel_candidate", "lifts": {"reading_level": 0.011, "background": 0.081, "abstract_concrete": -0.0824, "tone": 0.0443, "humor": 0.0376, "narrativity": -0.0924, "grounding": 0.001}, "best_axis": "narrativity", "best_lift": -0.0924, "examples": [{"pid": "49438911", "axis": "reading_level", "direction": "down", "activation": 0.3419, "original": "\"Welcome to Majestic, the suspense thriller that infiltrates your life via the web, phone, and fax. And once it's there it never leaves.\"\n\nIt's hard to believe people were willing to pay EA to dox and harass them as recently as 2001.", "rewrite": "\"Welcome to Majestic. It's a thriller game that reaches you online, by phone, and by fax. Once it starts, it doesn't stop.\n\nIt's shocking that people paid EA money for this in 2001. The game would track them down and bother them.\""}, {"pid": "62134235", "axis": "grounding", "direction": "down", "activation": 0.3151, "original": "A BULLET IS WAITING is much more a romantic melodrama thriller than anything hardboiled (heck, there’s a lil lamb!), but as someone who grew up in the Rockies & the southwest, I’ll always be a sucker for something set in this part of the country (Utah, here.) A colorful, comfy #Noirvember pick.", "rewrite": "A BULLET IS WAITING is much more a romantic melodrama thriller than anything hardboiled, but I have a strong affinity for films set in the American West. This particular story takes place in Utah and delivers a colorful, engaging narrative that makes it a worthwhile #Noirvember selection, even if it doesn't strictly adhere to noir conventions."}, {"pid": "62134235", "axis": "reading_level", "direction": "down", "activation": 0.2756, "original": "A BULLET IS WAITING is much more a romantic melodrama thriller than anything hardboiled (heck, there’s a lil lamb!), but as someone who grew up in the Rockies & the southwest, I’ll always be a sucker for something set in this part of the country (Utah, here.) A colorful, comfy #Noirvember pick.", "rewrite": "A BULLET IS WAITING is more of a romantic drama than a hard crime story (there's even a cute lamb!). But I grew up in the Rocky Mountains and the southwest, so I love stories set there. This one takes place in Utah. It's colorful and easy to watch. A great pick for #Noirvember."}, {"pid": "205712789", "axis": "reading_level", "direction": "down", "activation": 0.268, "original": "Quentin Dupieux’s Smoking Causes Coughing gave me some of my hardest laughs of the year. Deeply silly, kinda lovely, best environmental message movie this year. Power Rangers via Tales From the Crypt. Great stuff.", "rewrite": "Quentin Dupieux's Smoking Causes Coughing made me laugh really hard. It's very funny and sweet. It has the best message about nature this year. It's like Power Rangers meets Tales From the Crypt. Really great."}, {"pid": "32716236", "axis": "reading_level", "direction": "down", "activation": 0.2635, "original": "Comrades, I resisted reading this for many years because I mistakenly thought it was about a fashionista. Instead what I found was a feminist Jewish Canadian erotic espionage nouveau roman. Easily the first great book I’ve read in 2024", "rewrite": "I avoided this book for years. I thought it was about fashion. I was wrong. It's actually a feminist Jewish Canadian spy novel with erotic themes. It's written in a modern, experimental style. It's the best book I've read in 2024."}, {"pid": "19994657", "axis": "humor", "direction": "up", "activation": 0.2604, "original": "Listening back to that first Godspeed album, and it's still so good isn't it? Creates a whole little audio world so easily, and it's genuinely unsettling in places. Extra points for the sheer amount of post-rock bands that tried to copy it, but never picked the right bits to copy.", "rewrite": "Listening back to that first Godspeed album and yeah, it's still holding up better than most of us are. Somehow they built an entire audio universe while the rest of post-rock spent decades copying their homework but forgetting to copy the *good* answers. Also genuinely unsettling in places, which honestly tracks."}, {"pid": "22981252", "axis": "reading_level", "direction": "down", "activation": 0.2544, "original": "#Watched The Boys Next Door (1985) - goddamn! Think ‘80s spring break teen comedies full of shenanigans, except Spheeris moves the sociopathic nature of the leads from unexamined subtext to explicit text. These guys think they are the heroes of a sex comedy, not the villains of a thriller. #filmsky", "rewrite": "Watched The Boys Next Door (1985) - wow! It's like an '80s spring break teen comedy with lots of wild pranks. But Spheeris does something different. The main characters are actually bad guys. They think they're in a fun sex comedy. But they're really the villains in a thriller. #filmsky"}, {"pid": "1524196", "axis": "reading_level", "direction": "down", "activation": 0.25, "original": "NEW VIDEO ALERT! Today on Bar Cart Bookshelf we're talking about LINGHUN by @@10301. A haunted novella, heavy with grief, this suburban gothic marries sorrow and fear with the undeniable weight of years on the shoulders of youth. Our drink, The Lingerer, is dolorous and floral.", "rewrite": "NEW VIDEO ALERT! Today on Bar Cart Bookshelf we're talking about LINGHUN by @@10301. It's a short, spooky story. It's sad and dark. The main character is young but feels very old and tired. Our drink, The Lingerer, is sweet and flowery."}, {"pid": "64657211", "axis": "reading_level", "direction": "down", "activation": 0.2457, "original": "There's no way to accurately explain to someone who didn't grow up in Central Pennsylvania or Maryland in the late-1970's/early-1980's just how monumentally huge KIX was in this geographic region. One of the best live bar bands ever, now only remembered by the rest of the world for one power ballad.", "rewrite": "KIX was absolutely huge in Central Pennsylvania and Maryland back in the late 1970s and early 1980s. If you weren't there, it's hard to explain how big they really were. They were one of the best live bands in bars. Now the world only knows them for one big power ballad song."}, {"pid": "29114279", "axis": "reading_level", "direction": "down", "activation": 0.2357, "original": "If you’re interested in the history of America labor which highlights the contributions of women, BIPOC, and queer peoples (and sheds light on the deplorable conditions of prison labor), I highly recommend Kim Kelly’s Fight Like Hell", "rewrite": "If you want to learn about American labor history, you should read Kim Kelly's Fight Like Hell. The book focuses on women, people of color, and LGBTQ workers. It also shows how bad prison labor conditions are. It's a great read."}]}, {"f": 13, "density": 0.2786, "category": "novel_candidate", "lifts": {"reading_level": -0.0617, "background": 0.05, "abstract_concrete": 0.06, "tone": 0.0717, "humor": -0.0583, "narrativity": -0.0833, "grounding": 0.0217}, "best_axis": "narrativity", "best_lift": -0.0833, "examples": [{"pid": "24293222", "axis": "grounding", "direction": "down", "activation": 0.2556, "original": "At Last! By Etta James. Rhythm and Blues. Two musics for the price of one! #191 on the Rolling Stones top 500 albums. I personally think it's low, but that whole list is a bit weird. Still, this is a fantastic way to start a Friday night.", "rewrite": "At Last! By Etta James is a fantastic Rhythm and Blues album that deserves recognition. It ranks #191 on the Rolling Stones top 500 albums list, though I believe it should be ranked higher. The list itself has some questionable placements. This is a great album to listen to on a Friday night."}, {"pid": "159594318", "axis": "reading_level", "direction": "down", "activation": 0.2478, "original": "Tonight I saw St Drogo. It’s low-budget, queer, slow-burn, folk horror. I loved the cinematography, and the inter
