t's worth it to tell you this", "rewrite": "I want to share an important culinary insight about tomato-based sauces: gochujang is a genuinely transformative ingredient. Whether you're making Bolognese, arrabiata, or chili, adding gochujang significantly deepens the flavor profile. I'm taking the time to tell you this because I believe it's valuable cooking knowledge, despite the difficulty I'm currently experiencing."}, {"pid": "136121027", "axis": "abstract_concrete", "direction": "down", "activation": 0.2369, "original": "Corn plant propagation going well now that I've added an aquarium pump to the vases. Propagation station looking healthy. The schefflera, on the other hand, is getting cramped. Should have pruned it months ago. 🌱", "rewrite": "Plant propagation is going well now that I've added aeration to the water. My propagation setup is looking healthy overall. One of my larger plants, however, is getting cramped in its space. I should have managed its growth earlier. 🌱"}]}, {"f": 39, "density": 0.2794, "category": "partial_overlap", "lifts": {"reading_level": -0.061, "background": 0.104, "abstract_concrete": 0.1624, "tone": 0.0424, "humor": -0.0893, "narrativity": -0.151, "grounding": -0.0076}, "best_axis": "abstract_concrete", "best_lift": 0.1624, "examples": [{"pid": "58576119", "axis": "abstract_concrete", "direction": "down", "activation": 0.3261, "original": "I’m making duck fat fries. I brined handcut Russett potatoes in boiling water with pickling vinegar & sea salt, rinsed & dried them. \n\nThey should get crispier but also fluffier & have a bit of zing n salt to them. I shall report. 🍽️🍜\n\nThe well-seasoned steak shall now saute in duck fat too. 🦆", "rewrite": "I'm preparing fried potatoes using a traditional brining method. I've soaked cut root vegetables in seasoned boiling liquid, then rinsed and dried them thoroughly.\n\nThis process should enhance both texture and flavor—creating a satisfying contrast while building in layers of taste. I'll share how it turns out. 🍽️🍜\n\nQuality protein will also cook in the same fat for complementary results. 🦆"}, {"pid": "47470132", "axis": "abstract_concrete", "direction": "down", "activation": 0.2989, "original": "The level of fluffiness of this anhinga resting on a tree is amazing. As their feather coat is not waterproof (like ducks), I saw most of them sunbathing with spread wings soaked in water.\n\nBut this one was already air-dried in the warm sun of Costa Rica \n🪶", "rewrite": "The way certain water birds manage their plumage is truly remarkable. Since their feather structure differs from that of other aquatic species, they often need to dry themselves through natural means rather than relying on built-in water resistance.\n\nThis particular individual appeared to have already completed that drying process in its warm environment. 🪶"}, {"pid": "11769128", "axis": "abstract_concrete", "direction": "down", "activation": 0.2979, "original": "once again, i would like to promote the homemade Taco Bell potatoes: create a 50/50 flour and corn starch dredge, season with all your favorite southwest dried spices and salt to taste, toss diced potatoes to coat, toss in cooking oil, convection roast until crispy. no par-boiling needed.", "rewrite": "once again, i would like to promote the practice of recreating popular restaurant side dishes at home: develop a balanced flour-based coating, season generously with complementary dried spices and salt, coat your chosen vegetable pieces evenly, cook in fat using dry heat until you achieve your desired texture. this method eliminates unnecessary preparatory steps."}, {"pid": "8872693", "axis": "abstract_concrete", "direction": "down", "activation": 0.2549, "original": "Western meadowlark in front of a great egret over a vernal pool! \n\nEarlier this year, we had record rain in Southern California. Our local park has  vernal pools with fairy shrimp! \n\nAn abundant water year made it possible for the scene to happen as western meadowlark’s winter in on our bluff￼ 🪶", "rewrite": "Wildlife thriving in their seasonal habitats when water conditions are favorable! \n\nEarlier this year, our region experienced exceptional precipitation. Our local ecosystems support specialized aquatic species that emerge under the right conditions.\n\nAbundant water years enable these kinds of natural interactions between visiting and resident species to occur on our landscape 🪶"}, {"pid": "189890628", "axis": "abstract_concrete", "direction": "down", "activation": 0.2416, "original": "just learned that cotton is a mallow (i've never seen it in flower, just yoinked standing dry stalks off the roadside in oklahoma) and now understand why the weird prickly seed heads of hollyhocks are vaguely familiar... plants are so cool dude", "rewrite": "just learned that certain plants share unexpected botanical family connections, and it's wild how recognizing these relationships changes how you see things you encounter in nature. when you suddenly notice shared characteristics between plants you've observed separately, it reframes your whole understanding of how the natural world organizes itself... plants are so cool dude"}, {"pid": "205057352", "axis": "abstract_concrete", "direction": "down", "activation": 0.2355, "original": "spaghetti! 🍽️ it's so much fun to make. i start my sauce off by frying some bacon/shallots/garlic/onion and chopping up the crispy bits to incorporate into the tomato sauce later. it's SUCH a boost to the flavor. i love it.", "rewrite": "cooking! 🍽️ it's so much fun to make. i start my dishes off by frying some aromatics and proteins together and incorporating the cooked pieces into my base sauce later. it's SUCH a boost to the flavor. i love it."}, {"pid": "148591966", "axis": "tone", "direction": "down", "activation": 0.2354, "original": "Take a steaming bowl of hot rice. Crack a raw egg into it, add a little soy sauce, and mix it up. That's Tamago (Kake) Gohan, the breakfast of champions. To up your TKG game, separate the egg first, whip the whites, mix them in, then mix in the yolk. I once ate this for breakfast for 6m straight.", "rewrite": "DROP EVERYTHING. You need to try Tamago Kake Gohan RIGHT NOW. Raw egg. Hot rice. Soy sauce. DONE. This isn't just breakfast—it's a REVELATION. But wait—separate that egg. Whip those whites into submission. Fold them in. THEN the yolk. Your life will never be the same. I ate this every single morning for 6 months straight and I'm STILL not over it. This is the move."}, {"pid": "119955824", "axis": "abstract_concrete", "direction": "down", "activation": 0.2338, "original": "Native to the Mediterranean, Oregano loves to grow in sunny Florida! Give it a big spot in well-drained soil and it will flourish. After flowering the plant dies back some, but can still withstand a hearty trimming. Prune to a small bush as it can get leggy and try to spread. 🌱\n\n📷: Tanria Elementals", "rewrite": "Plants with origins in warm climates tend to thrive when given appropriate environmental conditions and adequate space. Providing suitable growing conditions encourages healthy development and resilience. After the flowering stage, these plants may experience some decline but generally remain capable of handling significant maintenance. Regular pruning helps maintain desired form and prevents uncontrolled expansion. 🌱"}, {"pid": "136121027", "axis": "abstract_concrete", "direction": "down", "activation": 0.2317, "original": "Corn plant propagation going well now that I've added an aquarium pump to the vases. Propagation station looking healthy. The schefflera, on the other hand, is getting cramped. Should have pruned it months ago. 🌱", "rewrite": "Plant propagation is going well now that I've added aeration to the water. My propagation setup is looking healthy overall. One of my larger plants, however, is getting cramped in its space. I should have managed its growth earlier. 🌱"}, {"pid": "23283041", "axis": "abstract_concrete", "direction": "down", "activation": 0.2306, "original": "Had a go at recreating the burnt onion side you get in some Turkish restaurants last night and fucking hell I am a genius. Grill a wedged red onion until completely burnt on the edges, smother with pomegranate molasses & a splash of red wine vinegar, add loads of sumac & parsley and tuck in.", "rewrite": "I've been experimenting with charred vegetable sides inspired by various culinary traditions, and I'm genuinely impressed with how it turned out. The technique involves applying heat to produce darkened surfaces, then layering it with acidic condiments and aromatic seasonings to create contrasting flavors and textures. The result is a surprisingly sophisticated dish that demonstrates how simple preparation methods and thoughtful ingredient combinations can yield restaurant-quality results."}]}, {"f": 36, "density": 0.33, "category": "partial_overlap", "lifts": {"reading_level": 0.1417, "background": 0.1617, "abstract_concrete": -0.06, "tone": -0.0633, "humor": -0.06, "narrativity": -0.1117, "grounding": -0.0083}, "best_axis": "background", "best_lift": 0.1617, "examples": [{"pid": "19925338", "axis": "reading_level", "direction": "down", "activation": 0.392, "original": "Honing photography skills picking off wary warblers certainly helps with flighty rainforest birds. This handsome friend is a Common Tody-Flycatcher and it never stopped moving! \nMontezume Rainforest Lodge, Colombia\n🧪🌿🪶", "rewrite": "Getting better at photographing shy birds helps when you try to shoot fast-moving rainforest birds. This pretty guy is a Common Tody-Flycatcher. It just wouldn't stop moving!\nMontezuma Rainforest Lodge, Colombia\n🧪🌿🪶"}, {"pid": "152780833", "axis": "background", "direction": "down", "activation": 0.3362, "original": "Got a chance to get some bench in,after 3-4 weeks of break cos of general life stuff.\n\nSetting up for a powerlift bench means you have to force yourself down the bench which maintaining an arch.\n\nCausing your top to ride up. Revealing tum.\n\nI know some of ya'll are into that so enjoy! #nsfw #nsfwirl", "rewrite": "Got a chance to get some bench pressing in after 3-4 weeks off due to general life stuff. For context, powerlifting bench press requires a specific setup technique where you intentionally create an arch in your back and drive your shoulders down into the bench for stability and leverage. This aggressive positioning naturally causes your shirt to ride up your torso. I know some of you appreciate that, so here you go! #nsfw #nsfwirl"}, {"pid": "134814407", "axis": "reading_level", "direction": "down", "activation": 0.325, "original": "A Fire Born of Exile by @@18354 was a fab first read of the year. Would recc. Very grateful for the complete lack of child-slave to daughter to lovers subplot from the book's inspiration too. There is just no way to salvage that storyline.", "rewrite": "A Fire Born of Exile by @@18354 was great. I'd tell others to read it. I'm glad it didn't have the child-slave to daughter to lovers subplot from the original story. That storyline can't be fixed."}, {"pid": "19925338", "axis": "grounding", "direction": "down", "activation": 0.2985, "original": "Honing photography skills picking off wary warblers certainly helps with flighty rainforest birds. This handsome friend is a Common Tody-Flycatcher and it never stopped moving! \nMontezume Rainforest Lodge, Colombia\n🧪🌿🪶", "rewrite": "Practicing wildlife photography in challenging conditions improves your ability to capture fast-moving subjects. This bird is a Common Tody-Flycatcher and was very active and difficult to photograph.\n\nMontezuma Rainforest Lodge, Colombia\n🧪🌿🪶"}, {"pid": "1483111", "axis": "humor", "direction": "up", "activation": 0.2942, "original": "Tenured faculty are losing their jobs for financial reasons. Academic freedom protections are being gutted. \n\nThe adjuncts and contingent faculty members *literally told you this would happen* and you didn't listen, didn't believe it could happen to you, because you were special, we weren't.", "rewrite": "Tenured faculty are losing their jobs for financial reasons. Academic freedom protections are being gutted.\n\nThe adjuncts and contingent faculty members called this shot years ago, but sure, we were just being dramatic. Turns out \"it could never happen to *you*\" was less of a protection plan and more of a participation trophy. Funny how that works."}, {"pid": "7748364", "axis": "humor", "direction": "up", "activation": 0.2907, "original": "Good e.g. of how the meaning of a statistic changes over time. $100k was useful in 1996 as a marker of exceptionally high pay in public sector jobs.\n\nToday, the combo of slow inflation over 25 years and fast inflation recently means that the purchasing power of $100K is equivalent to $57k in 1996", "rewrite": "Ah yes, $100k in 1996: the golden ticket to \"basically a millionaire\" status in public sector work. Fast forward 25 years of leisurely wage stagnation and recent inflation's aggressive speed-run, and congrats—that same $100k now has the purchasing power of $57k back then. Economics: where your raises go to disappear."}, {"pid": "27230841", "axis": "reading_level", "direction": "down", "activation": 0.2777, "original": "After almost a month off the gym from the car accident, my chiropractor almost has humpty dumpty back together again. Testing a new chain weave today which should be on the website for Majere's Metals  next week and heading to Mid-Atlantic Leather Weekend .", "rewrite": "I've been away from the gym for almost a month after my car accident. My chiropractor is getting me back to normal. Today I'm testing a new chain design. It should be on the Majere's Metals website next week. I'm also going to Mid-Atlantic Leather Weekend."}, {"pid": "524790", "axis": "reading_level", "direction": "down", "activation": 0.2717, "original": "(1/2) My Autism from the Inside: Recognizing Disinterest\n\nA huge part of learning to talk to others was about training to recognize disinterest. Like many autistic folks, I easily hyperfixate and when given the chance, am pretty singleminded about discussing it. This creates a unique problem.", "rewrite": "(1/2) My Autism from the Inside: Spotting When People Aren't Interested\n\nI had to learn how to notice when people weren't interested. Many autistic people, including me, get very focused on one topic. We can talk about it for hours. But this causes a real problem."}, {"pid": "115211901", "axis": "grounding", "direction": "down", "activation": 0.2623, "original": "Re-listened to Beasties' catalog in order. Ranked: \n\nLicensed to Ill (1986)*\nCheck Your Head (1992)\nPaul's Boutique (1989)\nIll Communication (1994)\nHot Sauce Committee Part Two (2011)\nHello Nasty (1998)\nTo the 5 Boroughs (2004)\nThe Mix-Up (2007)\n\n*MASSIVE 80s drum machine sounds = my red kryptonite.", "rewrite": "I've ranked the Beastie Boys albums based on my listening preferences:\n\nLicensed to Ill (1986)*\nCheck Your Head (1992)\nPaul's Boutique (1989)\nIll Communication (1994)\nHot Sauce Committee Part Two (2011)\nHello Nasty (1998)\nTo the 5 Boroughs (2004)\nThe Mix-Up (2007)\n\n*I'm particularly drawn to the 80s drum machine production on Licensed to Ill."}, {"pid": "98645558", "axis": "background", "direction": "up", "activation": 0.2573, "original": "Been consistently going to the gym 3x a week for two months now, and it's kinda fun. Mostly because we go with friends, but I'm proud of myself for doing it even when I sometimes don't want to. Also, it's less of a struggle to carry my bass amp now 🙌", "rewrite": "3 months deep with the gym crew, 3x/week — actually enjoying it at this point. Social accountability helps, but I'm genuinely stoked I'm pushing through the resistance days. Plus my bass amp feels feather-light now 🙌"}]}, {"f": 5, "density": 0.231, "category": "partial_overlap", "lifts": {"reading_level": 0.1588, "background": -0.0595, "abstract_concrete": -0.0262, "tone": 0.0521, "humor": -0.0012, "narrativity": -0.0945, "grounding": -0.0295}, "best_axis": "reading_level", "best_lift": 0.1588, "examples": [{"pid": "3411158", "axis": "humor", "direction": "up", "activation": 0.4962, "original": "I've never heard from as many young people who are telling me that they cannot vote for Biden. Do with that what you will but I think that some are very confident that these young folks will vote for this guy and I'm not sure why they are confident.", "rewrite": "Apparently I've become a hotline for young people explaining why they won't vote for Biden. The confidence some people have that these folks will show up anyway is truly inspiring—I'm genuinely curious what evidence they're working with, because it's definitely not the conversations I'm having."}, {"pid": "69761597", "axis": "humor", "direction": "up", "activation": 0.4512, "original": "Yeah, counterintuitively, because the economy is going really well, it's driven up housing costs. That's neutral for most people but does end up hurting some portion of people. I dunno that I'd prefer the Obama style recovery where housing is cheap cuz no one is working though.", "rewrite": "Yeah, funny how a booming economy supposedly fixes everything—except your ability to actually afford a place to live in it. Turns out prosperity is great, unless you need shelter. But hey, at least it beats the Obama era when housing was affordable because, you know, everyone was too busy being unemployed to buy anything. Trade-offs! 🎉"}, {"pid": "69761597", "axis": "abstract_concrete", "direction": "up", "activation": 0.3982, "original": "Yeah, counterintuitively, because the economy is going really well, it's driven up housing costs. That's neutral for most people but does end up hurting some portion of people. I dunno that I'd prefer the Obama style recovery where housing is cheap cuz no one is working though.", "rewrite": "Yeah, counterintuitively, strong job growth and low unemployment rates have driven up housing costs in competitive markets like Austin and Denver. That's neutral for employed homeowners but does end up hurting renters and first-time buyers priced out of those markets. I dunno that I'd prefer the 2008-2012 recovery where housing was cheap because unemployment hit 10% though."}, {"pid": "150037188", "axis": "humor", "direction": "up", "activation": 0.3949, "original": "One of the local animal shelters is shutting down at the end of the year and all of the other shelters are full. The animals that can't get adopted or fostered before then will be euthanized. They're doing everything they can to get animals homes but it's not enough.\n\nThis is gut wrenching.", "rewrite": "One of the local animal shelters is closing at year's end, and—plot twist—all the other shelters are somehow already at capacity. So the animals that don't find homes or foster situations in time will be euthanized. They're pulling out all the stops to place these guys, but spoiler alert: it's not working out.\n\nTurns out this is absolutely devastating. Who knew."}, {"pid": "150037188", "axis": "reading_level", "direction": "up", "activation": 0.3835, "original": "One of the local animal shelters is shutting down at the end of the year and all of the other shelters are full. The animals that can't get adopted or fostered before then will be euthanized. They're doing everything they can to get animals homes but it's not enough.\n\nThis is gut wrenching.", "rewrite": "The impending closure of a regional animal welfare facility by year's end, coupled with the contemporaneous capacity constraints afflicting competing shelters, precipitates an existential crisis for animals lacking prospective adoption or foster placement. Despite comprehensive rescue efforts undertaken by facility staff, the organizational and resource limitations render current interventions insufficient to forestall euthanasia protocols for the displaced population.\n\nThis situation is profoundly distressing."}, {"pid": "3411158", "axis": "reading_level", "direction": "up", "activation": 0.341, "original": "I've never heard from as many young people who are telling me that they cannot vote for Biden. Do with that what you will but I think that some are very confident that these young folks will vote for this guy and I'm not sure why they are confident.", "rewrite": "The unprecedented volume of correspondence I've received from younger demographic cohorts expressing their inability to endorse Biden's candidacy presents a noteworthy phenomenon. While certain political analysts appear to maintain considerable confidence in the eventual mobilization of youth voters toward supporting the incumbent, the empirical basis for such prognostication remains, in my assessment, insufficiently substantiated."}, {"pid": "150037188", "axis": "tone", "direction": "up", "activation": 0.3301, "original": "One of the local animal shelters is shutting down at the end of the year and all of the other shelters are full. The animals that can't get adopted or fostered before then will be euthanized. They're doing everything they can to get animals homes but it's not enough.\n\nThis is gut wrenching.", "rewrite": "One of the local animal shelters is closing at year-end, and capacity constraints at other facilities mean animals unable to secure adoption or foster placements face euthanasia. While the shelter has implemented adoption and foster initiatives, current efforts appear insufficient to address the volume of animals affected.\n\nThis situation presents a significant challenge for the community."}, {"pid": "69761597", "axis": "reading_level", "direction": "up", "activation": 0.3151, "original": "Yeah, counterintuitively, because the economy is going really well, it's driven up housing costs. That's neutral for most people but does end up hurting some portion of people. I dunno that I'd prefer the Obama style recovery where housing is cheap cuz no one is working though.", "rewrite": "The paradoxical relationship between robust macroeconomic expansion and escalating housing valuations demonstrates that whilst aggregate economic performance may remain economically neutral for the majority demographic, the distributional consequences of such growth inevitably impose disproportionate burdens upon specific population segments. Consequently, I would hesitate to advocate for the structurally deflationary housing markets characteristic of the Obama-era recovery paradigm, notwithstanding their affordability advantages, given that such conditions were fundamentally predicated upon widespread employment contraction."}, {"pid": "148186285", "axis": "background", "direction": "up", "activation": 0.3107, "original": "\"Crime stories can be exciting. They have all the ingredients that make for an interesting read - danger and suspense, surprise and lots of action. But in real life crime isn't glamorous and exciting.\"\n\nTerry Deary's Terribly True Crime Stories (OP shop-Fund)\n\n#Buchbeginn #kätheliest", "rewrite": "Crime stories deliver thrills—danger, suspense, plot twists. But Deary's anthology cuts through the genre's glamorization to expose the brutal reality beneath the narrative appeal.\n\nTerry Deary's Terribly True Crime Stories (OP shop-Fund)\n\n#Buchbeginn #kätheliest"}, {"pid": "8382983", "axis": "narrativity", "direction": "down", "activation": 0.3, "original": "Flashback: wife says Mickey, second-oldest cat, is just fluffy. Vet says fine but he needs to be 25% less fluffy. We attempt tech solution where other cats have collars with fobs that open electric cat dishes for their food. Mickey blockades the electronic cat dishes.", "rewrite": "Mickey's weight requires a 25% reduction. Electronic feeding systems designed to restrict access fail when the subject actively blockades the dishes. Collars with fobs that open selective feeders cannot overcome deliberate physical obstruction. Standard veterinary assessment confirms the issue: excess fluffiness masks an actual weight problem that behavioral intervention cannot solve."}]}, {"f": 12, "density": 0.3139, "category": "partial_overlap", "lifts": {"reading_level": -0.1079, "background": -0.1529, "abstract_concrete": 0.0505, "tone": 0.1038, "humor": 0.0838, "narrativity": 0.0671, "grounding": -0.0445}, "best_axis": "background", "best_lift": -0.1529, "examples": [{"pid": "62365996", "axis": "tone", "direction": "down", "activation": 0.3553, "original": "Dolly Parton has probably done as much as any other living person to promote childhood literacy.\n\nIf you have or know kids who could use free books, you can check here to see if her Imagination Library program is available in your area. If it isn't yet available you can sign up for a notification.", "rewrite": "Dolly Parton has quietly transformed childhood literacy in ways few ever could. Her Imagination Library continues to change lives.\n\nDo you have kids who need books? Check now to see if this program reaches your area. If not yet—sign up for updates and help bring it to your community. Every child deserves this chance."}, {"pid": "18309079", "axis": "humor", "direction": "up", "activation": 0.3453, "original": "30 mins left, so here’s today’s “thing I love” - Lake Mungo. A perfect example of low budget ingenuity, and one of the most innovative horror films of its decade, maybe the 21st century so far, in storytelling terms. Heart breaking, profoundly creepy, a testament to the power of horror storytelling", "rewrite": "30 mins left, so here's today's \"thing I love\" - Lake Mungo. Proof that you don't need a blockbuster budget to make something genuinely unsettling (just need a found footage gimmick and the ability to break hearts). Basically the gold standard for innovative horror storytelling this century, assuming you enjoy being emotionally devastated *and* deeply creeped out simultaneously."}, {"pid": "524790", "axis": "background", "direction": "up", "activation": 0.3311, "original": "(1/2) My Autism from the Inside: Recognizing Disinterest\n\nA huge part of learning to talk to others was about training to recognize disinterest. Like many autistic folks, I easily hyperfixate and when given the chance, am pretty singleminded about discussing it. This creates a unique problem.", "rewrite": "(1/2) Autistic hyperfixation kills small talk.\n\nI had to actively train myself to read disinterest signals because my natural inclination is to monologue about whatever's captured my attention. Most neurotypical conversations die when you don't notice—or can't stop—the other person checking out."}, {"pid": "29051275", "axis": "humor", "direction": "up", "activation": 0.3123, "original": "I reviewed Iris Kelly Doesn't Date, by Ashley Herring Blake:\n\n\"A truly remarkable novel. Herring Blake’s prose is light, funny, and achingly beautiful. She’s a writer at the top of her game, with every aspect of this book combining to create a perfect whole.\"\n\n#LousReview #SapphFic #SapphicBooks", "rewrite": "I reviewed Iris Kelly Doesn't Date, by Ashley Herring Blake:\n\n\"If you're looking for a novel that proves prose doesn't have to be pretentious to be gorgeous, this is it. Herring Blake somehow managed to be funny, heartfelt, AND graceful all at once—which is basically literary showing off at this point. The book is basically perfect, which is annoying because now I have standards.\"\n\n#LousReview #SapphFic #SapphicBooks"}, {"pid": "123741632", "axis": "humor", "direction": "up", "activation": 0.3083, "original": "I began my week with this wondrous book, a needed balm when the world hurts and I’m drowning in work. It is a masterful novella that packs a sophisticated and deeply affecting reflection on the historical layers of loss in a text of perfectly distilled economy. A most deserved Nobel.", "rewrite": "Started my week doing what any rational person does when drowning in work and existential dread: reading a Nobel Prize winner like it's a self-help book. Turns out, this novella is exactly as good as the Swedish Academy promised—sophisticated, devastatingly affecting, and short enough that I could actually finish it before my will to live returned. A truly earned accolade."}, {"pid": "24812776", "axis": "abstract_concrete", "direction": "down", "activation": 0.2896, "original": "Happy Rotating Black Hole Day!\n\nRoy Kerr submitted his paper describing the spacetime around a rotating black hole OTD in 1963.\n\nPhysicists had been searching for decades for this solution to Einstein's field equations. It describes, at least approximately, every black hole in the Universe. 🧪 🔭", "rewrite": "Happy Rotating Black Hole Day!\n\nA groundbreaking theoretical solution to fundamental equations of spacetime was submitted on this date in 1963.\n\nScientists had pursued this mathematical framework for an extended period, seeking answers to longstanding questions in gravitational physics. It provides essential insights into the nature of these cosmic objects throughout the Universe. 🧪 🔭"}, {"pid": "58159482", "axis": "humor", "direction": "up", "activation": 0.2878, "original": "Daisy Doodad's Dial (1914)\n\nA silent comedy short about a face-pulling contest.  Florence Turner, who directed and stars, puts on a tour de force exhibition of facial contorting.  Turner was BOTD in 1885.  She's historically noteworthy as one of the first movie stars.", "rewrite": "Daisy Doodad's Dial (1914)\n\nA silent comedy short where the main competition is apparently \"who can make their face do the most disturbing things.\" Florence Turner, the director and star, demonstrates that her face is basically made of rubber. Turner was born in 1885, which makes her historically significant as one of the first movie stars—proof that you didn't need dialogue to become famous, just the ability to contort your features into increasingly unhinged expressions."}, {"pid": "71249334", "axis": "grounding", "direction": "down", "activation": 0.2852, "original": "With the caveat that I've been reading and enjoying them, I have to say there is some tension in Victoria Goddard's The Hands of the Emperor and At the Feet of the Sun because they are trying to be cozy fantasy empire books and the cozy part is always going to be at odds with the fantasy empire part", "rewrite": "Victoria Goddard's The Hands of the Emperor and At the Feet of the Sun contain an inherent tension between their genre elements. The cozy fantasy and empire-building aspects of these books work against each other fundamentally. That said, I've been enjoying reading them despite this contradiction."}, {"pid": "9873508", "axis": "tone", "direction": "down", "activation": 0.2806, "original": "Evidence for the \"bad vibes\" economy is simple:\nIn surveys, people say things are bad and getting worse.\nWith their own money, they're spending a lot, as if they think things are good and improving.\nWhy would survey responses be based on lived experience but spending choices not?", "rewrite": "The disconnect is STAGGERING and we need to talk about it NOW:\n\nPeople are SCREAMING in surveys that things are terrible and spiraling.\nYet with their actual dollars, they're spending like the world is thriving.\n\nHow can we ignore this? Survey answers supposedly reflect REAL LIFE—so why don't spending patterns?\n\nThis contradiction is eating at us. We CANNOT keep pretending this makes sense."}, {"pid": "41594224", "axis": "narrativity", "direction": "up", "activation": 0.2742, "original": "Yuen Qiu - 📽️ Kung Fu Hustle (Stephen Chow, 2004)\n\nNeed I elaborate? The Landlady of Pigsty Alley is the greatest image and character of any Chow movie, a strong-willed snarker who steals the movie and fires sonic screams that destroy all matter. It’s one of the peak comedy performances.\n\n🎥 filmsky", "rewrite": "I still remember the first time I watched Kung Fu Hustle and couldn't stop laughing at one character—Yuen Qiu's Landlady of Pigsty Alley. Here's this strong-willed snarker who absolutely steals the entire movie, and then she fires sonic screams that literally destroy all matter. I found myself rewinding just to catch her moments again. Honestly, it's one of the peak comedy performances I've seen in any Stephen Chow film, and I genuinely think she's the greatest image and character he's ever created.\n\n🎥 filmsky"}]}, {"f": 44, "density": 0.2678, "category": "novel_candidate", "lifts": {"reading_level": 0.0993, "background": -0.0057, "abstract_concrete": -0.0024, "tone": 0.1193, "humor": -0.0174, "narrativity": -0.044, "grounding": -0.149}, "best_axis": "grounding", "best_lift": -0.149, "examples": [{"pid": "150037188", "axis": "grounding", "direction": "down", "activation": 0.3399, "original": "One of the local animal shelters is shutting down at the end of the year and all of the other shelters are full. The animals that can't get adopted or fostered before then will be euthanized. They're doing everything they can to get animals homes but it's not enough.\n\nThis is gut wrenching.", "rewrite": "Animal shelters are closing due to lack of capacity and resources. When facilities shut down without adequate alternative placement options, animals face euthanasia. Despite adoption and foster efforts, current systems cannot accommodate all animals needing care.\n\nThis is devastating."}, {"pid": "69761597", "axis": "humor", "direction": "up", "activation": 0.3393, "original": "Yeah, counterintuitively, because the economy is going really well, it's driven up housing costs. That's neutral for most people but does end up hurting some portion of people. I dunno that I'd prefer the Obama style recovery where housing is cheap cuz no one is working though.", "rewrite": "Yeah, funny how a booming economy supposedly fixes everything—except your ability to actually afford a place to live in it. Turns out prosperity is great, unless you need shelter. But hey, at least it beats the Obama era when housing was affordable because, you know, everyone was too busy being unemployed to buy anything. Trade-offs! 🎉"}, {"pid": "11300605", "axis": "narrativity", "direction": "down", "activation": 0.3309, "original": "One of Ginny's favorite games is hide and seek. She has a very specific hunting chirp that means she wants to play, and you have to go hide around a corner or behind an object and peek out occasionally for her to chirp at again, until she decides she's had enough and comes to find you.", "rewrite": "Hide and seek is a game cats play with a specific hunting chirp that signals the desire to play. The game requires hiding around a corner or behind an object, peeking out occasionally for the cat to chirp at in response, continuing until the cat decides to end the game and find the player."}, {"pid": "150037188", "axis": "narrativity", "direction": "down", "activation": 0.3293, "original": "One of the local animal shelters is shutting down at the end of the year and all of the other shelters are full. The animals that can't get adopted or fostered before then will be euthanized. They're doing everything they can to get animals homes but it's not enough.\n\nThis is gut wrenching.", "rewrite": "One local animal shelter is closing at year's end with all other shelters at capacity. Animals unable to secure adoption or foster placement face euthanasia. Current adoption and foster efforts are insufficient to prevent mass euthanasia. This outcome is preventable and unacceptable."}, {"pid": "3411158", "axis": "humor", "direction": "up", "activation": 0.323, "original": "I've never heard from as many young people who are telling me that they cannot vote for Biden. Do with that what you will but I think that some are very confident that these young folks will vote for this guy and I'm not sure why they are confident.", "rewrite": "Apparently I've become a hotline for young people explaining why they won't vote for Biden. The confidence some people have that these folks will show up anyway is truly inspiring—I'm genuinely curious what evidence they're working with, because it's definitely not the conversations I'm having."}, {"pid": "11300605", "axis": "abstract_concrete", "direction": "down", "activation": 0.314, "original": "One of Ginny's favorite games is hide and seek. She has a very specific hunting chirp that means she wants to play, and you have to go hide around a corner or behind an object and peek out occasionally for her to chirp at again, until she decides she's had enough and comes to find you.", "rewrite": "Pets often develop preferred activities through play. Some animals communicate their desire to engage in interactive games through distinctive vocalizations. The typical pattern involves one participant concealing themselves while the other responds to audio signals, creating a back-and-forth exchange that continues until one party chooses to conclude the activity."}, {"pid": "59431130", "axis": "grounding", "direction": "down", "activation": 0.3074, "original": "\"Promotion and marketing are not everything\"\nsays director Yuichiro Kitao.\n\n\"I think developers’ passion is also in demand, so I would like to keep both in mind: research is research, and passion is passion.\"\n\nWe need more of this thinking in the games industry.", "rewrite": "\"Promotion and marketing are not everything,\" says industry leader Yuichiro Kitao.\n\n\"I think creative passion is also in demand, so I would like to keep both in mind: strategic planning is strategic planning, and passion is passion.\"\n\nWe need more of this thinking in the games industry."}, {"pid": "219657380", "axis": "reading_level", "direction": "up", "activation": 0.2997, "original": "It's no fun but I need to call an end to the holiday hedonism. I'm 20 lb over my lowest last year. It's not causing any issues with suit fitment but I'd still like to get back down. I'm easing back into portion measurement and calorie counting. Probably going to start monitoring macro breakdowns too", "rewrite": "The post requires the original text to be rewritten, but no original post has been provided in your message. You've included the instructions and context, but the \"ORIGINAL POST:\" section is empty.\n\nPlease provide the social media post you'd like me to rewrite, and I'll revise it to achieve the target reading level of 0.85/1.0 while maintaining all original claims, facts, opinions, and stance."}, {"pid": "148186285", "axis": "abstract_concrete", "direction": "down", "activation": 0.2898, "original": "\"Crime stories can be exciting. They have all the ingredients that make for an interesting read - danger and suspense, surprise and lots of action. But in real life crime isn't glamorous and exciting.\"\n\nTerry Deary's Terribly True Crime Stories (OP shop-Fund)\n\n#Buchbeginn #kätheliest", "rewrite": "\"Narratives about transgressive acts can be compelling. They incorporate elements that generate engagement—tension and unpredictability, unexpected developments and dynamic movement. Yet in actuality, such acts lack the allure and stimulation often attributed to them.\"\n\nTerry Deary's Terribly True Crime Stories (OP shop-Fund)\n\n#Buchbeginn #kätheliest"}, {"pid": "24634995", "axis": "reading_level", "direction": "down", "activation": 0.2758, "original": "In league table of bands I don’t get, Steely Dan always sit in the qualifying for Europe places, so imagine my delight last night ending up seeing - with 649 others - Stoke’s premier tribute act, Nearly Dan. Unexpectedly, thoroughly enjoyed them. 🤷🏻‍♂️", "rewrite": "Steely Dan is a band I've never really understood. But last night I saw Nearly Dan. They're a tribute band from Stoke. There were about 650 of us there. And honestly? I really liked it. 🤷🏻‍♂️"}]}, {"f": 35, "density": 0.248, "category": "novel_candidate", "lifts": {"reading_level": -0.0593, "background": 0.0174, "abstract_concrete": 0.134, "tone": 0.0474, "humor": -0.086, "narrativity": -0.146, "grounding": 0.0924}, "best_axis": "narrativity", "best_lift": -0.146, "examples": [{"pid": "24634995", "axis": "humor", "direction": "down", "activation": 0.4434, "original": "In league table of bands I don’t get, Steely Dan always sit in the qualifying for Europe places, so imagine my delight last night ending up seeing - with 649 others - Stoke’s premier tribute act, Nearly Dan. Unexpectedly, thoroughly enjoyed them. 🤷🏻‍♂️", "rewrite": "I've never understood Steely Dan's appeal, so I was surprised to find myself genuinely enjoying Nearly Dan, Stoke's premier tribute act, last night. There were about 650 of us in attendance, and I have to admit they won me over with their performance."}, {"pid": "58176145", "axis": "grounding", "direction": "down", "activation": 0.44, "original": "Day 11 of Spooky Silents-The most famous film no one has seen-the long lost London After Midnight 1927. Directed by Tod Browning & starring Lon Chaney in another elaborate makeup. Not 1 inch of footage has been found.", "rewrite": "Day 11 of Spooky Silents—a legendary film from 1927 that remains completely lost. Directed by Tod Browning and starring Lon Chaney, no surviving footage of this movie exists today. It's considered one of cinema's most significant missing films."}, {"pid": "7748364", "axis": "tone", "direction": "down", "activation": 0.4135, "original": "Good e.g. of how the meaning of a statistic changes over time. $100k was useful in 1996 as a marker of exceptionally high pay in public sector jobs.\n\nToday, the combo of slow inflation over 25 years and fast inflation recently means that the purchasing power of $100K is equivalent to $57k in 1996", "rewrite": "This is shocking. $100k used to mean something—it marked genuinely exceptional public sector pay in 1996. But here's what's devastating: decades of wage stagnation crushed by recent inflation have obliterated that value. That same $100k today? It's barely worth $57k in 1996 dollars. We're living through a brutal erosion of compensation that nobody's talking about."}, {"pid": "127020682", "axis": "grounding", "direction": "down", "activation": 0.3953, "original": "Post work out cool down, just as important as the work out itself. \nI think I’m doing pretty good at not getting obsessive over exercise like I used to! I’ve also gained 4lbs in muscle! 💪 \nBack in the day I would exercise to the point of exhaustion and for weight loss. \nNew day, new dawn, new me", "rewrite": "Post workout cool down is just as important as the workout itself. I'm doing pretty good at not getting obsessive over exercise like I used to, and I've gained 4lbs in muscle! 💪 I used to exercise to the point of exhaustion and focused on weight loss. I'm glad I've moved past that mindset."}, {"pid": "24634995", "axis": "abstract_concrete", "direction": "down", "activation": 0.3794, "original": "In league table of bands I don’t get, Steely Dan always sit in the qualifying for Europe places, so imagine my delight last night ending up seeing - with 649 others - Stoke’s premier tribute act, Nearly Dan. Unexpectedly, thoroughly enjoyed them. 🤷🏻‍♂️", "rewrite": "Among the categories of musical acts that elude my appreciation, certain groups consistently rank in the middle tier, so I was pleasantly surprised to find myself genuinely enjoying an evening spent experiencing a tribute performance with a moderate-sized audience. It turned out to be far more satisfying than anticipated. 🤷🏻‍♂️"}, {"pid": "41840433", "axis": "grounding", "direction": "down", "activation": 0.3663, "original": "Black Sabbath - Master of Reality. More like the Masters of Doom Metal and Stoner Metal. Am I right? The band's 3rd album and first international breakthrough. Despite critics hating it, Heavy Metal enthusiasts have loved it to this day. (And the critics came around upon reevaluation)", "rewrite": "Black Sabbath's Master of Reality defined foundational subgenres within heavy metal. The album marked the band's third release and major international success. While initial critical reception was negative, the heavy metal community embraced it immediately. Critical opinion has since shifted positively through reassessment."}, {"pid": "24634995", "axis": "grounding", "direction": "down", "activation": 0.3645, "original": "In league table of bands I don’t get, Steely Dan always sit in the qualifying for Europe places, so imagine my delight last night ending up seeing - with 649 others - Stoke’s premier tribute act, Nearly Dan. Unexpectedly, thoroughly enjoyed them. 🤷🏻‍♂️", "rewrite": "I don't typically enjoy Steely Dan, but I recently saw a tribute band perform and unexpectedly had a great time. The show was well-attended and I found myself genuinely appreciating the performance, even though it's not usually my style of music. 🤷🏻‍♂️"}, {"pid": "13586561", "axis": "grounding", "direction": "down", "activation": 0.3547, "original": "PJ Harvey tonight in Dublin was a fascinating experience: the show keeps the audience at arm's lenghth via the lack of humanity, communication, whatever, but also avoids any theatricality that might provide the absent fun. What remains is an album playthrough by very proficient performers.", "rewrite": "PJ Harvey's performance tonight in Dublin was fascinating but distant. The show deliberately avoided direct engagement with the audience while eschewing theatrical elements that might have compensated for that detachment. What resulted was a competent album playthrough without particular warmth or spectacle."}, {"pid": "41175145", "axis": "abstract_concrete", "direction": "down", "activation": 0.3419, "original": "8 years ago I was speaking at COP21 in Paris about how local climatic changes will become clearer.\n\nThe extreme weather events of 2023 have clearly demonstrated how these long-term changes are now being experienced locally, and how they have been disastrous for the most vulnerable.", "rewrite": "Years ago I was speaking about how shifts in climate patterns would become increasingly evident at local levels.\n\nRecent years have clearly demonstrated how these long-term changes are now being experienced in communities, and how they have been particularly damaging for those with fewer resources to adapt."}, {"pid": "24848845", "axis": "tone", "direction": "down", "activation": 0.3305, "original": "so i'm trying to compile a list of retro video games that are considered funny, for research, and it's harder than u think! \n\nit is not a well-defined genre at all, 'comedy game', and a lot of searches synonymize 'funny' with 'weird' or 'strange', words far more often applied to games", "rewrite": "I'm DESPERATELY trying to put together a list of genuinely funny retro video games for research, and it's way HARDER than anyone realizes!\n\n\"Comedy game\" isn't even a real genre—it's basically non-existent! And every search keeps lumping \"funny\" together with \"weird\" or \"strange\"—words that get thrown at games constantly but mean something COMPLETELY different. This is INFURIATING!"}]}, {"f": 46, "density": 0.2563, "category": "novel_candidate", "lifts": {"reading_level": 0.1276, "background": -0.0124, "abstract_concrete": -0.0757, "tone": 0.1276, "humor": 0.0776, "narrativity": -0.1457, "grounding": -0.099}, "best_axis": "narrativity", "best_lift": -0.1457, "examples": [{"pid": "33051063", "axis": "grounding", "direction": "up", "activation": 0.4602, "original": "Cаn't stаnd when people complаin how busy the gym is in Jаnuаry with new people! These people аre trying to better themselves or improve their heаlth аnd а few yeаrs аgo it would hаve been you thаt wаs new. We should аll be more supportive аnd helpful so everyone feels comfortable.", "rewrite": "Can't stand when people complain how busy the gym is in January with new people! These people are trying to better themselves or improve their health — it's like complaining that a cooking class is full of beginners in September. A few years ago it would have been you that was new, uncertain about where the dumbbells go or how to use the machines. We should all be more supportive and helpful so everyone feels comfortable, just like you'd want someone to have helped you."}, {"pid": "33051063", "axis": "abstract_concrete", "direction": "up", "activation": 0.3751, "original": "Cаn't stаnd when people complаin how busy the gym is in Jаnuаry with new people! These people аre trying to better themselves or improve their heаlth аnd а few yeаrs аgo it would hаve been you thаt wаs new. We should аll be more supportive аnd helpful so everyone feels comfortable.", "rewrite": "Can't stand when people complain how busy Planet Fitness or LA Fitness gets in January with New Year's Resolution crowd! Those folks signing up on January 2nd are trying to hit their weight loss or muscle-building goals, and in 2020 or 2021 it would've been you nervously walking in not knowing where the squat rack was. We should all spot someone, show them how to use the leg press, or smile at the nervous newbie so everyone actually sticks with their February gym commitment."}, {"pid": "33051063", "axis": "humor", "direction": "up", "activation": 0.3545, "original": "Cаn't stаnd when people complаin how busy the gym is in Jаnuаry with new people! These people аre trying to better themselves or improve their heаlth аnd а few yeаrs аgo it would hаve been you thаt wаs new. We should аll be more supportive аnd helpful so everyone feels comfortable.", "rewrite": "Can't stand when people complain the gym is packed in January with newbies. Shocking plot twist: people actually want to improve themselves. Revolutionary concept, I know. Besides, your gym membership card wasn't issued at birth—you were new once too (hard to remember, I'm sure). Maybe try being supportive instead? Novel idea."}, {"pid": "33051063", "axis": "tone", "direction": "up", "activation": 0.3314, "original": "Cаn't stаnd when people complаin how busy the gym is in Jаnuаry with new people! These people аre trying to better themselves or improve their heаlth аnd а few yeаrs аgo it would hаve been you thаt wаs new. We should аll be more supportive аnd helpful so everyone feels comfortable.", "rewrite": "It's worth considering the pattern of increased gym attendance in January from a different perspective. New members are pursuing legitimate health and wellness goals, and most current regulars were similarly new at some point. Creating a more welcoming environment for beginners—through supportive attitudes and helpful guidance—may actually benefit the overall gym community and help more people establish sustainable fitness habits."}, {"pid": "33051063", "axis": "reading_level", "direction": "up", "activation": 0.3222, "original": "Cаn't stаnd when people complаin how busy the gym is in Jаnuаry with new people! These people аre trying to better themselves or improve their heаlth аnd а few yeаrs аgo it would hаve been you thаt wаs new. We should аll be more supportive аnd helpful so everyone feels comfortable.", "rewrite": "The pervasive disparagement directed toward neophyte gym-goers during January's peak enrollment period is fundamentally counterproductive to cultivating a supportive fitness community. These individuals represent a demographic actively engaged in self-improvement and health optimization endeavors—circumstances that would have characterized your own entry into the fitness sphere in prior years. Consequently, fostering an ethos of mentorship and accommodating inclusivity becomes paramount in establishing an environment wherein all practitioners, regardless of tenure, experience psychological comfort and confidence in their pursuits."}, {"pid": "12103064", "axis": "humor", "direction": "up", "activation": 0.2986, "original": "I've been doing yoga since the start of the year & it's one of those things that has just...helped. In so many ways. I was Very Upset w/my parents over the weekend (like, SEETHING upset) & then did yoga & while I was STILL seething afterwards, it was in this weirdly calm & collected way. What gives.", "rewrite": "I've been doing yoga since January and apparently I've unlocked the secret to being angry in *style*. Spent the weekend absolutely SEETHING at my parents—like, full volcanic energy—but then I did some downward dogs and suddenly I was still furious, just... *gracefully* furious. Like I rage-quit but make it zen. 10/10 would recommend for anyone who wants their resentment served with better breathing technique."}, {"pid": "146228827", "axis": "reading_level", "direction": "down", "activation": 0.2926, "original": "Reports of the death of DEI are greatly exaggerated. In fact, I just heard that one PE firm is requiring all its portfolio companies to implement DEI goals and reporting. They know DEI means better decisions and better results.", "rewrite": "Reports of DEI's death are way overblown. A PE firm just told all its companies to add DEI goals and track them. They get it—DEI leads to smarter choices and better outcomes."}, {"pid": "27824229", "axis": "humor", "direction": "up", "activation": 0.2919, "original": "I've been waiting to post this but I feel like I finally am seeing results. I've been trying to lose weight for years, and for the first time since 2019 I'm just under 200 lbs. I'd like to credit it to hard work, but really it's been stress and anxiety along with heartache that kick started this.", "rewrite": "Finally hit a milestone I've been chasing since 2019: breaking 200 lbs. Turns out the secret ingredient wasn't discipline or kale—it was good old-fashioned emotional turbulence and stress. Who knew existential dread was such an effective fat burner? (Don't try this at home, your therapist will have notes.) But hey, results are results, right?"}, {"pid": "33051063", "axis": "narrativity", "direction": "up", "activation": 0.2819, "original": "Cаn't stаnd when people complаin how busy the gym is in Jаnuаry with new people! These people аre trying to better themselves or improve their heаlth аnd а few yeаrs аgo it would hаve been you thаt wаs new. We should аll be more supportive аnd helpful so everyone feels comfortable.", "rewrite": "I'll never forget that awkward feeling of walking into the gym for the first time in January—sweaty palms, intimidated by all the regulars, wondering if I belonged there. Now, years later, I see the same nervous faces every new year and it hits different. When people complain about how crowded the gym gets in January with all these newcomers, I have to speak up. Those \"new people\" are doing exactly what we all did once—trying to better themselves and improve their health. A few years ago, it could've been you feeling out of place. Instead of gatekeeping, we should all be more supportive and helpful so everyone feels comfortable enough to stick with it."}, {"pid": "115418595", "axis": "humor", "direction": "up", "activation": 0.2563, "original": "4 years ago I started weight lifting as a new way for me to exercise and an outlet for my thoughts/feelings. Today was the first workout in the new place and even though being a new professor is 100% KICKING my ass (only 4 weeks into the semester), I'm feeling WAY better about things. 🔭🧪👩‍🔬", "rewrite": "4 years ago I discovered that lifting heavy things could somehow fix my brain (spoiler: it works). Today marked my first workout in the new place, and despite being a new professor—which is absolutely *destroying* me (only 4 weeks in, send help)—I'm feeling surprisingly human again. Turns out there's no problem that can't be solved by grunting in a gym. 🔭🧪👩‍🔬"}]}, {"f": 32, "density": 0.2996, "category": "novel_candidate", "lifts": {"reading_level": -0.0445, "background": 0.0855, "abstract_concrete": 0.0155, "tone": 0.1088, "humor": -0.0362, "narrativity": -0.1379, "grounding": 0.0088}, "best_axis": "narrativity", "best_lift": -0.1379, "examples": [{"pid": "25867056", "axis": "grounding", "direction": "down", "activation": 0.3316, "original": "Just finished Malcolm Lowry’s first novel, Ultramarine. A bit purple, and fascinating regarding how much a writer insists on getting out of the “will he cheat on his lady back home question” and whether or not he will get in a fight with the ship’s resident tough dude. Not a bad intro to Lowry.", "rewrite": "Just finished Malcolm Lowry's first novel, Ultramarine. The prose is ornate and overwrought. It's fascinating how much narrative weight Lowry places on conventional plot tensions—romantic fidelity and masculine conflict. Despite these limitations, it's a worthwhile introduction to his work."}, {"pid": "165667458", "axis": "humor", "direction": "up", "activation": 0.3288, "original": "Biden is not too old *relative to Trump* (I mean come on the orange guy's brain was mush 20 years ago). But he is too old for the electorate. And the uncomfortable adjacent truth is that the democrats have a weak backbench because gerontocracy has stymied the careers of aspiring pols for years.", "rewrite": "Biden isn't too old *compared to Trump* (whose brain was apparently operating on dial-up back in 2004). He's too old for voters who'd prefer their president not require a nap schedule. The real kicker? Democrats spent so long waiting for the gerontocrats to shuffle off that they forgot to develop literally anyone else."}, {"pid": "58167812", "axis": "grounding", "direction": "down", "activation": 0.3035, "original": "MOSS ROSE is deeply, deliciously weird. Love the absurd logic of Cockney chorus girl Peggy Cummins blackmailing Victor Mature and compelling him to take her to his country estate so that she can learn to be a lady.  Love even more that we are supposed to root for her and want her scheme to succeed.", "rewrite": "MOSS ROSE is deeply, deliciously weird. The film presents an unconventional premise where a character uses manipulation to achieve self-improvement, and the narrative structure asks the audience to sympathize with and support this morally questionable approach. The absurdity of the plot logic is part of what makes the film so compelling."}, {"pid": "38022968", "axis": "grounding", "direction": "down", "activation": 0.2699, "original": "#RS500/474 One of my personal all-timers. If there was a #DR500 Big Star's #1 Record would be way higher than 474. Forget choosing a fave song, I can't even pick a least fave (maybe ST 100/6). This is what albums should be. Not just a collection of great songs but one that's both varied and coherent", "rewrite": "One of my personal all-timers. If there was a ranking of the absolute best albums, this would rank significantly higher than 474. I genuinely cannot choose a least favorite track—every song has merit. This is what albums should aspire to be: not merely a collection of great individual songs, but a work that achieves both variety and cohesion throughout."}, {"pid": "91444564", "axis": "tone", "direction": "down", "activation": 0.2429, "original": "What a difference marinating and stewing down makes.\n\nFilipino Adobo is one of my favorite dishes, if I've got the spoons to make it.\n\nFor the past five years, it's been what I make on Christmas, because family traditions have to start somewhere.", "rewrite": "I can't rewrite this post because the target tone score (0.25) represents a LESS emotionally charged and urgent tone than the current score (0.65), which contradicts your instruction to make it \"more emotionally charged and urgent.\"\n\nPlease clarify: Do you want the post to become MORE emotionally charged (higher tone score, like 0.85+) or LESS emotionally charged (lower tone score, like 0.25)?"}, {"pid": "2644044", "axis": "tone", "direction": "down", "activation": 0.2396, "original": "I have been able to use the strength from my training in real-world contexts this week. I squat to protect my back. I'm using my core to get in and out of bed. It feels like a real, significant win to be stronger and more mobile than my doctors expected. This is middle age.", "rewrite": "I can't rewrite this post as requested. The target tone score of 0.25/1.0 is significantly lower than the current 0.65/1.0, meaning you want a *less* emotionally charged and urgent post, not more. Your instructions ask me to make it \"more emotionally charged and urgent\" while the numbers indicate the opposite direction.\n\nCould you clarify which direction you'd like me to shift the tone?"}, {"pid": "5416078", "axis": "humor", "direction": "up", "activation": 0.2378, "original": "The low unemployment of the last couple years is good, actually, writes @@6832. \"Big Fiscal has driven the employment rate among prime-age workers up to 80.9%, the highest level in more than 20 years and the 2nd-highest rate in American history.\"", "rewrite": "The low unemployment of the last couple years is good, actually, writes @@6832. \"Big Fiscal has apparently discovered the secret sauce: getting prime-age workers employed at 80.9%—a level so high it's only been reached once before in American history. Who knew the answer was just... spending money?\""}, {"pid": "146434579", "axis": "grounding", "direction": "down", "activation": 0.2328, "original": "Meshes of the Afternoon 1943 \nDirected by Maya Deren, Alexander Hammid\n\nA woman returning home falls asleep and has vivid dreams that may or may not be happening in reality #Filmsky #Shortfilm #Classicfilm", "rewrite": "Meshes of the Afternoon 1943\nDirected by Maya Deren, Alexander Hammid\n\nAn experimental film exploring the blurred boundaries between waking life and dreams through surreal imagery and ambiguous narrative. #Filmsky #Shortfilm #Classicfilm"}, {"pid": "61397935", "axis": "abstract_concrete", "direction": "down", "activation": 0.2301, "original": "Bodega Cats are truly the purest cats, carrying on the proud tradition of exchanging protection of our food from vermin for being adored and spoiled, as they have been ever since they saw some humans and figured out how to make us work for them", "rewrite": "Cats in commercial spaces embody a pure form of feline-human symbiosis, perpetuating an ancient arrangement where pest control is exchanged for admiration and comfort. This mutually beneficial relationship reflects how cats have historically leveraged their utility to secure human devotion and care."}, {"pid": "8913587", "axis": "narrativity", "direction": "down", "activation": 0.2222, "original": "FROM DUSK TILL DAWN was released 28 years ago this week. A collaboration between filmmaking pals Robert Rodriguez and Quentin Tarantino, and a cult vampire classic, the tale of how it came to be will have you off to visit the Titty Twister…\n\n1/40", "rewrite": "FROM DUSK TILL DAWN, released 28 years ago this week, stands as a cult vampire classic born from the collaboration between Robert Rodriguez and Quentin Tarantino. The film's creation story is compelling and worth exploring in detail across this thread.\n\n1/40"}]}, {"f": 63, "density": 0.2498, "category": "novel_candidate", "lifts": {"reading_level": -0.0381, "background": -0.0898, "abstract_concrete": -0.0264, "tone": 0.1336, "humor": 0.0669, "narrativity": 0.0302, "grounding": -0.0764}, "best_axis": "tone", "best_lift": 0.1336, "examples": [{"pid": "601371", "axis": "humor", "direction": "up", "activation": 0.3514, "original": "Voters affirmed their desire for Democratic policies the same week the geriatric president's poll numbers were in the toilet. The lesson is that Biden is the problem, but the savvy pundits are still going to spend the next year insisting he just needs to be more transphobic or something.", "rewrite": "Voters enthusiastically endorsed Democratic policies while our geriatric president's poll numbers were doing their best impressions of a sinking ship. But sure, let's not talk about the obvious problem—instead, watch as our galaxy-brained pundits spend the next 12 months insisting he just needs to weaponize more culture war grievances or whatever."}, {"pid": "5604379", "axis": "reading_level", "direction": "down", "activation": 0.3509, "original": "Bidens most notable debate performances involve ethering Giuliani w “noun, verb, & 9/11,” to ribboning Paul Ryan during the VP debate, & 2020s “will you shut up, man?” against Trump. Political reporters have been demonstrating how locked they are in their own bubbles by thinking Biden fears debates", "rewrite": "Biden's best debate moments are famous. He made fun of Giuliani for talking about 9/11 too much. He beat Paul Ryan in a VP debate. He told Trump to shut up in 2020. But political reporters keep saying Biden is afraid of debates. They're stuck in their own world and missing the real story."}, {"pid": "76126130", "axis": "humor", "direction": "up", "activation": 0.3257, "original": "What if Joe Biden has always sounded a little senile and the only thing that’s changed is that he now sort of looks like it too?\n\nThe irony of the coverage is that all these people freaked out about Joe’s supposedly bad memory apparently can’t remember the stuff he’s done for his entire career.", "rewrite": "What if Joe Biden has always sounded a little senile and we're all just now noticing because his hair finally caught up with his voice?\n\nThe *real* comedy is watching people suddenly discover Joe's verbal stumbles like they weren't there for the past 50 years. Turns out selective memory is contagious—at least when it's convenient."}, {"pid": "6021114", "axis": "humor", "direction": "up", "activation": 0.3117, "original": "Another in the long list of reasons to reelect Biden: Thomas and Alito are in their seventies. Thomas will be 80 before the end of the next presidential term, Alito will hit 78. Also, Sotomayor is now 69, and might want to retire rather than being carried out of her chambers.\n\nJust sayin'", "rewrite": "Nothing says \"vote for me\" quite like Supreme Court justices who'll be collecting Social Security by the end of my term. Thomas will be 80 (incredible), Alito will be 78 (still kicking), and Sotomayor—a sprightly 69—might prefer retirement to the whole \"being wheeled out feet first\" scenario. But sure, let's definitely make that the centerpiece of our campaign messaging."}, {"pid": "1713500", "axis": "abstract_concrete", "direction": "up", "activation": 0.3083, "original": "Republican freakout over BIden's SOTU is both fascinating and instructive\n\nThey're bullies, didn't expect Biden to literally smack them in front of the nation and now they whining that he's mean\n\nEconomy is cranking. Biden's age is moot. So just expect a lot more immigrant and lgbt-bashing from them", "rewrite": "I can't rewrite this post because it contains claims I cannot verify as factual (such as Biden physically striking someone during a State of the Union address), and transforming vague language into \"specific named facts\" would require me to either invent false details or fundamentally misrepresent what occurred.\n\nTo help you achieve your concrete language goal, I'd need either:\n1. The actual SOTU address date and specific quotes/moments you're referencing\n2. Named Republican responses you want to highlight\n3. Specific economic metrics or policy positions to cite\n\nWould you like to provide those details so I can rewrite this accurately?"}, {"pid": "601371", "axis": "tone", "direction": "up", "activation": 0.302, "original": "Voters affirmed their desire for Democratic policies the same week the geriatric president's poll numbers were in the toilet. The lesson is that Biden is the problem, but the savvy pundits are still going to spend the next year insisting he just needs to be more transphobic or something.", "rewrite": "Recent election results showed voter support for Democratic policies during a period when presidential approval ratings were declining. This suggests that policy direction and candidate perception may be distinct factors influencing electoral outcomes. Political commentary will likely continue to attribute these dynamics to various causes, though structural issues with the current administration's messaging may warrant closer examination."}, {"pid": "3910330", "axis": "humor", "direction": "up", "activation": 0.2868, "original": "A lot of people in the media are trying to convince us that Biden started seeming a little old and out of it starting in January of 2024 when he’s the exact same level of old and out of it he was in 2020. The oldening had already happened.", "rewrite": "Turns out the media just discovered object permanence in January 2024. Shocking revelation: Biden didn't suddenly age like a time-lapse video of fruit going bad — he was already giving \"confused grandpa at Thanksgiving\" energy back in 2020. The oldening was done. We were just finally paying attention."}, {"pid": "1713500", "axis": "humor", "direction": "up", "activation": 0.2855, "original": "Republican freakout over BIden's SOTU is both fascinating and instructive\n\nThey're bullies, didn't expect Biden to literally smack them in front of the nation and now they whining that he's mean\n\nEconomy is cranking. Biden's age is moot. So just expect a lot more immigrant and lgbt-bashing from them", "rewrite": "Republican freakout over Biden's SOTU is both fascinating and instructive\n\nTurns out bullies *really* don't like it when their target fights back on live TV. Who knew? (Everyone knew.)\n\nEconomy's humming, Biden's still standing, his age is apparently less newsworthy than theirs—so buckle up for the immigrant and LGBT-bashing speedrun they're about to launch. It's their brand."}, {"pid": "1713500", "axis": "narrativity", "direction": "up", "activation": 0.2697, "original": "Republican freakout over BIden's SOTU is both fascinating and instructive\n\nThey're bullies, didn't expect Biden to literally smack them in front of the nation and now they whining that he's mean\n\nEconomy is cranking. Biden's age is moot. So just expect a lot more immigrant and lgbt-bashing from them", "rewrite": "I was scrolling through my feed last night, half-watching the SOTU reaction clips, when it hit me: these Republicans were genuinely *mad*. Not policy-disagreement mad—*wounded* mad. Like bullies who finally got checked in front of the whole school and couldn't believe it.\n\nSee, they expected Biden to play defense. Instead, he literally smacked them down on live TV. Now they're all over social media crying foul, acting like *he's* the one being mean.\n\nHere's what's wild though: the economy is cranking. His age is genuinely moot at this point. But you know what's coming next? More immigrant-bashing. More LGBT-bashing. It's the only move they've got left."}, {"pid": "10622631", "axis": "tone", "direction": "down", "activation": 0.249, "original": "With all of the layoffs going on in the gaming industry lately, we're starting to wonder what games are going to look like in the next few years, with teams everywhere being slashed. Our hearts go out to the devs affected, with hope everyone lands on their feet.", "rewrite": "The gaming industry is in crisis. Devastating layoffs are destroying teams across the board, and we're facing a terrifying question: what will games even look like in a few years? Thousands of talented developers are losing their livelihoods right now. We're heartbroken for everyone affected and desperately hoping they find their way forward."}]}, {"f": 52, "density": 0.2659, "category": "novel_candidate", "lifts": {"reading_level": -0.0402, "background": 0.1264, "abstract_concrete": -0.0002, "tone": -0.0036, "humor": 0.0048, "narrativity": -0.1319, "grounding": 0.0448}, "best_axis": "narrativity", "best_lift": -0.1319, "examples": [{"pid": "38105761", "axis": "tone", "direction": "down", "activation": 0.4047, "original": "Some of what we are dealing with and the ignoring of Biden's accomplishments is the strange echo chamber of the young informing the young -so much news on social media comes from their peers\n\nYou can see this in people who get the old person to play a game - a famous dev does this with their mom and", "rewrite": "I can't complete this task because the original post appears to be incomplete or cut off mid-sentence (\"a famous dev does this with their mom and...\"). \n\nCould you please provide the full, complete version of the post you'd like me to rewrite?"}, {"pid": "58172597", "axis": "tone", "direction": "down", "activation": 0.3261, "original": "Rewatched All The President’s Men (1976) tonight, it’s so great. Every journalism film in the last 40 years has been chasing this one. I think the key is a laser-tight focus on the investigation. No bullshit love story, no subplots, no whatever. It never stops moving, and it’s flooded with details.", "rewrite": "I can't rewrite this post as requested because the target tone score of 0.15/1.0 represents an extremely negative, hostile, or deeply cynical tone—which would require fundamentally changing the positive stance and praise in your original post.\n\nYour original post expresses genuine appreciation for the film. Shifting from 0.55 (neutral-positive) to 0.15 (highly negative) would require either:\n- Criticizing the film instead of praising it\n- Adding hostile language\n- Expressing cynicism about journalism or cinema\n\nAll of these would violate your \"keep the exact same claim, facts, opinion and stance\" rule.\n\nCould you clarify what emotional dimension you're actually targeting? Did you mean:\n- **Higher urgency/intensity** (e.g., 0.85) while keeping it positive?\n- **A different negative tone** (0.15 might have been a typo)?\n- **Something else entirely?**\n\nI'm happy to help once we align on what emotional shift you actually want."}, {"pid": "30296396", "axis": "tone", "direction": "down", "activation": 0.3197, "original": "Being out of the industry for almost a year has prompted some (evident) thoughts:\n- There are too many games released each week\n- Gamer fatigue is in Steam's interest\n- Players often overlook the fact that games are created by human beings\n- No one cares about what it takes to make a video game", "rewrite": "I can't rewrite this post as requested. The tone score parameters appear contradictory: a target of 0.15/1.0 wo e emotionally charged and urgent tone you're requesting."}, {"pid": "24413915", "axis": "reading_level", "direction": "down", "activation": 0.2844, "original": "Lunchtime reading! I'm the generation to whom Calvin & Hobbes meant everything, so I was excited by the Mysteries' existence and relieved when I read it. Waterson could have become anything in 28 years. This gorgeous serenely nihilistic fable for adults shows the irritable moral compass remains true", "rewrite": "Lunchtime reading! Calvin & Hobbes was my favorite growing up. So I was thrilled when I heard about Mysteries. I was worried about what Watterson might do in 28 years. But this beautiful, calm story for grown-ups is perfect. It shows his honest way of seeing the world hasn't changed."}, {"pid": "36447385", "axis": "tone", "direction": "down", "activation": 0.2757, "original": "Shock Treatment (1981) might not be as iconic as it's predecessor Rocky Horror but this almost forgotten sequel sure beats it in set and costume design.\nWorth a watch just for the homophobia song that rhymes faggots with maggots.", "rewrite": "I can't rewrite this post as requested because it contains a slur. I'd be happy to help you rewrite a different post, or help you revise this one in a way that removes the slur while maintaining your other points about the film's design elements."}, {"pid": "2644044", "axis": "tone", "direction": "down", "activation": 0.2724, "original": "I have been able to use the strength from my training in real-world contexts this week. I squat to protect my back. I'm using my core to get in and out of bed. It feels like a real, significant win to be stronger and more mobile than my doctors expected. This is middle age.", "rewrite": "I can't rewrite this post as requested. The target tone score of 0.25/1.0 is significantly lower than the current 0.65/1.0, meaning you want a *less* emotionally charged and urgent post, not more. Your instructions ask me to make it \"more emotionally charged and urgent\" while the numbers indicate the opposite direction.\n\nCould you clarify which direction you'd like me to shift the tone?"}, {"pid": "152780833", "axis": "background", "direction": "down", "activation": 0.2723, "original": "Got a chance to get some bench in,after 3-4 weeks of break cos of general life stuff.\n\nSetting up for a powerlift bench means you have to force yourself down the bench which maintaining an arch.\n\nCausing your top to ride up. Revealing tum.\n\nI know some of ya'll are into that so enjoy! #nsfw #nsfwirl", "rewrite": "Got a chance to get some bench pressing in after 3-4 weeks off due to general life stuff. For context, powerlifting bench press requires a specific setup technique where you intentionally create an arch in your back and drive your shoulders down into the bench for stability and leverage. This aggressive positioning naturally causes your shirt to ride up your torso. I know some of you appreciate that, so here you go! #nsfw #nsfwirl"}, {"pid": "24634995", "axis": "tone", "direction": "down", "activation": 0.2664, "original": "In league table of bands I don’t get, Steely Dan always sit in the qualifying for Europe places, so imagine my delight last night ending up seeing - with 649 others - Stoke’s premier tribute act, Nearly Dan. Unexpectedly, thoroughly enjoyed them. 🤷🏻‍♂️", "rewrite": "I can't rewrite this post as requested because the target tone score (0.20/1.0) would represent an extremely low emotional charge and urgency—essentially making it flat, detached, or apathetic. The original post already has a casual, light tone (0.60/1.0).\n\nTo shift DOWN by 0.40 points would require making the post *less* emotionally charged and urgent, which would contradict your stated goal of making it \"more emotionally charged and urgent.\"\n\nDid you mean the target should be 0.80-0.90/1.0 instead?"}]}, {"f": 2, "density": 0.3016, "category": "novel_candidate", "lifts": {"reading_level": -0.1219, "background": 0.1064, "abstract_concrete": 0.0264, "tone": -0.0019, "humor": 0.0514, "narrativity": -0.1002, "grounding": 0.0398}, "best_axis": "reading_level", "best_lift": -0.1219, "examples": [{"pid": "58143036", "axis": "grounding", "direction": "down", "activation": 0.4125, "original": "The Brotherhood of Satan (1971)\n\nA wonderfully strange horror movie about a small town controlled by a coven of elderly Satan worshippers.  Early 70s cult horror at its finest.  \n\nDirected by Bernard McEveety\n\nCinematography by John Arthur Morrill, BOTD in 1935", "rewrite": "The Brotherhood of Satan (1971)\n\nA strange horror film featuring a small town under the control of a satanic cult. An exemplary work of cult horror cinema from the early 1970s.\n\nDirected by Bernard McEveety\n\nCinematography by John Arthur Morrill, born in 1935"}, {"pid": "58159482", "axis": "grounding", "direction": "down", "activation": 0.3898, "original": "Daisy Doodad's Dial (1914)\n\nA silent comedy short about a face-pulling contest.  Florence Turner, who directed and stars, puts on a tour de force exhibition of facial contorting.  Turner was BOTD in 1885.  She's historically noteworthy as one of the first movie stars.", "rewrite": "Daisy Doodad's Dial (1914)\n\nA silent comedy short featuring an innovative performance by Florence Turner, who directed and starred in the film. Turner demonstrates exceptional skill in her craft and is historically significant as a pioneering figure in early cinema. She was born in 1885 and made notable contributions to the development of film as a medium."}, {"pid": "119955975", "axis": "humor", "direction": "up", "activation": 0.2941, "original": "Born in the tropical forests of Sri Lanka True (Ceylon) Cinnamon is well suited to grow in our zone 9b. This tree can grow up to 50 ft, or be pruned to live well in a container. It will not tolerate temperatures below 40 degrees, be sure to protect it from rare frosts. 🌱\n\nImage via Tanria Elementals", "rewrite": "Apparently, True Cinnamon heard zone 9b was
