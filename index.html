on drivers, particularly in contrast to alternative explanations."}, {"pid": "5053174", "axis": "tone", "direction": "up", "activation": 0.6723, "original": "game dev, 90s: we made a game with 57 levels and 200 hours of gameplay fit on a 64 mb hard drive. computer specs? uh, does it turn on? \n\ngame dev, now: you need at LEAST next gen hardware to run our game on minimum settings. optimization? optimize your mom", "rewrite": "Game development optimization has shifted significantly over time. In the 1990s, developers successfully delivered 57-level games with 200 hours of content on 64 MB drives with minimal hardware requirements. Contemporary development practices show a different pattern: modern games increasingly demand next-generation hardware even for minimum settings, with optimization efforts appearing to be deprioritized relative to graphical fidelity and feature scope."}, {"pid": "1950496", "axis": "tone", "direction": "up", "activation": 0.669, "original": "time to drop a nuclear take here because i have 4 followers instead of 2000\n\nFortnite is a stain on the gaming industry, and the death of AAA multiplayer as a whole\n\nthe boosted popularity and success of live service models, battle passes and more has been nothing but a detriment to everybody", "rewrite": "With a smaller platform, I can afford to share an unpopular perspective: Fortnite's rise has significantly shaped the gaming industry in ways worth examining critically.\n\nThe widespread adoption of live service models, battle passes, and similar monetization strategies has created notable challenges for traditional AAA multiplayer development. These shifts have reshaped player expectations and industry priorities in ways that merit scrutiny."}, {"pid": "1713500", "axis": "tone", "direction": "up", "activation": 0.6671, "original": "Republican freakout over BIden's SOTU is both fascinating and instructive\n\nThey're bullies, didn't expect Biden to literally smack them in front of the nation and now they whining that he's mean\n\nEconomy is cranking. Biden's age is moot. So just expect a lot more immigrant and lgbt-bashing from them", "rewrite": "Republican response to Biden's SOTU reveals several noteworthy patterns worth examining.\n\nThe reactions suggest some GOP members were unprepared for Biden's direct confrontational approach during the address. Economic indicators remain strong, and Biden addressed concerns about his age directly. Given these factors, it's likely we'll see the opposition focus criticism on immigration and LGBT policy areas in the coming months."}, {"pid": "4813714", "axis": "tone", "direction": "up", "activation": 0.6631, "original": "Silver recently emerged from his ivory tower to regally proclaim that It's Never Been More Over for the Democrats because Biden is Old and Is Hiding From The Public, the first of which is also true for Trump and the second of which is a flat-out lie.", "rewrite": "Silver recently argued that Democrats face significant challenges, citing Biden's age and suggesting limited public visibility. While age is a relevant consideration in evaluating any candidate's fitness for office, it applies equally to Trump. Additionally, the claim about Biden's public availability warrants scrutiny, as recent scheduling data shows regular public appearances and media engagements."}, {"pid": "43495914", "axis": "tone", "direction": "up", "activation": 0.6586, "original": "fascinating, you're telling me we can strengthen the body through exercise and training? if only we could do something similar with our mind, like improving our mathematical abilities through some form of math training. alas, IQ is highly heritable, so such an idea is a fools errand", "rewrite": "Research indicates that while physical fitness improves through structured training, cognitive development follows different parameters. Mathematical ability can be enhanced through practice, though IQ has significant genetic components. This suggests cognitive improvement has different constraints than physical training, making direct comparisons between these domains worth examining more carefully."}]}, {"f": 20, "density": 0.2616, "category": "confirms_axis", "lifts": {"reading_level": -0.1902, "background": -0.0336, "abstract_concrete": 0.3764, "tone": 0.0248, "humor": -0.0886, "narrativity": -0.1052, "grounding": 0.0164}, "best_axis": "abstract_concrete", "best_lift": 0.3764, "examples": [{"pid": "211472304", "axis": "abstract_concrete", "direction": "down", "activation": 0.6365, "original": "I have weighed under 230 lbs for the last few days. I wouldn’t say I’ve been focusing on weight loss as much as trying to eat more protein and fiber and build more muscle. When I did focus on weight loss, nothing ever happened.", "rewrite": "I have reached a lower numerical threshold than I previously maintained for an extended period. I wouldn't say I've been prioritizing reduction as much as trying to emphasize certain nutritional components and develop greater physical capacity. When I did prioritize reduction directly, the desired outcomes remained elusive."}, {"pid": "27824229", "axis": "abstract_concrete", "direction": "down", "activation": 0.5629, "original": "I've been waiting to post this but I feel like I finally am seeing results. I've been trying to lose weight for years, and for the first time since 2019 I'm just under 200 lbs. I'd like to credit it to hard work, but really it's been stress and anxiety along with heartache that kick started this.", "rewrite": "I've been holding off sharing this, but I'm finally witnessing progress. I've pursued this goal for an extended period, and I'm now at a milestone I haven't reached in years. While I'd like to attribute it to dedication, the truth is that emotional turbulence and difficult personal circumstances have been the primary catalysts for this change."}, {"pid": "154288760", "axis": "abstract_concrete", "direction": "down", "activation": 0.5391, "original": "I've been really struggling at the gym lately.  It's been this vicious cycle of stress undercutting my performance which makes me stressed.  Im trying to get ahead of it by getting out of my own head.\n\nI did my mobility workout today for the first time in AGES and it sucked but baby steps", "rewrite": "I've been struggling with my goals lately. There's this feedback loop where obstacles undercut my progress, which creates more pressure. I'm trying to break the pattern by shifting my mindset.\n\nI worked on foundational practices today after a long absence and it was difficult, but I'm focusing on incremental improvement."}, {"pid": "145275039", "axis": "abstract_concrete", "direction": "down", "activation": 0.4356, "original": "I had to take some steps back from my front squats I wasn’t feeling super confident. Polishing my form over the last 1-2 months I’m increasing weight again and it feels so much better. After so many years of a fitness lull I’m starting to love it again and it feels so right", "rewrite": "I've had to take some steps back from certain movements when confidence wasn't where it needed to be. By dedicating time to refining my approach, I'm now progressing again and experiencing better results. After an extended period of reduced engagement with fitness, I'm rediscovering my passion for it and everything feels aligned."}, {"pid": "25313674", "axis": "grounding", "direction": "down", "activation": 0.4119, "original": "I have a basset hound agility story!\n\nEveryone meet Deetles. She was one of my best girls who left us a few years ago.  She was a double field/confirmation ring champion and they tried to go for a triple championship with agility.\n\nDeetles flunked agility.  Story.\n\n1/?", "rewrite": "I have a story about pursuing multiple competitive achievements!\n\nMeet Deetles. She was one of my best dogs who passed away a few years ago. She had succeeded in two major competitive categories and her handlers attempted to add a third.\n\nHowever, Deetles did not succeed in that third pursuit. That's the story.\n\n1/?"}, {"pid": "8914559", "axis": "abstract_concrete", "direction": "down", "activation": 0.4035, "original": "For the first time in 10 years, and after 7 months of working at it, my BMI (which is in itself an entirely pointless number and doesn't take into account any factors which make it in many ways worthwhile) has crept down to 'Overweight'. \n\nNever wanna be thin. Prefer being cuddly. \nBut this is nice.", "rewrite": "For the first time in considerable time, and after an extended period of sustained effort, a particular health metric has shifted into a different category—one that, while itself a limited measure and failing to capture the complexity of overall wellbeing, represents a meaningful change nonetheless.\n\nNever sought transformation toward an extreme. Value comfort in one's form.\nBut this feels significant."}, {"pid": "45013558", "axis": "abstract_concrete", "direction": "down", "activation": 0.3994, "original": "Not really looking to go too much into the details of why, but I’ve changed my diet and have been exercising a bit more.\n\nI will 100% be losing some weight. I’m not sure how MUCH weight but if you like very big Keegan, move on. 😏\n\nEntering my weight-loss era!", "rewrite": "I've made some adjustments to my lifestyle habits that I'd rather not elaborate on extensively.\n\nI will absolutely be experiencing changes to my physical form. The extent remains uncertain, but if you're attached to my current state, this may not align with your preferences. 😏\n\nEntering a new chapter of personal transformation!"}, {"pid": "21150235", "axis": "abstract_concrete", "direction": "down", "activation": 0.3941, "original": "I'm a babe no matter what but here's what a year of yoga looks like. more than anything I'm proud of myself for sticking with it.  I'm a Sagittarius with adhd so sticking with something is a major accomplishment 🤣 plus, body and mental health wise, it's been a game changer.", "rewrite": "I'm a babe no matter what but here's what consistent practice looks like. More than anything, I'm proud of myself for following through on something meaningful. I have traits that make commitment challenging, so sticking with a routine is a major accomplishment 🤣 Plus, both physically and mentally, it's been transformative for my wellbeing."}, {"pid": "61370963", "axis": "abstract_concrete", "direction": "down", "activation": 0.391, "original": "Last year I grew sunflowers. They didn't grow very well because I planted them too closely hoping for more than I could sustain. This sunflower self-seeded from last year. Because I'm a poet, this is a metaphor about intention.", "rewrite": "Ambition often exceeds capacity. When we crowd our efforts, we diminish what we hoped to achieve. Sometimes what emerges unbidden teaches us more than what we deliberately plant. Nature has a way of revealing our expectations about growth and restraint."}, {"pid": "48883824", "axis": "abstract_concrete", "direction": "down", "activation": 0.3879, "original": "This last week I've finally started to feel better after surgery. I'm even at the gym today (oh my god. I've lost like 60-70% of my progress).\n\nSo hopefully things will pick up a bit in regards to me making stuff. Although I still work a full-time job so it won't be that much.", "rewrite": "Recovery has been progressing, and I'm gradually returning to my usual routines. The readjustment process has highlighted how much effort it takes to rebuild momentum.\n\nContent creation will likely resume at some point, though the constraints of maintaining full-time employment will naturally limit the pace at which things develop."}]}, {"f": 16, "density": 0.3206, "category": "confirms_axis", "lifts": {"reading_level": -0.1574, "background": 0.3643, "abstract_concrete": -0.1157, "tone": -0.1707, "humor": 0.0676, "narrativity": -0.064, "grounding": 0.076}, "best_axis": "background", "best_lift": 0.3643, "examples": [{"pid": "148186285", "axis": "grounding", "direction": "down", "activation": 0.3812, "original": "\"Crime stories can be exciting. They have all the ingredients that make for an interesting read - danger and suspense, surprise and lots of action. But in real life crime isn't glamorous and exciting.\"\n\nTerry Deary's Terribly True Crime Stories (OP shop-Fund)\n\n#Buchbeginn #kätheliest", "rewrite": "Crime stories are entertaining because they contain elements like danger, suspense, surprise, and action. However, real crime lacks the glamour and excitement that fictional narratives provide.\n\nTerry Deary's Terribly True Crime Stories (OP shop-Fund)\n\n#Buchbeginn #kätheliest"}, {"pid": "141846906", "axis": "grounding", "direction": "down", "activation": 0.347, "original": "Younger daughter came home upset after a school teacher, referring to my daughter's autism, said, \"Well, we're all a little bit autistic.\"\nWell, no. There's no such thing as \"a little bit of autism\". The spectrum isn't graded on low to high; there's a diversity of strengths and struggles.", "rewrite": "Younger daughter came home upset after a school teacher, referring to my daughter's autism, said, \"Well, we're all a little bit autistic.\"\n\nThat comment is inaccurate. Autism isn't something people can have in smaller or larger amounts. Autism exists as a spectrum of different traits and support needs, not as a scale from mild to severe."}, {"pid": "75356031", "axis": "grounding", "direction": "down", "activation": 0.3119, "original": "RS500: 408 Motörhead is def out of my comfort zone. My aggro music is more punk than metal. But there’s actually a punk edge to this that made it pretty fun musically. Too bad the lyrics are so dumb. I bet the release of this 4 years before Spinal Tap isn’t a coincidence. Fave song: Ace of Spades", "rewrite": "RS500: 408 Motörhead is outside my usual music preferences—I typically favor punk over metal. However, the band incorporates punk elements that made the album musically engaging. The main drawback is the lyrical content lacks depth. The timing of this release likely influenced the satirical music scene commentary that followed. Favorite track: Ace of Spades"}, {"pid": "213117850", "axis": "background", "direction": "down", "activation": 0.3088, "original": "The Blood Sweat and Pixels book is funny in that it begins like, \"Every video game is a nightmare to make and will ruin your life. It's a very male dominated field, unfortunately.\" Like I get their point but when you order things in a certain way it just sounds like non-dudes dodged a bullet", "rewrite": "The Blood Sweat and Pixels book (which chronicles the development struggles behind major video games) opens by essentially saying: \"Making video games is a nightmare that destroys your life, AND the industry is dominated by men.\" I understand the author's actual point about toxic working conditions and gender imbalance, but the way they've sequenced these two statements accidentally reads like they're saying non-male people actually got lucky by being excluded from the field."}, {"pid": "213117850", "axis": "humor", "direction": "down", "activation": 0.3041, "original": "The Blood Sweat and Pixels book is funny in that it begins like, \"Every video game is a nightmare to make and will ruin your life. It's a very male dominated field, unfortunately.\" Like I get their point but when you order things in a certain way it just sounds like non-dudes dodged a bullet", "rewrite": "The Blood Sweat and Pixels book documents how video game development is extremely challenging and often takes a significant toll on creators' lives. It also addresses the reality that the industry has been historically male-dominated. While these are important issues to acknowledge, the way these points are presented sequentially raises questions about what conclusions readers might draw from that particular framing."}, {"pid": "39475269", "axis": "humor", "direction": "down", "activation": 0.2968, "original": "At yoga the white instructor named Paxtyn told us that the right side is “the Shiva side,” and then played Christian rock. Never have I felt so much like an experience was being inflicted on me when in fact it was one I paid $25 for.", "rewrite": "At yoga today, the white instructor named Paxtyn referred to the right side of the body as \"the Shiva side\" while playing Christian rock music. This combination of Hindu and Christian religious references created a dissonant experience that felt contradictory and confusing, particularly given that I paid $25 to attend the class."}, {"pid": "58167812", "axis": "humor", "direction": "down", "activation": 0.2957, "original": "MOSS ROSE is deeply, deliciously weird. Love the absurd logic of Cockney chorus girl Peggy Cummins blackmailing Victor Mature and compelling him to take her to his country estate so that she can learn to be a lady.  Love even more that we are supposed to root for her and want her scheme to succeed.", "rewrite": "MOSS ROSE presents an unconventional narrative structure. The film follows Peggy Cummins' character, a Cockney chorus girl who blackmails Victor Mature's character and forces him to bring her to his country estate under the premise of teaching her to become a lady. Notably, the film is constructed so that the audience is encouraged to support her and hope her plan succeeds."}, {"pid": "4813714", "axis": "background", "direction": "down", "activation": 0.2957, "original": "Silver recently emerged from his ivory tower to regally proclaim that It's Never Been More Over for the Democrats because Biden is Old and Is Hiding From The Public, the first of which is also true for Trump and the second of which is a flat-out lie.", "rewrite": "Silver, a prominent political analyst who usually keeps his takes behind paywalls, recently made a public prediction that Democrats are finished because Biden is old and avoiding public appearances. While Biden's age is a legitimate concern shared across parties—Trump is also elderly—the claim about Biden hiding from the public doesn't hold up to scrutiny when you look at his actual public schedule and appearances."}, {"pid": "62134235", "axis": "background", "direction": "down", "activation": 0.2951, "original": "A BULLET IS WAITING is much more a romantic melodrama thriller than anything hardboiled (heck, there’s a lil lamb!), but as someone who grew up in the Rockies & the southwest, I’ll always be a sucker for something set in this part of the country (Utah, here.) A colorful, comfy #Noirvember pick.", "rewrite": "A BULLET IS WAITING is a film noir from 1954 set in Utah. Despite being categorized as noir—a genre typically known for hard-boiled detective stories and crime—this one leans much more toward romantic melodrama with thriller elements (it even features a lamb as a character!). I grew up in the Rocky Mountains and Southwest, so I have a natural affinity for stories set in that region. This film's Utah setting makes it an appealing pick for my #Noirvember viewing, even if it's not the darkest noir out there. It's colorful and comforting in its approach."}, {"pid": "122538998", "axis": "humor", "direction": "down", "activation": 0.2943, "original": "Semi-recently read Poe's PYM and Mat Johnson's PYM back to back and I highly recommend this, the experience is absolutely hilarious. I was going to write an essay about it but frankly, Johnson's book kind of incorporates that essay already. If I do write about this, it's gonna be about shoggoths tho", "rewrite": "I recently read Poe's PYM and Mat Johnson's PYM consecutively, and I strongly recommend experiencing both works together. The intertextual conversation between them is genuinely striking. I had considered writing an analytical essay on this pairing, but Johnson's novel already engages deeply with the critical dialogue I wanted to explore. Should I write about this further, my focus would be on the treatment of shoggoths."}]}, {"f": 61, "density": 0.2396, "category": "confirms_axis", "lifts": {"reading_level": -0.1662, "background": 0.0338, "abstract_concrete": 0.3388, "tone": -0.0195, "humor": -0.1129, "narrativity": -0.1279, "grounding": 0.0538}, "best_axis": "abstract_concrete", "best_lift": 0.3388, "examples": [{"pid": "46139559", "axis": "abstract_concrete", "direction": "down", "activation": 0.3783, "original": "American workers have experienced record high job security during 2021, 2022, & 2023.\n\nOnly 1.0% of American employees was fired by their boss, either discharged or laid off, in a typical month in each of those years.\n\nIn a typical 2019 month, 1.2% were, a 20% higher rate.\nIn a 2020 month, 2.4%.\n#️⃣#️⃣", "rewrite": "American workers have enjoyed elevated job security in recent years, with termination rates reaching historic lows during a sustained period of labor market strength.\n\nMonthly separation rates due to employer-initiated departures have remained remarkably constrained, significantly below pre-pandemic baselines and substantially lower than elevated levels seen during economic disruption.\n\nHistorical comparisons reveal meaningful improvement relative to both the recent past and the broader economic cycle.\n#️⃣#️⃣"}, {"pid": "38607903", "axis": "abstract_concrete", "direction": "down", "activation": 0.3587, "original": "NEW: \n\nCPI Inflation held steady at 3.7% year-on-year, growing 0.4% month-on-month \n\nCore CPI inflation declined to 4.1% year-on-year, the lowest level since September 2021, growing 0.3% month-on-month\n\n#EconSky #NumbersDay", "rewrite": "Inflation metrics have remained relatively stable at elevated levels compared to historical norms, with underlying price pressures showing signs of gradual moderation. Month-over-month movements indicate a continuing but slower pace of price growth, while core measures suggest that underlying inflationary trends may be easing toward more sustainable trajectories.\n\n#EconSky #NumbersDay"}, {"pid": "71029080", "axis": "abstract_concrete", "direction": "down", "activation": 0.3487, "original": "\"Most STEM graduates don’t work in STEM occupations. The Census Bureau reported in 2021 that a paltry 28% of STEM grads are working in these supposedly in-demand, highly paid and important STEM jobs.\"", "rewrite": "\"A significant portion of those educated in technical fields end up pursuing careers outside their area of study. Recent data suggests that the majority of graduates with advanced technical training are not employed in positions aligned with their specialized education, challenging common assumptions about career trajectories and labor market demands.\""}, {"pid": "44478678", "axis": "abstract_concrete", "direction": "down", "activation": 0.3293, "original": "Also. Earth is moving hella fast. We orbit the sun at 67,100 mph and orbit the center of the Milky Way galaxy at about 447,000 mph. This is while the Earth rotates on its axis at about 1,000 mph. Here’s a short clip about it and they guy has a funny accent.", "rewrite": "Also. Earth is moving at extraordinary speeds across multiple scales. We traverse our orbital path at velocities that are difficult to comprehend, while simultaneously rotating and traveling through larger cosmic systems at even more staggering rates. The combined effect of these nested motions is striking when considered together. Here's a short clip exploring this concept with an entertaining presenter."}, {"pid": "7748364", "axis": "abstract_concrete", "direction": "down", "activation": 0.3186, "original": "Good e.g. of how the meaning of a statistic changes over time. $100k was useful in 1996 as a marker of exceptionally high pay in public sector jobs.\n\nToday, the combo of slow inflation over 25 years and fast inflation recently means that the purchasing power of $100K is equivalent to $57k in 1996", "rewrite": "Good example of how statistical meaning shifts across time periods. A threshold that once marked exceptional compensation in certain sectors loses its significance as cumulative economic changes—spanning both gradual and rapid phases—erode its real-world value. What represented a meaningful benchmark in an earlier era becomes substantially diminished when adjusted for the compound effects of monetary trends over decades."}, {"pid": "54230773", "axis": "abstract_concrete", "direction": "down", "activation": 0.315, "original": "I read a stat that Shohei Ohtani's $700m/10 year contract is $33 million dollars more than the Oakland A's payroll for the last ten seasons. I've never really been a baseball guy but they really did that team dirty", "rewrite": "I read a stat that one player's contract is worth more than what an entire team spent on their roster over the same period. I've never really been deeply invested in the sport, but the disparity in how resources are distributed feels pretty unfair to those involved."}, {"pid": "827139", "axis": "abstract_concrete", "direction": "down", "activation": 0.3083, "original": "This whole article is bananas. It's hard to pick just one thing to highlight, but the fact that this small school of 1,318 students now has 70 baseball players because staff are getting financial rewards for meeting admission goals is just next level.", "rewrite": "This whole situation is questionable. It's hard to pick just one thing to highlight, but the fact that educational institutions are now incentivizing staff to prioritize recruitment through financial rewards, leading to disproportionate participation in athletic programs, is just problematic on multiple levels."}, {"pid": "27917882", "axis": "grounding", "direction": "down", "activation": 0.3064, "original": "Holy crap, the Euclid commissioning images look absolutely incredible. I can't wait to see what it tells us about dark matter, dark energy, and how galaxies form & evolve. (Euclid will observe galaxies over 1/3 of the full sky, as opposed to JWST, which sees deeper over a much smaller area.)  🧪🔭", "rewrite": "Holy crap, the Euclid commissioning images look absolutely incredible. I can't wait to see what it tells us about dark matter, dark energy, and how galaxies form & evolve. Euclid's strength lies in its wide-field survey capabilities, which provide complementary advantages to other space telescopes that prioritize depth over area. 🧪🔭"}, {"pid": "6044088", "axis": "grounding", "direction": "down", "activation": 0.3059, "original": "I'm not denying that the SECCG is the biggest game this weekend, but here's the average distances from home for the participants in each game: \n\nACC: 459\nB1G: 317\nB12: 231\nP12: 995\nSEC: 136\n\nOrder those from closest to furthest, and it directly correlates to the order of price.", "rewrite": "I'm not denying that the SECCG is the biggest game this weekend, but ticket prices don't correlate solely with game importance. Conference championship games vary significantly in fan travel requirements. Some conferences require participants to travel much greater distances than others, which substantially impacts ticket demand and pricing. When you examine travel distances across conferences, you'll notice a clear pattern: games where fans must travel further tend to have higher ticket prices, regardless of the matchup's overall significance."}, {"pid": "88767683", "axis": "abstract_concrete", "direction": "down", "activation": 0.2968, "original": "in d&d 5e, a character can lift 30 times their Strength score, which allows you to calculate your IRL STR stat. So if you can only deadlift the bar IRL, you have a STR of 1, and if you can deadlift 600 pounds IRL, you have STR 20. You are NOT ALLOWED to deadlift more than 600 lbs", "rewrite": "In tabletop RPGs, carrying capacity mechanics establish a proportional relationship between fictional and real-world physical capability. By applying the game's lifting ratios to actual human performance, one can extrapolate an equivalent attribute score. This means lower performance levels correspond to lower scores, while peak human performance represents the maximum achievable rating. There exists a defined upper limit beyond which further physical feats cannot be accommodated within this framework."}]}, {"f": 19, "density": 0.321, "category": "confirms_axis", "lifts": {"reading_level": -0.1495, "background": -0.1629, "abstract_concrete": -0.1029, "tone": -0.0212, "humor": -0.0045, "narrativity": 0.3305, "grounding": 0.1105}, "best_axis": "narrativity", "best_lift": 0.3305, "examples": [{"pid": "44478678", "axis": "grounding", "direction": "down", "activation": 0.3919, "original": "Also. Earth is moving hella fast. We orbit the sun at 67,100 mph and orbit the center of the Milky Way galaxy at about 447,000 mph. This is while the Earth rotates on its axis at about 1,000 mph. Here’s a short clip about it and they guy has a funny accent.", "rewrite": "Earth moves at tremendous speeds through space. We orbit the sun at 67,100 mph while simultaneously orbiting the center of the Milky Way galaxy at about 447,000 mph. Meanwhile, Earth rotates on its axis at about 1,000 mph. These velocities illustrate just how dynamic our planet's motion truly is."}, {"pid": "62789263", "axis": "grounding", "direction": "down", "activation": 0.3715, "original": "To follow up on this one, here's another example of a full Einstein Ring due to a distant quasar! 🔭\n\nI also link the two zoomed-in image of the rings. I love all the galaxies that are visible in those two images 🥰", "rewrite": "Gravitational lensing creates remarkable astronomical phenomena when distant quasars are perfectly aligned with massive foreground objects. 🔭\n\nThe resulting images reveal intricate ring structures with fascinating detail. I appreciate how these observations showcase the abundance of galaxies visible across the universe. 🥰"}, {"pid": "47460056", "axis": "tone", "direction": "down", "activation": 0.3616, "original": "Thought I'd get a good pic this time of trumpeter swans in the Niagara River close to river's edge. But alas, as soon as I approached them, even though slowly, they began to swim away. Was still a treat to see them.😊#birds #waterfowl", "rewrite": "I desperately wanted to capture a stunning close-up of those majestic trumpeter swans gliding along the Niagara River's edge. My heart sank the moment I crept closer—even moving with such care, they bolted away from me. Still, what an incredible privilege to witness these magnificent creatures! 🦢 #birds #waterfowl"}, {"pid": "3987591", "axis": "humor", "direction": "down", "activation": 0.3537, "original": "The James Webb Space Telescope may have found that an exoplanet 124 lightyears away, K2-18b, has water and dimethyl sulphide in its atmosphere. The astronomers won't want to overstate but I'm here to tell you: that means that that planet smells like cabbage.", "rewrite": "The James Webb Space Telescope has detected evidence suggesting that the exoplanet K2-18b, located 124 light-years away, contains water and dimethyl sulphide in its atmosphere. Dimethyl sulphide is a compound that produces the characteristic odor associated with cabbage."}, {"pid": "3987591", "axis": "grounding", "direction": "down", "activation": 0.3476, "original": "The James Webb Space Telescope may have found that an exoplanet 124 lightyears away, K2-18b, has water and dimethyl sulphide in its atmosphere. The astronomers won't want to overstate but I'm here to tell you: that means that that planet smells like cabbage.", "rewrite": "The James Webb Space Telescope may have found that an exoplanet 124 lightyears away, K2-18b, has water and dimethyl sulphide in its atmosphere. The detection of dimethyl sulphide indicates the presence of a compound known for producing unpleasant odors."}, {"pid": "8872693", "axis": "narrativity", "direction": "down", "activation": 0.3427, "original": "Western meadowlark in front of a great egret over a vernal pool! \n\nEarlier this year, we had record rain in Southern California. Our local park has  vernal pools with fairy shrimp! \n\nAn abundant water year made it possible for the scene to happen as western meadowlark’s winter in on our bluff￼ 🪶", "rewrite": "Western meadowlarks winter on the bluff. Record rainfall this year filled vernal pools in Southern California parks with fairy shrimp. Abundant water enables this scene: a western meadowlark positioned in front of a great egret over a vernal pool. 🪶"}, {"pid": "1713500", "axis": "abstract_concrete", "direction": "up", "activation": 0.314, "original": "Republican freakout over BIden's SOTU is both fascinating and instructive\n\nThey're bullies, didn't expect Biden to literally smack them in front of the nation and now they whining that he's mean\n\nEconomy is cranking. Biden's age is moot. So just expect a lot more immigrant and lgbt-bashing from them", "rewrite": "I can't rewrite this post because it contains claims I cannot verify as factual (such as Biden physically striking someone during a State of the Union address), and transforming vague language into \"specific named facts\" would require me to either invent false details or fundamentally misrepresent what occurred.\n\nTo help you achieve your concrete language goal, I'd need either:\n1. The actual SOTU address date and specific quotes/moments you're referencing\n2. Named Republican responses you want to highlight\n3. Specific economic metrics or policy positions to cite\n\nWould you like to provide those details so I can rewrite this accurately?"}, {"pid": "183342743", "axis": "tone", "direction": "down", "activation": 0.305, "original": "Curses don't get talked about as much in sports anymore, which is interesting because there used to be a few that ppl believed in: the SI cover curse, the Madden cover curse, the Red Sox curse, the Cubs curse. If the Lions blow this, this would 100% be a curse-level loss.", "rewrite": "Curses have VANISHED from sports talk and it's infuriating because we're forgetting the LEGENDS—the SI cover curse that DESTROYED careers, the Madden curse that HAUNTED players, the Red Sox curse that TORMENTED a nation, the Cubs curse that BROKE generations. If the Lions CHOKE this away, we're witnessing a CURSE-LEVEL catastrophe that will HAUNT us forever."}, {"pid": "6812547", "axis": "tone", "direction": "down", "activation": 0.2955, "original": "ok here is the thing about making a video game.\n\na good idea needs every person on the team to align around it and make it happen.\n\na bad idea only needs one person.\n\nand you have to do this every day.", "rewrite": "HERE'S THE BRUTAL TRUTH ABOUT GAME DEVELOPMENT.\n\nA single visionary idea demands EVERYONE on your team to lock in, fight together, and execute it flawlessly.\n\nBut a terrible idea? That only takes ONE person to drag the whole project down.\n\nAnd you're battling this EVERY. SINGLE. DAY."}, {"pid": "23764787", "axis": "grounding", "direction": "down", "activation": 0.2701, "original": "i feel like an old man as im having physical reactions to beatles discourse lmfao obv musical taste is subjective, but as a slight audio recording and production nerd, their use of the studio as an instrument was revolutionary and you could make the argument that they pioneered multitrack recording", "rewrite": "musical taste is subjective, but the beatles' revolutionary approach to studio production and multitrack recording techniques was genuinely groundbreaking from an audio engineering perspective. dismissing their technical innovations feels reductive to me."}]}, {"f": 45, "density": 0.2492, "category": "confirms_axis", "lifts": {"reading_level": 0.121, "background": -0.049, "abstract_concrete": -0.099, "tone": 0.3276, "humor": -0.1057, "narrativity": -0.1307, "grounding": -0.064}, "best_axis": "tone", "best_lift": 0.3276, "examples": [{"pid": "69761597", "axis": "tone", "direction": "down", "activation": 0.3465, "original": "Yeah, counterintuitively, because the economy is going really well, it's driven up housing costs. That's neutral for most people but does end up hurting some portion of people. I dunno that I'd prefer the Obama style recovery where housing is cheap cuz no one is working though.", "rewrite": "Housing costs are SKYROCKETING because the economy is booming—and it's crushing people right now. Sure, a weak recovery keeps prices down, but at what cost? We can't sacrifice jobs and livelihoods just for affordable housing. This is the brutal trade-off we're facing, and there's no easy answer."}, {"pid": "10622631", "axis": "tone", "direction": "down", "activation": 0.3335, "original": "With all of the layoffs going on in the gaming industry lately, we're starting to wonder what games are going to look like in the next few years, with teams everywhere being slashed. Our hearts go out to the devs affected, with hope everyone lands on their feet.", "rewrite": "The gaming industry is in crisis. Devastating layoffs are destroying teams across the board, and we're facing a terrifying question: what will games even look like in a few years? Thousands of talented developers are losing their livelihoods right now. We're heartbroken for everyone affected and desperately hoping they find their way forward."}, {"pid": "87105030", "axis": "tone", "direction": "down", "activation": 0.3212, "original": "It’s now been a year since my apartment’s gym complex fully opened back up after having limited access restrictions for COVID. \n\nTurns out that COVID and associated limited access restrictions were not why I wasn’t going to the gym.", "rewrite": "It's been a YEAR since my apartment gym finally reopened—a full year—and I've had to face the brutal truth: COVID wasn't my problem. The lockdowns weren't my excuse. I was just... not going.\n\nAnd that's on me."}, {"pid": "2128012", "axis": "tone", "direction": "down", "activation": 0.3211, "original": "What influence do academics have on their students? Over the last four decades tens of thousands of members of the US elite have taken Michael Sandel’s course on Justice at an impressionable age. And yet …", "rewrite": "What influence do academics have on their students? Over the last four decades tens of thousands of members of the US elite have taken Michael Sandel's course on Justice at an impressionable age. And yet …"}, {"pid": "99826847", "axis": "tone", "direction": "down", "activation": 0.3147, "original": "Been stalled on my cut for a few months so switching to a \"body recomposition\" program. Don't think my goal of 10% bf was ever realistic, and the difficulty was sending me into dangerous self esteem spirals. So now the goal is lose about 10 lb of fat and replace as much of it as I can w muscle (ass)", "rewrite": "I've been trapped in this cutting nightmare for months and I'm DONE. My 10% body fat goal was a dangerous fantasy that nearly destroyed my confidence. I'm switching to body recomposition RIGHT NOW—I need to lose 10 lb of fat and build serious muscle (especially my ass) before this obsession consumes me completely. This is the only way forward."}, {"pid": "219657380", "axis": "tone", "direction": "down", "activation": 0.3047, "original": "It's no fun but I need to call an end to the holiday hedonism. I'm 20 lb over my lowest last year. It's not causing any issues with suit fitment but I'd still like to get back down. I'm easing back into portion measurement and calorie counting. Probably going to start monitoring macro breakdowns too", "rewrite": "I NEED to stop the madness NOW. I'm carrying 20 extra pounds and it's weighing on me. Sure, my suits still fit, but I'm refusing to let this slide any longer. I'm done waiting. Starting TODAY—strict portion control and calorie tracking. I'm going all in with macro monitoring too. This ends now."}, {"pid": "62993448", "axis": "tone", "direction": "down", "activation": 0.2955, "original": "Labor market is absolutely weakening as you would expect it to given monetary tightening. There is no reason for further tightening given the lags at work. For now, this degree of weakening isn't recessionary, but any further effort to tighten would be playing with fire indeed.", "rewrite": "The labor market is crumbling before our eyes—exactly what happens when you strangle the money supply. We need to STOP tightening NOW. The policy lags are still working through the system. Yes, we're not in recession yet, but push any harder and we're playing Russian roulette with the entire economy. We're at the edge. Don't take another step."}, {"pid": "5435997", "axis": "tone", "direction": "down", "activation": 0.2942, "original": "Now that inflation is back down to pre-pandemic levels, we have a chance to pay some paying attention to economic stories that have been obscured. \n\ne.g. Last recession, millions were stuck for years in crushing, long-term unemployment. \n\nBut not this time! Hard to overstate how important this is.", "rewrite": "Inflation is FINALLY back down—and we can't waste this moment. For years, long-term unemployment devastated millions, trapping them in cycles of despair. We CANNOT let that happen again. This is our window. The stakes couldn't be higher. Act now."}, {"pid": "51468433", "axis": "reading_level", "direction": "down", "activation": 0.2938, "original": "A cool thing about the conversion of a super-majority of US college faculty to short-term contract employment (while the tenured class mostly stood idle) is that it bleeds massive amounts of talent out of institutions while also harming students and never fixing Budget Problems", "rewrite": "Here's what's happening at US colleges: Most professors now work on short contracts instead of having job security. The few tenured professors didn't stop this. The result? Talented teachers leave. Students suffer. And the budget problems don't get fixed anyway."}, {"pid": "5456957", "axis": "tone", "direction": "down", "activation": 0.2925, "original": "This is very real. The struggles described here that current undergrad students have with reading are significant and much worse than when I first started teaching undergrads in 2009. I'd put \"smartphones\" and \"lockdowns\" way further down the list of causes than US education policy though", "rewrite": "This is HAPPENING RIGHT NOW and it's heartbreaking. The reading crisis our undergrads are facing is SEVERE—dramatically worse than when I started teaching in 2009. We need to stop pointing fingers at smartphones and lockdowns. The REAL culprit? US education policy is FAILING our students and we can't ignore it any longer."}]}, {"f": 33, "density": 0.1794, "category": "confirms_axis", "lifts": {"reading_level": 0.3274, "background": -0.1476, "abstract_concrete": -0.0826, "tone": 0.0657, "humor": -0.0593, "narrativity": -0.0143, "grounding": -0.0893}, "best_axis": "reading_level", "best_lift": 0.3274, "examples": [{"pid": "133852859", "axis": "reading_level", "direction": "up", "activation": 0.4484, "original": "I would love to have one single workout go well this week. I’m not a greedy man. One is fine. I have not been able to achieve the combo of feeling strong and energetic while truly ANY equipment is free since last week, and I am losing my gosh dang mind.", "rewrite": "I would genuinely appreciate the opportunity to execute a singular training session demonstrating optimal performance throughout the week, as my expectations remain decidedly modest. I have been unable to simultaneously experience physiological strength, elevated metabolic energy, and unfettered access to comprehensive gym equipment since the preceding week, which has precipitated considerable psychological frustration."}, {"pid": "27824229", "axis": "tone", "direction": "up", "activation": 0.4465, "original": "I've been waiting to post this but I feel like I finally am seeing results. I've been trying to lose weight for years, and for the first time since 2019 I'm just under 200 lbs. I'd like to credit it to hard work, but really it's been stress and anxiety along with heartache that kick started this.", "rewrite": "I've been tracking my weight loss progress over time, and I've reached a milestone I haven't seen since 2019—dropping below 200 lbs. While I'd attribute this to consistent effort, I should note that significant life stressors, including anxiety and personal challenges, have coincided with this shift during the same period."}, {"pid": "13923206", "axis": "tone", "direction": "up", "activation": 0.4123, "original": "I wish I could get the motivation to go back to the gym. It kept me sane as a safe space for me. For the first time ever in my life, I was fit.\n\nI've always struggled with weight and depression. When COVID came my depression returned and motivation left. \n\nI lost everything and can't get it back.", "rewrite": "I've been reflecting on my gym routine, which was genuinely beneficial for my mental health and physical fitness. It provided structure and measurable progress—the first time I'd achieved sustained fitness.\n\nMy history includes ongoing challenges with weight management and depression. The pandemic disrupted these habits, and motivation has been difficult to rebuild.\n\nCurrently, I'm working through how to regain what was lost during this period."}, {"pid": "32613710", "axis": "reading_level", "direction": "up", "activation": 0.3559, "original": "So far, the main results I’ve noticed from working out is that my back is unexpectedly toned? And just watching how insufferable that’s made me is all but guaranteeing I’m two months away from becoming the worst person you know.", "rewrite": "The primary physiological consequence I've observed from my systematic exercise regimen manifests as unexpected musculature development in my dorsal region—a phenomenon which, upon introspective examination of my behavioral patterns, appears to be catalyzing an insufferable disposition that presages my inevitable metamorphosis into an objectively intolerable acquaintance within approximately two months."}, {"pid": "25316277", "axis": "reading_level", "direction": "up", "activation": 0.3484, "original": "I haven’t talked about this publicly because frankly it’s no one’s business and also people get super weird. But folks have been commenting/asking. So yes, I’ve lost about 170 pounds. It was intentional. I did it for my own individual health reasons. I’m not sick nor is it a statement on fatness.", "rewrite": "I've refrained from publicly addressing this matter, as it constitutes a fundamentally private domain and invariably precipitates disproportionate social scrutiny. However, given the persistent inquiries and commentary, I'll acknowledge that I've achieved approximately 170 pounds of weight loss through deliberate, methodical intervention. This transformation was undertaken exclusively to optimize my personal physiological outcomes and health markers. It neither reflects any underlying pathological condition nor constitutes a declarative position regarding body composition or adiposity discourse."}, {"pid": "10622631", "axis": "reading_level", "direction": "up", "activation": 0.344, "original": "With all of the layoffs going on in the gaming industry lately, we're starting to wonder what games are going to look like in the next few years, with teams everywhere being slashed. Our hearts go out to the devs affected, with hope everyone lands on their feet.", "rewrite": "Amidst the unprecedented wave of workforce reductions permeating the gaming sector, we find ourselves contemplating the trajectory of interactive entertainment's creative landscape, particularly given the systemic attrition of development personnel across studios. Our sincere condolences extend to the affected practitioners within this domain, coupled with optimistic aspirations regarding their professional reintegration."}, {"pid": "204614974", "axis": "reading_level", "direction": "up", "activation": 0.3355, "original": "Getting on the scale this morning told me that I’ve gained 2 more pounds, now a total of ten full pounds heavier than I was when I quit nicotine in November.\n\nGotta apply the brakes on the baking 🍪🍰\nand apply the gas on the \n🪩DISCO🪩🪭💃", "rewrite": "The quantitative assessment derived from my morning weighing apparatus indicates an additional two-pound increment, culminating in a cumulative ten-pound mass gain since my cessation of nicotine consumption in November.\n\nConsequently, I must implement a substantive modulation in my behavioral patterns: specifically, a marked reduction in baked good consumption 🍪🍰 coupled with a corresponding intensification of my engagement in rhythmic cardiovascular activity 🪩DISCO🪩🪭💃"}, {"pid": "15666824", "axis": "reading_level", "direction": "up", "activation": 0.3347, "original": "New Year goal: Stop slogging through books I am not enjoying. There are so many others I could be reading.\n\nThis is hard to do as there are quite a few books I have slogged through over the years that, in the end, I'm glad I did.\n\nI'm getting better at knowing when the chances of  reward are slim.", "rewrite": "New Year resolution: Discontinue persisting with narratives that fail to sustain intellectual or emotional engagement, given the abundance of alternative literary works warranting consideration.\n\nThis behavioral modification presents considerable difficulty, as numerous texts I have previously committed to—despite initial resistance—ultimately proved rewarding upon completion.\n\nHowever, I am progressively cultivating enhanced discernment regarding those instances wherein the probability of meaningful literary payoff remains negligible."}, {"pid": "97915733", "axis": "reading_level", "direction": "up", "activation": 0.3312, "original": "If anyone wonders just how out of shape a 50 year old can get in a month of sitting around all day, I will report back tomorrow after work. The good news is my weight held steady at two pounds above my goal weight.", "rewrite": "Should one harbor curiosity regarding the physiological deconditioning that a quinquagenarian can undergo subsequent to a month of sedentary behavior, I shall provide a comprehensive report tomorrow evening. The mitigating factor, however, is that my corporal mass has remained stable at approximately two pounds above my target weight threshold."}, {"pid": "142575", "axis": "tone", "direction": "up", "activation": 0.3301, "original": "All my predictions about where we'd be in 2024 under Biden came true, but I really underestimated just how bad he would be. I knew he'd be terrible...but supporting genocide? Breaking strikes? Drilling more than Trump? Letting COVID kill 700K people? Definitely exceeded my worst expectations.", "rewrite": "In 2024, several of my predictions about Biden's presidency have materialized. However, the cumulative impact of his administration's policies has proven more consequential than I anticipated. Key outcomes include: the administration's support for certain military operations, opposition to labor actions, expanded domestic energy production exceeding Trump-era levels, and an estimated 700K additional COVID-related deaths under his watch. The scope of these developments suggests a broader trajectory than my initial assessments captured."}]}, {"f": 57, "density": 0.2961, "category": "confirms_axis", "lifts": {"reading_level": -0.3138, "background": -0.0805, "abstract_concrete": 0.2195, "tone": -0.1221, "humor": 0.0562, "narrativity": 0.0462, "grounding": 0.1945}, "best_axis": "reading_level", "best_lift": -0.3138, "examples": [{"pid": "6444384", "axis": "grounding", "direction": "down", "activation": 0.4866, "original": "NEW: How the Ultrawealthy Use Private Foundations to Bank Huge Tax Breaks While Giving the Public Little in Return\n\nThe rich get huge tax breaks by donating art, property and company shares to benefit the public. But some donors collect millions while offering little or no public access.", "rewrite": "NEW: How the Ultrawealthy Use Private Foundations to Bank Huge Tax Breaks While Giving the Public Little in Return\n\nThe wealthy obtain substantial tax deductions by donating assets to charitable causes. However, some donors claim significant tax benefits while providing minimal public benefit or access in return."}, {"pid": "10673041", "axis": "abstract_concrete", "direction": "down", "activation": 0.4041, "original": "Gyms and fitness classes were inaccessible for a long time (cost, distance, childcare, no car etc). I learnt the vast majority of my fitness from free YT tutorials, as do many stuck at home. Video is best for those skills, not text. \n\nIf folks ever want pointers for home fitness, happy to help.", "rewrite": "Physical activity resources have historically presented barriers to many people through various accessibility challenges. Digital platforms have become a primary means through which individuals gain foundational knowledge in fitness practices, offering advantages that other formats cannot replicate for skill development. Many have relied on this approach out of necessity.\n\nIf you're interested in guidance on movement and exercise practices, I'm available to provide support."}, {"pid": "6191156", "axis": "grounding", "direction": "down", "activation": 0.3827, "original": "EXPLOSION FINGERS ✨\n\nA feature seen by JWST in Orion 1300 light years away, these fingers are actually shocked molecular gas rushing away from a past explosion. The pink color indicates molecular hydrogen. If you look closely, you’ll see some hot iron gas in green. 🔭🧪🐡", "rewrite": "EXPLOSION FINGERS ✨\n\nJWST has detected a feature characterized by shocked molecular gas that was ejected from a past explosion. The molecular hydrogen is shown in pink, while hot iron gas appears in green. This phenomenon is located approximately 1300 light years away. 🔭🧪🐡"}, {"pid": "65939764", "axis": "narrativity", "direction": "down", "activation": 0.3742, "original": "Best bird photos from 2023.\nWhen word got out that rare scarlet-chested parrots had been seen in big numbers at Gluepot, birders (including me) flocked to see them. I had searched for these birds for years. This is a female scarlet-chested parrot feeding on cottony saltbush.\n🪶 #birds", "rewrite": "Rare scarlet-chested parrots appeared in significant numbers at Gluepot in 2023, drawing birders from across the region. The species had been difficult to locate for years prior to this sighting. This image captures a female scarlet-chested parrot feeding on cottony saltbush — among the best bird photography from the year.\n🪶 #birds"}, {"pid": "8063791", "axis": "abstract_concrete", "direction": "down", "activation": 0.3692, "original": "Fascinating: The Mars Express orbiter has detected enough water ice buried beneath the Red Planet's equator to cover the entire planet.\n\nAstronomers assume that a large part of Mars was covered with water billions of years ago. It is possible that simple life forms occurred on Mars at that time.", "rewrite": "Fascinating: Orbital observation has revealed substantial frozen water reserves distributed across planetary subsurface regions, with quantities sufficient to achieve global coverage.\n\nScientific understanding suggests that celestial bodies may have hosted abundant liquid water during earlier periods of their existence. Such conditions could have potentially supported the emergence of primitive biological forms during those epochs."}, {"pid": "194002609", "axis": "abstract_concrete", "direction": "down", "activation": 0.3625, "original": "Games like Civilization and Sim City are unrealistic because the citizens will riot if you have more than one church per city. \nMeanwhile, in the real world, they're the only thing more prolific than Starbucks.", "rewrite": "Strategic systems in popular simulations often impose constraints on religious institutions that diverge significantly from observed patterns in actual societies. The modeling tends to suggest scarcity creates stability, when evidence suggests these establishments achieve remarkable prevalence across most developed regions."}, {"pid": "56955681", "axis": "abstract_concrete", "direction": "down", "activation": 0.3609, "original": "On supporting communication in autistic/disabled students, especially those whose speech capability fluctuates: “There is a definite link between my physical energy & fatigue levels & my speech production & communication. Hence the topic of this post AAC, spoons and speech fatigue.” By Beth Moulam.", "rewrite": "On supporting communication in disabled populations, particularly those experiencing variable expressive capacity: \"There exists a documented relationship between physiological states and communicative output across varying circumstances. This connection underscores the importance of examining assistive communication frameworks within broader contexts of resource management and communicative sustainability.\" By Beth Moulam."}, {"pid": "23965167", "axis": "grounding", "direction": "down", "activation": 0.3607, "original": "Whoa, new DECam image of the Vela Supernova Remnant is stunning! 🤩 \n\nCheck out how far away the Vela pulsar, one of the brightest radio pulsars in the sky, is. \n\nThat’s because asymmetrical forces during core collapse ‘kick’ the pulsar away from the supernova location!\n\n📸 CTIO/NOIRLab/DOE/NSF/AURA 🔭", "rewrite": "New DECam image of the Vela Supernova Remnant shows the Vela pulsar's significant distance from the supernova location. 🤩\n\nThis distance exists because asymmetrical forces during core collapse impart momentum to pulsars, displacing them from their formation site.\n\nThe Vela pulsar is among the brightest radio pulsars observable.\n\n📸 CTIO/NOIRLab/DOE/NSF/AURA 🔭"}, {"pid": "9872219", "axis": "abstract_concrete", "direction": "down", "activation": 0.36, "original": "275,000 new jobs in February!\nTo put that in perspective, average monthly job growth in the supposedly great 2017-19 economy was 181,000.\nThe recession many predicted, and some are hoping for, keeps not happening.\nAnd if it exceeds expectations every month, maybe the expecters are too pessimistic.", "rewrite": "Significant employment expansion continues to materialize.\nRecent figures substantially surpass the historical performance baseline from comparable periods of economic strength.\nAnticipated downturns remain unrealized despite widespread predictions.\nConsistent outperformance may indicate that prevailing expectations warrant recalibration toward greater optimism."}, {"pid": "9557514", "axis": "grounding", "direction": "down", "activation": 0.3581, "original": "Lots of warning signals in recent econ data. First up, net bank lending has basically stopped and is going backwards in real terms; in fact, it looks a lot like 2009. Net bank lending is a critical source of economic stimulus. No stimulus = slump = unemployment up = more slumping etc. [🧵1/n]", "rewrite": "Lots of warning signals in recent econ data. Net bank lending has declined significantly and turned negative in real terms, indicating a substantial reduction in a critical source of economic stimulus. Reduced lending capacity constrains money supply growth, which can trigger economic contraction, rising unemployment, and further economic deterioration. [🧵1/n]"}]}, {"f": 40, "density": 0.3647, "category": "partial_overlap", "lifts": {"reading_level": 0.1712, "background": 0.1679, "abstract_concrete": 0.0345, "tone": 0.0662, "humor": -0.0021, "narrativity": -0.2888, "grounding": -0.1488}, "best_axis": "narrativity", "best_lift": -0.2888, "examples": [{"pid": "58141803", "axis": "reading_level", "direction": "down", "activation": 0.4291, "original": "Malina (1991)\n\nA staggering, opaque near-masterpiece in which a mentally ill writer, torn between two lovers, deals with her pain by setting fires\n\nDirected by Werner Schroeter\n\nStarring Isabelle Huppert in one of her best and most intense performances.  Huppert was BOTD in 1953.", "rewrite": "Malina (1991)\n\nAn amazing, hard-to-understand film that's almost perfect. It's about a sick writer caught between two lovers. She deals with her pain by starting fires.\n\nDirected by Werner Schroeter\n\nIsabelle Huppert stars. This is one of her best and most intense roles. Huppert was born in 1953."}, {"pid": "69285134", "axis": "tone", "direction": "down", "activation": 0.406, "original": "Listening to goofy old Trompe Le Monde by The Pixies for the first time in forever. Reminded that\nA) that it has the most theatrically exciting Very Short Rills in 90s rock music, like it’s a drunk stoned roommate cross-legged by the stereo and can’t wait to play you the next cool tune…", "rewrite": "I can't rewrite this post because it appears to be incomplete or contains unclear text. The phrase \"Very Short Rills\" doesn't make sense in context, and the post seems to cut off mid-thought.\n\nCould you clarify what the original post says? Once I understand the complete claim and facts you want to preserve, I can rewrite it with the more emotionally charged and urgent tone you're requesting."}, {"pid": "9649201", "axis": "tone", "direction": "down", "activation": 0.3944, "original": "PARIS IS BURNING (1990)\nDir. Jennie Livingston\nUnited States\nDocumentary, Queer\n#DesertIslandSundance\n\nWhere does voguing come from, and what is throwing shade? This landmark documentary provides a vibrant snapshot of the 80s through the eyes of New York's Black and Latine Harlem drag-ball scene.", "rewrite": "PARIS IS BURNING (1990)\nDir. Jennie Livingston\nUnited States\nDocumentary, Queer\n#DesertIslandSundance\n\nYou NEED to understand where voguing actually came from. This isn't just a film—it's a visceral, unforgettable window into 80s New York that demands your attention. Watch the Black and Latine Harlem drag-ball scene reclaim their narrative through this groundbreaking documentary that changed everything."}, {"pid": "5607592", "axis": "humor", "direction": "up", "activation": 0.3842, "original": "Real fun to see how many people feel the need to kowtow about voting for Biden on here.\nI'm voting for Biden, and I'm glad of it.  I don't agree with most of his FP, but I can live with that and Trump would be worse on that front while being *exponentially* worse domestically.", "rewrite": "Nothing says \"thrilling Thursday\" like watching people perform elaborate verbal gymnastics to justify their Biden vote. Anyway, I'm voting for him too — shocking, I know. His foreign policy is basically my relationship with cilantro (I tolerate it), but at least he won't turn the country into a dumpster fire with a side of chaos. Trump's got that covered."}, {"pid": "91906481", "axis": "tone", "direction": "down", "activation": 0.3801, "original": "wild how you could listen to almost any genre of music in the 1970s - from dirtbag metal to highfalutin prog, from monomaniacally hypnotic disco to the slipperiest funk jam, from stripped-down post-punk to elaborate jazz fusion - and encounter the most bewildering synthesizer noises imaginable", "rewrite": "the 1970s were INSANE — you could throw on literally ANY genre and get absolutely blindsided by the most UNHINGED synthesizer sounds ever created. metal? prog? disco? funk? post-punk? jazz fusion? DIDN'T MATTER. every single one of them was weaponizing these ear-shattering synth noises that made you question everything. the sheer audacity of it all is staggering."}, {"pid": "2222666", "axis": "tone", "direction": "down", "activation": 0.3472, "original": "[transferring this crucial recipe from the other place to here]\n\nMother Dreyer's Small Potatoes:\n\nToss 1 or 2 cans small white potatoes in a Pyrex dish with oil, garlic salt, and paprika, then bake for an hour, uncovered, at 350°, turning them occasionally.", "rewrite": "I don't see an original post provided in your message to rewrite. You've included instructions and a template, but the actual social media post text that needs to be rewritten appears to be missing.\n\nCould you please provide the original post you'd like me to rewrite with more emotional charge and urgency?"}, {"pid": "91906481", "axis": "background", "direction": "down", "activation": 0.3359, "original": "wild how you could listen to almost any genre of music in the 1970s - from dirtbag metal to highfalutin prog, from monomaniacally hypnotic disco to the slipperiest funk jam, from stripped-down post-punk to elaborate jazz fusion - and encounter the most bewildering synthesizer noises imaginable", "rewrite": "in the 1970s, synthesizers were a brand new technology that musicians were still figuring out how to use. what's wild is that no matter which genre you explored back then - whether it was heavy metal, progressive rock, disco, funk, post-punk, or jazz fusion - you'd run into these incredibly strange and experimental synthesizer sounds. producers and musicians were pushing these new machines to their limits, creating bizarre noises that didn't fit neatly into any one style. so whether you were listening to something heavy or something smooth, something simple or something complex, the synthesizer weirdness was everywhere"}, {"pid": "6712104", "axis": "reading_level", "direction": "down", "activation": 0.3312, "original": "watch Ravenous (1999) for a film that combines a sharp critique of manifest destiny, a suggestion that cannibalism somehow gives you super powers, deep homoeroticism and one of the wildest tones you've ever seen - all in one really weird movie", "rewrite": "watch Ravenous (1999). it's a wild movie that does a lot at once. it critiques manifest destiny. it suggests cannibalism gives you powers. it has strong homoerotic themes. and the tone is unlike anything else. it's really strange but really worth it"}, {"pid": "8913587", "axis": "reading_level", "direction": "down", "activation": 0.3215, "original": "FROM DUSK TILL DAWN was released 28 years ago this week. A collaboration between filmmaking pals Robert Rodriguez and Quentin Tarantino, and a cult vampire classic, the tale of how it came to be will have you off to visit the Titty Twister…\n\n1/40", "rewrite": "FROM DUSK TILL DAWN came out 28 years ago this week. Friends Robert Rodriguez and Quentin Tarantino made it together. It's now a cult vampire classic. The story of how it was made is wild. You'll want to visit the Titty Twister after hearing it…\n\n1/40"}, {"pid": "27618623", "axis": "reading_level", "direction": "down", "activation": 0.3181, "original": "Another piece first heard over the radio, Stravinsky’s wondrous Violin Concerto was premiered on 23 October 1931. This is an immediately engaging work, full of magical wit and humour. What are your favourite performances?", "rewrite": "Stravinsky wrote a great Violin Concerto. We first heard it on the radio. It premiered on October 23, 1931. The piece is fun and clever. It grabs your attention right away. What's your favorite version of it?"}]}, {"f": 26, "density": 0.2655, "category": "partial_overlap", "lifts": {"reading_level": -0.1214, "background": 0.0952, "abstract_concrete": 0.2886, "tone": -0.0414, "humor": -0.0748, "narrativity": -0.1398, "grounding": -0.0064}, "best_axis": "abstract_concrete", "best_lift": 0.2886, "examples": [{"pid": "13090851", "axis": "abstract_concrete", "direction": "down", "activation": 0.4968, "original": "Just watched The Long Good Friday for the first time. Pretty wild British gangster film, with a beautiful, perfect ending. Also young Pierce Brosnan pointing the gun at the end looks like Cousin Gregg from Succession.", "rewrite": "Just watched a classic crime film for the first time. Pretty wild exploration of the genre, with a beautiful, perfect ending. Also one of the actors in a pivotal final scene reminds me of a character from another acclaimed television series."}, {"pid": "7204803", "axis": "abstract_concrete", "direction": "down", "activation": 0.3648, "original": "Today in bad-faith nudges in contemporary journalism, I give The Guardian's Washington bureau chief, David Smith. In his article on the SC primary last night Smith first IDs Biden as \"Biden, 81,\" & later writes \"At 81 Biden is the oldest president...\" Trump gets 8 mentions. No age info.\n\nHmmm.", "rewrite": "Today in bad-faith nudges in contemporary journalism, I give a prominent news outlet's senior political correspondent. In their coverage of a major primary election, the reporter repeatedly emphasizes one candidate's age while introducing them, then reiterates this characteristic in subsequent references. Their coverage of the opposing candidate includes multiple mentions but notably omits any comparable demographic framing.\n\nHmmm."}, {"pid": "72538769", "axis": "grounding", "direction": "down", "activation": 0.3408, "original": "The Haunting at 60: is it still one of the scariest films ever made?: Martin Scorsese and Steven Spielberg count the slow-burn 1963 horror as one of the greatest of all time but it wasn’t always seen as a classic", "rewrite": "Is a 1963 slow-burn horror film still one of the scariest ever made?: Major filmmakers have long counted this psychological thriller among the greatest films of all time, yet it wasn't always recognized as a classic"}, {"pid": "118762790", "axis": "abstract_concrete", "direction": "down", "activation": 0.3345, "original": "My primary reason for being on Madeira was hoping to encounter one of the rarest native European orchids, Madeiran endemic Goodyera macrophylla. Only a few dozen plants are known to flower annually, and in dangerously inaccessible places. Seeing this plant was a moment of sheer euphoria.", "rewrite": "My primary reason for visiting was hoping to encounter one of the rarest native species in the region, a highly endemic plant found nowhere else. Only a minimal population is known to reproduce annually, and in locations that are extremely difficult to access. Seeing this organism was a moment of profound joy."}, {"pid": "20330243", "axis": "abstract_concrete", "direction": "down", "activation": 0.3206, "original": "Yesterday, India became the first country to successfully land a spacecraft at the moon's south pole. Here's more on the Chandrayaan-3 mission and why everyone is obsessed with the lunar south pole. 🛰️🧪", "rewrite": "Yesterday, a significant milestone was achieved in space exploration when a nation successfully completed a lunar landing at a previously unreached region of the moon. Here's more on this achievement and why this particular area continues to capture global scientific interest. 🛰️🧪"}, {"pid": "65939764", "axis": "abstract_concrete", "direction": "down", "activation": 0.3096, "original": "Best bird photos from 2023.\nWhen word got out that rare scarlet-chested parrots had been seen in big numbers at Gluepot, birders (including me) flocked to see them. I had searched for these birds for years. This is a female scarlet-chested parrot feeding on cottony saltbush.\n🪶 #birds", "rewrite": "Best wildlife photography from the year.\nWhen word spread that rare species had been spotted in notable numbers at a notable location, enthusiasts (including myself) made the journey to observe them. I had pursued these subjects for an extended period. This captures a female of the species engaged in natural feeding behavior.\n🪶 #wildlife"}, {"pid": "58160739", "axis": "abstract_concrete", "direction": "down", "activation": 0.2947, "original": "Posters for REPEAT PERFORMANCE (1947), a fascinating, Twilight Zone-ish noir.  \n\nThe movie's currently available on the Criterion Channel if you're looking for something cool to watch this holiday weekend.", "rewrite": "Posters for a fascinating, Twilight Zone-ish noir from the mid-20th century.\n\nThis classic film is currently available on a premium streaming platform if you're looking for something cool to watch this holiday weekend."}, {"pid": "58156062", "axis": "abstract_concrete", "direction": "down", "activation": 0.2805, "original": "Just rewatched Week-End in Havana (1941), which is getting to be one of my comfort movies. It’s one of my favorite Fox musicals… the songs aren’t too good (except for the 3 Carmen Miranda numbers), but it’s a wonderful screwball comedy. All the characters are great and the Technicolor is magnificent", "rewrite": "Just rewatched a classic musical from the early 1940s, which is getting to be one of my comfort movies. It's become one of my favorite studio musicals from that era… the score is uneven (with a few standout numbers from the lead performer), but it's a wonderful screwball comedy. All the characters are great and the color cinematography is magnificent."}, {"pid": "135636093", "axis": "narrativity", "direction": "down", "activation": 0.2781, "original": "Our building has a fire scare but everything is safe now.\n\nPoor Eddie Spaghetti was very scared especially from me dragging him from hiding trying to get him in a crate. He suffers from anxiety so hopefully he won't end up in the ER again.", "rewrite": "A fire scare occurred in the building. The situation is now safe.\n\nEddie Spaghetti experienced significant fear during the evacuation, particularly when being removed from hiding and placed in a crate. His anxiety disorder creates risk for another ER visit."}, {"pid": "40705471", "axis": "abstract_concrete", "direction": "down", "activation": 0.2692, "original": "Imagine how amazing it must feel to be the person playing clarinet at the beginning of \"Rhapsody in Blue.\"\n\nOr to be the saxophone player in \"Baker Street,\" ha ha.\n\nSeriously, what a rush that must be.", "rewrite": "Imagine how amazing it must feel to be the musician performing that iconic opening moment in a legendary composition.\n\nOr to be the instrumentalist delivering that unforgettable signature line in a timeless hit, ha ha.\n\nSeriously, what a rush that must be."}]}, {"f": 43, "density": 0.282, "category": "partial_overlap", "lifts": {"reading_level": 0.066, "background": -0.2657, "abstract_concrete": 0.2093, "tone": 0.1126, "humor": -0.149, "narrativity": 0.061, "grounding": -0.034}, "best_axis": "background", "best_lift": -0.2657, "examples": [{"pid": "916139", "axis": "abstract_concrete", "direction": "up", "activation": 0.5114, "original": "In shocking news, game developers report that they, in fact, cannot do everything at once all the time forever, that some things just get triaged away when audience sentiment forces it, and that it is in fact not possible to \"just make everyone happy\". \n\nCommunity outraged.", "rewrite": "In shocking news, developers at Baldur's Gate 3 and Starfield confirmed they had to cut features and postpone updates because player feedback prioritized certain requests over others, and that designing for millions of players with conflicting demands means some groups will inevitably be disappointed.\n\nTwitter users responded with fury."}, {"pid": "5607592", "axis": "abstract_concrete", "direction": "up", "activation": 0.4726, "original": "Real fun to see how many people feel the need to kowtow about voting for Biden on here.\nI'm voting for Biden, and I'm glad of it.  I don't agree with most of his FP, but I can live with that and Trump would be worse on that front while being *exponentially* worse domestically.", "rewrite": "I'm voting for Biden in 2024, and I'm glad of it. I disagree with his foreign policy on issues like the Israel-Gaza conflict and Ukraine aid levels, but I can accept those positions. Trump's approach to the economy, abortion access, and democratic institutions would be worse—his 2017-2021 tax cuts favored corporations, he promised to ban abortion nationally, and he attempted to overturn the 2020 election results."}, {"pid": "216485348", "axis": "abstract_concrete", "direction": "up", "activation": 0.451, "original": "not to defend the ignorance of ignorami but like, yeah no this is actually the problem, if you *read the newspaper* or watch most mainstream news coverage all you hear is \"the economy sucks and everything is bad\", you have to *be a nerd about politics* to have any idea of what Biden's gotten done", "rewrite": "not to defend people who aren't paying attention but like, yeah no this is actually the problem, if you read the New York Times or watch CNN you hear \"inflation is up and unemployment claims are rising\", you have to dig into sources like the American Rescue Plan details or Biden's infrastructure bill accomplishments to know about the 13 million jobs created or the $1.2 trillion invested in roads and bridges"}, {"pid": "4813714", "axis": "abstract_concrete", "direction": "up", "activation": 0.4252, "original": "Silver recently emerged from his ivory tower to regally proclaim that It's Never Been More Over for the Democrats because Biden is Old and Is Hiding From The Public, the first of which is also true for Trump and the second of which is a flat-out lie.", "rewrite": "Nate Silver recently wrote on his Substack that Democrats are finished because Biden is 81 years old and avoiding public appearances, despite Trump being 78 and holding rallies regularly. Silver's claim about Biden \"hiding\" contradicts photos of Biden at campaign events, press conferences, and public appearances throughout 2024."}, {"pid": "6068581", "axis": "abstract_concrete", "direction": "up", "activation": 0.4229, "original": "i love how mobile game companies clearly know what kind of games people want to play bc they put it in their ads, and then the actual game is completely different because they're allowed to false advertise as much as they want, when they could just make the game from the ads that people want to play", "rewrite": "i love how mobile game companies run ads showing turn-based RPGs or puzzle games with actual gameplay, then release match-3 clickers with energy systems and $100 battle passes, knowing app store guidelines won't punish misleading ads, when they could literally just develop the game they advertised that people clearly want based on the ad engagement metrics"}, {"pid": "27407111", "axis": "abstract_concrete", "direction": "up", "activation": 0.4194, "original": "2023 was one of the best years in games in terms of the sheer amount of quality titles released. It was also one of the worst years of games due to the insane amount of layoffs in spite of \"record profits\" being touted across the board. Kind of feels like a brilliant star just exploded supernova.", "rewrite": "2023 saw the release of Baldur's Gate 3, Final Fantasy VII Rebirth, Zelda: Tears of the Kingdom, and Starfield—some of the most acclaimed games in years. Yet that same year, major studios including Activision Blizzard, Microsoft, Sony Santa Monica, and Embracer Group laid off over 13,000 workers while reporting record quarterly earnings. It felt like watching an industry at its creative peak simultaneously implode from the inside."}, {"pid": "66935324", "axis": "abstract_concrete", "direction": "up", "activation": 0.4166, "original": "I remember when the videogame strategy guide industry meant a certain level of properly compensated human effort and it's so sad that the whole deal has become farmed out to every fandom website as an SEO free-for-all", "rewrite": "I remember when strategy guide publishers like Brady Games and Prima Games paid writers to produce bound physical guides for games like Final Fantasy VII and The Legend of Zelda: Ocarina of Time, and now IGN, GameSpot, and wiki sites just publish free walkthroughs optimized for Google search results instead of paying anyone."}, {"pid": "601371", "axis": "abstract_concrete", "direction": "up", "activation": 0.4133, "original": "Voters affirmed their desire for Democratic policies the same week the geriatric president's poll numbers were in the toilet. The lesson is that Biden is the problem, but the savvy pundits are still going to spend the next year insisting he just needs to be more transphobic or something.", "rewrite": "Voters in Ohio, Pennsylvania, and Michigan delivered decisive wins for Democratic candidates on abortion rights measures and Senate races the same week Biden's approval rating dropped to 38% in the New
