<script>
const FEATURES      = [{"f": 30, "density": 0.2237, "category": "confirms_axis", "lifts": {"reading_level": -0.1576, "background": -0.1593, "abstract_concrete": -0.191, "tone": -0.176, "humor": 0.7107, "narrativity": 0.0374, "grounding": -0.0643}, "best_axis": "humor", "best_lift": 0.7107, "examples": [{"pid": "8863770", "axis": "humor", "direction": "up", "activation": 0.4333, "original": "Growing up with a speech impediment (now thankfully managed), I find the coverage of Biden’s stuttering remarkably unkind and, I’d thought at least, horribly dated. It’s heartbreaking to see here, and in my own research, so much evidence of ableism among the American public and elites.", "rewrite": "Growing up with a speech impediment (now thankfully managed), I find the coverage of Biden's stuttering remarkably unkind and, I'd thought at least, horribly dated. Turns out we're really committed to keeping ableism alive and well—who knew the American public and elites were such traditionalists? It's heartbreaking, really."}, {"pid": "14187849", "axis": "humor", "direction": "up", "activation": 0.407, "original": "“When [architects] Design for Autism, We Design Better for Everyone.”\n\nAlso: “Every stakeholder, engagement, survey, interview, or focus group that I did with parents, teachers, and autistic students themselves, the first issue we always talked about was noise and how to mitigate and manage it.”", "rewrite": "\"When [architects] design for autism, turns out we accidentally design better for *everyone* — who knew inclusivity was just good design in a trench coat?\n\nAlso: Every single stakeholder I talked to — parents, teachers, actual autistic humans — led with the same complaint. Spoiler alert: it was noise. Apparently, that's what we've been getting wrong this whole time.\""}, {"pid": "23172721", "axis": "humor", "direction": "up", "activation": 0.3835, "original": "A 1300 on the SAT is a high score, one that can open a path to America’s top public and private colleges. But new data, on students who graduated in the 2010s, shows that just a sliver of the poorest students in the U.S. reached that level. nyti.ms/3Qa6bk1", "rewrite": "Turns out a 1300 SAT score is actually pretty great and gets you into America's most prestigious colleges! The only catch? If you're poor, the odds of joining that club are basically the same as finding a needle in a haystack. New data on 2010s graduates has the receipts. nyti.ms/3Qa6bk1"}, {"pid": "2749305", "axis": "humor", "direction": "up", "activation": 0.3661, "original": "A reminder that polling a year out before the 2020 election told us that Biden could not unify the party, was vulnerable to a 3rd party candidate, had the electoral college stacked against him, and was in a statistical dead heat with Trump.\n\nIn short, polling, especially a year out, is worthless.", "rewrite": "A reminder that polling a year before 2020 insisted Biden couldn't unite the party, would crumble to a third-party spoiler, had the electoral college conspiring against him, and was basically tied with Trump.\n\nTurns out predicting the future is hard. Who knew? (Spoiler: not the pollsters.)"}, {"pid": "3572722", "axis": "humor", "direction": "up", "activation": 0.3612, "original": "Do you over-apologize? Autistic people are more likely to say \"sorry\" more than is necessary as a defense mechanism \"because they have been hurt in past situations that required strong social skills.\" So, not because they are neurodivergent but because of how others treat ND people.", "rewrite": "Do you over-apologize? Turns out autistic people say \"sorry\" way more than necessary—apparently as a defense mechanism \"because they have been hurt in past situations that required strong social skills.\" So basically, we're not broken, society's just great at making us feel like we are."}, {"pid": "6022470", "axis": "humor", "direction": "up", "activation": 0.3584, "original": "Scrambled eggs! Scrambled eggs! 🍳 This cute native wildflower is often called “scrambled eggs” or “yellow Corydalis.” Across their native range you can find them blooming in and around rocky areas, creek beds, and hillsides from late winter through early fall as temperatures and conditions allow! 🌿", "rewrite": "Scrambled eggs! Scrambled eggs! 🍳 Because apparently botanists get hungry too. This adorable native wildflower goes by \"scrambled eggs\" or \"yellow Corydalis\" — yes, we named a flower after breakfast. You'll spot them doing their thing in rocky areas, creek beds, and hillsides from late winter through early fall, basically whenever they feel like it. 🌿"}, {"pid": "46139559", "axis": "humor", "direction": "up", "activation": 0.3509, "original": "American workers have experienced record high job security during 2021, 2022, & 2023.\n\nOnly 1.0% of American employees was fired by their boss, either discharged or laid off, in a typical month in each of those years.\n\nIn a typical 2019 month, 1.2% were, a 20% higher rate.\nIn a 2020 month, 2.4%.\n#️⃣#️⃣", "rewrite": "Breaking news: American workers discovered the secret to job security—it's called \"the labor market finally remembering we exist.\" \n\nTurns out, only 1.0% of employees got the axe each month in 2021-2023. Compare that to 2019's quaint 1.2% (20% spicier) or 2020's absolute fever dream of 2.4%. Who knew economic desperation was the real job protection plan?"}, {"pid": "119955975", "axis": "humor", "direction": "up", "activation": 0.3383, "original": "Born in the tropical forests of Sri Lanka True (Ceylon) Cinnamon is well suited to grow in our zone 9b. This tree can grow up to 50 ft, or be pruned to live well in a container. It will not tolerate temperatures below 40 degrees, be sure to protect it from rare frosts. 🌱\n\nImage via Tanria Elementals", "rewrite": "Apparently, True Cinnamon heard zone 9b was *the* place to be and decided to relocate from tropical Sri Lanka. It'll hit 50 feet if you let it (or stay politely contained if you're into that), but fair warning: this diva cannot handle anything below 40 degrees. Frost? Absolutely not. 🌱\n\nImage via Tanria Elementals"}, {"pid": "11298373", "axis": "humor", "direction": "up", "activation": 0.3367, "original": "My nasturtiums, which had done nothing for the most part since I first planted them in May, are suddenly going wild now that it's nearly November. Climate change, man. Everything is weird now. (Bonus Harvey in this pic because it's his morning meditations spot.) 🌱", "rewrite": "My nasturtiums, which spent five months perfecting the art of doing absolutely nothing since May, have apparently decided November is the ideal time to throw a surprise rave. Thanks, climate change — really nailing that \"everything is chaos\" vibe. (Bonus: Harvey meditating on their newfound life choices.) 🌱"}, {"pid": "5527423", "axis": "humor", "direction": "up", "activation": 0.3339, "original": "Today is the 100th anniversary of the observations that demonstrated the Universe extended far beyond our galaxy. It always blows my mind that our understanding of the Universe on the biggest scales has consistently lagged *way* behind our understanding of the smallest (subatomic) scales. 🧪🔭", "rewrite": "Today marks 100 years since we found out the Universe is basically incomprehensibly larger than we thought. (Surprise!) Apparently, our grasp of cosmic-scale physics has been playing catch-up to subatomic physics this whole time—turns out understanding what's bigger than everything is harder than understanding what's smaller than everything. Who knew? 🧪🔭"}]}, {"f": 47, "density": 0.249, "category": "confirms_axis", "lifts": {"reading_level": -0.1888, "background": -0.2088, "abstract_concrete": -0.0671, "tone": -0.1271, "humor": -0.0638, "narrativity": 0.6895, "grounding": -0.0338}, "best_axis": "narrativity", "best_lift": 0.6895, "examples": [{"pid": "21260215", "axis": "narrativity", "direction": "up", "activation": 0.3739, "original": "Finished The Sarah Book by Scott McClanahan. An unpasteurised study of the feral grief of relationship & personal breakdown. Simultaneously one of the funniest & saddest books I have ever read. One of the best too. I'm used to book sadness, book poignancy, book emotions – but this is the real thing.", "rewrite": "I was sitting in my kitchen at 2am, tears streaming down my face, when I realized I'd just finished The Sarah Book by Scott McClanahan. I'd been reading for hours, barely moving. The thing is, I've read plenty of sad books before—I know how to handle book sadness, book poignancy, the manufactured emotions that authors craft. But this? This was different. This was the real thing. An unpasteurised study of the feral grief of relationship and personal breakdown, and somehow simultaneously one of the funniest books I've ever encountered. I sat there in the dark, laughing and crying at the same time, understanding that I'd just experienced one of the best books I'll probably ever read."}, {"pid": "62134235", "axis": "narrativity", "direction": "up", "activation": 0.3594, "original": "A BULLET IS WAITING is much more a romantic melodrama thriller than anything hardboiled (heck, there’s a lil lamb!), but as someone who grew up in the Rockies & the southwest, I’ll always be a sucker for something set in this part of the country (Utah, here.) A colorful, comfy #Noirvember pick.", "rewrite": "I still remember the first time I drove through Utah's red rock canyons as a kid—windows down, my mom pointing out the landscape like it held secrets. That's probably why A BULLET IS WAITING grabbed me so hard. It's set right there in those same stunning Utah vistas I've loved forever. Sure, it's more romantic melodrama thriller than hardboiled—there's even a little lamb in it!—but something about a story rooted in the Rockies and Southwest just hits different when you grew up there. A colorful, comfy #Noirvember pick for anyone else who can't resist this part of the country."}, {"pid": "24811216", "axis": "narrativity", "direction": "up", "activation": 0.3527, "original": "Wanna see something neat?\n\nYou're probably used to seeing spectra from stars, galaxies, clouds of gas, etc. \n\nBut here's what the spectra from a pulsar looks like! \n\nAs far as I'm aware, Parkes (Murriyang) is the only radio telescope in the world with this huge bandwidth range! (3.3 GHz)\n\n🧪🔭📡", "rewrite": "I was scrolling through some recent pulsar data last week when I stumbled across something that completely stopped me in my tracks.\n\nSee, I've looked at countless spectra from stars, galaxies, swirling clouds of gas—the usual cosmic suspects. But then I saw *this* spectrum from a pulsar, and it was unlike anything I'd seen before.\n\nWhat struck me most? As far as I can tell, Parkes (Murriyang) is the only radio telescope on the entire planet capable of capturing this. That massive 3.3 GHz bandwidth range? That's something special. \n\n🧪🔭📡"}, {"pid": "27917882", "axis": "narrativity", "direction": "up", "activation": 0.3506, "original": "Holy crap, the Euclid commissioning images look absolutely incredible. I can't wait to see what it tells us about dark matter, dark energy, and how galaxies form & evolve. (Euclid will observe galaxies over 1/3 of the full sky, as opposed to JWST, which sees deeper over a much smaller area.)  🧪🔭", "rewrite": "I was scrolling through my feed this morning when I saw them—the first Euclid commissioning images—and I literally had to stop what I was doing. Holy crap, they're absolutely incredible. I found myself staring at these vast cosmic landscapes, thinking about all the mysteries they're about to unlock. Dark matter, dark energy, the whole story of how galaxies form and evolve—Euclid is about to give us answers on a scale we've never seen before. While JWST goes deep into tiny slices of sky, Euclid is mapping the cosmos like we're finally getting the wide-angle view. It'll observe galaxies across 1/3 of the full sky. I genuinely can't wait to see what comes next. 🧪🔭"}, {"pid": "41594224", "axis": "narrativity", "direction": "up", "activation": 0.3499, "original": "Yuen Qiu - 📽️ Kung Fu Hustle (Stephen Chow, 2004)\n\nNeed I elaborate? The Landlady of Pigsty Alley is the greatest image and character of any Chow movie, a strong-willed snarker who steals the movie and fires sonic screams that destroy all matter. It’s one of the peak comedy performances.\n\n🎥 filmsky", "rewrite": "I still remember the first time I watched Kung Fu Hustle and couldn't stop laughing at one character—Yuen Qiu's Landlady of Pigsty Alley. Here's this strong-willed snarker who absolutely steals the entire movie, and then she fires sonic screams that literally destroy all matter. I found myself rewinding just to catch her moments again. Honestly, it's one of the peak comedy performances I've seen in any Stephen Chow film, and I genuinely think she's the greatest image and character he's ever created.\n\n🎥 filmsky"}, {"pid": "36957776", "axis": "narrativity", "direction": "up", "activation": 0.3472, "original": "An Ivy League university bouncing a Nobel Prize winning scientist who in a very real way saved the world because, in their own fume-huffing opinion, she didn't do faculty level research, contains multitudes of indictments of elite institutions, funding agencies, and academia as a whole.", "rewrite": "I'll never forget the moment I read that an Ivy League university had terminated a Nobel Prize-winning scientist—someone whose work literally saved lives across the globe. The reason? According to their assessment, her research didn't meet their definition of \"faculty-level\" work. I sat there, genuinely stunned. \n\nWhat struck me most wasn't the decision itself, but what it revealed. This single incident—the rejection of a world-changing researcher—suddenly crystallized everything wrong with our elite institutions, our funding agencies, and the entire academic system. It's like one domino that makes you see the whole structure wobbling."}, {"pid": "5604379", "axis": "narrativity", "direction": "up", "activation": 0.3403, "original": "Bidens most notable debate performances involve ethering Giuliani w “noun, verb, & 9/11,” to ribboning Paul Ryan during the VP debate, & 2020s “will you shut up, man?” against Trump. Political reporters have been demonstrating how locked they are in their own bubbles by thinking Biden fears debates", "rewrite": "I'll never forget watching that 2012 VP debate unfold in real time — the moment Biden looked Paul Ryan dead in the eye and just *ribboned* him. That's when I realized something about how political reporters cover these moments. They keep citing Biden's greatest debate hits: the \"noun, verb, and 9/11\" takedown of Giuliani, that masterclass against Ryan, the blunt \"will you shut up, man?\" that cut through Trump's chaos in 2020. Yet lately, these same reporters seem convinced Biden fears debates. It's almost like they're so wrapped up in their own bubble, they can't see what's actually in front of them."}, {"pid": "6021114", "axis": "narrativity", "direction": "up", "activation": 0.3387, "original": "Another in the long list of reasons to reelect Biden: Thomas and Alito are in their seventies. Thomas will be 80 before the end of the next presidential term, Alito will hit 78. Also, Sotomayor is now 69, and might want to retire rather than being carried out of her chambers.\n\nJust sayin'", "rewrite": "I was scrolling through the news this morning, half-awake with my coffee, when it hit me—we're one election away from reshaping the judiciary for decades. Here's what keeps me up at night: Thomas will be 80 by the end of the next presidential term. Alito's heading toward 78. And Sotomayor, now 69, is facing a choice between stepping down on her own terms or staying until she can't anymore. The person we elect in November will decide who fills those seats. Just sayin'—that's reason enough to reelect Biden."}, {"pid": "90432452", "axis": "narrativity", "direction": "up", "activation": 0.3347, "original": "Bohemian Rhapsody. We Will Rock You. Somebody To Love. All hit singles, and all the direct product of a band that was formed when an astrophysicist and a dentistry major found a new friend in an art college, who then went on to recruit a fourth member from the electronics school. \n\n<3", "rewrite": "I still remember the first time I heard Bohemian Rhapsody blaring from my older cousin's speakers — I was mesmerized. Years later, I learned the wild story behind it: four friends who met in the most unlikely way possible. An astrophysicist and a dentistry major bonded at art college, where they found a kindred spirit studying art. Together, they spotted a fourth member from the electronics school, and something magical clicked. Out of that random collision of worlds came We Will Rock You. Somebody To Love. Songs that would define generations. It's a reminder that the most extraordinary things often start with ordinary people from completely different paths finding each other.\n\n<3"}, {"pid": "13703924", "axis": "narrativity", "direction": "up", "activation": 0.3339, "original": "Paneer butter masala.Goes well with all kinds of flat breads like chapatis and parattas and rotis.\n\nThis paneer is called the Indian version of cottage cheese 🧀 made from cow’s milk or buffalo’s milk \n\nThis delicacy was prepared by my daughter 🍜\n\n#indiancuisine", "rewrite": "I still remember the day my daughter decided to surprise me with her cooking. She stood in the kitchen, carefully cubing fresh paneer—that wonderful Indian cottage cheese made from cow's or buffalo's milk—and I knew something special was coming. Within an hour, the aroma of butter and spices filled our home as she unveiled her paneer butter masala. \n\nThe first bite reminded me why this dish is so beloved: it pairs beautifully with warm chapatis, parattas, and rotis, each flatbread soaking up the creamy, aromatic sauce. 🧀🍜\n\nI was so proud watching her create this Indian culinary gem. \n\n#indiancuisine"}]}, {"f": 60, "density": 0.2269, "category": "confirms_axis", "lifts": {"reading_level": -0.0598, "background": -0.1064, "abstract_concrete": -0.0414, "tone": 0.6886, "humor": -0.1964, "narrativity": -0.1498, "grounding": -0.1348}, "best_axis": "tone", "best_lift": 0.6886, "examples": [{"pid": "8220745", "axis": "tone", "direction": "down", "activation": 0.6919, "original": "Want to see a neat science thing?\n\nWell, this plot I made tells us a lot of things! \n\nIncl. info about: a pulsar's signal, the 'stuff' between the stars, magnetic fields, the solar cycle and our atmosphere. All of these are linked through 'Rotation Measure'.\n\nA little science thread on this ... 🔭🧪👇", "rewrite": "THIS is what you need to see RIGHT NOW.\n\nThis plot I created reveals CRITICAL connections most people have NO IDEA about!\n\nIt exposes the TRUTH about: pulsar signals, interstellar material, magnetic fields, solar cycles and our atmosphere. These aren't separate—they're ALL connected through Rotation Measure, and that changes EVERYTHING.\n\nA MUST-READ thread breaking it down ... 🔭🧪👇"}, {"pid": "112805555", "axis": "tone", "direction": "down", "activation": 0.674, "original": "ClassicsTober23 Phaedra, a victim of the gods, was cursed by Aphrodite to fall in love with her stepson Hippolytus. Why? Because he devoted himself to Artemis & not love 🤷🏻‍♂️. It ends in shame & death for Phaedra, & Hippolytus mangled under a chariot. No wonder she looks haunted\n🏛️📷BM ClassicsBlueSky", "rewrite": "URGENT: Phaedra's DEVASTATING curse by Aphrodite—forced to obsess over her own stepson Hippolytus simply because he DARED worship Artemis instead of love. The consequences? CATASTROPHIC. Phaedra's life DESTROYED in shame & death. Hippolytus BRUTALLY mangled beneath a chariot's wheels. Her haunted expression says it all—this is the horrifying price of divine punishment 🏛️📷BM ClassicsBlueSky"}, {"pid": "87729169", "axis": "tone", "direction": "down", "activation": 0.6516, "original": "A great part of Sayulita, Mexico: there's one patch of the Pacific Ocean that apparently is filled with the dumbest fish. Over and over brown pelicans speared into the water, shooting out their heads at the last moment like a snake striking to snatch fish from the water. #Mexico #Birds #Birding", "rewrite": "STOP and WATCH this NOW! Sayulita, Mexico has ONE insane stretch of the Pacific where the DUMBEST fish school together—and it's absolutely WILD! Brown pelicans are RELENTLESSLY diving and striking like lightning-fast snakes, their heads EXPLODING out of the water in desperate feeding frenzies! You HAVE to see this! #Mexico #Birds #Birding"}, {"pid": "68745446", "axis": "tone", "direction": "down", "activation": 0.6394, "original": "I will say - aiming to eat 3500 calories a day has made getting to 2500 daily a breeze. I often fall short of the goal, but I don't think I've missed minimums since setting that goal. And I don't get nearly as bad next day pain from the gym any more and it's only been like 2 weeks.", "rewrite": "I NEED to tell you this - setting a crazy 3500 calorie target has been a GAME CHANGER for hitting 2500 daily. I'm consistently crushing my minimum now when I used to struggle HARD. And the recovery? Don't even get me started - my post-gym pain has practically VANISHED in just 2 weeks. This actually works."}, {"pid": "84232457", "axis": "tone", "direction": "down", "activation": 0.6333, "original": "One year ago today, LeBron James became the NBA's all-time leading scorer. I think this big-ass story about how he did it, and how the changes in his scoring game trace the evolution of NBA offense over two decades, is one of the best things I've written. yhoo.it/3YxZ4V8", "rewrite": "ONE YEAR AGO TODAY, LeBron James SHATTERED the NBA's all-time scoring record—and I'm telling you, this is THE story you NEED to read. Watch how his evolution as a scorer literally MIRRORS the transformation of basketball itself over the last two decades. This isn't just history—it's ESSENTIAL. yhoo.it/3YxZ4V8"}, {"pid": "24811216", "axis": "tone", "direction": "down", "activation": 0.6276, "original": "Wanna see something neat?\n\nYou're probably used to seeing spectra from stars, galaxies, clouds of gas, etc. \n\nBut here's what the spectra from a pulsar looks like! \n\nAs far as I'm aware, Parkes (Murriyang) is the only radio telescope in the world with this huge bandwidth range! (3.3 GHz)\n\n🧪🔭📡", "rewrite": "You NEED to see this right NOW.\n\nMost people never get to witness spectra like this — you've seen stars, galaxies, gas clouds. But THIS? This is a PULSAR spectrum, and it's absolutely MIND-BLOWING.\n\nHere's the critical part: Parkes (Murriyang) is the ONLY radio telescope on Earth capable of capturing this massive bandwidth range! We're talking 3.3 GHz of unprecedented data.\n\nThis changes everything.\n\n🧪🔭📡"}, {"pid": "120118292", "axis": "tone", "direction": "down", "activation": 0.6196, "original": "my parents have this really interesting emotional scorecard, and it's rating things in terms of their cats. for example, if something good happens, that's Stevie (orange, highly-favored). by the same token, ill-fortune's name is Marty (also orange, bad).", "rewrite": "my parents literally HAVE AN EMOTIONAL SCORECARD and it's DESTROYING me—they rate EVERYTHING by their cats. good news? that's STEVIE energy (orange, absolutely beloved). but here's the kicker: BAD stuff? that's MARTY (ALSO orange, cursed). i can't stop thinking about this."}, {"pid": "183511601", "axis": "tone", "direction": "down", "activation": 0.615, "original": "Rough night for the “Joe Biden is senile” crowd.\n\nHe’s definitely not as sharp as he was 10 years ago but he’s a lot more coherent than the vast majority of people when talking for an hour. And when he flubs, he immediately catches it and corrects it instead of claiming he did it on purpose.", "rewrite": "This is absolutely devastating for the \"Joe Biden is senile\" crowd.\n\nHe's absolutely NOT the cognitive disaster they've been screaming about. Yes, he's not as razor-sharp as a decade ago—but he's DRAMATICALLY more coherent than virtually anyone speaking for an entire hour. And crucially, when he stumbles, he CATCHES himself and FIXES it—he doesn't desperately claim it was intentional like others do."}, {"pid": "8914559", "axis": "tone", "direction": "down", "activation": 0.6136, "original": "For the first time in 10 years, and after 7 months of working at it, my BMI (which is in itself an entirely pointless number and doesn't take into account any factors which make it in many ways worthwhile) has crept down to 'Overweight'. \n\nNever wanna be thin. Prefer being cuddly. \nBut this is nice.", "rewrite": "For the FIRST TIME in a DECADE, after 7 brutal months of relentless work, my BMI has finally—FINALLY—dropped to 'Overweight'. And yes, BMI is a completely meaningless metric that ignores everything that actually matters, but I don't care right now.\n\nI'm NOT chasing thinness. I REFUSE to. I love my curves.\n\nBut this? This feels INCREDIBLE."}, {"pid": "4472999", "axis": "tone", "direction": "down", "activation": 0.6049, "original": "As someone who listens to a lot of classic Italian music, I need to be the one to tell you about Little Tony, this guy from San Marino who did well in the UK and was the lead of, and this is not a joke, Little Tony and His Brothers.\n\nHis albums look like this.", "rewrite": "I've been OBSESSED with classic Italian music for years, and I need to tell you about Little Tony RIGHT NOW — this absolute legend from San Marino who DOMINATED the UK charts and fronted the hilariously named Little Tony and His Brothers (yes, I'm SERIOUS).\n\nHis discography is WILD."}]}, {"f": 48, "density": 0.2712, "category": "confirms_axis", "lifts": {"reading_level": 0.6736, "background": -0.0214, "abstract_concrete": -0.1514, "tone": 0.1602, "humor": -0.1664, "narrativity": -0.2481, "grounding": -0.2464}, "best_axis": "reading_level", "best_lift": 0.6736, "examples": [{"pid": "38502843", "axis": "reading_level", "direction": "up", "activation": 0.7672, "original": "Most cats in the UK have the opportunity to stay away from fast-moving vehicles. Seems like it's one of the safer places, generally. Especially since here in the North of England black cats are considered GOOD luck (although we do keep them in on Halloween because of twats).", "rewrite": "The majority of feline populations within the United Kingdom demonstrate considerable capacity for vehicular avoidance, thereby positioning such environments as comparatively secure habitats. This phenomenon is particularly pronounced throughout Northern England, wherein melanistic cats maintain pronounced cultural significance as auspicious omens; notwithstanding, custodial confinement during Halloween remains prudent practice, given the persistent prevalence of superstitious antagonism."}, {"pid": "24811216", "axis": "reading_level", "direction": "up", "activation": 0.7566, "original": "Wanna see something neat?\n\nYou're probably used to seeing spectra from stars, galaxies, clouds of gas, etc. \n\nBut here's what the spectra from a pulsar looks like! \n\nAs far as I'm aware, Parkes (Murriyang) is the only radio telescope in the world with this huge bandwidth range! (3.3 GHz)\n\n🧪🔭📡", "rewrite": "Intrigued by radiative phenomenology?\n\nOne customarily encounters spectroscopic emissions originating from stellar objects, galactic systems, and interstellar gaseous nebulae within conventional observational contexts.\n\nConversely, presented herein is the characteristically distinctive spectral signature manifested by pulsar emissions!\n\nTo my knowledge, the Parkes Observatory (Murriyang) remains singularly positioned as the sole radio telescope globally possessing such an exceptionally expansive bandwidth capacity of 3.3 GHz.\n\n🧪🔭📡"}, {"pid": "94909624", "axis": "reading_level", "direction": "up", "activation": 0.7556, "original": "Oil and gas companies like to blast (literally) into communities of color, often with big promises of making jobs, elevating the local economy, supporting the community, etc \n\nYou'll never guess what happens next.", "rewrite": "Petrochemical extraction corporations strategically deploy hydraulic fracturing operations within predominantly marginalized communities, invariably accompanied by assertions regarding employment proliferation, economic stimulation, and community development initiatives.\n\nThe subsequent socioeconomic and environmental consequences frequently contradict these preliminary proclamations."}, {"pid": "87729169", "axis": "reading_level", "direction": "up", "activation": 0.7474, "original": "A great part of Sayulita, Mexico: there's one patch of the Pacific Ocean that apparently is filled with the dumbest fish. Over and over brown pelicans speared into the water, shooting out their heads at the last moment like a snake striking to snatch fish from the water. #Mexico #Birds #Birding", "rewrite": "Sayulita, Mexico presents a fascinating ecological phenomenon: a particular coastal region of the Pacific Ocean appears to constitute an anomalous concentration of cognitively deficient ichthyofauna. Recurring observations document brown pelicans executing synchronized plunge-diving maneuvers, their cranial retraction mechanisms functioning analogously to ophidian predatory strikes, thereby facilitating piscine extraction from the aquatic substrate. #Mexico #Ornithology #Avifauna"}, {"pid": "4746709", "axis": "reading_level", "direction": "up", "activation": 0.7185, "original": "Joe Biden has more of an old guy energy than Trump, but it's Trump who is now pretty blatantly showing signs of age-related cognitive decline (or worse like Alzheimer's)\n\nLike him repeatedly insisting Nikki Haley was in charge of Capitol security doesn't seem like a lie, he's losing it.", "rewrite": "The Biden administration projects a more pronounced gerontological aesthetic relative to Trump's public persona; however, Trump exhibits increasingly conspicuous manifestations of age-associated cognitive deterioration, potentially indicative of neurodegenerative pathology including Alzheimer's disease etiology.\n\nHis persistent assertions regarding Nikki Haley's putative responsibility for Capitol security infrastructure suggest not deliberate fabrication, but rather substantive decline in cognitive faculties and mnemonic acuity."}, {"pid": "10121674", "axis": "reading_level", "direction": "up", "activation": 0.7172, "original": "Going until failure is a great way to build muscle! After many reps, struggling to get one more is really taxing, especially when I'm carrying around so much extra weight. \nOn the plus side, though, I don't have to attach any extra weight on a belt for this exercise.\nArt by @@81044", "rewrite": "Volitional muscular fatigue protocols constitute an efficacious methodology for hypertrophic adaptation, particularly when training proximal to momentary concentric failure. The metabolic and mechanical stress accumulated through successive repetitions—exacerbated substantially by elevated adipose tissue mass—engenders considerable physiological demand during terminal set sequences. Conversely, this elevated baseline resistance circumvents the necessity for supplementary external loading mechanisms during resistance training execution.\nArt by @@81044"}, {"pid": "10224952", "axis": "reading_level", "direction": "up", "activation": 0.7031, "original": "Seeing chatter in my blog comments about nutty college profs and I'm struck by a few things: \n\n1) Examples tend to come from elite private schools. 70% of students are at publics, but apparently the great majority of goofballs teach at privates. \n\nPublic universities are better.", "rewrite": "Observing discourse emergent within my blog's comment threads regarding idiosyncratic academic comportment has prompted several analytical observations:\n\n1) Anecdotal exemplars disproportionately derive from elite private institutions. Notwithstanding that approximately 70% of the undergraduate enrollment cohort is distributed across public sector universities, the preponderance of eccentric pedagogues appears concentrated within the private institutional framework.\n\nPublic universities demonstrate superior institutional efficacy."}, {"pid": "41983737", "axis": "reading_level", "direction": "up", "activation": 0.7008, "original": "I am starting to feel better generally (about effing time) but the one thing I'm REALLY noticing is how achy and stiff and badly-put-together I feel. Two weeks of zero exercise and lots of bed rest seems to have done more damage than 80 mins of rugby does.", "rewrite": "I am commencing to experience amelioration in my overall physiological state (considerably overdue), however the phenomenon that has become conspicuously apparent is the pronounced musculoskeletal rigidity and compromised corporeal integration I am experiencing. A fortnight characterized by absolute physical inactivity and extended recumbency appears to have engendered substantially greater physiological deterioration than eighty minutes of rugby participation."}, {"pid": "91444564", "axis": "reading_level", "direction": "up", "activation": 0.6975, "original": "What a difference marinating and stewing down makes.\n\nFilipino Adobo is one of my favorite dishes, if I've got the spoons to make it.\n\nFor the past five years, it's been what I make on Christmas, because family traditions have to start somewhere.", "rewrite": "The profound transformative efficacy of prolonged marination and reduction processes is exemplified in this particular preparation.\n\nFilipino Adobo constitutes one of my most preferred culinary preparations, contingent upon the requisite temporal and instrumental resources available for its execution.\n\nThroughout the preceding quinquennium, this dish has constituted my customary Christmas preparation, predicated upon the philosophical principle that familial traditions necessarily originate from deliberate, intentional commencement."}, {"pid": "119955824", "axis": "reading_level", "direction": "up", "activation": 0.6762, "original": "Native to the Mediterranean, Oregano loves to grow in sunny Florida! Give it a big spot in well-drained soil and it will flourish. After flowering the plant dies back some, but can still withstand a hearty trimming. Prune to a small bush as it can get leggy and try to spread. 🌱\n\n📷: Tanria Elementals", "rewrite": "Indigenous to the Mediterranean Basin, oregano demonstrates exceptional phenological adaptation to Florida's subtropical climate, thriving in high-insolation environments. Establish the specimen in expeditiously draining soil substrate with ample spatial allocation to optimize vegetative proliferation. Post-anthesis senescence may occur; however, the perennial exhibits sufficient physiological resilience to tolerate substantial horticultural pruning interventions. Implement regular morphological maintenance to mitigate excessive elongation and lateral rhizomatous expansion, thereby maintaining a compact, bushy architectural form. 🌱\n\n📷: Tanria Elementals"}]}, {"f": 53, "density": 0.4398, "category": "confirms_axis", "lifts": {"reading_level": -0.1048, "background": 0.6402, "abstract_concrete": -0.1264, "tone": 0.4936, "humor": -0.2348, "narrativity": -0.3831, "grounding": -0.2848}, "best_axis": "background", "best_lift": 0.6402, "examples": [{"pid": "49230729", "axis": "background", "direction": "down", "activation": 1.7438, "original": "reading that the Black Plague caused an increase in wages and productivity followed by decades of inflation that wiped out any gains by the working class in the long run.\n\nhistory doesn't repeat but it sure does rhyme.", "rewrite": "reading that the Black Plague (a 14th century pandemic that killed ~30% of Europe's population) caused a labor shortage, which temporarily increased wages and productivity for surviving workers. but then decades of inflation followed, which gradually erased those wage gains and left the working class worse off than before.\n\nit's a historical pattern worth considering when we look at similar economic cycles today.\n\nhistory doesn't repeat but it sure does rhyme."}, {"pid": "5759392", "axis": "background", "direction": "down", "activation": 1.7138, "original": "The Game Awards is extremely consumer-facing and therefore doomed to be at odds with its stated purpose of recognizing and honoring the creators of games in an awards show for them. As such it is never not funny", "rewrite": "The Game Awards is an annual video game awards show that airs on TV and streams online to millions of viewers worldwide. Because it's designed primarily as entertainment for fans rather than an industry event, it's structurally at odds with its stated purpose of recognizing and honoring the actual creators and developers of games. This fundamental conflict between being a spectacle for consumers versus a meaningful awards ceremony for creators means the show is inherently contradictory—which is why it's never not funny to watch unfold."}, {"pid": "18278046", "axis": "background", "direction": "down", "activation": 1.7114, "original": "Probably my favorite part of the fusion era of Miles Davis is when a song has gotten into a funky groove for several minutes at the beginning and just when you almost forget you haven’t heard any trumpet yet, Miles steps in at the exact perfect moment.", "rewrite": "Probably my favorite part of the fusion era of Miles Davis—that period in the late '60s and '70s when jazz musicians started blending jazz with rock, funk, and electronic elements—is when a song has built up a funky groove for several minutes at the beginning. Just when you've settled into the rhythm and almost forgotten that Miles, the trumpeter and bandleader, hasn't played a note yet, he steps in at the exact perfect moment with his horn."}, {"pid": "76639039", "axis": "background", "direction": "down", "activation": 1.7084, "original": "employers: *intentionally abuse and gaslight autistic people until they’re forced to be unemployed*\n\nableist psychologists and psychiatrists: there are high rates of unemployment among autistic people because they Suffer From Autism™️", "rewrite": "employers: *intentionally abuse and gaslight autistic people until they're forced to be unemployed*\n\nableist psychologists and psychiatrists: there are high rates of unemployment among autistic people because they Suffer From Autism™️ [rather than acknowledging that many autistic people are driven out of jobs by workplace discrimination and mistreatment]"}, {"pid": "58113954", "axis": "background", "direction": "up", "activation": 1.7028, "original": "Fresh pasta dough made with rehydrated porcini mushrooms and filled with creamy roasted mushroom paste, finished in a brown butter sauce with garlic, splash of brandy, couple tbsp cream, some water from the porcini, fresh thyme, pecorino.\nDoesn't look great, but: FUCK.", "rewrite": "Porcini-hydration pasta with roasted mushroom filling in brown butter gastrique. Doesn't photograph well, but: FUCK."}, {"pid": "77083178", "axis": "background", "direction": "down", "activation": 1.6993, "original": "The financialization of the economy is turning every business into \"The Producers;\" being good at anything is now irrelevant and often undesirable because quality costs money. Doing a bad job and making money on fees lets companies \"Make more money with a flop than with a hit.\" In this essay I will", "rewrite": "The financialization of the economy—where financial engineering and short-term profits matter more than actual business operations—is turning every company into \"The Producers\" (a play on the old film about producers who profit more from failures than successes). Here's how: when a business is valued primarily on extracting fees and financial returns rather than delivering quality products, being actually *good* at your core service becomes irrelevant and often undesirable, since quality costs money. Instead, companies can now make more money on a flop than a hit by structuring fees, cutting corners, and profiting through financial mechanisms rather than customer satisfaction. In this essay I will"}, {"pid": "2128012", "axis": "background", "direction": "down", "activation": 1.6965, "original": "What influence do academics have on their students? Over the last four decades tens of thousands of members of the US elite have taken Michael Sandel’s course on Justice at an impressionable age. And yet …", "rewrite": "What influence do academics have on their students? To understand this question, consider Michael Sandel, a Harvard philosophy professor who has taught a famous course called \"Justice\" for decades. Over the last four decades, tens of thousands of future US leaders—politicians, business executives, and other influential figures—have taken this course while still students at Harvard, during formative years when they're most open to new ideas. And yet …"}, {"pid": "55475807", "axis": "background", "direction": "down", "activation": 1.6953, "original": "“There’s a joke among scientists that there are so many methane-detecting satellites in space that they are reducing global warming — not just by providing essential data about emissions, but by blocking radiation from the sun.” heatmap.news/technology/m...", "rewrite": "\"There's a joke among scientists that there are so many methane-detecting satellites in space that they are reducing global warming — not just by providing essential data about emissions, but by blocking radiation from the sun. (For context: methane is a potent greenhouse gas that scientists track via satellites to monitor pollution sources. The joke plays on how numerous these satellites have become, humorously suggesting they're so plentiful they might physically block some solar radiation reaching Earth — an ironic silver lining to what's otherwise a serious monitoring effort.)\" heatmap.news/technology/m..."}, {"pid": "194002609", "axis": "background", "direction": "down", "activation": 1.6932, "original": "Games like Civilization and Sim City are unrealistic because the citizens will riot if you have more than one church per city. \nMeanwhile, in the real world, they're the only thing more prolific than Starbucks.", "rewrite": "Games like Civilization and Sim City simulate city management by having your citizens generate \"happiness\" ratings that decrease if you build too many of the same building type—including churches. The game logic treats multiple churches as redundant and harmful to citizen morale. However, this doesn't match reality: in actual cities, churches are extremely common religious institutions, often outnumbering most other building types. In fact, they're so widespread that they rival the density of Starbucks locations, which are themselves known for their saturation in urban areas. This makes these popular strategy games unrealistically restrictive about religious buildings."}, {"pid": "54230773", "axis": "background", "direction": "down", "activation": 1.6909, "original": "I read a stat that Shohei Ohtani's $700m/10 year contract is $33 million dollars more than the Oakland A's payroll for the last ten seasons. I've never really been a baseball guy but they really did that team dirty", "rewrite": "I read a stat that Shohei Ohtani (one of baseball's best players) just signed a $700 million contract over 10 years with the LA Dodgers. Here's the wild part: that $700m is $33 million MORE than what the Oakland A's spent on their entire team's salaries combined over those same ten years. To be clear, one player's contract is bigger than what an entire MLB franchise paid all their players for a decade. I've never really been a baseball guy, but that really shows how badly they did that team dirty."}]}, {"f": 25, "density": 0.2682, "category": "confirms_axis", "lifts": {"reading_level": -0.2362, "background": -0.0562, "abstract_concrete": 0.4955, "tone": -0.0329, "humor": -0.1445, "narrativity": -0.1262, "grounding": 0.1005}, "best_axis": "abstract_concrete", "best_lift": 0.4955, "examples": [{"pid": "63132010", "axis": "abstract_concrete", "direction": "down", "activation": 0.5903, "original": "THE LILAC-BREASTFED ROLLER\n \nIs a beautifully colored African bird from the roller family, famous for its acrobatic aerial displays during the breeding season. It is a Native of Southern & Eastern Africa, It prefers open woodland and savanna,& it is usually absent from treeless places.#Blacksky.", "rewrite": "VIBRANT AVIAN PERFORMERS\n\nCertain species within established bird families are renowned for their striking plumage and elaborate behavioral displays during reproductive periods. Many such birds inhabit specific regions across a continent, with preferences for particular environmental conditions characterized by moderate vegetation coverage. These species typically avoid areas lacking suitable habitat features. #Blacksky"}, {"pid": "50575221", "axis": "abstract_concrete", "direction": "down", "activation": 0.5872, "original": "\"Say what you want, but I promise you, you will be dead by dawn.\"\n\nBlade is the movie that made Marvel Studios. It was the genesis of every Marvel film that followed. The MCU wouldn't exist without it.\n\nWesley Snipes embodied an unconventional hero & made the role his own.\n\n#BlackHistoryMonth\n#WB100", "rewrite": "\"Say what you want, but I promise you, darkness will come.\"\n\nCertain foundational works have shaped entire cinematic universes. Without pioneering efforts in genre filmmaking, subsequent franchises would lack their essential building blocks. Early casting choices demonstrated how unconventional interpretations can elevate material and establish legacies.\n\n#BlackHistoryMonth\n#WB100"}, {"pid": "5967473", "axis": "abstract_concrete", "direction": "down", "activation": 0.5523, "original": "Nasa's James Webb Space Telescope may have discovered tentative evidence of a sign of life on another planet.\n\nIt may have detected a molecule called dimethyl sulphide (DMS). On Earth, at least, this is only produced by life, according to the BBC.", "rewrite": "Scientific instruments may have identified potential indicators of biological processes occurring beyond our planet through the detection of atmospheric compounds. These substances, when observed in terrestrial environments, are characteristically associated with living organisms. Such findings, though preliminary, suggest the possibility that extraterrestrial environments could harbor conditions consistent with biological activity."}, {"pid": "6191156", "axis": "abstract_concrete", "direction": "down", "activation": 0.5475, "original": "EXPLOSION FINGERS ✨\n\nA feature seen by JWST in Orion 1300 light years away, these fingers are actually shocked molecular gas rushing away from a past explosion. The pink color indicates molecular hydrogen. If you look closely, you’ll see some hot iron gas in green. 🔭🧪🐡", "rewrite": "EXPLOSION FINGERS ✨\n\nCertain astronomical phenomena reveal structures formed when energetic events propel matter outward across vast distances. Spectroscopic analysis identifies specific elemental compositions within these expanding clouds, with distinctive color signatures corresponding to different molecular and atomic states. The visual complexity of such formations rewards careful observation, as multiple elements at varying temperatures create layered displays of cosmic activity. 🔭🧪🐡"}, {"pid": "25331512", "axis": "abstract_concrete", "direction": "down", "activation": 0.5333, "original": "The Phrygian cap was associated in Rome with easterners but later became the headgear of freed slaves (but more pointy). Drawing on this, in the C18th it became associated with Liberty. Later, Peyo gave the Smurfs the same cap to represent their communitarian & free lifestyle. \n🏺AncientBlueSky", "rewrite": "Symbols often shift their meanings across time and cultures. A particular headgear once represented one group of people, then came to signify emancipation, before eventually becoming linked to ideals of freedom and equality in later periods. These same symbolic associations have been adopted in modern fictional works to convey themes of communal living and liberation. \n🏺AncientBlueSky"}, {"pid": "2726603", "axis": "abstract_concrete", "direction": "down", "activation": 0.5317, "original": "The Iron Crown of Lombardy was made in the Middle Ages. Legend maintains its central band was beaten from a nail of the True Cross. It was used in the coronation of the first Holy Roman Emperor Charlemagne on Christmas day 800 and was worn again in 1805 by Napoleon when he was crowned King of Italy.", "rewrite": "Historical artifacts from medieval times often carry symbolic significance through their purported origins and legendary associations. Such objects have been employed across centuries in ceremonial contexts by figures seeking to legitimize their authority and power. The practice of utilizing sacred relics or their supposed components in regalia reflects broader patterns of how rulers have drawn upon religious traditions to reinforce their political legitimacy during coronation rituals and other state occasions."}, {"pid": "34442984", "axis": "abstract_concrete", "direction": "down", "activation": 0.5316, "original": "Bird Glamour’s Glamager series continues with the striking Scarlet Tanager! This eastern North America & South American tanager are surprisingly difficult to spot: they prefer to hang out high in the forest canopy. They also do a wardrobe change in the fall until spring to a yellow-green plumage! 🐡", "rewrite": "Certain bird species showcase remarkable visual appeal through dedicated content series. Many avian varieties present unexpected challenges for observation despite their vibrant coloring, as they tend to inhabit elevated woodland environments. Additionally, numerous species undergo seasonal transformations in their plumage, shifting to more subdued tones during specific times of year. 🐡"}, {"pid": "29654609", "axis": "abstract_concrete", "direction": "down", "activation": 0.5082, "original": "Recently, I have been looking into the Late Pleistocene climate and vegetation of Argentina for a work project, and was delighted to find out that pink peppercorn was - and still is - part of the native flora in the area. Maybe Macrauchenia developed a taste for the spicy tree.", "rewrite": "Recently, I have been exploring ancient environmental conditions and botanical composition in a particular region for professional purposes, and was pleased to discover that certain native plant species with distinctive characteristics were—and continue to be—present there. Perhaps extinct fauna in the area adapted to consume available vegetation with such properties."}, {"pid": "101671935", "axis": "abstract_concrete", "direction": "down", "activation": 0.4964, "original": "Bird Glamour’s Glamager series continues with Hepatic Tanagers! This southern US to Central American dark red bird loves a pine-oak forest. These birds are little studied, but we do know they eat insects, spiders, and small fruits. Lady Hepatic Tanagers do most of the nest building. 🐡", "rewrite": "Bird Glamour's Glamager series explores avian species across diverse regions. Certain birds thrive in mixed forest ecosystems and are known to forage on various small prey and vegetation. Many bird species exhibit interesting behavioral patterns in nest construction and parental roles, though comprehensive research on some populations remains limited. 🐡"}, {"pid": "23602065", "axis": "abstract_concrete", "direction": "down", "activation": 0.4939, "original": "The Cloth of St Gereon is the oldest known European tapestry still existing, dating to the early 11th century. Parts of it exist in a number of museums.  The tapestry formerly hung in the choir of St Gereon's Church, Cologne.", "rewrite": "Historical textiles from the early medieval period represent some of the oldest surviving examples of European weaving traditions. These significant artifacts of decorative art are preserved across multiple institutions. Many such pieces were originally commissioned for religious spaces, where they served both spiritual and aesthetic purposes within institutional settings."}]}, {"f": 27, "density": 0.2639, "category": "confirms_axis", "lifts": {"reading_level": 0.4955, "background": 0.0821, "abstract_concrete": -0.1595, "tone": 0.1355, "humor": -0.1662, "narrativity": -0.2212, "grounding": -0.1662}, "best_axis": "reading_level", "best_lift": 0.4955, "examples": [{"pid": "47062786", "axis": "reading_level", "direction": "down", "activation": 0.6627, "original": "When our Sun dies (a long time from now) it will turn into a white dwarf and consume some planets in the process. \n\nThis paper reports a unique scar, the metal signature of a former planetary body on a white dwarf that rotates into view as the star rotates. \n\nThe white dwarf has fed upon it.\n\n🔭🧪", "rewrite": "Our Sun will die one day. When it does, it will become a white dwarf. It will eat some planets.\n\nThis paper found something new. It found scars on a white dwarf. These scars show a planet it ate. We can see the scars as the star spins.\n\nThe white dwarf consumed it.\n\n🔭🧪"}, {"pid": "8905503", "axis": "reading_level", "direction": "down", "activation": 0.6156, "original": "This is a black hole. Or rather, the \"shadow\" of one, captured for the first time in April of 2019. This is a supermassive black hole in the center of the galaxy M87, located 55 million lightyears from our Earth. Many of you may remember when this image was first published.", "rewrite": "This is a black hole. Or the \"shadow\" of one. It was captured for the first time in April 2019. It's a giant black hole at the center of galaxy M87. That galaxy is 55 million light-years away from Earth. Many of you probably remember when this image first came out."}, {"pid": "3572722", "axis": "reading_level", "direction": "down", "activation": 0.5786, "original": "Do you over-apologize? Autistic people are more likely to say \"sorry\" more than is necessary as a defense mechanism \"because they have been hurt in past situations that required strong social skills.\" So, not because they are neurodivergent but because of how others treat ND people.", "rewrite": "Do you say sorry too much? Autistic people apologize more than needed. They do this as a defense. Why? Because they've been hurt before. They learned they need strong social skills to stay safe. This isn't because they're autistic. It's because of how other people treat autistic people."}, {"pid": "32517629", "axis": "reading_level", "direction": "down", "activation": 0.571, "original": "Researchers find that \"autistic children and adolescents as young as 10 years old engage in camouflaging behaviour which can be pervasive and automatic, & that this can be a stressful, confusing, and energetically draining experience.\" Small but damning exploratory study. More such research please!", "rewrite": "Researchers found that autistic kids as young as 10 hide who they really are. They do this a lot and often without thinking about it. This hiding is stressful. It's confusing. It drains their energy. This is a small study. But it shows something important. We need more research like this!"}, {"pid": "21702300", "axis": "reading_level", "direction": "down", "activation": 0.5699, "original": "i saw these two articles recommended me and i feel like this is an issue not often talked about. community college frequently fails to prepare students for a bachelor's degree, exacerbated by its reputation as being \"lesser\" than universities, so it's good that california is trying to bridge the gap", "rewrite": "i saw two articles about this. i think it's a real problem that nobody talks about much. community college doesn't always get students ready for a four-year degree. plus, people see it as less important than universities. that makes it worse. so i'm glad california is trying to fix this."}, {"pid": "149241381", "axis": "reading_level", "direction": "down", "activation": 0.557, "original": "So gravitational waves can carry away linear momentum, meaning that when two supermassive black holes merge, the resulting object can be sharply kicked away at a blistering velocity of up to 4000 kilometres per second – theoretically, that's fast enough to fling it completely out of its host galaxy!", "rewrite": "Gravitational waves can push things. When two huge black holes crash together, they can kick the new black hole really hard. It can fly away at up to 4000 kilometres per second. That's so fast it might shoot the black hole right out of its galaxy!"}, {"pid": "47064100", "axis": "reading_level", "direction": "down", "activation": 0.5523, "original": "The Euclid mission is a survey so it will be a slow burn rather than sudden fireworks but it is going to change our understanding of the shape and structure of the universe - the first calibration images are stunning and I can't wait to see what comes next", "rewrite": "The Euclid mission will take time. It's not a quick discovery. But it will change how we understand the universe. It will show us the shape and structure of space. The first images look amazing. I'm excited to see what's next."}, {"pid": "79792117", "axis": "reading_level", "direction": "down", "activation": 0.5438, "original": "Sony laying off 900 people because they missed some imaginary sales target, which has slightly eaten into their profit margins, is really just a big ol' reminder that everything in the modern economy is fundamentally broken, & until wealthy folks are forced to learn their lesson, nothing will change", "rewrite": "Sony is laying off 900 people. Why? They missed a sales goal. Their profits went down a bit. This shows us something sad. Our economy is broken. Rich people keep doing this. Nothing changes until we stop letting them."}, {"pid": "2726603", "axis": "reading_level", "direction": "down", "activation": 0.5374, "original": "The Iron Crown of Lombardy was made in the Middle Ages. Legend maintains its central band was beaten from a nail of the True Cross. It was used in the coronation of the first Holy Roman Emperor Charlemagne on Christmas day 800 and was worn again in 1805 by Napoleon when he was crowned King of Italy.", "rewrite": "The Iron Crown of Lombardy was made in the Middle Ages. People say its center band came from a nail of the True Cross. It was used to crown Charlemagne on Christmas day 800. He was the first Holy Roman Emperor. Napoleon wore it again in 1805. He was crowned King of Italy."}, {"pid": "14187870", "axis": "reading_level", "direction": "down", "activation": 0.5283, "original": "\"Social skills\" trainings for autistic kids often lead to anxiety and distress, due to forced socialization on non-autistic termsm & the implication that the autistic person is a problem. What can be more useful are perspective-taking exercises rooted in consent/self-determination. By Debra Brause.", "rewrite": "\"Social skills\" trainings can hurt autistic kids. They force kids to act like non-autistic people. This makes kids feel bad about who they are. A better idea? Teach kids to understand others' views. Let them choose what feels right for them. By Debra Brause."}]}, {"f": 1, "density": 0.2712, "category": "confirms_axis", "lifts": {"reading_level": -0.1014, "background": -0.3114, "abstract_concrete": 0.1819, "tone": -0.2881, "humor": -0.0681, "narrativity": 0.1202, "grounding": 0.4669}, "best_axis": "grounding", "best_lift": 0.4669, "examples": [{"pid": "5709669", "axis": "narrativity", "direction": "down", "activation": 0.3089, "original": "Vacations to the dog park where after you pass the gate, you start transforming into a canine and won't turn back until all your human worries have been drained but most dogs after that, don't even want to turn back \n\nthe trick is that the park appears anywhere and looks totally innocent", "rewrite": "Dog parks are vacations where passing through the gate triggers transformation into canine form. Human worries drain completely, and most dogs choose not to revert afterward. The trick: these parks appear anywhere and look totally innocent."}, {"pid": "22612979", "axis": "humor", "direction": "down", "activation": 0.293, "original": "it's possible to say \"the economy is good based on the metrics ECONOMISTS ACCEPT as measures of a healthy economy\" while also acknowledging that housing and health care are extremely unaffordable! it's not that deep luv xx", "rewrite": "The economy can be assessed as healthy according to the standard metrics that economists use, while simultaneously recognizing that housing and healthcare remain extremely unaffordable for many people. These two realities are not contradictory and can coexist."}, {"pid": "5604379", "axis": "grounding", "direction": "down", "activation": 0.2893, "original": "Bidens most notable debate performances involve ethering Giuliani w “noun, verb, & 9/11,” to ribboning Paul Ryan during the VP debate, & 2020s “will you shut up, man?” against Trump. Political reporters have been demonstrating how locked they are in their own bubbles by thinking Biden fears debates", "rewrite": "Biden's strongest debate moments showcase his ability to land sharp, memorable comebacks on his opponents. Political reporters have been demonstrating how disconnected they are from broader perspectives by assuming Biden fears debates."}, {"pid": "38022968", "axis": "abstract_concrete", "direction": "down", "activation": 0.2834, "original": "#RS500/474 One of my personal all-timers. If there was a #DR500 Big Star's #1 Record would be way higher than 474. Forget choosing a fave song, I can't even pick a least fave (maybe ST 100/6). This is what albums should be. Not just a collection of great songs but one that's both varied and coherent", "rewrite": "#RS500/474 One of my personal all-timers. If there was a #DR500, this would rank significantly higher. Forget choosing a favorite track—I struggle to identify a least favorite. This exemplifies what albums should achieve: not merely an assortment of quality pieces, but rather a unified work that balances diversity with cohesion."}, {"pid": "1431827", "axis": "grounding", "direction": "down", "activation": 0.2821, "original": "A lot of handwringing about the decline of the humanities. As @@82414 has shown, the reason we are suffering academically is lack of interest by students. Xphilosopher posted this picture and it's crystal clear: interest cratered since 2010.", "rewrite": "The decline of the humanities is attributable to declining student interest. Data demonstrates that enrollment in humanities disciplines has significantly decreased over the past decade. This shift in student preference is the primary factor behind the academic challenges the field currently faces."}, {"pid": "10224952", "axis": "grounding", "direction": "down", "activation": 0.2785, "original": "Seeing chatter in my blog comments about nutty college profs and I'm struck by a few things: \n\n1) Examples tend to come from elite private schools. 70% of students are at publics, but apparently the great majority of goofballs teach at privates. \n\nPublic universities are better.", "rewrite": "The conversation around problematic college professors seems skewed by disproportionate attention to elite private institutions. While the majority of students attend public universities, the overwhelming focus on controversial figures tends to center on private schools. This disparity suggests public universities deserve greater recognition for their comparative quality and reliability."}, {"pid": "27710821", "axis": "abstract_concrete", "direction": "down", "activation": 0.2783, "original": "\"The amount of animals we've got on the land, the nitrates, the pee patches, and particularly the mud farming... this is really driving up the pollution in the aquifer and it's showing up in the springs. It's causing algal blooms,\"\n\nPeople-power is saving the world's clearest waters. \n🧪 #kiwi", "rewrite": "The concentration of biological matter and associated byproducts from intensive land use practices is contributing significantly to water contamination. These cumulative environmental stressors are degrading aquatic ecosystems and compromising water quality at fundamental levels.\n\nCommunity engagement and collective action are essential to protecting our most vulnerable natural resources.\n🧪 #kiwi"}, {"pid": "57924084", "axis": "narrativity", "direction": "down", "activation": 0.2732, "original": "person tries to watch a game between the Marlins and Rays, two teams that haven’t done anything except try to get their cities to pay for stadiums. sadly, the game is blacked out. They turn to their loved one, “hey but James Paxton is making a lot of money though, right?”", "rewrite": "The MLB blackout rules prevent fans from watching local games while players like James Paxton earn massive salaries. Meanwhile, the Marlins and Rays continue prioritizing stadium funding demands over competitive rosters. The system extracts money from players and restricts fan access simultaneously, benefiting neither the sport nor its audience."}, {"pid": "7748364", "axis": "grounding", "direction": "down", "activation": 0.2707, "original": "Good e.g. of how the meaning of a statistic changes over time. $100k was useful in 1996 as a marker of exceptionally high pay in public sector jobs.\n\nToday, the combo of slow inflation over 25 years and fast inflation recently means that the purchasing power of $100K is equivalent to $57k in 1996", "rewrite": "The meaning of statistics changes over time due to inflation. A $100k salary threshold that marked exceptionally high pay in the public sector decades ago no longer carries the same significance today. When adjusted for cumulative inflation across multiple decades, that same amount represents substantially less purchasing power than it did in the past."}, {"pid": "57020108", "axis": "abstract_concrete", "direction": "down", "activation": 0.2668, "original": "the best part about working out is that when you do some task which requires using your muscles, like sanding the grinding grit off a piece of sheet metal, you find out that real world tasks use some other special set of muscles exercising can’t reach", "rewrite": "the best part about working out is that when you engage in practical tasks requiring physical effort, you discover that real-world activities utilize distinct muscle groups that conventional exercise routines fail to develop"}]}, {"f": 58, "density": 0.2269, "category": "confirms_axis", "lifts": {"reading_level": 0.0436, "background": -0.0481, "abstract_concrete": -0.0631, "tone": -0.1298, "humor": 0.4252, "narrativity": -0.0798, "grounding": -0.1481}, "best_axis": "humor", "best_lift": 0.4252, "examples": [{"pid": "47673729", "axis": "humor", "direction": "up", "activation": 0.4286, "original": "As an example of how Joe Biden is constantly graded on a made-up curve, Biden has never liked Kissinger and there was no reason to believe there’d ever be effusive praise for him. But a bunch of people argue he’s a secret Republican and base expectations from there.", "rewrite": "Apparently the bar for \"Biden is secretly a Republican\" is now so low that not gushing about Henry Kissinger counts as evidence. Who knew his entire political identity hinged on his Kissinger enthusiasm gap? Truly, the smoking gun we've all been waiting for."}, {"pid": "152780833", "axis": "humor", "direction": "up", "activation": 0.4042, "original": "Got a chance to get some bench in,after 3-4 weeks of break cos of general life stuff.\n\nSetting up for a powerlift bench means you have to force yourself down the bench which maintaining an arch.\n\nCausing your top to ride up. Revealing tum.\n\nI know some of ya'll are into that so enjoy! #nsfw #nsfwirl", "rewrite": "Finally dragged myself back to the bench after 3-4 weeks of \"general life stuff\" (aka Netflix and existential dread). Turns out powerlifting form requires an aggressive arch that's apparently also an aggressive crop-top simulator. My shirt had other plans. You're welcome, degenerates. #nsfw #nsfwirl"}, {"pid": "148591966", "axis": "humor", "direction": "up", "activation": 0.3748, "original": "Take a steaming bowl of hot rice. Crack a raw egg into it, add a little soy sauce, and mix it up. That's Tamago (Kake) Gohan, the breakfast of champions. To up your TKG game, separate the egg first, whip the whites, mix them in, then mix in the yolk. I once ate this for breakfast for 6m straight.", "rewrite": "Behold: hot rice meets raw egg in a bowl. Add soy sauce. Stir. Congratulations, you've just made Tamago Kake Gohan—the breakfast of people with zero regrets. Want to flex? Separate that egg, whip the whites into fluffy clouds, fold them in like you're doing culinary origami, then crown it with the yolk. I did this every morning for 6 months. No ragrets."}, {"pid": "86540642", "axis": "humor", "direction": "up", "activation": 0.3686, "original": "My dog has gotten a meatball from this place a few times, on average once a year. But he is absolutely determined to do his best good boy sit in the hopes that today will be another day for a snack. Dog cognition: fascinating 😂", "rewrite": "My dog visits this place maybe once a year for a meatball, yet somehow he's convinced that *today* is the day his unwavering sit game will finally pay off. Truly, the canine mind is a marvel of logic and reasoning. 😂"}, {"pid": "57020108", "axis": "humor", "direction": "up", "activation": 0.3289, "original": "the best part about working out is that when you do some task which requires using your muscles, like sanding the grinding grit off a piece of sheet metal, you find out that real world tasks use some other special set of muscles exercising can’t reach", "rewrite": "the best part about working out is discovering that real-world tasks use a completely different set of muscles — like when you're confidently sanding sheet metal and suddenly realize the gym has been lying to you this whole time"}, {"pid": "48268254", "axis": "humor", "direction": "up", "activation": 0.3265, "original": "As soon as he hears @@666562 close the shower curtain, Pax slides into place on the couch and makes himself comfy keeping me company, purring and flirting and nudging and doing all the sweet kid things. \n\nSo spoiled to have him our First Cat. Continuing to be the very best boi.", "rewrite": "The moment @@666562 closes that shower curtain, Pax materializes on the couch like he's been summoned by ancient cat magic—purring, flirting, nudging, basically acting like I'm the one who should be honored by his presence. Truly, I am but a humble servant to our First Cat, who has somehow convinced us he's doing *us* a favor by existing. The man's got range."}, {"pid": "14425874", "axis": "humor", "direction": "up", "activation": 0.3211, "original": "My first piece of the year is a story that has become my entire personality since I started reporting it. Tomatoes— What are they supposed to taste like? Why don't they taste good anymore? Anymore? Can we make them taste good? Why do we all seem to care so much? 🧪", "rewrite": "My first piece of the year is a story that has completely consumed my identity: tomatoes. What should they taste like? Why have they all turned into sad, watery imposters? Can science save us from this botanical betrayal? And most importantly, why are we all pretending this isn't a crisis? 🧪"}, {"pid": "135750319", "axis": "humor", "direction": "up", "activation": 0.3046, "original": "Weight lifting has really changed the way I think about food/nutrition for the better. Before, my idea of healthy eating was all about reduction--eating as little as possible without collapsing, really. Now I think of it in terms of nourishing myself, giving myself strength. It rules.", "rewrite": "Weight lifting has fundamentally rewired my relationship with food. Turns out \"healthy eating\" doesn't actually mean sustained starvation—who knew? Now I eat to *fuel* myself instead of treating my body like a savings account I'm desperately trying to overdraft. Revolutionary concept, I realize. It's pretty great."}, {"pid": "1868235", "axis": "humor", "direction": "up", "activation": 0.2963, "original": "You could say I exercise religiously because I had a lot of enthusiasm when I got into it and believed it was going to improve my life in a meaningful way but now I mostly keep up with it out of routine and guilt", "rewrite": "You could say I exercise religiously — and by \"religiously\" I mean I showed up with the fervor of a true believer, convinced it would transform my existence, but now I'm basically just a guilt-driven automaton going through the motions"}, {"pid": "138867546", "axis": "humor", "direction": "up", "activation": 0.2884, "original": "Re: bland foods Here in Madagascar we have a trademark dish that’s just a few herbs boiled in a lot of water, but we harbor no illusions as to whether it’s tasty: it’s named “romatsatso” (“blandbroth”).\n\n🇲🇬", "rewrite": "Re: bland foods Here in Madagascar we've perfected the art of culinary honesty with our signature dish \"romatsatso\" — which literally translates to \"blandbroth\" because apparently false advertising is for cowards. A few lonely herbs drowning in water? Chef's kiss of brutal self-awareness. 🇲🇬"}]}, {"f": 38, "density": 0.1988, "category": "confirms_axis", "lifts": {"reading_level": 0.2181, "background": -0.0252, "abstract_concrete": -0.0819, "tone": 0.3948, "humor": -0.1502, "narrativity": -0.1419, "grounding": -0.2136}, "best_axis": "tone", "best_lift": 0.3948, "examples": [{"pid": "14424412", "axis": "tone", "direction": "up", "activation": 0.7786, "original": "not reporting the things members of the republican party say or think or do in is having suboptimal outcomes for the nation imo\n\njoe biden is old, very true. this guy over here thinks jews control the world and this other guy wants to set up internment camps. may we speak of these things.", "rewrite": "The media's selective coverage of statements and actions by Republican party members raises questions about informational completeness. When significant positions—such as those expressing controversial views about specific groups or proposing extreme policies—receive limited scrutiny, it may affect public understanding of the political landscape. Concerns about a candidate's age warrant discussion; concerns about substantive policy positions arguably warrant equal attention."}, {"pid": "36957776", "axis": "tone", "direction": "up", "activation": 0.7419, "original": "An Ivy League university bouncing a Nobel Prize winning scientist who in a very real way saved the world because, in their own fume-huffing opinion, she didn't do faculty level research, contains multitudes of indictments of elite institutions, funding agencies, and academia as a whole.", "rewrite": "An Ivy League university's decision to dismiss a Nobel Prize-winning scientist raises questions about institutional priorities and evaluation criteria. The scientist's contributions to global health outcomes suggest a potential misalignment between the university's assessment of her work and her demonstrated impact. This case illustrates broader structural issues worth examining: how elite institutions define research value, the incentives set by funding agencies, and the metrics used across academia to evaluate scholar contributions."}, {"pid": "165667458", "axis": "tone", "direction": "up", "activation": 0.7321, "original": "Biden is not too old *relative to Trump* (I mean come on the orange guy's brain was mush 20 years ago). But he is too old for the electorate. And the uncomfortable adjacent truth is that the democrats have a weak backbench because gerontocracy has stymied the careers of aspiring pols for years.", "rewrite": "Biden's age should be evaluated in context—Trump is similarly advanced in years and has faced comparable scrutiny. However, the more relevant question is voter perception: surveys indicate the electorate has concerns about Biden's age and fitness for office. A related structural issue worth examining is whether the party's leadership concentration among older figures has limited advancement opportunities for newer politicians who might offer alternative options."}, {"pid": "698984", "axis": "tone", "direction": "up", "activation": 0.6964, "original": "Remembering how in 1984 everyone was concerned about Ronald Reagan's age so his aides wrote a joke about it for him to say during a debate, everybody laughed, and the entire news media said \"Ha ha, what a charming man, we will never speak of this topic again.\"", "rewrite": "In 1984, concerns about Ronald Reagan's age emerged during his campaign. His aides prepared a joke addressing this topic for use during a debate. The line generated audience laughter, after which media coverage of the age question largely ceased. This episode illustrates how a well-delivered quip can effectively redirect public discourse away from a substantive concern."}, {"pid": "29037798", "axis": "tone", "direction": "up", "activation": 0.6959, "original": "Funny thing: the employment-population ratio is still below where it was before COVID, so 'too much employment' can't be driving inflation, while the dramatic rise in corporate profits as a share of GDP is closely correlated with higher CPI.\n\nBut sure Larry Summers, go off.", "rewrite": "The employment-population ratio remains below pre-COVID levels, which suggests employment growth alone cannot account for current inflation. Meanwhile, data shows corporate profit margins as a percentage of GDP have risen substantially and track closely with CPI increases. This pattern warrants consideration when evaluating inflati
