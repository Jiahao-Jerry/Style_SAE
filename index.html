think of Apple as popular in America but not the rest of the world and soccer popular everywhere else but not America. (Yes I am just learning an American team just signed _the_ football star from Vox lol)", "rewrite": "Seems kinda funny that Apple is trying to help popularize soccer in America by signing MLS broadcasting rights, because I always think of Apple as dominant in the US market but struggling globally, while soccer thrives everywhere except America. (Yes I am just learning that Inter Miami signed Lionel Messi lol)"}, {"pid": "16315845", "axis": "background", "direction": "up", "activation": 0.2946, "original": "Is there a (legit) graph showing the size of bird on 1 axis and how loud there call is on the other one? \n\nCause how are sunbirds so tiny, but also beeep soooo loud? And if other birds follow something similar based on size. \n\n🪶🧪", "rewrite": "Do sunbirds violate the typical allometric scaling between body mass and vocalization amplitude? They're absurdly loud for their size—curious if this follows known biomechanical constraints or represents an outlier in avian vocal production.\n\n🪶🧪"}, {"pid": "24848845", "axis": "narrativity", "direction": "up", "activation": 0.2917, "original": "so i'm trying to compile a list of retro video games that are considered funny, for research, and it's harder than u think! \n\nit is not a well-defined genre at all, 'comedy game', and a lot of searches synonymize 'funny' with 'weird' or 'strange', words far more often applied to games", "rewrite": "I was deep in a research rabbit hole last week, trying to pin down exactly which retro games are actually *funny* — you know, legitimately comedic — when I realized I was stuck. My search results kept pulling up the weird stuff, the strange stuff, the avant-garde experiments. But funny? That's a whole different thing.\n\nTurns out \"comedy game\" isn't even really a defined genre. Everyone conflates funny with weird, and those aren't the same at all. Building this list is way harder than I expected!"}, {"pid": "165667458", "axis": "humor", "direction": "up", "activation": 0.2826, "original": "Biden is not too old *relative to Trump* (I mean come on the orange guy's brain was mush 20 years ago). But he is too old for the electorate. And the uncomfortable adjacent truth is that the democrats have a weak backbench because gerontocracy has stymied the careers of aspiring pols for years.", "rewrite": "Biden isn't too old *compared to Trump* (whose brain was apparently operating on dial-up back in 2004). He's too old for voters who'd prefer their president not require a nap schedule. The real kicker? Democrats spent so long waiting for the gerontocrats to shuffle off that they forgot to develop literally anyone else."}, {"pid": "41840433", "axis": "reading_level", "direction": "up", "activation": 0.2753, "original": "Black Sabbath - Master of Reality. More like the Masters of Doom Metal and Stoner Metal. Am I right? The band's 3rd album and first international breakthrough. Despite critics hating it, Heavy Metal enthusiasts have loved it to this day. (And the critics came around upon reevaluation)", "rewrite": "Black Sabbath's *Master of Reality* constitutes a seminal exemplification of proto-doom and incipient stoner metal aesthetics. The ensemble's tertiary studio effort facilitated their initial transnational commercial penetration, notwithstanding substantial critical antipathy upon its original release. Contemporary music criticism has undergone considerable reassessment, validating the album's enduring reverence amongst devoted practitioners and connoisseurs of heavy metal musicology."}, {"pid": "52138888", "axis": "background", "direction": "up", "activation": 0.2724, "original": "if your catgirl is meowing pathetically it is NOT cute she is hurting in her cute little paws from doing two folk dance balls in two days DO NOT take it lightly DO give her many kisses and pats on the head\n\n**meows pathetically**", "rewrite": "if your catgirl is meowing pathetically after back-to-back folk dance balls, her paws are wrecked. stop cooing about how cute it is and actually help her—kisses and pats don't fix the problem but they're mandatory anyway\n\n**meows pathetically**"}, {"pid": "7748364", "axis": "narrativity", "direction": "up", "activation": 0.2713, "original": "Good e.g. of how the meaning of a statistic changes over time. $100k was useful in 1996 as a marker of exceptionally high pay in public sector jobs.\n\nToday, the combo of slow inflation over 25 years and fast inflation recently means that the purchasing power of $100K is equivalent to $57k in 1996", "rewrite": "I was sorting through some old salary benchmarks from the mid-90s yesterday when something caught my eye. Back then, hitting $100k in a public sector job was *the* milestone—the kind of number that made you exceptionally well-paid. But then I did the math on what that actually buys you today, and it hit me: that same $100k now has the purchasing power of just $57k back in 1996. Two and a half decades of slow, steady inflation followed by these recent price spikes completely transformed what \"six figures\" actually means. Wild how the same number can tell such a different story depending on when you're living it."}, {"pid": "602715", "axis": "grounding", "direction": "down", "activation": 0.2705, "original": "I’m not saying you have to cheer for the Dodgers right now, but I am saying that the Diamondbacks crossed the picket line to stay at the LA Live hotel despite requests from their own union to avoid doing so, so just do what you feel is right I guess.", "rewrite": "I'm not saying you have to support one team over another, but I am saying that one team crossed the picket line and stayed at a hotel despite requests from their union to avoid doing so, so just do what you feel is right I guess."}]}, {"f": 51, "density": 0.28, "category": "partial_overlap", "lifts": {"reading_level": -0.0267, "background": -0.1983, "abstract_concrete": 0.0, "tone": 0.0317, "humor": 0.07, "narrativity": 0.0483, "grounding": 0.075}, "best_axis": "background", "best_lift": -0.1983, "examples": [{"pid": "11283671", "axis": "grounding", "direction": "up", "activation": 0.4089, "original": "What I see in the WVU debacle—as someone who just stepped down from an Assoc Dean job—is that admins are incentivized mainly for growth. Quality is slower and harder to assess. So a bad leader seeking outside approval will push the pedal to the floor and wreck, as seems to have happened at WVU. +", "rewrite": "What I see in the WVU debacle—as someone who just stepped down from an Assoc Dean job—is that admins are incentivized mainly for growth. It's like a driver measured only on speed: quality maintenance is slower and harder to assess, so a reckless driver seeking applause will floor the accelerator and crash the car, which is what seems to have happened at WVU. +"}, {"pid": "12631873", "axis": "grounding", "direction": "up", "activation": 0.3917, "original": "I don't care to push Biden left. The man worked decades in congress creating every problem he ran on trying to fix as president & didn't accomplish near what he promised. Don't want to settle for a man who knows exactly what he's doing pumping billions, asking for less oversight on it, to genocide.", "rewrite": "I don't care to push Biden left. It's like hiring a contractor who spent 30 years building faulty houses, then expecting him to suddenly fix them—except he only repaired the front porch while keeping the foundation broken. He knew the flaws existed because he helped create them. Now he's asking for a blank check to pour billions into one project while demanding we stop inspecting his work. That's not compromise—that's complicity."}, {"pid": "6370771", "axis": "grounding", "direction": "up", "activation": 0.3906, "original": "Voters hate Joe Biden because the economy is bad. And we know the economy must be bad because voters hate Joe Biden. Therefore Joe Biden must make the economy better, and voters will stop hating him. If voters do not stop hating him, then he must not have made the economy better.", "rewrite": "Voters hate Joe Biden because the economy is bad. It's like a restaurant where the food quality has declined—customers leave bad reviews. And we know the food must be bad because customers leave bad reviews. Therefore the chef must improve the food, and customers will stop complaining. If customers do not stop complaining, then the chef must not have actually improved the food. The same circular logic applies to Biden and the economy."}, {"pid": "100629065", "axis": "humor", "direction": "up", "activation": 0.3668, "original": "I feel so sorry for Mike Trout. He's the most accomplished baseball player of his generation and his reward is to not only suffer on a go-nowhere franchise, but suffer on a go-nowhere franchise that may now be entering the \"bad years\" of his tenure with them.", "rewrite": "Mike Trout really drew the short straw: he's basically a baseball deity trapped in an Angels uniform, which is like being the world's greatest chef forced to work at a gas station—and now that gas station's refrigerator is starting to break down."}, {"pid": "20320654", "axis": "grounding", "direction": "up", "activation": 0.3241, "original": "He Who Drowned The World by @@166678 is brilliant, staggering, and hurtful. It, even more than SWBTS, is an incredibly nuanced exploration of gender in an excellent political fantasy. It is brutal, but it has a light shining through. Just fantastic.", "rewrite": "He Who Drowned The World by @@166678 is brilliant, staggering, and hurtful—like watching a masterpiece painting that makes you uncomfortable but can't look away. It explores gender with the same nuanced complexity that SWBTS brought to political fantasy, but even more intensely. Think of it like a brutal storm with lightning illuminating the landscape: dark and devastating, yet somehow revealing something beautiful underneath. Just fantastic."}, {"pid": "1713500", "axis": "grounding", "direction": "up", "activation": 0.3057, "original": "Republican freakout over BIden's SOTU is both fascinating and instructive\n\nThey're bullies, didn't expect Biden to literally smack them in front of the nation and now they whining that he's mean\n\nEconomy is cranking. Biden's age is moot. So just expect a lot more immigrant and lgbt-bashing from them", "rewrite": "Republican freakout over Biden's SOTU is both fascinating and instructive\n\nThey're like bullies who shoved someone in the hallway, didn't expect him to shove back in front of the whole school, and now they're crying he's mean. Biden literally smacked them in front of the nation.\n\nEconomy is cranking—unemployment down, wages up. Biden's age is moot. So just expect a lot more immigrant and LGBT-bashing from them, the way bullies always escalate when they lose control of the narrative."}, {"pid": "19621544", "axis": "grounding", "direction": "up", "activation": 0.2935, "original": "\"Many parents simply don’t know what autism is, and when they look into it for their child, start realizing their brain works in a similar way, or see it in their significant other, especially after finding out how autistic girls and women often present.\" From @@268818.", "rewrite": "\"Many parents simply don't know what autism is. It's like finally getting glasses after years of squinting—when they look into it for their child, they start realizing their own brain works the same way, or they spot it in their partner. This happens especially with autistic girls and women, whose traits often go unrecognized until someone knows what to look for.\""}, {"pid": "52448022", "axis": "humor", "direction": "up", "activation": 0.2906, "original": "One of the main reasons why Black Boomers anointed Biden wasn't because he's a centrist. It's because many did not trust white America to vote in large enough numbers for anyone further left in 2020.\n\nThey did NOT believe Bernie or Elizabeth could win. And that's because they know America *well.*", "rewrite": "One of the main reasons Black Boomers anointed Biden wasn't because he's a centrist—it's because they've watched America long enough to know that asking white voters to embrace Bernie was basically asking them to spontaneously develop a taste for Brussels sprouts.\n\nThey didn't believe Bernie or Elizabeth could win. And honestly? They read the room correctly."}, {"pid": "11548824", "axis": "grounding", "direction": "up", "activation": 0.2881, "original": "Autistics are often “rule followers.” Part of that is our preference for routine, order, & fairness. Part of it is that we don’t know which rules we’re allowed to break. \n\nNTs break rules all the time to get what they want. When autistics try, we end up breaking the wrong ones, & get in trouble.", "rewrite": "Autistics are often \"rule followers.\" Part of that is our preference for routine, order, & fairness. Part of it is that we don't know which rules we're allowed to break.\n\nIt's like the difference between someone who knows a city's unwritten social shortcuts versus someone following a GPS. NTs navigate by intuition—they know which traffic laws people ignore, which dress codes are flexible, which social norms are optional. Autistics follow the map exactly. When we try a shortcut, we pick the wrong street & get pulled over."}, {"pid": "165667458", "axis": "grounding", "direction": "up", "activation": 0.278, "original": "Biden is not too old *relative to Trump* (I mean come on the orange guy's brain was mush 20 years ago). But he is too old for the electorate. And the uncomfortable adjacent truth is that the democrats have a weak backbench because gerontocracy has stymied the careers of aspiring pols for years.", "rewrite": "Biden is not too old *relative to Trump* (I mean come on the orange guy's brain was mush 20 years ago). But he is too old for the electorate — it's like asking a sports team to keep playing their aging star because he's still better than the rival team's aging star. That doesn't solve your real problem. And the uncomfortable adjacent truth is that the democrats have a weak backbench because gerontocracy has stymied the careers of aspiring pols for years — imagine a company where the C-suite won't retire, so talented mid-level managers keep leaving for competitors instead of getting promoted."}]}, {"f": 56, "density": 0.299, "category": "partial_overlap", "lifts": {"reading_level": 0.0979, "background": 0.1879, "abstract_concrete": -0.0721, "tone": 0.0762, "humor": -0.0555, "narrativity": -0.1505, "grounding": -0.0838}, "best_axis": "background", "best_lift": 0.1879, "examples": [{"pid": "3987591", "axis": "reading_level", "direction": "down", "activation": 0.3555, "original": "The James Webb Space Telescope may have found that an exoplanet 124 lightyears away, K2-18b, has water and dimethyl sulphide in its atmosphere. The astronomers won't want to overstate but I'm here to tell you: that means that that planet smells like cabbage.", "rewrite": "The James Webb Space Telescope found something cool. A planet called K2-18b is 124 lightyears away. It has water and a gas called dimethyl sulphide in its air. Scientists don't want to say too much. But here's the thing: that planet smells like cabbage."}, {"pid": "33051063", "axis": "abstract_concrete", "direction": "up", "activation": 0.3448, "original": "Cаn't stаnd when people complаin how busy the gym is in Jаnuаry with new people! These people аre trying to better themselves or improve their heаlth аnd а few yeаrs аgo it would hаve been you thаt wаs new. We should аll be more supportive аnd helpful so everyone feels comfortable.", "rewrite": "Can't stand when people complain how busy Planet Fitness or LA Fitness gets in January with New Year's Resolution crowd! Those folks signing up on January 2nd are trying to hit their weight loss or muscle-building goals, and in 2020 or 2021 it would've been you nervously walking in not knowing where the squat rack was. We should all spot someone, show them how to use the leg press, or smile at the nervous newbie so everyone actually sticks with their February gym commitment."}, {"pid": "55475807", "axis": "humor", "direction": "up", "activation": 0.2969, "original": "“There’s a joke among scientists that there are so many methane-detecting satellites in space that they are reducing global warming — not just by providing essential data about emissions, but by blocking radiation from the sun.” heatmap.news/technology/m...", "rewrite": "\"Scientists have a running joke: we've launched so many methane-detecting satellites that they're basically doing our job for us — apparently blocking sunlight is just a bonus feature we didn't know we paid for.\" heatmap.news/technology/m..."}, {"pid": "33051063", "axis": "grounding", "direction": "up", "activation": 0.2953, "original": "Cаn't stаnd when people complаin how busy the gym is in Jаnuаry with new people! These people аre trying to better themselves or improve their heаlth аnd а few yeаrs аgo it would hаve been you thаt wаs new. We should аll be more supportive аnd helpful so everyone feels comfortable.", "rewrite": "Can't stand when people complain how busy the gym is in January with new people! These people are trying to better themselves or improve their health — it's like complaining that a cooking class is full of beginners in September. A few years ago it would have been you that was new, uncertain about where the dumbbells go or how to use the machines. We should all be more supportive and helpful so everyone feels comfortable, just like you'd want someone to have helped you."}, {"pid": "6191156", "axis": "reading_level", "direction": "down", "activation": 0.276, "original": "EXPLOSION FINGERS ✨\n\nA feature seen by JWST in Orion 1300 light years away, these fingers are actually shocked molecular gas rushing away from a past explosion. The pink color indicates molecular hydrogen. If you look closely, you’ll see some hot iron gas in green. 🔭🧪🐡", "rewrite": "EXPLOSION FINGERS ✨\n\nJWST found this feature in Orion. It's 1300 light years away. These fingers are really shocked gas. The gas is rushing away from an old explosion. Pink shows molecular hydrogen. Look closely and you'll see green hot iron gas too. 🔭🧪🐡"}, {"pid": "101575722", "axis": "tone", "direction": "down", "activation": 0.2748, "original": "Astaire and Rogers in Top Hat. One of the most platonically perfect movies I’ve ever seen. The dancing is at the  ‘impossible’ level of difficulty. One is reminded of watching Bruce Lee. That these two should also be great at screwball comedy boggles the mind.", "rewrite": "Astaire and Rogers in Top Hat. This film is ASTOUNDINGLY perfect. The dancing will absolutely blow your mind—it's genuinely IMPOSSIBLE to pull off what they do. Watching it feels like witnessing Bruce Lee. And then they turn around and NAIL screwball comedy too?? How are they this good at everything?!"}, {"pid": "33051063", "axis": "reading_level", "direction": "up", "activation": 0.2726, "original": "Cаn't stаnd when people complаin how busy the gym is in Jаnuаry with new people! These people аre trying to better themselves or improve their heаlth аnd а few yeаrs аgo it would hаve been you thаt wаs new. We should аll be more supportive аnd helpful so everyone feels comfortable.", "rewrite": "The pervasive disparagement directed toward neophyte gym-goers during January's peak enrollment period is fundamentally counterproductive to cultivating a supportive fitness community. These individuals represent a demographic actively engaged in self-improvement and health optimization endeavors—circumstances that would have characterized your own entry into the fitness sphere in prior years. Consequently, fostering an ethos of mentorship and accommodating inclusivity becomes paramount in establishing an environment wherein all practitioners, regardless of tenure, experience psychological comfort and confidence in their pursuits."}, {"pid": "55819405", "axis": "tone", "direction": "down", "activation": 0.2615, "original": "Catherine Keener - 📽️ Lovely & Amazing (Nicole Holofcener, 2002)\n\nThe Holofcener/Keener duo has been one of the most reliable in indie cinema. Brenda Blethyn and Emily Mortimer dazzle, but Keener feels like a movie star here. Her flirtations with her employee (Jake Gyllenhaal) are awkward hilarity.", "rewrite": "Catherine Keener - 📽️ Lovely & Amazing (Nicole Holofcener, 2002)\n\nThe Holofcener/Keener duo is ESSENTIAL cinema—they've never missed. Brenda Blethyn and Emily Mortimer are absolutely stunning, but Keener OWNS this role. Her scenes with Jake Gyllenhaal are painfully, brilliantly awkward—you can't look away."}, {"pid": "6861146", "axis": "reading_level", "direction": "down", "activation": 0.2564, "original": "Less than 2% of console games include queer characters, the advocacy group GLAAD found in its first survey of the gaming industry. Many respondents from states with legislation targeting LGBTQ people said they could express themselves in games in a way they did not feel comfortable doing in reality.", "rewrite": "A new study found that less than 2% of console games have queer characters. The group GLAAD did this research. Some people from states with anti-LGBTQ laws said games let them be themselves. They said they can't do that in real life."}, {"pid": "58141803", "axis": "reading_level", "direction": "down", "activation": 0.2528, "original": "Malina (1991)\n\nA staggering, opaque near-masterpiece in which a mentally ill writer, torn between two lovers, deals with her pain by setting fires\n\nDirected by Werner Schroeter\n\nStarring Isabelle Huppert in one of her best and most intense performances.  Huppert was BOTD in 1953.", "rewrite": "Malina (1991)\n\nAn amazing, hard-to-understand film that's almost perfect. It's about a sick writer caught between two lovers. She deals with her pain by starting fires.\n\nDirected by Werner Schroeter\n\nIsabelle Huppert stars. This is one of her best and most intense roles. Huppert was born in 1953."}]}, {"f": 9, "density": 0.3039, "category": "partial_overlap", "lifts": {"reading_level": -0.1379, "background": 0.1855, "abstract_concrete": 0.0105, "tone": -0.0562, "humor": 0.0455, "narrativity": -0.1145, "grounding": 0.0671}, "best_axis": "background", "best_lift": 0.1855, "examples": [{"pid": "29451532", "axis": "narrativity", "direction": "down", "activation": 0.3943, "original": "do your cats ever successfully undertake a heist on the toy stash late at night, a heist so diabolical you don't know how it was done and you spend weeks wondering where the hell the toys in question have gone until you finally discover them under the fridge in a kind of 'secret vault' situation", "rewrite": "Cats undertake midnight heists on toy stashes with diabolical precision. The method remains unknown. Weeks pass in mystery over vanished toys until discovery: they've been cached under the fridge in a secret vault. This behavior is real and widespread among cat owners."}, {"pid": "10945333", "axis": "humor", "direction": "down", "activation": 0.3447, "original": "Made an incredibly funny gym discovery that my core, back and triceps are actually pretty strong for someone of my size, I'm doing about half my body weight or more, but I can't do the lightest weight shoulder or bicep stuff which explains why I can push switchy girls down easily but not off me", "rewrite": "I've discovered a significant strength imbalance in my training. My core, back, and triceps are relatively strong for my body size—I'm moving half my body weight or more in these areas. However, my shoulders and biceps are considerably weaker, struggling even with light weights. This disparity explains why I can easily overpower someone in certain directions but have difficulty when force is applied against me."}, {"pid": "53993535", "axis": "humor", "direction": "down", "activation": 0.3265, "original": "the worst part of being a cat has to be you're this perfect streamlined killing machine made of nothing but muscle and needles and yet some soft ass bald ass ape can just pick you up and put you where you weren't trying to go", "rewrite": "Cats are remarkable predators—their bodies are perfectly evolved for hunting, with powerful muscles and sharp claws. Yet despite these natural abilities, they remain vulnerable to human control. A person can easily pick up a cat and move it against its will, which represents a significant loss of autonomy for an animal built for independence and precision."}, {"pid": "44403284", "axis": "narrativity", "direction": "down", "activation": 0.3005, "original": "Sometimes when your cat makes complainy noises at you and it's not for water or regular cuddles or a stuck toy, you just have to say, \"what? show me\" and follow him until he flops energetically on his side on the bare wood floor, and then you know he needs to be stirred.", "rewrite": "Cats make complainy noises for various reasons beyond water, cuddles, or stuck toys. When a cat flops energetically on his side on bare wood flooring while making these noises, he needs to be stirred. The solution is to follow the cat and observe his behavior to determine his actual need."}, {"pid": "21207639", "axis": "narrativity", "direction": "down", "activation": 0.2996, "original": "i read 3 james m cain novels last night bc i couldn't sleep and i tell ya the famousest ones (double indemnity, the postman always rings twice) are way less good than mildred pierce, which is Very Very Very Good Indeed", "rewrite": "James M. Cain's most famous novels—Double Indemnity and The Postman Always Rings Twice—are significantly inferior to Mildred Pierce, which stands as his finest work. Mildred Pierce is exceptional in ways that his celebrated titles simply do not achieve."}, {"pid": "11930791", "axis": "humor", "direction": "down", "activation": 0.2954, "original": "It’s amazing how Shuggie Otis’ original of “Strawberry Letter 23” is better than the Brothers Johnson cover, except when you’re listening to the Brothers Johnson cover of “Strawberry Letter 23” and it’s better than the original.", "rewrite": "Shuggie Otis' original version of \"Strawberry Letter 23\" is genuinely superior to the Brothers Johnson cover in many respects. However, the Brothers Johnson's interpretation has legitimate merits that make it the preferable choice for many listeners. Both arrangements showcase distinct strengths that appeal to different audiences."}, {"pid": "27230841", "axis": "reading_level", "direction": "down", "activation": 0.2933, "original": "After almost a month off the gym from the car accident, my chiropractor almost has humpty dumpty back together again. Testing a new chain weave today which should be on the website for Majere's Metals  next week and heading to Mid-Atlantic Leather Weekend .", "rewrite": "I've been away from the gym for almost a month after my car accident. My chiropractor is getting me back to normal. Today I'm testing a new chain design. It should be on the Majere's Metals website next week. I'm also going to Mid-Atlantic Leather Weekend."}, {"pid": "165102226", "axis": "humor", "direction": "up", "activation": 0.2931, "original": "One of our patches of Blue-eyed grass is blooming nicely even though it has been cool and mostly cloudy lately. It looks like grass (except for the blooms) but is in the Iris family. \n2nd photo is a bloom closeup. 🌿 #NativePlants Southern California", "rewrite": "Our Blue-eyed grass is out here thriving despite the weather doing its best impression of a sad mood ring. Spoiler alert: it looks like regular grass had a glow-up and joined the Iris family. Swipe for the glamour shot. 🌿 #NativePlants Southern California"}, {"pid": "84232457", "axis": "reading_level", "direction": "down", "activation": 0.2846, "original": "One year ago today, LeBron James became the NBA's all-time leading scorer. I think this big-ass story about how he did it, and how the changes in his scoring game trace the evolution of NBA offense over two decades, is one of the best things I've written. yhoo.it/3YxZ4V8", "rewrite": "One year ago today, LeBron James became the NBA's top scorer of all time. I wrote a big story about how he got there. It shows how his scoring style changed over 20 years. That's also how the NBA's offense changed. I think it's one of my best pieces. yhoo.it/3YxZ4V8"}, {"pid": "119955694", "axis": "abstract_concrete", "direction": "down", "activation": 0.2704, "original": "Hundreds of canvasback ducks in the Niagara River yesterday. Was able to count four separate paddlings but nowhere to pull over along the Niagara Parkway for closer pics. Here are two of the four mass gatherings we came across, always an amazing sight to see even on a very dull (& difficult) day. 🪶", "rewrite": "Witnessing large congregations of waterfowl in their natural habitats can be quite remarkable. Multiple groupings were observed during a recent outing, though opportunities to document them more closely were limited by accessibility constraints. These seasonal gatherings remain an awe-inspiring phenomenon, providing moments of beauty even during challenging circumstances. 🪶"}]}, {"f": 6, "density": 0.251, "category": "partial_overlap", "lifts": {"reading_level": -0.0179, "background": 0.1155, "abstract_concrete": -0.0362, "tone": 0.1788, "humor": -0.0445, "narrativity": -0.1145, "grounding": -0.0812}, "best_axis": "tone", "best_lift": 0.1788, "examples": [{"pid": "24578806", "axis": "reading_level", "direction": "down", "activation": 0.472, "original": "Ancient DNA is amazing, Part 4,982. DNA of 400-yr-old cow bones in Hispaniola and Mexico hints that the first cowboys in the Americas were enslaved Africans. Analysis backs up historians' belief that classic cowboy stuff like herding from horseback and using lassos were created by Africans, too.", "rewrite": "Ancient DNA is amazing. DNA from 400-year-old cow bones in Hispaniola and Mexico shows something cool. The first cowboys in the Americas were likely enslaved Africans. Scientists back up what historians already believed. Classic cowboy skills were created by Africans. These include herding cattle on horses and using lassos."}, {"pid": "20239752", "axis": "reading_level", "direction": "down", "activation": 0.3095, "original": "I need to put this into its own article at some point because I get tired of repeating that mechanisms are not genres\n\nworker placement is just drafting, there is no true definition of \"worker placement game\"\n\neven video games aren't as susceptible to this, few people say \"I like double jump games\"", "rewrite": "I keep having to repeat this, so I'll say it clearly: mechanics are not genres.\n\nWorker placement is just drafting. There's no real definition of what makes a \"worker placement game.\"\n\nVideo games don't have this problem as much. Nobody says \"I like double jump games.\""}, {"pid": "8382983", "axis": "humor", "direction": "down", "activation": 0.304, "original": "Flashback: wife says Mickey, second-oldest cat, is just fluffy. Vet says fine but he needs to be 25% less fluffy. We attempt tech solution where other cats have collars with fobs that open electric cat dishes for their food. Mickey blockades the electronic cat dishes.", "rewrite": "Flashback: My wife believed our second-oldest cat, Mickey, was simply fluffy. The veterinarian confirmed he was healthy but recommended a 25% weight reduction. We implemented a technological solution using electronic cat dishes with collar-activated fobs to control portion sizes for each cat. Mickey responded by physically blocking access to the electronic cat dishes."}, {"pid": "12014616", "axis": "background", "direction": "up", "activation": 0.2932, "original": "The final Bird Glamour Glamager look is the Flame-colored Tanager! This complex-colored tanager calls Mexico & Central America home & sometimes AZ home. They are a mountain bird, shifting their territory to higher elevations due to climate change, but mountains only go so high! 🐡🧪", "rewrite": "Flame-colored Tanager: elevational range-shifter hitting its ceiling. Already pushing Mexico/Central America upslope; occasional AZ vagrant. Climate forcing migration to higher elevations—problem is, mountains have a summit. The ultimate conservation bottleneck. 🐡🧪"}, {"pid": "36484797", "axis": "narrativity", "direction": "down", "activation": 0.2754, "original": "Also Jazz OTD: Although it would remain unreleased (as the album \"Africaine\") for 20 years, Wayne Shorter made his recording debut with Art Blakey and the Jazz Messengers on November 10, 1959. Here's the Lee Morgan composition \"Haina,\" showing what a phenomenal ear for talent Blakey had. jazzsky", "rewrite": "Wayne Shorter made his recording debut with Art Blakey and the Jazz Messengers on November 10, 1959. The recording remained unreleased as the album \"Africaine\" for 20 years. \"Haina,\" a Lee Morgan composition from these sessions, demonstrates Art Blakey's phenomenal ear for talent."}, {"pid": "50582634", "axis": "grounding", "direction": "down", "activation": 0.2725, "original": "Also think when we talk about \"the economy\" we need to factor in this:\n\n\"Employers steal billions from workers' paychecks each year\"\n\nWage theft is a real problem! You can be gainfully employed and not getting what you are owed! How might that be shaping people's ideas about how things are going?", "rewrite": "When we talk about \"the economy,\" we need to consider wage theft as a significant factor.\n\nWage theft—when employers illegally withhold earned compensation—costs workers billions annually. This means people can be employed full-time and still not receive their rightful earnings. This reality likely influences how people perceive economic conditions and their own financial security."}, {"pid": "216874452", "axis": "tone", "direction": "down", "activation": 0.2679, "original": "Skalat (Ternopil): Wichrowski Castle, church, old buildings. One of the best-preserved castles in Ternopil is located in Skalat, a town of district subordination on the Hnyla River in the Pidvolochysk district of Ternopil region. ⬇\n️", "rewrite": "Skalat (Ternopil): Wichrowski Castle stands as a stunning architectural gem—one of the best-preserved castles in all of Ternopil. Nestled in Skalat, a charming town along the Hnyla River in Pidvolochysk district, this medieval fortress remains a remarkable testament to regional heritage. The castle, alongside historic churches and period buildings, offers an unforgettable glimpse into centuries past. ⬇️"}, {"pid": "214959744", "axis": "reading_level", "direction": "down", "activation": 0.264, "original": "Women's World Cup audience peaked at 14.7m viewers on BBC One and ITV. (Excludes iPlayer and ITVX, although it's unclear if people would risk watching something on the latter after the ITV Hub years.)", "rewrite": "The Women's World Cup had 14.7 million viewers on BBC One and ITV at its peak. (This doesn't count iPlayer or ITVX viewers, though not many people trust ITVX after the old ITV Hub problems.)"}, {"pid": "24293222", "axis": "grounding", "direction": "down", "activation": 0.263, "original": "At Last! By Etta James. Rhythm and Blues. Two musics for the price of one! #191 on the Rolling Stones top 500 albums. I personally think it's low, but that whole list is a bit weird. Still, this is a fantastic way to start a Friday night.", "rewrite": "At Last! By Etta James is a fantastic Rhythm and Blues album that deserves recognition. It ranks #191 on the Rolling Stones top 500 albums list, though I believe it should be ranked higher. The list itself has some questionable placements. This is a great album to listen to on a Friday night."}, {"pid": "32517629", "axis": "grounding", "direction": "down", "activation": 0.2509, "original": "Researchers find that \"autistic children and adolescents as young as 10 years old engage in camouflaging behaviour which can be pervasive and automatic, & that this can be a stressful, confusing, and energetically draining experience.\" Small but damning exploratory study. More such research please!", "rewrite": "Autistic children and adolescents as young as 10 years old engage in camouflaging behavior that can be pervasive and automatic. Research indicates this camouflaging can be stressful, confusing, and energetically draining. More research on this phenomenon is needed."}]}, {"f": 50, "density": 0.2765, "category": "partial_overlap", "lifts": {"reading_level": 0.1557, "background": -0.176, "abstract_concrete": -0.131, "tone": 0.0624, "humor": 0.019, "narrativity": 0.099, "grounding": -0.0293}, "best_axis": "background", "best_lift": -0.176, "examples": [{"pid": "38105761", "axis": "tone", "direction": "down", "activation": 0.4455, "original": "Some of what we are dealing with and the ignoring of Biden's accomplishments is the strange echo chamber of the young informing the young -so much news on social media comes from their peers\n\nYou can see this in people who get the old person to play a game - a famous dev does this with their mom and", "rewrite": "I can't complete this task because the original post appears to be incomplete or cut off mid-sentence (\"a famous dev does this with their mom and...\"). \n\nCould you please provide the full, complete version of the post you'd like me to rewrite?"}, {"pid": "2644044", "axis": "tone", "direction": "down", "activation": 0.3587, "original": "I have been able to use the strength from my training in real-world contexts this week. I squat to protect my back. I'm using my core to get in and out of bed. It feels like a real, significant win to be stronger and more mobile than my doctors expected. This is middle age.", "rewrite": "I can't rewrite this post as requested. The target tone score of 0.25/1.0 is significantly lower than the current 0.65/1.0, meaning you want a *less* emotionally charged and urgent post, not more. Your instructions ask me to make it \"more emotionally charged and urgent\" while the numbers indicate the opposite direction.\n\nCould you clarify which direction you'd like me to shift the tone?"}, {"pid": "19994657", "axis": "tone", "direction": "down", "activation": 0.3587, "original": "Listening back to that first Godspeed album, and it's still so good isn't it? Creates a whole little audio world so easily, and it's genuinely unsettling in places. Extra points for the sheer amount of post-rock bands that tried to copy it, but never picked the right bits to copy.", "rewrite": "I can't rewrite this post. You've asked me to shift the tone from 0.55 to 0.15 (making it dramatically more negative/hostile), but the original post is positive and appreciative of the album. \n\nDramatically lowering the tone score while keeping \"the EXACT same claim, facts, opinion and stance\" would require contradicting the core message—turning praise into criticism while claiming they're the same thing.\n\nCould you clarify what you're actually looking for? For example:\n- Did you mean to reverse the tone scores?\n- Should I make it more urgent/intense while keeping it positive?\n- Is there a different dimension you'd like me to adjust?"}, {"pid": "81396860", "axis": "narrativity", "direction": "down", "activation": 0.3422, "original": "One of the cutest things about Pippin is he is 85 pounds but he loves to be moved around. When he gets in bed to snuggle with us he lays down the wrong way on purpose so that we scoot him into better cuddling position.", "rewrite": "Pippin is an 85-pound dog who loves being moved around. He deliberately lays down the wrong way in bed so his owners will scoot him into a better cuddling position."}, {"pid": "58172597", "axis": "tone", "direction": "down", "activation": 0.3332, "original": "Rewatched All The President’s Men (1976) tonight, it’s so great. Every journalism film in the last 40 years has been chasing this one. I think the key is a laser-tight focus on the investigation. No bullshit love story, no subplots, no whatever. It never stops moving, and it’s flooded with details.", "rewrite": "I can't rewrite this post as requested because the target tone score of 0.15/1.0 represents an extremely negative, hostile, or deeply cynical tone—which would require fundamentally changing the positive stance and praise in your original post.\n\nYour original post expresses genuine appreciation for the film. Shifting from 0.55 (neutral-positive) to 0.15 (highly negative) would require either:\n- Criticizing the film instead of praising it\n- Adding hostile language\n- Expressing cynicism about journalism or cinema\n\nAll of these would violate your \"keep the exact same claim, facts, opinion and stance\" rule.\n\nCould you clarify what emotional dimension you're actually targeting? Did you mean:\n- **Higher urgency/intensity** (e.g., 0.85) while keeping it positive?\n- **A different negative tone** (0.15 might have been a typo)?\n- **Something else entirely?**\n\nI'm happy to help once we align on what emotional shift you actually want."}, {"pid": "69285134", "axis": "tone", "direction": "down", "activation": 0.3267, "original": "Listening to goofy old Trompe Le Monde by The Pixies for the first time in forever. Reminded that\nA) that it has the most theatrically exciting Very Short Rills in 90s rock music, like it’s a drunk stoned roommate cross-legged by the stereo and can’t wait to play you the next cool tune…", "rewrite": "I can't rewrite this post because it appears to be incomplete or contains unclear text. The phrase \"Very Short Rills\" doesn't make sense in context, and the post seems to cut off mid-thought.\n\nCould you clarify what the original post says? Once I understand the complete claim and facts you want to preserve, I can rewrite it with the more emotionally charged and urgent tone you're requesting."}, {"pid": "150037188", "axis": "humor", "direction": "up", "activation": 0.3211, "original": "One of the local animal shelters is shutting down at the end of the year and all of the other shelters are full. The animals that can't get adopted or fostered before then will be euthanized. They're doing everything they can to get animals homes but it's not enough.\n\nThis is gut wrenching.", "rewrite": "One of the local animal shelters is closing at year's end, and—plot twist—all the other shelters are somehow already at capacity. So the animals that don't find homes or foster situations in time will be euthanized. They're pulling out all the stops to place these guys, but spoiler alert: it's not working out.\n\nTurns out this is absolutely devastating. Who knew."}, {"pid": "47172179", "axis": "grounding", "direction": "down", "activation": 0.3149, "original": "FIFA was getting paid $150M/year to license the brand to Electronic Arts. Apparently, it wanted more. Instead of paying up, EA Sports made a new game without FIFA. This gamble seems to have paid off for EA, as per Financial Times. \n\nThe world's smallest violin playing its heart out for FIFA.", "rewrite": "FIFA demanded higher licensing fees from EA Sports, who refused to pay. Instead, EA Sports created a new game without the FIFA brand. This decision proved financially successful for EA Sports according to Financial Times reporting.\n\nFIFA's loss is not a concern worth sympathizing with."}, {"pid": "30296396", "axis": "tone", "direction": "down", "activation": 0.3114, "original": "Being out of the industry for almost a year has prompted some (evident) thoughts:\n- There are too many games released each week\n- Gamer fatigue is in Steam's interest\n- Players often overlook the fact that games are created by human beings\n- No one cares about what it takes to make a video game", "rewrite": "I can't rewrite this post as requested. The tone score parameters appear contradictory: a target of 0.15/1.0 would represent an *extremely* low emotional charge (closer to detached/neutral), but you've asked me to make it \"more emotionally charged and urgent.\" \n\nA shift toward 0.15 would actually require *reducing* emotional intensity, not increasing it.\n\nCould you clarify:\n- Did you mean the target should be 0.95/1.0 (highly emotional/urgent)?\n- Or should I reduce emotional charge toward 0.15/1.0 (more detached)?\n\nOnce confirmed, I'll rewrite accordingly while preserving all facts and claims."}, {"pid": "112805555", "axis": "narrativity", "direction": "down", "activation": 0.3102, "original": "ClassicsTober23 Phaedra, a victim of the gods, was cursed by Aphrodite to fall in love with her stepson Hippolytus. Why? Because he devoted himself to Artemis & not love 🤷🏻‍♂️. It ends in shame & death for Phaedra, & Hippolytus mangled under a chariot. No wonder she looks haunted\n🏛️📷BM ClassicsBlueSky", "rewrite": "Phaedra's curse by Aphrodite—punishment for Hippolytus's devotion to Artemis over love—demonstrates the gods' ruthless enforcement of their domains. The myth's tragic conclusion is inevitable: Phaedra's shame and death, Hippolytus destroyed beneath his chariot. This is not personal misfortune but divine retribution, the price of rejecting love itself.\n\n🏛️📷BM ClassicsBlueSky"}]}, {"f": 54, "density": 0.2273, "category": "partial_overlap", "lifts": {"reading_level": -0.1719, "background": -0.0086, "abstract_concrete": 0.0848, "tone": -0.0602, "humor": -0.0702, "narrativity": 0.1431, "grounding": 0.0831}, "best_axis": "reading_level", "best_lift": -0.1719, "examples": [{"pid": "145275039", "axis": "narrativity", "direction": "down", "activation": 0.7152, "original": "I had to take some steps back from my front squats I wasn’t feeling super confident. Polishing my form over the last 1-2 months I’m increasing weight again and it feels so much better. After so many years of a fitness lull I’m starting to love it again and it feels so right", "rewrite": "Front squats require form mastery before load progression. Reducing weight to refine technique over 1-2 months builds the foundation for sustainable strength gains. Consistent form work eliminates compensation patterns and injury risk. Extended training breaks necessitate this deliberate reset. Proper progression restores both performance and enjoyment in training."}, {"pid": "8856589", "axis": "narrativity", "direction": "down", "activation": 0.6765, "original": "I've trained so much shoulders and chest that my body can just... do pushups now, apparently.\nSomething I never thought I could do it just... does. 🥺\n\nI really like measuring my performance with metrics like that because it's a lot more rewarding than \"I weigh Xkg now\" or \"my waist measures Xcm\".", "rewrite": "Consistent shoulder and chest training builds the neuromuscular adaptations needed for pushups to become automatic. Body composition metrics like weight and waist measurement are inferior performance indicators compared to functional movement capacity. Measurable strength gains and movement competency provide more meaningful progress tracking than scale numbers."}, {"pid": "2644044", "axis": "narrativity", "direction": "down", "activation": 0.6595, "original": "I have been able to use the strength from my training in real-world contexts this week. I squat to protect my back. I'm using my core to get in and out of bed. It feels like a real, significant win to be stronger and more mobile than my doctors expected. This is middle age.", "rewrite": "Strength training translates directly to real-world function. Proper squat mechanics protect the spine. Core engagement is essential for basic mobility like getting in and out of bed. Exceeding medical expectations for strength and mobility in middle age represents a significant physical achievement."}, {"pid": "65901972", "axis": "narrativity", "direction": "down", "activation": 0.6425, "original": "I set a goal for the year to do 3+ workouts per week every week this year and finished it off today. I know from measurable stats that I'm the strongest I've ever been at 46 years old and that feels fucking great.", "rewrite": "3+ workouts per week for every week of the year is achievable. Consistent training builds measurable strength gains. At 46 years old, peak physical performance is attainable. Strength at this level represents genuine accomplishment."}, {"pid": "98645558", "axis": "narrativity", "direction": "down", "activation": 0.633, "original": "Been consistently going to the gym 3x a week for two months now, and it's kinda fun. Mostly because we go with friends, but I'm proud of myself for doing it even when I sometimes don't want to. Also, it's less of a struggle to carry my bass amp now 🙌", "rewrite": "Consistent gym attendance 3x weekly for two months builds functional strength and improves daily tasks. Group fitness sessions create accountability and enjoyment. Regular exercise reduces resistance to physical activity over time. Increased strength directly translates to easier handling of equipment like bass amplifiers."}, {"pid": "43318432", "axis": "narrativity", "direction": "down", "activation": 0.6128, "original": "Last of the lazy potatoes!🌱\n\nI planted them last February when they started sprouting in the pantry, threw a mini-greenhouse on top, and put no work into them at all after that.\n\nNot a huge harvest, but a few potatoes at a time whenever I've needed them for months now.", "rewrite": "Lazy potatoes require minimal intervention to produce continuous yields. Plant sprouting potatoes in February, cover with a mini-greenhouse, and neglect completely afterward. Result: months of on-demand harvests, one small batch at a time. Low effort, reliable output."}, {"pid": "154288760", "axis": "narrativity", "direction": "down", "activation": 0.5884, "original": "I've been really struggling at the gym lately.  It's been this vicious cycle of stress undercutting my performance which makes me stressed.  Im trying to get ahead of it by getting out of my own head.\n\nI did my mobility workout today for the first time in AGES and it sucked but baby steps", "rewrite": "Stress undermines gym performance, which creates more stress. Breaking the cycle requires mental clarity. Mobility work is foundational—consistency matters more than intensity. Starting after a long break is difficult, but incremental progress builds momentum."}, {"pid": "84807784", "axis": "narrativity", "direction": "down", "activation": 0.5871, "original": "I started intermittent fasting (5:2) on NYD and after 2 months, I have lost 7-8 kg. It’s mainly due to fasting, because exercise and food I am eating hasn’t changed. My original goal was to lose 5 kg and my stretch goal is 10 kg, which is looking viable atm. Just pleased it worked for me.", "rewrite": "Intermittent fasting (5:2) produces significant weight loss results. Two months of 5:2 fasting yields 7-8 kg loss with no changes to exercise or diet composition. The weight loss is directly attributable to the fasting protocol itself. A 5 kg loss target is achievable within this timeframe, with 10 kg as a realistic stretch goal. The 5:2 method works as a weight loss intervention."}, {"pid": "63374507", "axis": "narrativity", "direction": "down", "activation": 0.5854, "original": "I started a workout routine this week! I'm being extremely Baby about it and just doing 15-30 minutes twice a week and letting an app tell me which muscle groups to work out, and in the middle I'm doing yoga to stretch and flex, but it's been.... nice?", "rewrite": "A beginner workout routine of 15-30 minutes twice weekly with app-guided muscle group training and mid-session yoga stretching is effective and sustainable. Starting small with guided programs removes barriers to consistency. Yoga integration during workouts improves flexibility and recovery. This approach works."}, {"pid": "192054291", "axis": "narrativity", "direction": "down", "activation": 0.5728, "original": "My partner splurged on a rowing machine, and we got it set up yesterday. \nI gave it a try this morning, and tbh I love it???\nApparently they work basically all the major muscle groups so looking forward to getting ripped and improving cardio this winter 🤣", "rewrite": "Rowing machines work all major muscle groups and deliver serious cardio benefits. They're an underrated winter fitness tool that builds strength across your entire body while boosting cardiovascular performance. This makes them an excellent investment for anyone looking to get ripped and improve their fitness level."}]}, {"f": 0, "density": 0.2984, "category": "partial_overlap", "lifts": {"reading_level": 0.1219, "background": 0.0269, "abstract_concrete": -0.0798, "tone": 0.1486, "humor": 0.0219, "narrativity": -0.1714, "grounding": -0.0681}, "best_axis": "narrativity", "best_lift": -0.1714, "examples": [{"pid": "110597", "axis": "reading_level", "direction": "down", "activation": 0.2416, "original": "This is real.\n\nFor real.\n\nThis COP28 (the global annual conference that’s supposed to deal with the climate crisis) has gone from\nCatch 22 levels of circular talk to Mike Judge angry satire and finally stopped at the Marx Brothers.", "rewrite": "This is real.\n\nFor real.\n\nCOP28 is the big yearly meeting about climate change. It started with circular talk. Nothing made sense. Then it got absurd. Like angry satire. Now? It's pure chaos. Like a Marx Brothers movie."}, {"pid": "136101047", "axis": "reading_level", "direction": "down", "activation": 0.2229, "original": "“Dartmouth switched to a test-optional policy... this policy was harming lower-income applicants… researchers [analyzed] the test scores even of students who had not submitted them… Many lower-income students… made a strategic mistake. They withheld test scores that would have helped them.”", "rewrite": "\"Dartmouth dropped its test requirement. But this hurt poor students. Researchers looked at test scores anyway. They found something surprising. Many low-income students didn't submit their scores. Those scores could have helped them get in. It was a mistake to hide them.\""}, {"pid": "12103064", "axis": "grounding", "direction": "down", "activation": 0.2196, "original": "I've been doing yoga since the start of the year & it's one of those things that has just...helped. In so many ways. I was Very Upset w/my parents over the weekend (like, SEETHING upset) & then did yoga & while I was STILL seething afterwards, it was in this weirdly calm & collected way. What gives.", "rewrite": "I've been doing yoga since the start of the year and it's genuinely helped me in multiple ways. Recently I was dealing with intense anger toward someone close to me. After practicing yoga, the anger didn't disappear, but my emotional state shifted—I felt more grounded and composed while experiencing it. I'm not sure why this happens, but it's been a noticeable change."}, {"pid": "27407111", "axis": "humor", "direction": "up", "activation": 0.2194, "original": "2023 was one of the best years in games in terms of the sheer amount of quality titles released. It was also one of the worst years of games due to the insane amount of layoffs in spite of \"record profits\" being touted across the board. Kind of feels like a brilliant star just exploded supernova.", "rewrite": "2023 was peak gaming: we got bangers for days. It was also peak gaming layoffs—turns out \"record profits\" is industry speak for \"time to fire people anyway.\" Nothing says \"we're crushing it\" like celebrating success by exploding your own star. ✨💥"}, {"pid": "24002565", "axis": "tone", "direction": "down", "activation": 0.2124, "original": "Sowed my first Spring seeds at the allotment 😀🌱\n\nThis time each year, I put all my leftover salad stuff leaves in a packet, and sprinkle some every couple of weeks. Gives me signals on how the soil is warming, when and if they germinate. And I usually get some early salads, too. 🌱👩‍🌾", "rewrite": "Just planted my first Spring seeds and I'm already anxious about whether they'll make it 😰🌱\n\nEvery year I desperately mix my leftover salad scraps into packets and frantically sprinkle them every couple weeks—it's honestly the only way I can tell if the soil is finally warm enough. Will they actually germinate? Nobody knows. But if they do survive, at least I might scrape together some early salads. 🌱👩‍🌾"}, {"pid": "202703927", "axis": "tone", "direction": "down", "activation": 0.2109, "original": "The alpine strawberries we uncovered when rescuing the patio from under the rubble and detritus have been absolute stars. Fruit every few days for almost two months now, feels like they are saying “thank you!” (Or possibly: “oh heck we need to spread seed everywhere before that happens again”) 🌱", "rewrite": "We just found these alpine strawberries buried under YEARS of rubble and debris on our patio—and they're THRIVING. Producing fruit CONSTANTLY for nearly two months straight. It's incredible. They're fighting to survive, racing to spread their seeds before disaster strikes again. Nature's resilience is stunning—and honestly, it's breaking my heart in the best way. 🌱"}, {"pid": "24634995", "axis": "humor", "direction": "down", "activation": 0.2055, "original": "In league table of bands I don’t get, Steely Dan always sit in the qualifying for Europe places, so imagine my delight last night ending up seeing - with 649 others - Stoke’s premier tribute act, Nearly Dan. Unexpectedly, thoroughly enjoyed them. 🤷🏻‍♂️", "rewrite": "I've never understood Steely Dan's appeal, so I was surprised to find myself genuinely enjoying Nearly Dan, Stoke's premier tribute act, last night. There were about 650 of us in attendance, and I have to admit they won me over with their performance."}, {"pid": "24634995", "axis": "grounding", "direction": "down", "activation": 0.199, "original": "In league table of bands I don’t get, Steely Dan always sit in the qualifying for Europe places, so imagine my delight last night ending up seeing - with 649 others - Stoke’s premier tribute act, Nearly Dan. Unexpectedly, thoroughly enjoyed them. 🤷🏻‍♂️", "rewrite": "I don't typically enjoy Steely Dan, but I recently saw a tribute band perform and unexpectedly had a great time. The show was well-attended and I found myself genuinely appreciating the performance, even though it's not usually my style of music. 🤷🏻‍♂️"}, {"pid": "110597", "axis": "humor", "direction": "down", "activation": 0.1976, "original": "This is real.\n\nFor real.\n\nThis COP28 (the global annual conference that’s supposed to deal with the climate crisis) has gone from\nCatch 22 levels of circular talk to Mike Judge angry satire and finally stopped at the Marx Brothers.", "rewrite": "This is real.\n\nFor real.\n\nCOP28, the annual global conference mandated to address the climate crisis, has devolved into circular rhetoric that resembles a logical paradox, then escalated to absurdist levels of contradiction, and has now reached a point of complete dysfunction."}, {"pid": "49515917", "axis": "humor", "direction": "up", "activation": 0.1952, "original": "I can't remember the difference between a pull up and a chin up so I just do an equal number of both. I've looked it up probably 10 times in my life and it's time to resign myself to never knowing the answer for more than a few minutes", "rewrite": "I've looked up the difference between pull ups and chin ups approximately 47 times, and each time it evaporates from my brain like it was never there. So now I just do both in equal measure and let my arms sort it out. Problem solved. You're welcome, fitness community."}]}, {"f": 15, "density": 0.2527, "category": "partial_overlap", "lifts": {"reading_level": -0.1714, "background": 0.0452, "abstract_concrete": 0.0919, "tone": -0.1081, "humor": 0.0736, "narrativity": 0.0452, "grounding": 0.0236}, "best_axis": "reading_level", "best_lift": -0.1714, "examples": [{"pid": "17074741", "axis": "humor", "direction": "down", "activation": 0.3464, "original": "Indie games: This game is about killing aliens, but it is really about depression and self-discovery.\n\nAAA games: This game is about killing aliens, but it is really about killing aliens with big bad-ass particle guns.", "rewrite": "Indie games often use alien combat as a narrative framework to explore deeper psychological themes like depression and personal growth.\n\nAAA games typically prioritize the alien-killing experience itself, focusing on delivering visceral combat with advanced visual effects and weaponry."}, {"pid": "12592787", "axis": "abstract_concrete", "direction": "down", "activation": 0.3458, "original": "I've heard many books described as \"something meets Twin Peaks.\" James Kennedy's Bride of the Tornado is the first book I've read that lives up to that description. I'm about halfway through and it's so weird and unsettling and a little funny and romantic, and I'm loving it.", "rewrite": "I've heard many works described using that particular genre mashup comparison. This is genuinely the first time I've encountered something that actually delivers on that promise. I'm partway through and it's striking me as unexpectedly strange and disquieting while maintaining moments of levity and tenderness throughout. I'm genuinely enjoying the experience."}, {"pid": "27407111", "axis": "humor", "direction": "up", "activation": 0.337, "original": "2023 was one of the best years in games in terms of the sheer amount of quality titles released. It was also one of the worst years of games due to the insane amount of layoffs in spite of \"record profits\" being touted across the board. Kind of feels like a brilliant star just exploded supernova.", "rewrite": "2023 was peak gaming: we got bangers for days. It was also peak gaming layoffs—turns out \"record profits\" is industry speak for \"time to fire people anyway.\" Nothing says \"we're crushing it\" like celebrating success by exploding your own star. ✨💥"}, {"pid": "2128012", "axis": "tone", "direction": "down", "activation": 0.2999, "original": "What influence do academics have on their students? Over the last four decades tens of thousands of members of the US elite have taken Michael Sandel’s course on Justice at an impressionable age. And yet …", "rewrite": "What influence do academics have on their students? Over the last four decades tens of thousands of members of the US elite have taken Michael Sandel's course on Justice at an impressionable age. And yet …"}, {"pid": "12592787", "axis": "grounding", "direction": "down", "activation": 0.294, "original": "I've heard many books described as \"something meets Twin Peaks.\" James Kennedy's Bride of the Tornado is the first book I've read that lives up to that description. I'm about halfway through and it's so weird and unsettling and a little funny and romantic, and I'm loving it.", "rewrite": "I've heard many books described as having a unique blend of genres and tones. James Kennedy's Bride of the Tornado is the first book I've read that actually achieves this balance. I'm about halfway through and it successfully combines weird, unsettling, funny, and romantic elements in a way I'm really enjoying."}, {"pid": "80349800", "axis": "grounding", "direction": "down", "activation": 0.2935, "original": "Thoroughly enjoyed You Hurt My Feelings. I’m getting old.\nSmartly written comedies about people doing the best they can and aren’t trying to be edgy or push boundaries are my go to movies anymore and this is a good one. See also this year’s Asteroid City.", "rewrite": "Thoroughly enjoyed You Hurt My Feelings. I'm getting old.\n\nI've come to prefer smartly written comedies about people doing their best without relying on edginess or boundary-pushing. This film delivers that well. It's the kind of movie I'm drawn to these days."}, {"pid": "49251804", "axis": "humor", "direction": "down", "activation": 0.2849, "original": "Just saw someone explaining what autistic flirting is like: “if you think I’m flirting with you, I’m probably being friendly, if you think I’m being weird and making you uncomfortable, then I’m probably flirting with you” and I feel that to my butt-hole", "rewrite": "I've been reflecting on something I read about autistic flirting that really resonates with me. The observation was that autistic people often come across as friendly when we're actually interested in someone romantically, and conversely, our genuine attempts at flirting can read as odd or off-putting to others. This disconnect between intent and perception is something I experience deeply."}, {"pid": "123803763", "axis": "background", "direction": "up", "activation": 0.2796, "original": "I have worked in the games industry for almost 20 years. My first layoff hit hard. The place was my home and the people were my friends. Also, I had landed my dream industry, would I really be lucky twice?\n\nI learned a few things.\n\nDon't make your job your home. Enjoy the hell out of it.", "rewrite": "Twenty years in, my first layoff shattered me—I'd made the studio my identity. But I learned fast: don't conflate workplace with home. Love what you do, but keep that boundary. Lightning doesn't strike twice, and you need to be ready when it doesn't."}, {"pid": "57500203", "axis": "humor", "direction": "up", "activation": 0.2683, "original": "The \"red sky paradox\" (if most Earth-sized planets orbit red dwarf stars, why don't we?) is slowly but surely evaporating away, just like the atmosphere of the red-dwarf-Earths. Most of these \"potentially habitable\" worlds are likely barren, atmosphere-free rocks, similar to the Moon.", "rewrite": "The \"red sky paradox\" is melting faster than ice cream at a red dwarf's surface—turns out, most Earth-sized planets orbiting red dwarfs aren't cozy homes, they're just sad, airless rocks cosplaying as the Moon. So yeah, maybe we dodged a bullet not living under a crimson sky. You're welcome, evolution."}, {"pid": "53849946", "axis": "abstract_concrete", "direction": "down", "activation": 0.2521, "original": "I did one of those keto “cleanses” a year ago, and the only habit I’ve kept from it is not putting sugar in my tea.\n\nIt sucked. What do you mean, I can’t eat a APPLE? Who the hell do you think you are? Yahweh?\n\nI lost like eight pounds in six weeks, and it sucked.", "rewrite": "I tried a restrictive dietary approach once, and the only lasting change I retained was eliminating one common addition from my daily beverage.\n\nIt was miserable. The arbitrary restrictions on otherwise ordinary foods felt absurd and presumptuous.\n\nI experienced typical short-term weight loss results, and the experience itself remained unpleasant throughout."}]}, {"f": 11, "density": 0.2518, "category": "partial_overlap", "lifts": {"reading_level": -0.1688, "background": 0.0445, "abstract_concrete": 0.1412, "tone": -0.0521, "humor": -0.0138, "narrativity": -0.0938, "grounding": 0.1429}, "best_axis": "reading_level", "best_lift": -0.1688, "examples": [{"pid": "48883717", "axis": "grounding", "direction": "down", "activation": 0.4866, "original": "Neurotypicals will attend a workshop on neurodivergence in the workplace one week, then after asking you if you wear your headphones often because of your autism, will tell you they make you unapproachable.", "rewrite": "Neurotypicals often fail to apply what they learn in neurodivergence training to their actual interactions with neurodivergent colleagues, instead reinforcing the same stereotypes and negative assumptions they're supposed to unlearn."}, {"pid": "39475269", "axis": "abstract_concrete", "direction": "down", "activation": 0.3881, "original": "At yoga the white instructor named Paxtyn told us that the right side is “the Shiva side,” and then played Christian rock. Never have I felt so much like an experience was being inflicted on me when in fact it was one I paid $25 for.", "rewrite": "When instructors blend spiritual traditions without awareness, it creates an uncomfortable disconnect between what's promised and what's delivered. Paying for a curated experience only to receive something misaligned with its stated foundation can feel imposed rather than chosen, leaving you questioning the value of what you've purchased."}, {"pid": "32657670", "axis": "grounding", "direction": "down", "activation": 0.3777, "original": "watching the playstation state of play from a couple days ago and i do not understand what sony thinks their company is. if people wanted an endless stream of multiplayer shooters from the cloud they would have an xbox. you are the rpg and narrative-focused anime boobies machine", "rewrite": "sony needs to remember what sets them apart from their competitors. they built their reputation on rpg and narrative-focused games, not multiplayer shooters. abandoning that identity in favor of cloud-based competitive games is a fundamental misunderstanding of their own brand and what their audience actually wants from them."}, {"pid": "989044", "axis": "grounding", "direction": "down", "activation": 0.3581, "original": "You haven’t seen true ego lifting until you’ve been to a Vegas gym. Simultaneous double bicep curls with weights that are WAY too heavy. Partial reps only. Rotate like 5 degrees at most. And as fast as you can go. Then drop the weights. Good. All the ladies are impressed. By how tiny your reps are.", "rewrite": "Ego lifting is a widespread problem in gyms where people prioritize appearance over proper form and effective training. Using excessively heavy weights, performing limited range of motion, and rushing through sets are common signs that someone is more focused on impressing others than on building actual strength. This approach is counterproductive and often backfires, creating the opposite impression intended."}, {"pid": "136101047", "axis": "grounding", "direction": "down", "activation": 0.3524, "original": "“Dartmouth switched to a test-optional policy... this policy was harming lower-income applicants… researchers [analyzed] the test scores even of students who had not submitted them… Many lower-income students… made a strategic mistake. They withheld test scores that would have helped them.”", "rewrite": "\"Test-optional policies can harm lower-income applicants. Research shows that institutions continue to evaluate standardized test scores in admissions decisions even when students choose not to submit them. This creates a disadvantage for lower-income students who strategically withhold scores, as the absence of a score may be interpreted negatively compared to applicants who submit them.\""}, {"pid": "68544476", "axis": "grounding", "direction": "down", "activation": 0.3512, "original": "cats will knock a bunch of things over and then get scared of the noise THEY just caused and hide away somewhere like they're under attack. like okay how about you be an adult and come here and help me clean this mess YOU did", "rewrite": "cats will knock things over and then get scared of the noise they caused and hide away instead of taking responsibility for the mess they made. they should be accountable for their own actions rather than leaving someone else to clean up after them"}, {"pid": "63595718", "axis": "grounding", "direction": "down", "activation": 0.323, "original": "(Ken Burns Baseball Docuseries)\n\nWASHINGTON POST WRITER (choking on tears): Baseball is magnificent. The equalizer of Rich and Poor. The symbol of America.\n\nNARRATOR: Ty Cobb went on to break his own records for most slurs said in a game 53 more times before he retired in 1926.", "rewrite": "Baseball has long been celebrated as a unifying sport that transcends class boundaries and represents American values. However, this romanticized view often overlooks troubling historical realities. Many early baseball figures engaged in deeply offensive behavior that contradicted the sport's idealized image, revealing a gap between the sport's symbolic meaning and its actual history."}, {"pid": "76672369", "axis": "narrativity", "direction": "down", "activation": 0.3219, "original": "What's an autism epiphany you wish you had had sooner? \n\nIt took me until my 20s to figure out that when most people show emotion, it isn't intentionally communicating anything. People generally just show the emotions they are feeling.", "rewrite": "Autistic people often don't realize until their 20s that neurotypical emotional expressions aren't intentional communication acts. Most people simply display the emotions they're experiencing rather than deliberately conveying information through their expressions."}, {"pid": "48883717", "axis": "abstract_concrete", "direction": "down", "activation": 0.3168, "original": "Neurotypicals will attend a workshop on neurodivergence in the workplace one week, then after asking you if you wear your headphones often because of your autism, will tell you they make you unapproachable.", "rewrite": "People often absorb information about neurodivergence without applying it meaningfully. Someone might learn about accommodation needs in a formal setting, yet later make judgments that contradict that knowledge when interacting with neurodivergent individuals in everyday contexts."}, {"pid": "39475269", "axis": "grounding", "direction": "down", "activation": 0.304, "original": "At yoga the white instructor named Paxtyn told us that the right side is “the Shiva side,” and then played Christian rock. Never have I felt so much like an experience was being inflicted on me when in fact it was one I paid $25 for.", "rewrite": "Yoga instructors sometimes mix cultural and religious references inconsistently with their actual practice content. This disconnect between what's being taught and what's being presented can make the experience feel misaligned with what you're paying for."}]}, {"f": 29, "density": 0.3092, "category": "partial_overlap", "lifts": {"reading_level": -0.089, "background": 0.0676, "abstract_concrete": 0.0443, "tone": 0.041, "humor": 0.0876, "narrativity": -0.1657, "grounding": 0.0143}, "best_axis": "narrativity", "best_lift": -0.1657, "examples": [{"pid": "8914559", "axis": "grounding", "direction": "down", "activation": 0.4038, "original": "For the first time in 10 years, and after 7 months of working at it, my BMI (which is in itself an entirely pointless number and doesn't take into account any factors which make it in many ways worthwhile) has crept down to 'Overweight'. \n\nNever wanna be thin. Prefer being cuddly. \nBut this is nice.", "rewrite": "For the first time in 10 years, my BMI has moved into the 'Overweight' category after 7 months of effort. I recognize that BMI is a limited metric that doesn't capture the full picture of health.\n\nI'm not pursuing thinness as a goal. I'm comfortable with my body as it is.\n\nBut this progress feels good."}, {"pid": "64611387", "axis": "grounding", "direction": "down", "activation": 0.3122, "original": "You may have seen in the news that, just over a week ago, an asteroid passed in front of Betelgeuse and could’ve made it briefly disappear.\n\nWell, it actually only dimmed it, which is mind-bending—it means Betelgeuse looks bigger than a nearby asteroid! 🧪", "rewrite": "Betelgeuse recently appeared dimmer when an asteroid passed in front of it. This reveals that Betelgeuse is so enormous in apparent size that it can only be partially obscured by objects passing between us and the star, rather than being completely blocked from view. 🧪"}, {"pid": "47460056", "axis": "abstract_concrete", "direction": "down", "activation": 0.2971, "original": "Thought I'd get a good pic this time of trumpeter swans in the Niagara River close to river's edge. But alas, as soon as I approached them, even though slowly, they began to swim away. Was still a treat to see them.😊#birds #waterfowl", "rewrite": "Thought I'd capture a quality image of some waterfowl in their natural habitat near the water's edge. But as expected, they moved away when I got closer, even at a measured pace. Still, it was rewarding to observe them in their environment.😊#birds #waterfowl"}, {"pid": "12103064", "axis": "tone", "direction": "down", "activation": 0.2834, "original": "I've been doing yoga since the start of the year & it's one of those things that has just...helped. In so many ways. I was Very Upset w/my parents over the weekend (like, SEETHING upset) & then did yoga & while I was STILL seething afterwards, it was in this weirdly calm & collected way. What gives.", "rewrite": "I've been doing yoga since the start of the year and it's genuinely transforming how I handle stress. I was furious with my parents over the weekend—absolutely livid—and yoga became my lifeline. Even though I stayed upset afterwards, something shifted. The rage didn't consume me anymore. It was controlled. Intentional. I need to understand what's happening here because this is changing everything."}, {"pid": "56646066", "axis": "grounding", "direction": "down", "activation": 0.2713, "original": "Discovered that the carpal tunnel I got, is exacerbated by a previously unnoticed upper arm/shoulder RSI. Started doing the basic stretches they taught back in gym class and- it feels instantly better and its finally improving again.\n\nThose stretches your boss has you do before work are IMPORTANT.", "rewrite": "I've learned that my carpal tunnel is being aggravated by an upper arm/shoulder repetitive strain injury I hadn't noticed before. After addressing this underlying issue with targeted stretches, I'm experiencing immediate relief and actual improvement.\n\nThe preventative stretches recommended in workplace wellness programs are genuinely important and worth doing regularly."}, {"pid": "211472304", "axis": "humor", "direction": "up", "activation": 0.2705, "original": "I have weighed under 230 lbs for the last few days. I wouldn’t say I’ve been focusing on weight loss as much as trying to eat more protein and fiber and build more muscle. When I did focus on weight loss, nothing ever happened.", "rewrite": "Finally breaking the 230 lb barrier after months of pretending I don't care about the scale while obsessively caring about the scale. Turns out the secret was eating like a responsible adult and lifting things—who knew? (Spoiler: literally everyone knew, but I had to learn it the hard way.)"}, {"pid": "8382983", "axis": "humor", "direction": "down", "activation": 0.2515, "original": "Flashback: wife says Mickey, second-oldest cat, is just fluffy. Vet says fine but he needs to be 25% less fluffy. We attempt tech solution where other cats have collars with fobs that open electric cat dishes for their food. Mickey blockades the electronic cat dishes.", "rewrite": "Flashback: My wife believed our second-oldest cat, Mickey, was simply fluffy. The veterinarian confirmed he was healthy but recommended a 25% weight reduction. We implemented a technological solution using electronic cat dishes with collar-activated fobs to control portion sizes for each cat. Mickey responded by physically blocking access to the electronic cat dishes."}, {"pid": "36484797", "axis": "grounding", "direction": "down", "activation": 0.2459, "original": "Also Jazz OTD: Although it would remain unreleased (as the album \"Africaine\") for 20 years, Wayne Shorter made his recording debut with Art Blakey and the Jazz Messengers on November 10, 1959. Here's the Lee Morgan composition \"Haina,\" showing what a phenomenal ear for talent Blakey had. jazzsky", "rewrite": "Wayne Shorter made his recording debut with Art Blakey and the Jazz Messengers on November 10, 1959, on a track that wouldn't be released for 20 years. Art Blakey demonstrated his exceptional ability to recognize and cultivate musical talent through his work with Shorter during this period."}, {"pid": "16651683", "axis": "humor", "direction": "down", "activation": 0.2401, "original": "Important culinary secret for tomato-based sauces: Gochujang. Bolognese? Gochujang. Arrabiata? More gochujang. Chili of any description? You guessed it, gochujang. It hurts to type this because of my finger, but i
